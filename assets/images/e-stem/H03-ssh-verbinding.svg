<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0E14"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
    <marker id="arrowSSH" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#A855F7"/>
    </marker>
    <marker id="arrowSSH2" markerWidth="10" markerHeight="8" refX="2" refY="4" orient="auto-start-reverse">
      <path d="M10,0 L10,8 L0,4 z" fill="#A855F780"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Titel -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E8E9F3">SSH — REMOTE VERBINDING MET RASPBERRY PI</text>
  <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6E8E" letter-spacing="0.1em">SECURE SHELL — VERSLEUTELDE TEKSTCOMMANDO'S OVER HET LAN</text>
  <line x1="80" y1="64" x2="720" y2="64" stroke="#1F2035" stroke-width="1"/>

  <!-- Laptop (links) -->
  <!-- Scherm -->
  <rect x="60" y="100" width="200" height="130" rx="8" fill="#13141D" stroke="#A855F7" stroke-width="2"/>
  <rect x="68" y="108" width="184" height="110" rx="4" fill="#0D0E14"/>
  <!-- Terminal venster -->
  <rect x="72" y="112" width="176" height="100" rx="3" fill="#09090F"/>
  <text x="76" y="128" font-family="monospace" font-size="9" fill="#22C55E">pi@laptop:~$</text>
  <text x="76" y="142" font-family="monospace" font-size="9" fill="#A855F7">ssh pi@192.168.1.50</text>
  <text x="76" y="156" font-family="monospace" font-size="9" fill="#6B6E8E">password: ••••••</text>
  <text x="76" y="170" font-family="monospace" font-size="9" fill="#22C55E">pi@raspberrypi:~$</text>
  <text x="76" y="184" font-family="monospace" font-size="9" fill="#A8AACB">ls -la</text>
  <text x="76" y="198" font-family="monospace" font-size="9" fill="#6B6E8E">_</text>
  <!-- Laptop base -->
  <rect x="48" y="230" width="224" height="10" rx="3" fill="#1A1C28" stroke="#2A2C45" stroke-width="1"/>
  <rect x="120" y="240" width="80" height="5" rx="1" fill="#2A2C45"/>
  <!-- Label -->
  <text x="160" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#A855F7">LAPTOP / PC</text>
  <text x="160" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">SSH-client</text>
  <text x="160" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6E8E">IP: 192.168.1.10</text>

  <!-- SSH tunnel arrow (bidirectioneel) -->
  <!-- Heen -->
  <rect x="290" y="150" width="220" height="50" rx="8" fill="#A855F715" stroke="#A855F7" stroke-width="2"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#A855F7">SSH — Poort 22</text>
  <text x="400" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Versleuteld kanaal (AES)</text>

  <!-- Pijl laptop naar pi -->
  <line x1="265" y1="168" x2="288" y2="168" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowSSH)"/>
  <!-- Pijl pi naar laptop -->
  <line x1="512" y1="182" x2="535" y2="182" stroke="#A855F780" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="265" y1="182" x2="288" y2="182" stroke="#A855F780" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Raspberry Pi (rechts) -->
  <rect x="540" y="100" width="200" height="140" rx="8" fill="#13141D" stroke="#A855F7" stroke-width="2"/>
  <!-- Pi board simulatie -->
  <rect x="548" y="108" width="184" height="120" rx="6" fill="#0D1F14" opacity="0.8"/>
  <!-- CPU -->
  <rect x="600" y="140" width="60" height="50" rx="4" fill="#1A1C28" stroke="#A855F7" stroke-width="1"/>
  <text x="630" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#A855F7">BCM2711</text>
  <text x="630" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6B6E8E">4-core ARM</text>
  <!-- GPIO stub -->
  <rect x="695" y="118" width="30" height="16" rx="2" fill="#2A2C45" stroke="#A855F750" stroke-width="1"/>
  <text x="710" y="128" text-anchor="middle" font-family="monospace" font-size="7" fill="#A855F7">GPIO</text>
  <!-- Ethernet port -->
  <rect x="540" y="192" width="20" height="16" rx="2" fill="#00C2A8" stroke="#00C2A8" stroke-width="1" opacity="0.8"/>
  <text x="550" y="203" text-anchor="middle" font-family="monospace" font-size="6" fill="#0D0E14" font-weight="700">ETH</text>
  <!-- Status LED -->
  <circle cx="705" cy="200" r="5" fill="#22C55E" opacity="0.9"/>
  <!-- Label -->
  <text x="640" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#A855F7">RASPBERRY PI</text>
  <text x="640" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">SSH-server (sshd)</text>
  <text x="640" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6E8E">IP: 192.168.1.50</text>

  <!-- Netwerk/Router in midden onderaan -->
  <rect x="328" y="295" width="144" height="50" rx="8" fill="#1A1C28" stroke="#00C2A8" stroke-width="1.5"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#00C2A8">LAN / Router</text>
  <text x="400" y="331" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6B6E8E">192.168.1.0/24</text>

  <!-- Kabel laptop naar router -->
  <line x1="220" y1="290" x2="328" y2="315" stroke="#00C2A850" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Kabel pi naar router -->
  <line x1="552" y1="206" x2="472" y2="306" stroke="#00C2A850" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- SSH setup stappen -->
  <rect x="30" y="315" width="280" height="115" rx="8" fill="#13141D" stroke="#2A2C45" stroke-width="1"/>
  <text x="170" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6B6E8E" letter-spacing="0.06em">SSH ACTIVEREN OP RASPBERRY PI</text>
  <line x1="40" y1="342" x2="300" y2="342" stroke="#1F2035" stroke-width="1"/>
  <text x="40" y="358" font-family="monospace" font-size="10" font-weight="700" fill="#A855F7">1.</text>
  <text x="58" y="358" font-family="monospace" font-size="10" fill="#A8AACB">sudo raspi-config</text>
  <text x="40" y="374" font-family="monospace" font-size="10" font-weight="700" fill="#A855F7">2.</text>
  <text x="58" y="374" font-family="monospace" font-size="10" fill="#A8AACB">Interface Options → SSH → Enable</text>
  <text x="40" y="390" font-family="monospace" font-size="10" font-weight="700" fill="#A855F7">3.</text>
  <text x="58" y="390" font-family="monospace" font-size="10" fill="#A8AACB">ip addr  (noteer IP-adres)</text>
  <text x="40" y="406" font-family="monospace" font-size="10" font-weight="700" fill="#A855F7">4.</text>
  <text x="58" y="406" font-family="monospace" font-size="10" fill="#A8AACB">ssh pi@&lt;IP-adres&gt;  (op laptop)</text>
  <text x="170" y="424" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6E8E">standaard gebruiker: pi  |  poort: 22</text>

  <!-- SSH beschrijving rechts -->
  <rect x="490" y="358" width="280" height="80" rx="8" fill="#A855F710" stroke="#A855F730" stroke-width="1"/>
  <text x="630" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#A855F7">Wat is SSH?</text>
  <text x="630" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Secure Shell — versleuteld protocol</text>
  <text x="630" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">voor remote bediening via terminal.</text>
  <text x="630" y="427" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Vervangt telnet (onversleuteld).</text>
</svg>
