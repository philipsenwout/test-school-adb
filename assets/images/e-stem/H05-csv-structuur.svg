  <text x="52" y="410" font-family="monospace" font-size="11" fill="#C084FC">print</text>
  <text x="91" y="410" font-family="monospace" font-size="11" fill="#E8E9F3">(df[</text>
  <text x="116" y="410" font-family="monospace" font-size="11" fill="#86EFAC">'temperatuur'</text>
  <text x="208" y="410" font-family="monospace" font-size="11" fill="#E8E9F3">].</text>
  <text x="218" y="410" font-family="monospace" font-size="11" fill="#93C5FD">mean</text>
  <text x="250" y="410" font-family="monospace" font-size="11" fill="#E8E9F3">())</text>

