  <text x="171" y="336" font-family="monospace" font-size="11" fill="#E8E9F3">pd</text>
  <text x="52" y="354" font-family="monospace" font-size="11" fill="#E8E9F3">df = pd.</text>
  <text x="104" y="354" font-family="monospace" font-size="11" fill="#93C5FD">read_csv</text>
