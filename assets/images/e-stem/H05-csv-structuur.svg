  <text x="428" y="366" font-family="system-ui, sans-serif" font-size="11" fill="#22C55E">+</text>
  <text x="444" y="366" font-family="system-ui, sans-serif" font-size="11" fill="#A8AACB">Werkt in Excel, Python, R, SQL</text>

  <text x="428" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#22C55E">+</text>
  <text x="444" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#A8AACB">Ideaal voor sensordata (Pi)</text>

  <text x="428" y="402" font-family="system-ui, sans-serif" font-size="11" fill="#22C55E">+</text>
