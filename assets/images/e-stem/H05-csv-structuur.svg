  <text x="179" y="354" font-family="monospace" font-size="11" fill="#86EFAC">'sensor_data.csv'</text>
  <text x="337" y="354" font-family="monospace" font-size="11" fill="#E8E9F3">)</text>
  <text x="52" y="372" font-family="monospace" font-size="11" fill="#C084FC">print</text>
  <text x="91" y="372" font-family="monospace" font-size="11" fill="#E8E9F3">(df.</text>
  <text x="113" y="372" font-family="monospace" font-size="11" fill="#93C5FD">head</text>
  <text x="143" y="372" font-family="monospace" font-size="11" fill="#E8E9F3">())</text>
