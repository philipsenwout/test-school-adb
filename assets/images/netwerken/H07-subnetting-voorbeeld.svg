<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0E14"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Titel -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E8E9F3">SUBNETTING — CIDR OVERZICHTSTABEL</text>
  <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6E8E" letter-spacing="0.1em">NETWERKMASKERS EN HOSTCAPACITEIT VOOR /24 – /27</text>
  <line x1="80" y1="64" x2="720" y2="64" stroke="#1F2035" stroke-width="1"/>

  <!-- Formule box -->
  <rect x="200" y="74" width="400" height="34" rx="6" fill="#00C2A810" stroke="#00C2A830" stroke-width="1"/>
  <text x="400" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A8AACB">Formule: max. hosts = 2</text>
  <text x="516" y="82" font-family="system-ui, sans-serif" font-size="9" fill="#A8AACB">hostbits</text>
  <text x="525" y="87" font-family="system-ui, sans-serif" font-size="11" fill="#A8AACB"> − 2   (netwerk- en broadcastadres niet bruikbaar)</text>
  <text x="400" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Voorbeeld basisnetwerk: 192.168.1.0/24 (255.255.255.0)</text>

  <!-- Tabelheader -->
  <rect x="60" y="118" width="680" height="30" rx="4" fill="#1A1C28" stroke="#2A2C45" stroke-width="1"/>
  <text x="105" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#00C2A8" letter-spacing="0.08em">CIDR</text>
  <text x="210" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6B6E8E" letter-spacing="0.06em">SUBNETMASKER</text>
  <text x="345" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6B6E8E" letter-spacing="0.06em">NETWERK BITS</text>
  <text x="460" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6B6E8E" letter-spacing="0.06em">HOST BITS</text>
  <text x="570" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6B6E8E" letter-spacing="0.06em">MAX. HOSTS</text>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6B6E8E" letter-spacing="0.06em">SUBNETTEN VAN /24</text>

  <!-- Rij /24 -->
  <rect x="60" y="148" width="680" height="60" rx="0" fill="#1A1C28"/>
  <rect x="60" y="148" width="4" height="60" fill="#00C2A8"/>
  <text x="105" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#00C2A8">/24</text>
  <text x="210" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">255.255.255.0</text>
  <text x="210" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">11111111.11111111</text>
  <text x="210" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">.11111111.00000000</text>
  <text x="345" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">24</text>
  <text x="460" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">8</text>
  <text x="570" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#00C2A8">254</text>
  <text x="570" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2⁸ − 2 = 254</text>
  <text x="680" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#E8E9F3">1 netwerk</text>
  <line x1="60" y1="208" x2="740" y2="208" stroke="#2A2C45" stroke-width="1"/>

  <!-- Rij /25 -->
  <rect x="60" y="208" width="680" height="60" rx="0" fill="#13141D"/>
  <rect x="60" y="208" width="4" height="60" fill="#00C2A8cc"/>
  <text x="105" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#00C2A8cc">/25</text>
  <text x="210" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">255.255.255.128</text>
  <text x="210" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">...11111111.10000000</text>
  <text x="345" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">25</text>
  <text x="460" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">7</text>
  <text x="570" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#00C2A8cc">126</text>
  <text x="570" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2⁷ − 2 = 126</text>
  <text x="680" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#E8E9F3">2 subnetten</text>
  <line x1="60" y1="268" x2="740" y2="268" stroke="#2A2C45" stroke-width="1"/>

  <!-- Rij /26 -->
  <rect x="60" y="268" width="680" height="60" rx="0" fill="#1A1C28"/>
  <rect x="60" y="268" width="4" height="60" fill="#00C2A8aa"/>
  <text x="105" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#00C2A8aa">/26</text>
  <text x="210" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">255.255.255.192</text>
  <text x="210" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">...11111111.11000000</text>
  <text x="345" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">26</text>
  <text x="460" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">6</text>
  <text x="570" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#00C2A8aa">62</text>
  <text x="570" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2⁶ − 2 = 62</text>
  <text x="680" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#E8E9F3">4 subnetten</text>
  <line x1="60" y1="328" x2="740" y2="328" stroke="#2A2C45" stroke-width="1"/>

  <!-- Rij /27 -->
  <rect x="60" y="328" width="680" height="60" rx="0" fill="#13141D"/>
  <rect x="60" y="328" width="4" height="60" fill="#00C2A880"/>
  <text x="105" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#00C2A880">/27</text>
  <text x="210" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">255.255.255.224</text>
  <text x="210" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">...11111111.11100000</text>
  <text x="345" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">27</text>
  <text x="460" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E8E9F3">5</text>
  <text x="570" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#00C2A880">30</text>
  <text x="570" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2⁵ − 2 = 30</text>
  <text x="680" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#E8E9F3">8 subnetten</text>

  <!-- Tafelrand -->
  <rect x="60" y="148" width="680" height="240" rx="4" fill="none" stroke="#2A2C45" stroke-width="1"/>

  <!-- Opmerking -->
  <rect x="60" y="402" width="680" height="36" rx="6" fill="#1A1C28" stroke="#2A2C45" stroke-width="1"/>
  <text x="400" y="417" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Algemene regel: hoe hoger het CIDR-getal, hoe minder hosts maar hoe meer subnetten mogelijk.</text>
  <text x="400" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Subnetten van /24: aantal subnetten = 2^(nieuw cidr − 24)   |   Kolommen: netwerk + broadcast kunnen NIET worden toegewezen.</text>
</svg>
