  <text x="720" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">255.255.255.255</text>

  <!-- Detailtabel -->
  <!-- Header -->
  <rect x="80" y="152" width="640" height="30" rx="4" fill="#13141D" stroke="#2A2C45" stroke-width="1"/>
  <text x="120" y="171" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6B6E8E" letter-spacing="0.08em">KLASSE</text>
  <text x="230" y="171" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6B6E8E" letter-spacing="0.08em">EERSTE OCTET</text>
  <text x="370" y="171" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6B6E8E" letter-spacing="0.08em">STANDAARD MASKER</text>
