  <text x="530" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">128</text>
  <text x="680" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">16.777.214</text>

  <!-- Rij B -->
  <rect x="80" y="222" width="640" height="40" rx="0" fill="#13141D" stroke="#2A2C45" stroke-width="0.5"/>
  <rect x="80" y="222" width="4" height="40" fill="#3B82F6"/>
  <text x="120" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#3B82F6">B</text>
  <text x="120" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Unicast — Middelgroot</text>
