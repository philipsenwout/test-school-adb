  <text x="530" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">16.384</text>
  <text x="680" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">65.534</text>

  <!-- Rij C -->
  <rect x="80" y="262" width="640" height="40" rx="0" fill="#1A1C28" stroke="#2A2C45" stroke-width="0.5"/>
  <rect x="80" y="262" width="4" height="40" fill="#F97316"/>
  <text x="120" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F97316">C</text>
  <text x="120" y="293" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Unicast — Klein</text>
  <text x="230" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">192 – 223</text>
  <text x="370" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#E8E9F3">/24   255.255.255.0</text>
  <text x="530" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">2.097.152</text>
  <text x="680" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">254</text>

  <!-- Rij D -->
  <rect x="80" y="302" width="640" height="40" rx="0" fill="#13141D" stroke="#2A2C45" stroke-width="0.5"/>
  <rect x="80" y="302" width="4" height="40" fill="#A855F7"/>
  <text x="120" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#A855F7">D</text>
  <text x="120" y="333" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Multicast</text>
  <text x="230" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">224 – 239</text>
  <text x="370" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6E8E">—</text>
  <text x="530" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6E8E">—</text>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6E8E">Multicast groepen</text>

  <!-- Rij E -->
  <rect x="80" y="342" width="640" height="40" rx="0" fill="#1A1C28" stroke="#2A2C45" stroke-width="0.5"/>
  <rect x="80" y="342" width="4" height="40" fill="#6B6E8E"/>
  <text x="120" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6B6E8E">E</text>
  <text x="120" y="373" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Gereserveerd</text>
  <text x="230" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#E8E9F3">240 – 255</text>
  <text x="370" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6E8E">—</text>
  <text x="530" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6E8E">—</text>
  <text x="680" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6E8E">Experimenteel gebruik</text>

  <!-- Tafelrand -->
  <rect x="80" y="182" width="640" height="200" rx="0" fill="none" stroke="#2A2C45" stroke-width="1"/>

  <!-- Opmerking onderaan -->
  <rect x="80" y="398" width="640" height="36" rx="6" fill="#00C2A810" stroke="#00C2A830" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A8AACB">Privé-ranges: A → 10.x.x.x  |  B → 172.16–31.x.x  |  C → 192.168.x.x</text>
  <text x="400" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Loopback: 127.0.0.1 (localhost)   |   Classless adressering: CIDR (bv. /26) vervangt classful indeling</text>
</svg>
