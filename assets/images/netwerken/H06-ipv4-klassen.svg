<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0E14"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
  </defs>

  <!-- Achtergrond -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Titel -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E8E9F3">IPv4 ADRESKLASSEN</text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6E8E" letter-spacing="0.1em">CLASSFUL ADRESSERING — OVERZICHT KLASSE A T/M E</text>
  <line x1="80" y1="66" x2="720" y2="66" stroke="#1F2035" stroke-width="1"/>

  <!-- Horizontale adresbalk: 0.0.0.0 → 255.255.255.255 -->
  <!-- Totale balk: x=80 tot x=720, breedte=640 -->
  <!-- Klasse A: 0–127 = 128/256 = 50% → 320px -->
  <!-- Klasse B: 128–191 = 64/256 = 25% → 160px -->
  <!-- Klasse C: 192–223 = 32/256 = 12.5% → 80px -->
  <!-- Klasse D: 224–239 = 16/256 = 6.25% → 40px -->
  <!-- Klasse E: 240–255 = 16/256 = 6.25% → 40px -->

  <!-- Adresbalk achtergrond -->
  <rect x="80" y="80" width="640" height="40" rx="6" fill="#13141D" stroke="#2A2C45" stroke-width="1"/>

  <!-- Klasse A — groen/teal -->
  <rect x="80" y="80" width="320" height="40" rx="4" fill="#00C2A820" stroke="#00C2A840" stroke-width="0"/>
  <rect x="80" y="80" width="320" height="3" rx="0" fill="#00C2A8"/>
  <text x="240" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#00C2A8">Klasse A</text>
  <text x="240" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">0.0.0.0 – 127.255.255.255</text>

  <!-- Klasse B — blauw -->
  <rect x="400" y="80" width="160" height="40" fill="#3B82F620" stroke="#3B82F640" stroke-width="0"/>
  <rect x="400" y="80" width="160" height="3" fill="#3B82F6"/>
  <rect x="400" y="80" width="1" height="40" fill="#2A2C45"/>
  <text x="480" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3B82F6">Klasse B</text>
  <text x="480" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">128.0.0.0 – 191.255.255.255</text>

  <!-- Klasse C — oranje -->
  <rect x="560" y="80" width="80" height="40" fill="#F9731620" stroke="#F9731640" stroke-width="0"/>
  <rect x="560" y="80" width="80" height="3" fill="#F97316"/>
  <rect x="560" y="80" width="1" height="40" fill="#2A2C45"/>
  <text x="600" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F97316">Klasse C</text>
  <text x="600" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#A8AACB">192.0.0.0 – 223.255.255.255</text>

