  <rect x="640" y="80" width="40" height="40" fill="#A855F720"/>
  <rect x="640" y="80" width="40" height="3" fill="#A855F7"/>
  <rect x="640" y="80" width="1" height="40" fill="#2A2C45"/>
  <text x="660" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#A855F7">D</text>

  <!-- Klasse E — grijs -->
  <rect x="680" y="80" width="40" height="40" rx="0" fill="#6B6E8E20"/>
  <rect x="680" y="80" width="40" height="3" rx="0" fill="#6B6E8E"/>
  <rect x="680" y="80" width="1" height="40" fill="#2A2C45"/>
  <text x="700" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#6B6E8E">E</text>

  <!-- Rand afsluiten -->
