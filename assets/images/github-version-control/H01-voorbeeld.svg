<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Achtergrond -->
  <rect width="800" height="500" fill="#1e1e1e" rx="10"/>
  <!-- Header -->
  <rect width="800" height="44" fill="#2d2d2d" rx="10"/>
  <rect y="22" width="800" height="22" fill="#2d2d2d"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="6" fill="#27c93f"/>
  <text x="400" y="28" font-size="13" fill="#aaa" text-anchor="middle">vergelijkingstabel.docx</text>

  <!-- Tabel kader -->
  <rect x="60" y="70" width="680" height="50" fill="#2DBA4E" rx="6"/>
  <text x="400" y="101" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Git vs GitHub — Vergelijkingstabel</text>

  <!-- Kolomhoofden -->
  <rect x="60" y="130" width="330" height="36" fill="#333" rx="4"/>
  <rect x="410" y="130" width="330" height="36" fill="#333" rx="4"/>
  <text x="225" y="153" font-size="14" fill="#2DBA4E" text-anchor="middle" font-weight="bold">Git</text>
  <text x="575" y="153" font-size="14" fill="#2DBA4E" text-anchor="middle" font-weight="bold">GitHub</text>

  <!-- Rij 1 -->
  <rect x="60" y="176" width="330" height="34" fill="#252525" rx="2"/>
  <rect x="410" y="176" width="330" height="34" fill="#252525" rx="2"/>
  <text x="225" y="198" font-size="12" fill="#e0e0e0" text-anchor="middle">Lokaal versiebeheersysteem</text>
  <text x="575" y="198" font-size="12" fill="#e0e0e0" text-anchor="middle">Online platform / cloud</text>

  <!-- Rij 2 -->
  <rect x="60" y="220" width="330" height="34" fill="#2a2a2a" rx="2"/>
  <rect x="410" y="220" width="330" height="34" fill="#2a2a2a" rx="2"/>
  <text x="225" y="242" font-size="12" fill="#e0e0e0" text-anchor="middle">Werkt zonder internet</text>
  <text x="575" y="242" font-size="12" fill="#e0e0e0" text-anchor="middle">Vereist internetverbinding</text>

  <!-- Rij 3 -->
  <rect x="60" y="264" width="330" height="34" fill="#252525" rx="2"/>
  <rect x="410" y="264" width="330" height="34" fill="#252525" rx="2"/>
  <text x="225" y="286" font-size="12" fill="#e0e0e0" text-anchor="middle">Commando's in terminal</text>
  <text x="575" y="286" font-size="12" fill="#e0e0e0" text-anchor="middle">Grafische webinterface</text>

  <!-- Rij 4 -->
  <rect x="60" y="308" width="330" height="34" fill="#2a2a2a" rx="2"/>
  <rect x="410" y="308" width="330" height="34" fill="#2a2a2a" rx="2"/>
  <text x="225" y="330" font-size="12" fill="#e0e0e0" text-anchor="middle">Bijhouden van wijzigingen</text>
  <text x="575" y="330" font-size="12" fill="#e0e0e0" text-anchor="middle">Samenwerken via repos</text>

  <!-- Rij 5 -->
  <rect x="60" y="352" width="330" height="34" fill="#252525" rx="2"/>
  <rect x="410" y="352" width="330" height="34" fill="#252525" rx="2"/>
  <text x="225" y="374" font-size="12" fill="#e0e0e0" text-anchor="middle">Gratis en open-source</text>
  <text x="575" y="374" font-size="12" fill="#e0e0e0" text-anchor="middle">Gratis voor openbare repos</text>

  <!-- Uitleg badge -->
  <rect x="60" y="408" width="680" height="50" fill="#252525" rx="6"/>
  <text x="80" y="428" font-size="12" fill="#aaa">Eigen woorden:</text>
  <text x="80" y="448" font-size="12" fill="#ccc">"Git is het gereedschap op mijn computer. GitHub is waar ik mijn werk online bewaar."</text>
</svg>
