<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="500" fill="#1e1e1e" rx="10"/>
  <rect width="800" height="44" fill="#2d2d2d" rx="10"/>
  <rect y="22" width="800" height="22" fill="#2d2d2d"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="6" fill="#27c93f"/>
  <text x="400" y="28" font-size="13" fill="#aaa" text-anchor="middle">Terminal — feature branch workflow</text>

  <rect x="40" y="60" width="720" height="300" fill="#0d1117" rx="6"/>
  <text x="60" y="90" font-size="13" fill="#2DBA4E" font-family="'Courier New', monospace">$ git checkout -b feature/mini-website</text>
  <text x="60" y="112" font-size="13" fill="#c9d1d9" font-family="'Courier New', monospace">Switched to a new branch 'feature/mini-website'</text>
  <text x="60" y="140" font-size="13" fill="#2DBA4E" font-family="'Courier New', monospace">$ git add index.html style.css</text>
  <text x="60" y="162" font-size="13" fill="#2DBA4E" font-family="'Courier New', monospace">$ git commit -m "feat: mini-website structuur"</text>
  <text x="60" y="184" font-size="13" fill="#c9d1d9" font-family="'Courier New', monospace">[feature/mini-website 4c3d1e9] feat: mini-website structuur</text>
  <text x="60" y="212" font-size="13" fill="#2DBA4E" font-family="'Courier New', monospace">$ git push origin feature/mini-website</text>
  <text x="60" y="234" font-size="13" fill="#c9d1d9" font-family="'Courier New', monospace">Branch 'feature/mini-website' set up to track remote.</text>
  <text x="60" y="256" font-size="13" fill="#2DBA4E" font-family="'Courier New', monospace">$ git log --oneline --graph --all</text>
  <text x="60" y="280" font-size="13" fill="#f7c948" font-family="'Courier New', monospace">* 4c3d1e9 (HEAD → feature/mini-website) feat: structuur</text>
  <text x="60" y="300" font-size="13" fill="#c9d1d9" font-family="'Courier New', monospace">| * a2b1c3d (main) init: repository aangemaakt</text>
  <text x="60" y="320" font-size="13" fill="#c9d1d9" font-family="'Courier New', monospace">|/</text>
  <text x="60" y="340" font-size="13" fill="#555" font-family="'Courier New', monospace">origin/main</text>

  <rect x="40" y="376" width="720" height="80" fill="#252525" rx="6"/>
  <text x="60" y="400" font-size="13" fill="#2DBA4E" font-weight="bold">✔ Checklist</text>
  <text x="60" y="422" font-size="12" fill="#ccc">✔  Branch aangemaakt via checkout -b</text>
  <text x="60" y="442" font-size="12" fill="#ccc">✔  Minimaal 3 commits op de branch</text>
  <text x="360" y="422" font-size="12" fill="#ccc">✔  Branch gepusht naar GitHub</text>
  <text x="360" y="442" font-size="12" fill="#ccc">✔  Branching-diagram zichtbaar in log</text>
</svg>
