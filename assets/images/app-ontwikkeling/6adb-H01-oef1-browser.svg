<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="500" rx="10" fill="#2a2a2a"/>

  <!-- Titelbalk -->
  <rect x="0" y="0" width="800" height="38" rx="10" fill="#3a3a3a"/>
  <rect x="0" y="20" width="800" height="18" fill="#3a3a3a"/>

  <!-- Venster knoppen -->
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Adresbalk -->
  <rect x="100" y="8" width="500" height="22" rx="4" fill="#1a1a1a"/>
  <text x="350" y="23" font-size="12" fill="#888" text-anchor="middle">index.html</text>

  <!-- Pagina inhoud (heel klein zichtbaar) -->
  <rect x="0" y="38" width="800" height="160" fill="#f5f5f5"/>
  <rect x="20" y="55" width="200" height="15" rx="3" fill="#ddd"/>
  <rect x="20" y="78" width="350" height="10" rx="2" fill="#eee"/>
  <rect x="20" y="96" width="300" height="10" rx="2" fill="#eee"/>
  <rect x="20" y="114" width="250" height="10" rx="2" fill="#eee"/>
  <text x="400" y="110" font-size="12" fill="#bbb" text-anchor="middle" font-style="italic">(paginainhoud)</text>

  <!-- DevTools scheidingslijn -->
  <line x1="0" y1="198" x2="800" y2="198" stroke="#555" stroke-width="2"/>

  <!-- DevTools header -->
  <rect x="0" y="198" width="800" height="302" fill="#1e1e1e"/>

  <!-- DevTools tabbladen -->
  <rect x="0" y="198" width="800" height="34" fill="#252525"/>
  <text x="20" y="220" font-size="12" fill="#888">Elements</text>
  <line x1="70" y1="198" x2="70" y2="232" stroke="#333" stroke-width="1"/>
  <!-- Console actief -->
  <text x="82" y="220" font-size="12" fill="#ffffff" font-weight="bold">Console</text>
  <line x1="82" y1="231" x2="125" y2="231" stroke="#6c63ff" stroke-width="2"/>
  <line x1="135" y1="198" x2="135" y2="232" stroke="#333" stroke-width="1"/>
  <text x="147" y="220" font-size="12" fill="#888">Sources</text>
  <line x1="200" y1="198" x2="200" y2="232" stroke="#333" stroke-width="1"/>
  <text x="212" y="220" font-size="12" fill="#888">Network</text>

  <!-- Console inhoud -->
  <rect x="0" y="232" width="800" height="268" fill="#1e1e1e"/>

  <!-- Lijn 1: > mijnLijst -->
  <text x="16" y="262" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="262" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnLijst</text>

  <!-- Resultaat 1 -->
  <text x="16" y="282" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">←</text>
  <text x="32" y="282" font-size="13" fill="#a78bfa" font-family="'Courier New', monospace">(5) ['Melk', 'Brood', 'Appels', 'Kaas', 'Yoghurt']</text>

  <line x1="0" y1="292" x2="800" y2="292" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lijn 2: > mijnLijst.push -->
  <text x="16" y="315" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="315" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnLijst.<tspan fill="#6c63ff">push</tspan>(<tspan fill="#43e97b">'Boter'</tspan>)</text>

  <!-- Resultaat 2 -->
  <text x="16" y="335" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">←</text>
  <text x="32" y="335" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">6</text>

  <line x1="0" y1="345" x2="800" y2="345" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lijn 3: > mijnLijst[0] -->
  <text x="16" y="368" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="368" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnLijst[<tspan fill="#f9a825">0</tspan>]</text>

  <!-- Resultaat 3 -->
  <text x="16" y="388" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">←</text>
  <text x="32" y="388" font-size="13" fill="#43e97b" font-family="'Courier New', monospace">'Melk'</text>

  <line x1="0" y1="398" x2="800" y2="398" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lijn 4: > mijnLijst.includes -->
  <text x="16" y="421" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="421" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnLijst.<tspan fill="#6c63ff">includes</tspan>(<tspan fill="#43e97b">'Brood'</tspan>)</text>

  <!-- Resultaat 4 -->
  <text x="16" y="441" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">←</text>
  <text x="32" y="441" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">true</text>

  <line x1="0" y1="451" x2="800" y2="451" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lijn 5: > mijnLijst.length -->
  <text x="16" y="474" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="474" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnLijst.<tspan fill="#6c63ff">length</tspan></text>

  <!-- Resultaat 5 -->
  <text x="550" y="474" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">← <tspan fill="#4a9eff">6</tspan></text>

  <!-- Prompt cursor -->
  <text x="16" y="494" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <rect x="30" y="482" width="8" height="14" fill="#4a9eff" opacity="0.7"/>
</svg>
