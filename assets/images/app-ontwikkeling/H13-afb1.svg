<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">CSS Grid — Template Visualisatie</text>

  <!-- Grid container definitie -->
  <rect x="30" y="50" width="740" height="60" rx="6" fill="#2a2d3e"/>
  <text x="60" y="73" font-size="13" font-family="Courier New" fill="#7B3FE4">.container {</text>
  <text x="90" y="93" font-size="13" font-family="Courier New" fill="#22C55E">  display: grid;</text>
  <text x="280" y="93" font-size="13" font-family="Courier New" fill="#F97316">  grid-template-columns: 1fr 2fr 1fr;</text>
  <text x="600" y="93" font-size="13" font-family="Courier New" fill="#7B3FE4">}</text>

  <!-- Grid visualisatie: 3 kolommen 1fr 2fr 1fr -->
  <rect x="30" y="125" width="740" height="220" rx="8" fill="#2a2d3e" stroke="#7B3FE4" stroke-width="2"/>
  <text x="400" y="147" text-anchor="middle" font-size="12" fill="#7B3FE4">grid-container</text>

  <!-- Kolom 1: 1fr (~185px) -->
  <rect x="45" y="155" width="175" height="80" rx="4" fill="#7B3FE4" opacity="0.6"/>
  <text x="132" y="198" text-anchor="middle" font-size="12" fill="white">1fr</text>
  <text x="132" y="215" text-anchor="middle" font-size="11" fill="#ddd">col 1</text>

  <!-- Kolom 2: 2fr (~370px) -->
  <rect x="230" y="155" width="340" height="80" rx="4" fill="#2D9CDB" opacity="0.6"/>
  <text x="400" y="198" text-anchor="middle" font-size="12" fill="white">2fr</text>
  <text x="400" y="215" text-anchor="middle" font-size="11" fill="#ddd">col 2 (dubbel zo breed)</text>

  <!-- Kolom 3: 1fr (~185px) -->
  <rect x="580" y="155" width="175" height="80" rx="4" fill="#F97316" opacity="0.6"/>
  <text x="667" y="198" text-anchor="middle" font-size="12" fill="white">1fr</text>
  <text x="667" y="215" text-anchor="middle" font-size="11" fill="#ddd">col 3</text>

  <!-- Rij 2 -->
  <rect x="45" y="248" width="175" height="80" rx="4" fill="#7B3FE4" opacity="0.35"/>
  <text x="132" y="291" text-anchor="middle" font-size="12" fill="white">cell</text>
  <rect x="230" y="248" width="340" height="80" rx="4" fill="#2D9CDB" opacity="0.35"/>
  <text x="400" y="291" text-anchor="middle" font-size="12" fill="white">cell</text>
  <rect x="580" y="248" width="175" height="80" rx="4" fill="#F97316" opacity="0.35"/>
  <text x="667" y="291" text-anchor="middle" font-size="12" fill="white">cell</text>

  <!-- Breedte pijlen -->
  <line x1="45" y1="350" x2="220" y2="350" stroke="#7B3FE4" stroke-width="1.5"/>
  <text x="132" y="365" text-anchor="middle" font-size="11" fill="#7B3FE4">1 deel</text>
  <line x1="230" y1="350" x2="570" y2="350" stroke="#2D9CDB" stroke-width="1.5"/>
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#2D9CDB">2 delen</text>
  <line x1="580" y1="350" x2="755" y2="350" stroke="#F97316" stroke-width="1.5"/>
  <text x="667" y="365" text-anchor="middle" font-size="11" fill="#F97316">1 deel</text>

  <text x="400" y="390" text-anchor="middle" font-size="12" fill="#555">fr = fractie van beschikbare ruimte — totaal 4 fr: 1+2+1 → 25% | 50% | 25%</text>
</svg>
