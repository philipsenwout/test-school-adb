<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#f8f9fa"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">index.html</text>

  <!-- nav with dark background (kleur-primair var) -->
  <rect x="0" y="44" width="900" height="50" fill="#003087"/>
  <text x="40" y="76" font-size="16" fill="#ffffff">MijnSite</text>
  <text x="700" y="76" font-size="15" fill="#ffffff">Home</text>
  <text x="760" y="76" font-size="15" fill="#ffffff">Over</text>
  <text x="810" y="76" font-size="15" fill="#ffffff">Contact</text>

  <!-- h1 in dark blue title color -->
  <text x="40" y="145" font-size="32" font-weight="bold" fill="#003087">Welkom op MijnSite</text>

  <!-- body text -->
  <text x="40" y="186" font-size="16" fill="#333333">Dit is een voorbeeldpagina met CSS custom properties voor kleurenbeheer.</text>
  <text x="40" y="210" font-size="16" fill="#333333">Alle kleuren zijn gedefinieerd als variabelen in :root en worden via var() gebruikt.</text>

  <!-- accent button -->
  <rect x="40" y="232" width="180" height="38" fill="#ff6b35" rx="6"/>
  <text x="130" y="256" text-anchor="middle" font-size="15" fill="#ffffff">Meer weten</text>

  <!-- contrast note -->
  <text x="40" y="308" font-size="14" fill="#888">Contrastverhouding tekst/achtergrond: voldoet aan WCAG 4,5:1</text>
</svg>
