<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Titel -->
  <text x="400" y="34" font-size="17" font-weight="700" fill="#2d2d4e" text-anchor="middle">SVG-element aanmaken met createElementNS</text>

  <!-- STAP 1: createElementNS -->
  <rect x="30" y="60" width="160" height="80" rx="10" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="85" font-size="11" fill="#9ca3af" text-anchor="middle" font-weight="600">STAP 1</text>
  <text x="110" y="103" font-size="10" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">createElementNS(</text>
  <text x="110" y="118" font-size="10" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'…svg', 'svg')</text>
  <text x="110" y="134" font-size="9" fill="#e8e8f0" text-anchor="middle" opacity="0.6">→ leeg SVG-element</text>

  <!-- Resultaat 1 -->
  <rect x="210" y="80" width="80" height="40" rx="6" fill="#f0f4ff" stroke="#6c63ff" stroke-width="1"/>
  <text x="250" y="97" font-size="10" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">&lt;svg&gt;</text>
  <text x="250" y="113" font-size="10" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">&lt;/svg&gt;</text>

  <!-- Pijl 1 -->
  <line x1="190" y1="100" x2="208" y2="100" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAP 2: setAttribute -->
  <rect x="310" y="60" width="160" height="80" rx="10" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="85" font-size="11" fill="#9ca3af" text-anchor="middle" font-weight="600">STAP 2</text>
  <text x="390" y="103" font-size="10" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">setAttribute(</text>
  <text x="390" y="118" font-size="10" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'viewBox', '0 0 24 24')</text>
  <text x="390" y="134" font-size="9" fill="#e8e8f0" text-anchor="middle" opacity="0.6">+ width, height, fill</text>

  <!-- Pijl 2 -->
  <line x1="290" y1="100" x2="308" y2="100" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Resultaat 2 -->
  <rect x="482" y="75" width="90" height="50" rx="6" fill="#f0f4ff" stroke="#6c63ff" stroke-width="1"/>
  <text x="527" y="93" font-size="9" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">&lt;svg</text>
  <text x="527" y="106" font-size="9" fill="#9b59b6" text-anchor="middle" font-family="'Courier New', monospace">  viewBox=…</text>
  <text x="527" y="119" font-size="9" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">&gt;&lt;/svg&gt;</text>

  <!-- Pijl resultaat 2 -->
  <line x1="470" y1="100" x2="480" y2="100" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAP 3: innerHTML -->
  <rect x="30" y="200" width="160" height="80" rx="10" fill="#1a1a2e" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="225" font-size="11" fill="#9ca3af" text-anchor="middle" font-weight="600">STAP 3</text>
  <text x="110" y="243" font-size="10" fill="#9b59b6" text-anchor="middle" font-family="'Courier New', monospace">.innerHTML = `</text>
  <text x="110" y="258" font-size="10" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">  &lt;path d="…"/&gt;</text>
  <text x="110" y="273" font-size="9" fill="#e8e8f0" text-anchor="middle" opacity="0.6">prullenbak-icoon</text>

  <!-- Pijl van stap 2 naar stap 3 (naar beneden) -->
  <line x1="390" y1="140" x2="390" y2="170" stroke="#6c63ff" stroke-width="2"/>
  <line x1="390" y1="170" x2="110" y2="170" stroke="#6c63ff" stroke-width="2"/>
  <line x1="110" y1="170" x2="110" y2="198" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Resultaat 3: prullenbak icoon preview -->
  <rect x="210" y="215" width="60" height="50" rx="6" fill="#f0f4ff" stroke="#9b59b6" stroke-width="1"/>
  <!-- Kleine prullenbak SVG -->
  <g transform="translate(225, 228)">
    <rect x="3" y="5" width="20" height="16" rx="2" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
    <line x1="7" y1="9" x2="7" y2="18" stroke="#9b59b6" stroke-width="1"/>
    <line x1="13" y1="9" x2="13" y2="18" stroke="#9b59b6" stroke-width="1"/>
    <line x1="19" y1="9" x2="19" y2="18" stroke="#9b59b6" stroke-width="1"/>
    <rect x="0" y="2" width="26" height="4" rx="1" fill="#9b59b6"/>
    <rect x="8" y="-1" width="10" height="4" rx="1" fill="#9b59b6"/>
  </g>
  <line x1="190" y1="240" x2="208" y2="240" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAP 4: insertAdjacentElement -->
  <rect x="310" y="200" width="200" height="80" rx="10" fill="#1a1a2e" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="225" font-size="11" fill="#9ca3af" text-anchor="middle" font-weight="600">STAP 4</text>
  <text x="410" y="243" font-size="10" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">insertAdjacentElement(</text>
  <text x="410" y="258" font-size="10" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'afterbegin', deleteKnop)</text>
  <text x="410" y="273" font-size="9" fill="#e8e8f0" text-anchor="middle" opacity="0.6">knop toegevoegd aan kaart</text>

  <!-- Pijl van stap 3 naar stap 4 -->
  <line x1="290" y1="240" x2="308" y2="240" stroke="#43e97b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Eindresultaat: kaart met prullenbak -->
  <rect x="540" y="192" width="220" height="100" rx="10" fill="#ffffff" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="540" y="192" width="6" height="100" rx="3" fill="#3498db"/>
  <!-- Prullenbak in de hoek van de kaart -->
  <g transform="translate(718, 200)">
    <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="#9b59b6" stroke-width="1.2"/>
    <line x1="7" y1="9" x2="7" y2="16" stroke="#9b59b6" stroke-width="0.8"/>
    <line x1="12" y1="9" x2="12" y2="16" stroke="#9b59b6" stroke-width="0.8"/>
    <line x1="17" y1="9" x2="17" y2="16" stroke="#9b59b6" stroke-width="0.8"/>
    <rect x="0" y="2" width="24" height="4" rx="1" fill="#9b59b6"/>
    <rect x="7" y="-1" width="10" height="4" rx="1" fill="#9b59b6"/>
  </g>
  <text x="558" y="232" font-size="13" font-weight="700" fill="#2d2d4e">Spaghetti</text>
  <text x="558" y="252" font-size="11" fill="#6b7280">Hoofdgerecht</text>
  <rect x="558" y="266" width="80" height="18" rx="9" fill="#3498db"/>
  <text x="598" y="279" font-size="10" fill="#fff" text-anchor="middle">hoofdgerecht</text>
  <!-- Pijl naar eindresultaat -->
  <line x1="510" y1="240" x2="538" y2="240" stroke="#43e97b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Label eindresultaat -->
  <text x="650" y="310" font-size="12" fill="#43e97b" text-anchor="middle" font-weight="600">✓ Kaart in DOM</text>

  <!-- Legenda onderaan -->
  <rect x="30" y="330" width="740" height="140" rx="10" fill="#f0f4ff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="50" y="355" font-size="13" font-weight="700" fill="#2d2d4e">Volledige code:</text>
  <text x="50" y="378" font-size="11" fill="#6c63ff" font-family="'Courier New', monospace">const deleteKnop = document.createElementNS('http://www.w3.org/2000/svg', 'svg');</text>
  <text x="50" y="398" font-size="11" fill="#6c63ff" font-family="'Courier New', monospace">deleteKnop.setAttribute('viewBox', '0 0 24 24');</text>
  <text x="50" y="418" font-size="11" fill="#9b59b6" font-family="'Courier New', monospace">deleteKnop.innerHTML = `&lt;path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/&gt;`;</text>
  <text x="50" y="438" font-size="11" fill="#43e97b" font-family="'Courier New', monospace">artikel.insertAdjacentElement('afterbegin', deleteKnop);</text>
  <text x="50" y="458" font-size="11" fill="#9ca3af" font-family="'Courier New', monospace">// Stap 1          // Stap 2                // Stap 3                    // Stap 4</text>
</svg>
