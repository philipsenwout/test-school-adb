<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Browser window -->
  <rect x="40" y="30" width="1120" height="740" rx="14" fill="#1e222d" stroke="#444" stroke-width="2"/>

  <!-- Browser toolbar -->
  <rect x="40" y="30" width="1120" height="46" rx="14" fill="#2a2d3a"/>
  <rect x="40" y="56" width="1120" height="20" fill="#2a2d3a"/>
  <!-- Dots -->
  <circle cx="75" cy="53" r="8" fill="#ff5f57"/>
  <circle cx="100" cy="53" r="8" fill="#ffbd2e"/>
  <circle cx="125" cy="53" r="8" fill="#28c840"/>
  <!-- URL -->
  <rect x="200" y="40" width="760" height="26" rx="6" fill="#1a1d26" stroke="#555" stroke-width="1"/>
  <text x="580" y="58" fill="#aaaaaa" font-size="13" text-anchor="middle">localhost:5500/oefening-1.html</text>

  <!-- Page content area (top half) -->
  <rect x="40" y="76" width="1120" height="350" fill="#f8f8f2"/>
  <!-- White page with minimal content -->
  <rect x="60" y="90" width="1080" height="322" fill="#f8f8f2"/>
  <text x="580" y="200" fill="#cccccc" font-size="48" font-weight="700" text-anchor="middle" opacity="0.4">Lege HTML pagina</text>
  <text x="580" y="250" fill="#aaaaaa" font-size="18" text-anchor="middle" opacity="0.5">Alle output staat in de console hieronder ↓</text>
  <!-- html file label -->
  <text x="80" y="108" fill="#999" font-size="12">&lt;!DOCTYPE html&gt; — index.html</text>
  <line x1="60" y1="115" x2="1140" y2="115" stroke="#ddd" stroke-width="1"/>

  <!-- DevTools divider -->
  <rect x="40" y="426" width="1120" height="6" fill="#444"/>

  <!-- DevTools tabs -->
  <rect x="40" y="432" width="1120" height="30" fill="#252830"/>
  <text x="65" y="452" fill="#888" font-size="12">Elements</text>
  <text x="140" y="452" fill="#888" font-size="12">Sources</text>
  <text x="210" y="452" fill="#888" font-size="12">Network</text>
  <rect x="265" y="432" width="72" height="30" fill="#1a1d26"/>
  <text x="301" y="452" fill="#00d4ff" font-size="12" font-weight="700">Console</text>
  <text x="350" y="452" fill="#888" font-size="12">Application</text>
  <text x="430" y="452" fill="#888" font-size="12">Performance</text>

  <!-- Console body -->
  <rect x="40" y="462" width="1120" height="308" fill="#1a1d26"/>

  <!-- Console toolbar -->
  <rect x="40" y="462" width="1120" height="28" fill="#222530"/>
  <circle cx="65" cy="476" r="6" fill="#444"/>
  <text x="85" y="481" fill="#888" font-size="12">🚫  Filter</text>
  <text x="180" y="481" fill="#888" font-size="11">Default levels ▾</text>
  <line x1="40" y1="490" x2="1160" y2="490" stroke="#333" stroke-width="1"/>

  <!-- Console output -->
  <g font-family="'Courier New', monospace">
    <!-- row 1 -->
    <rect x="40" y="490" width="1120" height="32" fill="#1c2a1c" opacity="0.6"/>
    <text x="65" y="512" fill="#888" font-size="11">oefening-1.js:4</text>
    <text x="175" y="512" fill="#39ff14" font-size="14">Mijn naam is:</text>
    <text x="300" y="512" fill="#ffffff" font-size="14"> Jana</text>

    <!-- row 2 -->
    <text x="65" y="546" fill="#888" font-size="11">oefening-1.js:5</text>
    <text x="175" y="546" fill="#39ff14" font-size="14">Ik ben</text>
    <text x="240" y="546" fill="#ff6b35" font-size="14"> 17</text>
    <text x="260" y="546" fill="#39ff14" font-size="14"> jaar oud</text>

    <!-- row 3 -->
    <rect x="40" y="522" width="1120" height="32" fill="#1c2a1c" opacity="0.6"/>
    <text x="65" y="580" fill="#888" font-size="11">oefening-1.js:6</text>
    <text x="175" y="580" fill="#39ff14" font-size="14">School:</text>
    <text x="250" y="580" fill="#ffffff" font-size="14"> Appschool Munsterbilzen</text>

    <!-- row 4 -->
    <text x="65" y="614" fill="#888" font-size="11">oefening-1.js:9</text>
    <text x="175" y="614" fill="#39ff14" font-size="14">Na wijziging — naam is nu:</text>
    <text x="402" y="614" fill="#ffffff" font-size="14"> Liam</text>

    <!-- row 5 - const error -->
    <rect x="40" y="620" width="1120" height="32" fill="#2a1a1a" opacity="0.7"/>
    <text x="65" y="643" fill="#ff5f57" font-size="13">✖</text>
    <text x="85" y="643" fill="#ff5f57" font-size="13" font-family="'Courier New', monospace">TypeError: Assignment to constant variable.   oefening-1.js:12</text>

    <!-- cursor -->
    <text x="65" y="678" fill="#00d4ff" font-size="16">›</text>
    <rect x="84" y="662" width="9" height="18" fill="#00d4ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Annotation arrows -->
  <line x1="1050" y1="512" x2="1100" y2="512" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1105" y="508" fill="#00d4ff" font-size="11">log output</text>
  <line x1="1050" y1="643" x2="1100" y2="643" stroke="#ff5f57" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1105" y="639" fill="#ff5f57" font-size="11">const fout!</text>
</svg>
