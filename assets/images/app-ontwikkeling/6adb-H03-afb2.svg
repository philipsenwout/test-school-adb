<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Achtergrond kader -->
  <rect x="5" y="5" width="790" height="540" rx="14" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>

  <!-- Titel -->
  <text x="400" y="38" font-size="17" fill="#e8e8f0" text-anchor="middle" font-weight="bold">String Methodes — Cheatsheet</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#6c63ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Koptekst kolommen -->
  <rect x="20" y="55" width="760" height="30" rx="6" fill="#6c63ff" opacity="0.2"/>
  <text x="160" y="75" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="bold">METHODE</text>
  <line x1="280" y1="55" x2="280" y2="85" stroke="#6c63ff" stroke-width="0.8" opacity="0.5"/>
  <text x="470" y="75" font-size="12" fill="#f9a825" text-anchor="middle" font-weight="bold">VOORBEELD</text>
  <line x1="620" y1="55" x2="620" y2="85" stroke="#6c63ff" stroke-width="0.8" opacity="0.5"/>
  <text x="710" y="75" font-size="12" fill="#43e97b" text-anchor="middle" font-weight="bold">RESULTAAT</text>

  <!-- Rij 1 (donkerder) -->
  <rect x="20" y="88" width="760" height="50" rx="6" fill="#12122a"/>
  <text x="160" y="118" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.length</text>
  <text x="450" y="118" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'Hallo'.length</text>
  <text x="710" y="118" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">5</text>

  <!-- Rij 2 (lichter) -->
  <rect x="20" y="141" width="760" height="50" rx="6" fill="#1a1a30"/>
  <text x="160" y="171" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.toUpperCase()</text>
  <text x="450" y="171" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'hallo'.toUpperCase()</text>
  <text x="710" y="171" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'HALLO'</text>

  <!-- Rij 3 -->
  <rect x="20" y="194" width="760" height="50" rx="6" fill="#12122a"/>
  <text x="160" y="224" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.toLowerCase()</text>
  <text x="450" y="224" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'HALLO'.toLowerCase()</text>
  <text x="710" y="224" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'hallo'</text>

  <!-- Rij 4 -->
  <rect x="20" y="247" width="760" height="50" rx="6" fill="#1a1a30"/>
  <text x="160" y="277" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.includes()</text>
  <text x="450" y="277" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'Hallo'.includes('all')</text>
  <text x="710" y="277" font-size="14" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">true</text>

  <!-- Rij 5 -->
  <rect x="20" y="300" width="760" height="50" rx="6" fill="#12122a"/>
  <text x="160" y="330" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.slice()</text>
  <text x="450" y="330" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'Hallo'.slice(1, 4)</text>
  <text x="710" y="330" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'all'</text>

  <!-- Rij 6 -->
  <rect x="20" y="353" width="760" height="50" rx="6" fill="#1a1a30"/>
  <text x="160" y="383" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.trim()</text>
  <text x="450" y="383" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'  Hallo  '.trim()</text>
  <text x="710" y="383" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'Hallo'</text>

  <!-- Rij 7 -->
  <rect x="20" y="406" width="760" height="50" rx="6" fill="#12122a"/>
  <text x="160" y="436" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.padStart()</text>
  <text x="450" y="436" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'5'.padStart(3, '0')</text>
  <text x="710" y="436" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">'005'</text>

  <!-- Rij 8 -->
  <rect x="20" y="459" width="760" height="50" rx="6" fill="#1a1a30"/>
  <text x="160" y="489" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace">.split()</text>
  <text x="450" y="489" font-size="13" fill="#f9a825" text-anchor="middle" font-family="'Courier New', monospace">'a,b,c'.split(',')</text>
  <text x="710" y="489" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">['a','b','c']</text>

  <!-- Verticale scheidingslijnen -->
  <line x1="280" y1="88" x2="280" y2="509" stroke="#6c63ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="620" y1="88" x2="620" y2="509" stroke="#6c63ff" stroke-width="0.8" opacity="0.3"/>

  <!-- Footer -->
  <text x="400" y="533" font-size="11" fill="#555" text-anchor="middle">Strings zijn in JavaScript onveranderlijk — methodes geven altijd een nieuw resultaat terug.</text>
</svg>
