<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>

  <!-- Titel -->
  <text x="400" y="30" font-size="16" fill="#e8e8f0" text-anchor="middle" font-weight="bold">Array van objecten = meerdere gelijkvormige items</text>
  <line x1="100" y1="38" x2="700" y2="38" stroke="#6c63ff" stroke-width="1" opacity="0.4"/>

  <!-- Doos 0 -->
  <text x="183" y="62" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[0]</text>
  <rect x="50" y="70" width="210" height="180" rx="10" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2"/>

  <!-- Doos 0 rijen -->
  <rect x="60" y="82" width="190" height="42" rx="6" fill="#1a1a2e"/>
  <text x="90" y="101" font-size="12" fill="#888" font-family="'Courier New', monospace">naam:</text>
  <text x="175" y="101" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">"Pasta"</text>
  <text x="90" y="117" font-size="11" fill="#555">string</text>

  <rect x="60" y="133" width="190" height="42" rx="6" fill="#1e1e3a"/>
  <text x="90" y="152" font-size="12" fill="#888" font-family="'Courier New', monospace">categorie:</text>
  <text x="175" y="152" font-size="11" fill="#e8e8f0" font-family="'Courier New', monospace">"hoofd.."</text>
  <text x="90" y="168" font-size="11" fill="#555">string</text>

  <rect x="60" y="184" width="190" height="42" rx="6" fill="#1a1a2e"/>
  <text x="90" y="203" font-size="12" fill="#888" font-family="'Courier New', monospace">bereiding:</text>
  <text x="185" y="203" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">25</text>
  <text x="90" y="219" font-size="11" fill="#555">number (min)</text>

  <!-- Doos 1 -->
  <text x="400" y="62" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[1]</text>
  <rect x="295" y="70" width="210" height="180" rx="10" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2.5"/>

  <!-- Doos 1 rijen -->
  <rect x="305" y="82" width="190" height="42" rx="6" fill="#1a1a2e"/>
  <text x="335" y="101" font-size="12" fill="#888" font-family="'Courier New', monospace">naam:</text>
  <text x="420" y="101" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">"Soep"</text>
  <text x="335" y="117" font-size="11" fill="#555">string</text>

  <rect x="305" y="133" width="190" height="42" rx="6" fill="#1e1e3a"/>
  <text x="335" y="152" font-size="12" fill="#888" font-family="'Courier New', monospace">categorie:</text>
  <text x="420" y="152" font-size="11" fill="#e8e8f0" font-family="'Courier New', monospace">"voor.."</text>
  <text x="335" y="168" font-size="11" fill="#555">string</text>

  <rect x="305" y="184" width="190" height="42" rx="6" fill="#1a1a2e"/>
  <text x="335" y="203" font-size="12" fill="#888" font-family="'Courier New', monospace">bereiding:</text>
  <text x="430" y="203" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">15</text>
  <text x="335" y="219" font-size="11" fill="#555">number (min)</text>

  <!-- Doos 2 -->
  <text x="618" y="62" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[2]</text>
  <rect x="540" y="70" width="210" height="180" rx="10" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2"/>

  <!-- Doos 2 rijen -->
  <rect x="550" y="82" width="190" height="42" rx="6" fill="#1a1a2e"/>
  <text x="580" y="101" font-size="12" fill="#888" font-family="'Courier New', monospace">naam:</text>
  <text x="665" y="101" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">"Salade"</text>
  <text x="580" y="117" font-size="11" fill="#555">string</text>

  <rect x="550" y="133" width="190" height="42" rx="6" fill="#1e1e3a"/>
  <text x="580" y="152" font-size="12" fill="#888" font-family="'Courier New', monospace">categorie:</text>
  <text x="665" y="152" font-size="11" fill="#e8e8f0" font-family="'Courier New', monospace">"snack"</text>
  <text x="580" y="168" font-size="11" fill="#555">string</text>

  <rect x="550" y="184" width="190" height="42" rx="6" fill="#1a1a2e"/>
  <text x="580" y="203" font-size="12" fill="#888" font-family="'Courier New', monospace">bereiding:</text>
  <text x="675" y="203" font-size="13" fill="#f9a825" font-family="'Courier New', monospace">10</text>
  <text x="580" y="219" font-size="11" fill="#555">number (min)</text>

  <!-- Pijl van [1] naar middelste doos -->
  <line x1="400" y1="65" x2="400" y2="73" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Pijl van middelste doos naar naam-rij -->
  <line x1="510" y1="103" x2="550" y2="103" stroke="#6c63ff" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Syntax voorbeeld onderaan -->
  <rect x="50" y="280" width="700" height="100" rx="12" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="400" y="305" font-size="13" fill="#888" text-anchor="middle">Hoe lees je properties uit een array van objecten?</text>
  <text x="120" y="335" font-size="14" fill="#6c63ff" font-family="'Courier New', monospace">alleRecepten[<tspan fill="#f9a825">1</tspan>].naam</text>
  <text x="400" y="335" font-size="14" fill="#888" font-family="'Courier New', monospace">→</text>
  <text x="450" y="335" font-size="14" fill="#43e97b" font-family="'Courier New', monospace">"Soep"</text>

  <text x="120" y="362" font-size="14" fill="#6c63ff" font-family="'Courier New', monospace">alleRecepten[<tspan fill="#f9a825">0</tspan>].bereidingstijd</text>
  <text x="450" y="362" font-size="14" fill="#888" font-family="'Courier New', monospace">→</text>
  <text x="500" y="362" font-size="14" fill="#f9a825" font-family="'Courier New', monospace">25</text>

  <!-- Array notatie -->
  <rect x="50" y="400" width="700" height="80" rx="10" fill="#0d0d1a" stroke="#333" stroke-width="1" opacity="0.8"/>
  <text x="400" y="425" font-size="12" fill="#888" text-anchor="middle">Declaratie</text>
  <text x="70" y="455" font-size="12" fill="#6c63ff" font-family="'Courier New', monospace">const alleRecepten = [&#123; naam: "Pasta", ... &#125;, &#123; naam: "Soep", ... &#125;, &#123; naam: "Salade", ... &#125;];</text>
  <text x="70" y="473" font-size="11" fill="#555" font-family="'Courier New', monospace">// alleRecepten.length → 3</text>
</svg>
