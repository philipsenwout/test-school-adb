<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Absolute vs Relatieve Paden</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Hoe verwijst een link naar een bestand?</text>

  <!-- Mappenstructuur links -->
  <rect x="30" y="60" width="260" height="240" rx="8" fill="#1e2030" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="160" y="80" text-anchor="middle" font-size="12" fill="#74c0fc" font-weight="bold">Mappenstructuur</text>
  <!-- Boom -->
  <text x="50" y="105" font-size="12" font-family="Courier New" fill="#f0f0f0">mijnsite/</text>
  <line x1="60" y1="110" x2="60" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="60" y1="125" x2="80" y2="125" stroke="#555" stroke-width="1"/>
  <text x="85" y="130" font-size="12" font-family="Courier New" fill="#a8ff7a">index.html</text>
  <line x1="60" y1="148" x2="80" y2="148" stroke="#555" stroke-width="1"/>
  <text x="85" y="153" font-size="12" font-family="Courier New" fill="#a8ff7a">over.html</text>
  <line x1="60" y1="171" x2="80" y2="171" stroke="#555" stroke-width="1"/>
  <text x="85" y="176" font-size="12" font-family="Courier New" fill="#f97316">producten/</text>
  <line x1="100" y1="181" x2="100" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="100" y1="195" x2="120" y2="195" stroke="#555" stroke-width="1"/>
  <text x="125" y="200" font-size="11" font-family="Courier New" fill="#a8ff7a">stoel.html</text>
  <line x1="100" y1="210" x2="120" y2="210" stroke="#555" stroke-width="1"/>
  <text x="125" y="215" font-size="11" font-family="Courier New" fill="#a8ff7a">tafel.html</text>
  <line x1="60" y1="230" x2="80" y2="230" stroke="#555" stroke-width="1"/>
  <text x="85" y="235" font-size="12" font-family="Courier New" fill="#f97316">img/</text>
  <line x1="100" y1="240" x2="120" y2="240" stroke="#555" stroke-width="1"/>
  <text x="125" y="245" font-size="11" font-family="Courier New" fill="#a8ff7a">logo.png</text>

  <!-- Ster: je bent hier (stoel.html) -->
  <text x="235" y="200" font-size="14" fill="#f97316">← huidig</text>

  <!-- Absoluut pad -->
  <rect x="310" y="60" width="460" height="110" rx="8" fill="#7B3FE4" opacity="0.15" stroke="#7B3FE4" stroke-width="1.5"/>
  <text x="540" y="82" text-anchor="middle" font-size="14" fill="#7B3FE4" font-weight="bold">Absoluut pad</text>
  <text x="540" y="100" text-anchor="middle" font-size="11" fill="#aaa">Bevat het volledige adres incl. protocol + domein</text>
  <text x="325" y="122" font-size="12" font-family="Courier New" fill="#22C55E">href="https://mijnsite.be/producten/tafel.html"</text>
  <text x="540" y="147" text-anchor="middle" font-size="11" fill="#aaa">Gebruik voor: verwijzingen naar andere websites</text>
  <text x="540" y="163" text-anchor="middle" font-size="10" fill="#f97316">❌ Breekt als je de site verplaatst naar een ander domein</text>

  <!-- Relatief pad -->
  <rect x="310" y="185" width="460" height="175" rx="8" fill="#2D9CDB" opacity="0.12" stroke="#2D9CDB" stroke-width="1.5"/>
  <text x="540" y="205" text-anchor="middle" font-size="14" fill="#2D9CDB" font-weight="bold">Relatief pad</text>
  <text x="540" y="223" text-anchor="middle" font-size="11" fill="#aaa">Relatief t.o.v. het huidige bestand — geen protocol of domein</text>

  <!-- Voorbeelden relatief pad vanuit stoel.html -->
  <text x="320" y="248" font-size="11" fill="#888">Vanuit producten/stoel.html:</text>
  <rect x="310" y="254" width="460" height="24" rx="3" fill="#0d1117"/>
  <text x="320" y="270" font-size="11" font-family="Courier New" fill="#79c0ff">href="tafel.html"</text>
  <text x="530" y="270" font-size="11" fill="#aaa">→ zelfde map (producten/)</text>

  <rect x="310" y="282" width="460" height="24" rx="3" fill="#0d1117"/>
  <text x="320" y="297" font-size="11" font-family="Courier New" fill="#79c0ff">href="../over.html"</text>
  <text x="530" y="297" font-size="11" fill="#aaa">→ één map omhoog</text>

  <rect x="310" y="310" width="460" height="24" rx="3" fill="#0d1117"/>
  <text x="320" y="325" font-size="11" font-family="Courier New" fill="#79c0ff">href="../img/logo.png"</text>
  <text x="530" y="325" font-size="11" fill="#aaa">→ omhoog dan in img/</text>

  <text x="540" y="352" text-anchor="middle" font-size="10" fill="#22C55E">✓ Werkt altijd, ongeacht domeinnaam of hostingomgeving</text>

  <!-- Vuistregel -->
  <rect x="30" y="318" width="260" height="62" rx="6" fill="#2a2c3e"/>
  <text x="160" y="336" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0f0f0">Vuistregel</text>
  <text x="160" y="354" text-anchor="middle" font-size="10" fill="#aaa">Externe site → absoluut pad</text>
  <text x="160" y="370" text-anchor="middle" font-size="10" fill="#aaa">Eigen bestanden → relatief pad</text>
</svg>
