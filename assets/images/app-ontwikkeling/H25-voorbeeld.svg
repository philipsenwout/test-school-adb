<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">rekenmachine-functies.html</text>

  <!-- Code left -->
  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="92" font-size="12" fill="#94a3b8">// Deel 1: 4 basisfuncties</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">telOp</tspan><tspan fill="#ffffff">(a, b) { </tspan><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> a + b; }</tspan></text>
  <text x="40" y="138" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">treckAf</tspan><tspan fill="#ffffff">(a, b) { </tspan><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> a - b; }</tspan></text>
  <text x="40" y="161" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">vermenigvuldig</tspan><tspan fill="#ffffff">(a, b) { </tspan><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> a * b; }</tspan></text>
  <text x="40" y="184" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">deel</tspan><tspan fill="#ffffff">(a, b) {</tspan></text>
  <text x="60" y="207" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (b === </tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ff6b35">"Fout: delen door 0"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="60" y="230" font-size="13" font-family="monospace"><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> a / b;</tspan></text>
  <text x="40" y="253" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="40" y="286" font-size="12" fill="#94a3b8">// Deel 2: arrow functions</text>
  <text x="40" y="309" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> optellen = (a, b) =&gt; a + b;</tspan></text>
  <text x="40" y="332" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> aftrekken = (a, b) =&gt; a - b;</tspan></text>
  <text x="40" y="355" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> keer = (a, b) =&gt; a * b;</tspan></text>
  <text x="40" y="390" font-size="12" fill="#94a3b8">// Deel 3: BMI-functie</text>
  <text x="40" y="413" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">berekenBmi</tspan><tspan fill="#ffffff">(gewicht, lengte) {</tspan></text>
  <text x="60" y="436" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> bmi = gewicht / (lengte * lengte);</tspan></text>
  <text x="60" y="459" font-size="13" font-family="monospace"><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> Math.round(bmi * </tspan><tspan fill="#ff6b35">10</tspan><tspan fill="#ffffff">) / </tspan><tspan fill="#ff6b35">10</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="482" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="40" y="515" font-size="12" fill="#94a3b8">// Aanroepen</text>
  <text x="40" y="538" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(telOp(</tspan><tspan fill="#ff6b35">8</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ff6b35">5</tspan><tspan fill="#ffffff">), treckAf(</tspan><tspan fill="#ff6b35">8</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ff6b35">5</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="561" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(deel(</tspan><tspan fill="#ff6b35">10</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="584" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(berekenBmi(</tspan><tspan fill="#ff6b35">70</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ff6b35">1.75</tspan><tspan fill="#ffffff">));</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>

  <text x="600" y="120" font-size="12" fill="#94a3b8">// telOp(8,5) en treckAf(8,5)</text>
  <text x="600" y="148" font-size="15" font-family="monospace" fill="#39ff14">13  3</text>
  <line x1="600" y1="160" x2="1160" y2="160" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="188" font-size="12" fill="#94a3b8">// deel(10, 0) → delen door nul</text>
  <text x="600" y="216" font-size="15" font-family="monospace" fill="#ff6b35">Fout: delen door 0</text>
  <line x1="600" y1="228" x2="1160" y2="228" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="256" font-size="12" fill="#94a3b8">// berekenBmi(70, 1.75)</text>
  <text x="600" y="284" font-size="15" font-family="monospace" fill="#39ff14">22.9</text><text x="660" y="284" font-size="12" fill="#94a3b8"> ← afgerond op 1 decimaal</text>
  <line x1="600" y1="296" x2="1160" y2="296" stroke="#333" stroke-width="1"/>

  <rect x="600" y="320" width="560" height="300" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="880" y="348" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">Wat heb je geleerd?</text>
  <text x="620" y="375" font-size="13" fill="#39ff14">✓</text><text x="640" y="375" font-size="13" fill="#ffffff">function declaration voor herbruikbare functies</text>
  <text x="620" y="400" font-size="13" fill="#39ff14">✓</text><text x="640" y="400" font-size="13" fill="#ffffff">return-waarden gebruiken</text>
  <text x="620" y="425" font-size="13" fill="#39ff14">✓</text><text x="640" y="425" font-size="13" fill="#ffffff">Validatie in functie (b === 0 check)</text>
  <text x="620" y="450" font-size="13" fill="#39ff14">✓</text><text x="640" y="450" font-size="13" fill="#ffffff">Arrow functions: (a, b) =&gt; a + b</text>
  <text x="620" y="475" font-size="13" fill="#39ff14">✓</text><text x="640" y="475" font-size="13" fill="#ffffff">Math.round() voor afronden</text>
  <text x="620" y="500" font-size="13" fill="#39ff14">✓</text><text x="640" y="500" font-size="13" fill="#ffffff">Functies meerdere keren aanroepen</text>
  <text x="620" y="525" font-size="13" fill="#39ff14">✓</text><text x="640" y="525" font-size="13" fill="#ffffff">Lokale scope: bmi bestaat alleen in berekenBmi</text>
  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
