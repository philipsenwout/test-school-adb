<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Titel -->
  <text x="400" y="30" font-size="17" fill="#e8e8f0" text-anchor="middle" font-weight="bold">Template literals maken het leven makkelijker</text>
  <line x1="80" y1="40" x2="720" y2="40" stroke="#6c63ff" stroke-width="1" opacity="0.4"/>

  <!-- Scheidingslijn verticaal -->
  <line x1="400" y1="55" x2="400" y2="470" stroke="#444" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LINKS: String concatenatie (rood kruis) -->
  <rect x="15" y="58" width="368" height="305" rx="12" fill="#fff0f0" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Label links -->
  <text x="35" y="85" font-size="14" fill="#ff6b6b" font-weight="bold">✗ String concatenatie</text>
  <line x1="35" y1="93" x2="368" y2="93" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>

  <!-- Code blok links -->
  <rect x="30" y="105" width="338" height="150" rx="8" fill="#1a1a2e"/>
  <text x="50" y="130" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace"><tspan fill="#f9a825">"Hallo "</tspan> + naam + <tspan fill="#f9a825">"!"</tspan></text>
  <text x="50" y="158" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace"><tspan fill="#f9a825">"Je bent "</tspan> + leeftijd + <tspan fill="#f9a825">" jaar"</tspan></text>
  <text x="50" y="186" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace"><tspan fill="#f9a825">"Woon je in "</tspan> + stad + <tspan fill="#f9a825">"?"</tspan></text>
  <text x="50" y="230" font-size="11" fill="#888">// veel aanhalingstekens en + tekens</text>

  <!-- Commentaar links -->
  <rect x="30" y="270" width="338" height="55" rx="8" fill="#ffe0e0"/>
  <text x="199" y="293" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="bold">Problemen:</text>
  <text x="45" y="312" font-size="11" fill="#c0392b">• Veel aanhalingstekens en + tekens</text>
  <text x="45" y="327" font-size="11" fill="#c0392b">• Makkelijk fouten maken</text>

  <!-- RECHTS: Template literal (groen vinkje) -->
  <rect x="417" y="58" width="368" height="305" rx="12" fill="#f0fff4" stroke="#43e97b" stroke-width="2"/>

  <!-- Label rechts -->
  <text x="437" y="85" font-size="14" fill="#43e97b" font-weight="bold">✓ Template literal</text>
  <line x1="437" y1="93" x2="770" y2="93" stroke="#43e97b" stroke-width="1" opacity="0.4"/>

  <!-- Code blok rechts -->
  <rect x="432" y="105" width="338" height="150" rx="8" fill="#1a1a2e"/>
  <text x="452" y="130" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">` Hallo <tspan fill="#f9a825">${</tspan><tspan fill="#6c63ff">naam</tspan><tspan fill="#f9a825">}</tspan>!`</text>
  <text x="452" y="158" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">`Je bent <tspan fill="#f9a825">${</tspan><tspan fill="#6c63ff">leeftijd</tspan><tspan fill="#f9a825">}</tspan> jaar`</text>
  <text x="452" y="186" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">`Woon je in <tspan fill="#f9a825">${</tspan><tspan fill="#6c63ff">stad</tspan><tspan fill="#f9a825">}</tspan>?`</text>
  <text x="452" y="230" font-size="11" fill="#43e97b">// backtick (`) + ${variabele}</text>

  <!-- Commentaar rechts -->
  <rect x="432" y="270" width="338" height="55" rx="8" fill="#d4f5e2"/>
  <text x="601" y="293" font-size="12" fill="#1a6e3c" text-anchor="middle" font-weight="bold">Voordelen:</text>
  <text x="447" y="312" font-size="11" fill="#1a6e3c">• Overzichtelijk en leesbaar</text>
  <text x="447" y="327" font-size="11" fill="#1a6e3c">• Minder kans op fouten</text>

  <!-- Gelijkheid pijlen -->
  <text x="400" y="390" font-size="18" fill="#888" text-anchor="middle">=</text>

  <!-- Resultaat beide dezelfde uitvoer -->
  <rect x="60" y="400" width="300" height="45" rx="8" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="210" y="428" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">"Hallo Jana!"</text>

  <rect x="440" y="400" width="300" height="45" rx="8" fill="#1a1a2e" stroke="#43e97b" stroke-width="1.5"/>
  <text x="590" y="428" font-size="14" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">"Hallo Jana!"</text>

  <text x="60" y="460" font-size="12" fill="#888" text-anchor="middle">→ zelfde uitvoer</text>
  <text x="440" y="460" font-size="12" fill="#888" text-anchor="middle">→ zelfde uitvoer</text>

  <!-- Backtick uitleg -->
  <rect x="250" y="462" width="300" height="28" rx="6" fill="#6c63ff" opacity="0.15" stroke="#6c63ff" stroke-width="1"/>
  <text x="400" y="481" font-size="12" fill="#a78bfa" text-anchor="middle">Backtick = ` (links van de 1-toets op AZERTY-toetsenbord)</text>
</svg>
