<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="eq" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="600" cy="400" r="350" fill="#7c3aed" opacity="0.02"/>

  <!-- Titel -->
  <text x="600" y="50" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" font-family="Inter, sans-serif">Toewijzingsoperatoren — Verkorte Notaties</text>
  <text x="600" y="74" text-anchor="middle" fill="#6b7280" font-size="14" font-family="Inter, sans-serif">Schrijf minder, doe hetzelfde. Beginwaarde: let x = 10</text>
  <line x1="100" y1="90" x2="1100" y2="90" stroke="#2d3150" stroke-width="1"/>

  <!-- Kolomhoofden -->
  <rect x="60" y="105" width="160" height="36" rx="6" fill="#2d3150"/>
  <text x="140" y="128" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600" font-family="Inter, sans-serif">Operator</text>
  <rect x="240" y="105" width="280" height="36" rx="6" fill="#2d3150"/>
  <text x="380" y="128" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600" font-family="Inter, sans-serif">Lange schrijfwijze</text>
  <rect x="540" y="105" width="280" height="36" rx="6" fill="#2d3150"/>
  <text x="680" y="128" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600" font-family="Inter, sans-serif">Verkorte schrijfwijze</text>
  <rect x="840" y="105" width="160" height="36" rx="6" fill="#2d3150"/>
  <text x="920" y="128" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600" font-family="Inter, sans-serif">Resultaat</text>
  <rect x="1020" y="105" width="140" height="36" rx="6" fill="#2d3150"/>
  <text x="1090" y="128" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600" font-family="Inter, sans-serif">x wordt</text>

  <!-- Rij 1: = -->
  <rect x="60" y="155" width="1100" height="90" rx="8" fill="#1e2030" stroke="#2d3150" stroke-width="1"/>
  <rect x="60" y="155" width="5" height="90" rx="3" fill="#00d4ff"/>
  <!-- Badge -->
  <rect x="75" y="172" width="130" height="56" rx="8" fill="#0e7490"/>
  <text x="140" y="201" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Courier New, monospace" filter="url(#glow)">=</text>
  <text x="140" y="218" text-anchor="middle" fill="#a5f3fc" font-size="10" font-family="Inter, sans-serif">Toewijzing</text>
  <!-- Lang -->
  <rect x="255" y="168" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="265" y="192" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Beginwaarde instellen</text>
  <text x="265" y="214" fill="#e2e8f0" font-size="13" font-family="Courier New, monospace"><tspan fill="#7c3aed">let</tspan> x = <tspan fill="#60a5fa">10</tspan>;</text>
  <!-- Kort -->
  <rect x="555" y="168" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="565" y="192" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Zelfde ding</text>
  <text x="565" y="214" fill="#e2e8f0" font-size="13" font-family="Courier New, monospace"><tspan fill="#7c3aed">let</tspan> x = <tspan fill="#60a5fa">10</tspan>;</text>
  <!-- Resultaat -->
  <rect x="855" y="172" width="130" height="56" rx="8" fill="#1a2744"/>
  <text x="920" y="205" text-anchor="middle" fill="#00d4ff" font-size="22" font-family="Courier New, monospace" font-weight="700" filter="url(#glow)">10</text>
  <rect x="1035" y="172" width="110" height="56" rx="8" fill="#1a2744" stroke="#00d4ff" stroke-width="1"/>
  <text x="1090" y="205" text-anchor="middle" fill="#00d4ff" font-size="22" font-family="Courier New, monospace" font-weight="700" filter="url(#glow)">10</text>

  <!-- Rij 2: += -->
  <rect x="60" y="260" width="1100" height="90" rx="8" fill="#1e2030" stroke="#2d3150" stroke-width="1"/>
  <rect x="60" y="260" width="5" height="90" rx="3" fill="#39ff14"/>
  <rect x="75" y="277" width="130" height="56" rx="8" fill="#14532d"/>
  <text x="140" y="306" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Courier New, monospace" filter="url(#glow)">+=</text>
  <text x="140" y="323" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Inter, sans-serif">Optellen en opslaan</text>
  <rect x="255" y="273" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="265" y="294" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// x is nu 10</text>
  <text x="265" y="316" fill="#e2e8f0" font-size="13" font-family="Courier New, monospace">x = x + <tspan fill="#60a5fa">5</tspan>;</text>
  <text x="265" y="330" fill="#6b7280" font-size="10" font-family="Courier New, monospace">// vervangen door</text>
  <rect x="555" y="273" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="565" y="297" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Korter!</text>
  <text x="565" y="319" fill="#e2e8f0" font-size="14" font-family="Courier New, monospace">x <tspan fill="#39ff14" font-weight="700" filter="url(#glow)">+=</tspan> <tspan fill="#60a5fa">5</tspan>;</text>
  <rect x="855" y="277" width="130" height="56" rx="8" fill="#1a2744"/>
  <text x="920" y="310" text-anchor="middle" fill="#9ca3af" font-size="13" font-family="Courier New, monospace">10 + 5</text>
  <rect x="1035" y="277" width="110" height="56" rx="8" fill="#052e16" stroke="#39ff14" stroke-width="1"/>
  <text x="1090" y="310" text-anchor="middle" fill="#39ff14" font-size="22" font-family="Courier New, monospace" font-weight="700" filter="url(#glow)">15</text>

  <!-- Rij 3: -= -->
  <rect x="60" y="365" width="1100" height="90" rx="8" fill="#1e2030" stroke="#2d3150" stroke-width="1"/>
  <rect x="60" y="365" width="5" height="90" rx="3" fill="#ff6b35"/>
  <rect x="75" y="382" width="130" height="56" rx="8" fill="#7c2d12"/>
  <text x="140" y="411" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Courier New, monospace" filter="url(#glow)">-=</text>
  <text x="140" y="428" text-anchor="middle" fill="#fed7aa" font-size="10" font-family="Inter, sans-serif">Aftrekken en opslaan</text>
  <rect x="255" y="378" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="265" y="399" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// x is nu 10</text>
  <text x="265" y="421" fill="#e2e8f0" font-size="13" font-family="Courier New, monospace">x = x - <tspan fill="#60a5fa">3</tspan>;</text>
  <rect x="555" y="378" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="565" y="402" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Korter!</text>
  <text x="565" y="424" fill="#e2e8f0" font-size="14" font-family="Courier New, monospace">x <tspan fill="#ff6b35" font-weight="700" filter="url(#glow)">-=</tspan> <tspan fill="#60a5fa">3</tspan>;</text>
  <rect x="855" y="382" width="130" height="56" rx="8" fill="#1a2744"/>
  <text x="920" y="415" text-anchor="middle" fill="#9ca3af" font-size="13" font-family="Courier New, monospace">10 - 3</text>
  <rect x="1035" y="382" width="110" height="56" rx="8" fill="#431407" stroke="#ff6b35" stroke-width="1"/>
  <text x="1090" y="415" text-anchor="middle" fill="#ff6b35" font-size="22" font-family="Courier New, monospace" font-weight="700" filter="url(#glow)">7</text>

  <!-- Rij 4: *= -->
  <rect x="60" y="470" width="1100" height="90" rx="8" fill="#1e2030" stroke="#2d3150" stroke-width="1"/>
  <rect x="60" y="470" width="5" height="90" rx="3" fill="#a78bfa"/>
  <rect x="75" y="487" width="130" height="56" rx="8" fill="#4c1d95"/>
  <text x="140" y="516" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Courier New, monospace" filter="url(#glow)">*=</text>
  <text x="140" y="533" text-anchor="middle" fill="#ddd6fe" font-size="10" font-family="Inter, sans-serif">Vermenigvuldigen</text>
  <rect x="255" y="483" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="265" y="504" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// x is nu 10</text>
  <text x="265" y="526" fill="#e2e8f0" font-size="13" font-family="Courier New, monospace">x = x * <tspan fill="#60a5fa">2</tspan>;</text>
  <rect x="555" y="483" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="565" y="507" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Korter!</text>
  <text x="565" y="529" fill="#e2e8f0" font-size="14" font-family="Courier New, monospace">x <tspan fill="#a78bfa" font-weight="700" filter="url(#glow)">*=</tspan> <tspan fill="#60a5fa">2</tspan>;</text>
  <rect x="855" y="487" width="130" height="56" rx="8" fill="#1a2744"/>
  <text x="920" y="520" text-anchor="middle" fill="#9ca3af" font-size="13" font-family="Courier New, monospace">10 × 2</text>
  <rect x="1035" y="487" width="110" height="56" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="1"/>
  <text x="1090" y="520" text-anchor="middle" fill="#a78bfa" font-size="22" font-family="Courier New, monospace" font-weight="700" filter="url(#glow)">20</text>

  <!-- Rij 5: /= -->
  <rect x="60" y="575" width="1100" height="90" rx="8" fill="#1e2030" stroke="#2d3150" stroke-width="1"/>
  <rect x="60" y="575" width="5" height="90" rx="3" fill="#fbbf24"/>
  <rect x="75" y="592" width="130" height="56" rx="8" fill="#78350f"/>
  <text x="140" y="621" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Courier New, monospace" filter="url(#glow)">/=</text>
  <text x="140" y="638" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="Inter, sans-serif">Delen en opslaan</text>
  <rect x="255" y="588" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="265" y="609" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// x is nu 10</text>
  <text x="265" y="631" fill="#e2e8f0" font-size="13" font-family="Courier New, monospace">x = x / <tspan fill="#60a5fa">2</tspan>;</text>
  <rect x="555" y="588" width="250" height="56" rx="6" fill="#0d1117"/>
  <text x="565" y="612" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Korter!</text>
  <text x="565" y="634" fill="#e2e8f0" font-size="14" font-family="Courier New, monospace">x <tspan fill="#fbbf24" font-weight="700" filter="url(#glow)">/=</tspan> <tspan fill="#60a5fa">2</tspan>;</text>
  <rect x="855" y="592" width="130" height="56" rx="8" fill="#1a2744"/>
  <text x="920" y="625" text-anchor="middle" fill="#9ca3af" font-size="13" font-family="Courier New, monospace">10 ÷ 2</text>
  <rect x="1035" y="592" width="110" height="56" rx="8" fill="#451a03" stroke="#fbbf24" stroke-width="1"/>
  <text x="1090" y="625" text-anchor="middle" fill="#fbbf24" font-size="22" font-family="Courier New, monospace" font-weight="700" filter="url(#glow)">5</text>

  <!-- Extra: increment en decrement bonus -->
  <rect x="60" y="685" width="530" height="65" rx="8" fill="#1e2030" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="80" y="706" fill="#a5f3fc" font-size="12" font-weight="700" font-family="Inter, sans-serif">Bonus: ++ en -- (stap van 1)</text>
  <text x="80" y="728" fill="#9ca3af" font-size="12" font-family="Courier New, monospace">x++;  // x = x + 1   →  zelfde als x += 1</text>
  <text x="80" y="744" fill="#9ca3af" font-size="12" font-family="Courier New, monospace">x--;  // x = x - 1   →  zelfde als x -= 1</text>

  <rect x="620" y="685" width="520" height="65" rx="8" fill="#1e2030" stroke="#39ff14" stroke-width="1.5"/>
  <text x="640" y="706" fill="#86efac" font-size="12" font-weight="700" font-family="Inter, sans-serif">Gebruik in de praktijk:</text>
  <text x="640" y="728" fill="#9ca3af" font-size="12" font-family="Courier New, monospace">score += 10;  // speler scoort punten</text>
  <text x="640" y="744" fill="#9ca3af" font-size="12" font-family="Courier New, monospace">leven--;      // speler verliest een leven</text>

  <text x="600" y="785" text-anchor="middle" fill="#3d4166" font-size="12" font-family="Inter, sans-serif">H20 — Operatoren — Toewijzingsoperatoren [ADB09] [basis]</text>
</svg>
