<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#00d4ff">De Ternaire Operator ? :</text>
  <text x="600" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#8892a4">Compacte if/else in één regel</text>

  <!-- Main expression box -->
  <rect x="80" y="110" width="1040" height="100" rx="14" fill="#12161f" stroke="#2d3448" stroke-width="2"/>
  <text x="600" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">let resultaat =</text>

  <!-- Ternary expression tokens -->
  <!-- voorwaarde -->
  <rect x="160" y="158" width="200" height="38" rx="6" fill="#1a1a40" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="183" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#7c3aed" font-weight="bold">voorwaarde</text>

  <!-- ? -->
  <text x="390" y="185" text-anchor="middle" font-family="'Courier New', monospace" font-size="30" fill="#00d4ff" font-weight="bold">?</text>

  <!-- waardeAlsTrue -->
  <rect x="420" y="158" width="220" height="38" rx="6" fill="#0d2e1a" stroke="#39ff14" stroke-width="2"/>
  <text x="530" y="183" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#39ff14" font-weight="bold">waardeAlsTrue</text>

  <!-- : -->
  <text x="672" y="185" text-anchor="middle" font-family="'Courier New', monospace" font-size="30" fill="#00d4ff" font-weight="bold">:</text>

  <!-- waardeAlsFalse -->
  <rect x="695" y="158" width="240" height="38" rx="6" fill="#2e1a0d" stroke="#ff6b35" stroke-width="2"/>
  <text x="815" y="183" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#ff6b35" font-weight="bold">waardeAlsFalse</text>

  <!-- ; -->
  <text x="960" y="185" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#6b7280">;</text>

  <!-- Labels with arrows below -->
  <!-- voorwaarde label -->
  <line x1="260" y1="196" x2="260" y2="246" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="140" y="248" width="240" height="72" rx="8" fill="#15102e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="260" y="272" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" font-weight="bold">VOORWAARDE</text>
  <text x="260" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a38dd0">Uitdrukking die</text>
  <text x="260" y="308" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a38dd0">true of false oplevert</text>

  <!-- waardeAlsTrue label -->
  <line x1="530" y1="196" x2="530" y2="246" stroke="#39ff14" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="400" y="248" width="260" height="72" rx="8" fill="#0a2016" stroke="#39ff14" stroke-width="1.5"/>
  <text x="530" y="272" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#39ff14" font-weight="bold">ALS TRUE</text>
  <text x="530" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#6baa78">Waarde als voorwaarde</text>
  <text x="530" y="308" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#6baa78">true is</text>

  <!-- waardeAlsFalse label -->
  <line x1="815" y1="196" x2="815" y2="246" stroke="#ff6b35" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="680" y="248" width="270" height="72" rx="8" fill="#2a1008" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="815" y="272" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#ff6b35" font-weight="bold">ALS FALSE</text>
  <text x="815" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#c08060">Waarde als voorwaarde</text>
  <text x="815" y="308" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#c08060">false is</text>

  <!-- Separator -->
  <line x1="80" y1="358" x2="1120" y2="358" stroke="#2d3448" stroke-width="1.5"/>
  <text x="600" y="348" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">Vergelijking met if / else equivalent</text>

  <!-- Left: ternary example -->
  <rect x="80" y="372" width="490" height="180" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <rect x="80" y="372" width="490" height="30" rx="12" fill="#1e2438"/>
  <rect x="80" y="388" width="490" height="14" fill="#1e2438"/>
  <text x="98" y="394" font-family="'Courier New', monospace" font-size="13" fill="#00d4ff">✦ Ternaire operator</text>

  <text x="104" y="428" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">// Één regel</text>
  <text x="104" y="452" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">let</text>
  <text x="138" y="452" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> boodschap =</text>
  <text x="104" y="476" font-family="'Courier New', monospace" font-size="14" fill="#a38dd0">  leeftijd &gt;= 18</text>
  <text x="104" y="498" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff" font-weight="bold">    ?</text>
  <text x="128" y="498" font-family="'Courier New', monospace" font-size="14" fill="#39ff14"> "Welkom!"</text>
  <text x="104" y="520" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff" font-weight="bold">    :</text>
  <text x="128" y="520" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35"> "Toegang geweigerd."</text>
  <text x="340" y="520" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">;</text>

  <!-- Right: if/else example -->
  <rect x="630" y="372" width="490" height="180" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <rect x="630" y="372" width="490" height="30" rx="12" fill="#1e2438"/>
  <rect x="630" y="388" width="490" height="14" fill="#1e2438"/>
  <text x="648" y="394" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">≡ if / else equivalent</text>

  <text x="654" y="428" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">// Meerdere regels</text>
  <text x="654" y="452" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">let</text>
  <text x="688" y="452" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> boodschap;</text>
  <text x="654" y="474" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">if</text>
  <text x="675" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> (leeftijd &gt;= 18) {</text>
  <text x="674" y="494" font-family="'Courier New', monospace" font-size="14" fill="#39ff14">  boodschap = "Welkom!";</text>
  <text x="654" y="514" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">} else</text>
  <text x="700" y="514" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> {</text>
  <text x="674" y="534" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35">  boodschap = "Toegang geweigerd.";</text>
  <text x="654" y="548" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">}</text>

  <!-- EQUALS sign in the middle -->
  <text x="565" y="467" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" fill="#00d4ff" font-weight="bold">≡</text>
  <text x="565" y="492" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">zelfde</text>
  <text x="565" y="508" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">resultaat</text>

  <!-- When to use callout -->
  <rect x="80" y="570" width="1040" height="100" rx="12" fill="#1a1030" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="600" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed" font-weight="bold">✔ Gebruik de ternaire operator wanneer:</text>
  <text x="120" y="624" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">  • De logica eenvoudig is (één waarde kiezen uit twee)</text>
  <text x="120" y="644" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">  • De uitdrukking kort genoeg blijft om leesbaar te zijn</text>
  <text x="120" y="664" font-family="'Courier New', monospace" font-size="13" fill="#ff6b35">  ✗ Gebruik if/else bij complexe logica — leesbaarheid gaat boven compactheid</text>

  <!-- Real example -->
  <rect x="80" y="686" width="1040" height="80" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <text x="120" y="710" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">Echt voorbeeld:</text>
  <text x="120" y="734" font-family="'Courier New', monospace" font-size="15" fill="#7c3aed">let</text>
  <text x="155" y="734" font-family="'Courier New', monospace" font-size="15" fill="#ffffff"> resultaat = score &gt;= 50</text>
  <text x="415" y="734" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff" font-weight="bold"> ?</text>
  <text x="440" y="734" font-family="'Courier New', monospace" font-size="15" fill="#39ff14"> "geslaagd"</text>
  <text x="560" y="734" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff" font-weight="bold"> :</text>
  <text x="582" y="734" font-family="'Courier New', monospace" font-size="15" fill="#ff6b35"> "niet geslaagd"</text>
  <text x="730" y="734" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">;</text>
  <text x="780" y="734" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">// als score = 65 → "geslaagd"</text>
</svg>
