<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">producten.html</text>

  <!-- heading -->
  <text x="40" y="90" font-size="24" font-weight="bold" fill="#000">Onze producten</text>
  <text x="40" y="114" font-size="13" fill="#888" font-style="italic">.kaart { position: relative; }   .badge { position: absolute; top: 10px; right: 10px; }</text>

  <!-- Card 1: with badge "Nieuw!" -->
  <!-- card container (position: relative) -->
  <rect x="40" y="130" width="240" height="280" fill="#f9f9f9" stroke="#ddd" stroke-width="1" rx="8"/>
  <!-- product image placeholder -->
  <rect x="40" y="130" width="240" height="160" fill="#e0e8f0" rx="8"/>
  <text x="160" y="218" text-anchor="middle" font-size="13" fill="#888">img/product1.jpg</text>
  <!-- Badge: position absolute top-right of card -->
  <rect x="238" y="140" width="52" height="24" fill="#cc0000" rx="12"/>
  <text x="264" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Nieuw!</text>
  <!-- card content -->
  <text x="56" y="314" font-size="16" font-weight="bold" fill="#000">Laptop Stand Pro</text>
  <text x="56" y="338" font-size="14" fill="#555">Ergonomische standaard</text>
  <text x="56" y="358" font-size="14" fill="#555">voor elke laptop.</text>
  <text x="56" y="382" font-size="15" font-weight="bold" fill="#003087">€ 49,99</text>

  <!-- Card 2: no badge -->
  <rect x="310" y="130" width="240" height="280" fill="#f9f9f9" stroke="#ddd" stroke-width="1" rx="8"/>
  <rect x="310" y="130" width="240" height="160" fill="#e8e0f0" rx="8"/>
  <text x="430" y="218" text-anchor="middle" font-size="13" fill="#888">img/product2.jpg</text>
  <text x="326" y="314" font-size="16" font-weight="bold" fill="#000">Mechanisch Toetsenbord</text>
  <text x="326" y="338" font-size="14" fill="#555">Stille switches, ideaal</text>
  <text x="326" y="358" font-size="14" fill="#555">voor op kantoor.</text>
  <text x="326" y="382" font-size="15" font-weight="bold" fill="#003087">€ 89,99</text>

  <!-- annotation showing position absolute -->
  <line x1="264" y1="152" x2="264" y2="108" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="270" y="106" font-size="11" fill="#f97316">position: absolute</text>
  <text x="270" y="120" font-size="11" fill="#f97316">top: 10px; right: 10px;</text>
</svg>
