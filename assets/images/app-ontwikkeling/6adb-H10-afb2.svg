<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Achtergrond -->
  <rect width="800" height="500" fill="#f8f9ff" rx="0"/>

  <!-- Browservenster simulatie -->
  <rect x="120" y="40" width="560" height="420" rx="12" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Blauwe linkerrand (hoofdgerecht) -->
  <rect x="120" y="40" width="6" height="420" rx="3" fill="#3498db"/>

  <!-- Prullenbak icoon rechtsboven -->
  <g transform="translate(632, 60)" opacity="0.45">
    <rect x="0" y="4" width="20" height="16" rx="2" fill="none" stroke="#888" stroke-width="1.5"/>
    <line x1="3" y1="8" x2="3" y2="17" stroke="#888" stroke-width="1.2"/>
    <line x1="7" y1="8" x2="7" y2="17" stroke="#888" stroke-width="1.2"/>
    <line x1="11" y1="8" x2="11" y2="17" stroke="#888" stroke-width="1.2"/>
    <line x1="15" y1="8" x2="15" y2="17" stroke="#888" stroke-width="1.2"/>
    <rect x="-2" y="1" width="24" height="4" rx="1" fill="#888"/>
    <rect x="5" y="-2" width="10" height="4" rx="1" fill="#888"/>
  </g>

  <!-- Hoofdtitel recept -->
  <text x="148" y="110" font-size="26" font-weight="700" fill="#2d2d4e">Spaghetti carbonara</text>

  <!-- Beschrijving -->
  <text x="148" y="148" font-size="15" fill="#6b7280" font-weight="400">Klassieke Italiaanse pasta met ei, spek en parmezaan.</text>

  <!-- Divider -->
  <line x1="148" y1="170" x2="660" y2="170" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ingrediënten-label -->
  <text x="148" y="200" font-size="13" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">INGREDIËNTEN</text>

  <!-- Ingrediënten lijst -->
  <circle cx="158" cy="220" r="3" fill="#3498db"/>
  <text x="170" y="225" font-size="14" fill="#4b5563">200g spaghetti</text>
  <circle cx="158" cy="242" r="3" fill="#3498db"/>
  <text x="170" y="247" font-size="14" fill="#4b5563">100g pancetta of spek</text>
  <circle cx="158" cy="264" r="3" fill="#3498db"/>
  <text x="170" y="269" font-size="14" fill="#4b5563">3 eierdooiers</text>
  <circle cx="158" cy="286" r="3" fill="#3498db"/>
  <text x="170" y="291" font-size="14" fill="#4b5563">50g Parmigiano Reggiano</text>
  <circle cx="158" cy="308" r="3" fill="#3498db"/>
  <text x="170" y="313" font-size="14" fill="#4b5563">Zwarte peper naar smaak</text>

  <!-- Divider -->
  <line x1="148" y1="335" x2="660" y2="335" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Meta-rij onderaan -->
  <!-- Badge hoofdgerecht -->
  <rect x="148" y="355" width="116" height="28" rx="14" fill="#3498db"/>
  <text x="206" y="373" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">hoofdgerecht</text>

  <!-- Tijd -->
  <text x="290" y="372" font-size="22" fill="#9ca3af">⏱</text>
  <text x="316" y="373" font-size="14" fill="#6b7280" font-weight="500">25 min</text>

  <!-- Porties -->
  <text x="390" y="372" font-size="18" fill="#9ca3af">👥</text>
  <text x="412" y="373" font-size="14" fill="#6b7280" font-weight="500">2 personen</text>

  <!-- Moeilijkheidsgraad -->
  <text x="510" y="372" font-size="18" fill="#9ca3af">⭐</text>
  <text x="532" y="373" font-size="14" fill="#6b7280" font-weight="500">Gemiddeld</text>

  <!-- Label boven de kaart -->
  <text x="400" y="26" font-size="13" fill="#9ca3af" text-anchor="middle">Receptkaart — browser weergave</text>
</svg>
