<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">maaltafelgenerator.html</text>

  <!-- Code left -->
  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="92" font-size="12" fill="#94a3b8">// Deel 1: Maaltafel van 7</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> getal = </tspan><tspan fill="#ff6b35">7</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="145" font-size="13" font-family="monospace"><tspan fill="#7c3aed">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> i = </tspan><tspan fill="#ff6b35">1</tspan><tspan fill="#ffffff">; i &lt;= </tspan><tspan fill="#ff6b35">10</tspan><tspan fill="#ffffff">; i++) {</tspan></text>
  <text x="60" y="168" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(`${getal} × ${i} = ${getal * i}`);</tspan></text>
  <text x="40" y="191" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="40" y="230" font-size="12" fill="#94a3b8">// Deel 2: Priemgetallen tot 50</text>
  <text x="40" y="253" font-size="13" font-family="monospace"><tspan fill="#7c3aed">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> n = </tspan><tspan fill="#ff6b35">2</tspan><tspan fill="#ffffff">; n &lt;= </tspan><tspan fill="#ff6b35">50</tspan><tspan fill="#ffffff">; n++) {</tspan></text>
  <text x="60" y="276" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> isPriemgetal = </tspan><tspan fill="#ff6b35">true</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="60" y="299" font-size="13" font-family="monospace"><tspan fill="#7c3aed">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> d = </tspan><tspan fill="#ff6b35">2</tspan><tspan fill="#ffffff">; d &lt; n; d++) {</tspan></text>
  <text x="80" y="322" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (n % d === </tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="100" y="345" font-size="13" font-family="monospace"><tspan fill="#ffffff">isPriemgetal = </tspan><tspan fill="#ff6b35">false</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7c3aed">break</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="368" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="60" y="391" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="60" y="414" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (isPriemgetal) </tspan><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(n);</tspan></text>
  <text x="40" y="437" font-size="13" font-family="monospace" fill="#ffffff">}</text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>

  <text x="600" y="115" font-size="12" fill="#94a3b8">// Maaltafel van 7</text>
  <text x="600" y="138" font-size="13" font-family="monospace" fill="#39ff14">7 × 1 = 7</text>
  <text x="600" y="158" font-size="13" font-family="monospace" fill="#39ff14">7 × 2 = 14</text>
  <text x="600" y="178" font-size="13" font-family="monospace" fill="#39ff14">7 × 3 = 21</text>
  <text x="600" y="198" font-size="13" font-family="monospace" fill="#39ff14">7 × 4 = 28</text>
  <text x="600" y="218" font-size="13" font-family="monospace" fill="#39ff14">7 × 5 = 35</text>
  <text x="800" y="198" font-size="12" fill="#94a3b8">... t/m 7 × 10 = 70</text>
  <line x1="600" y1="232" x2="1160" y2="232" stroke="#333" stroke-width="1"/>

  <text x="600" y="258" font-size="12" fill="#94a3b8">// Priemgetallen tot 50</text>
  <!-- priemgetallen in een grid -->
  <text x="600" y="283" font-size="14" font-family="monospace" fill="#00d4ff">2</text>
  <text x="640" y="283" font-size="14" font-family="monospace" fill="#00d4ff">3</text>
  <text x="680" y="283" font-size="14" font-family="monospace" fill="#00d4ff">5</text>
  <text x="720" y="283" font-size="14" font-family="monospace" fill="#00d4ff">7</text>
  <text x="760" y="283" font-size="14" font-family="monospace" fill="#00d4ff">11</text>
  <text x="810" y="283" font-size="14" font-family="monospace" fill="#00d4ff">13</text>
  <text x="860" y="283" font-size="14" font-family="monospace" fill="#00d4ff">17</text>
  <text x="910" y="283" font-size="14" font-family="monospace" fill="#00d4ff">19</text>
  <text x="960" y="283" font-size="14" font-family="monospace" fill="#00d4ff">23</text>
  <text x="600" y="308" font-size="14" font-family="monospace" fill="#00d4ff">29</text>
  <text x="650" y="308" font-size="14" font-family="monospace" fill="#00d4ff">31</text>
  <text x="700" y="308" font-size="14" font-family="monospace" fill="#00d4ff">37</text>
  <text x="750" y="308" font-size="14" font-family="monospace" fill="#00d4ff">41</text>
  <text x="800" y="308" font-size="14" font-family="monospace" fill="#00d4ff">43</text>
  <text x="850" y="308" font-size="14" font-family="monospace" fill="#00d4ff">47</text>
  <line x1="600" y1="322" x2="1160" y2="322" stroke="#333" stroke-width="1"/>

  <rect x="600" y="350" width="560" height="260" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="880" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">Technieken gebruikt</text>
  <text x="620" y="408" font-size="13" fill="#39ff14">✓</text><text x="640" y="408" font-size="13" fill="#ffffff">for-lus met teller i</text>
  <text x="620" y="433" font-size="13" fill="#39ff14">✓</text><text x="640" y="433" font-size="13" fill="#ffffff">Template literals in console.log</text>
  <text x="620" y="458" font-size="13" fill="#39ff14">✓</text><text x="640" y="458" font-size="13" fill="#ffffff">Geneste for-lus (priemgetallen)</text>
  <text x="620" y="483" font-size="13" fill="#39ff14">✓</text><text x="640" y="483" font-size="13" fill="#ffffff">break zodra deler gevonden</text>
  <text x="620" y="508" font-size="13" fill="#39ff14">✓</text><text x="640" y="508" font-size="13" fill="#ffffff">boolean flag isPriemgetal</text>
  <text x="620" y="533" font-size="13" fill="#39ff14">✓</text><text x="640" y="533" font-size="13" fill="#ffffff">% modulo voor deelbaarheid</text>

  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
