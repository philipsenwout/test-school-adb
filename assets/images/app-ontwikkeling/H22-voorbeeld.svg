<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">dag-boodschap.html</text>

  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="90" font-size="12" fill="#94a3b8">// if / else if / else + switch</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> uur = </tspan><tspan fill="#ff6b35">14</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="145" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> boodschap;</tspan></text>
  <text x="40" y="175" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (uur &lt; </tspan><tspan fill="#ff6b35">12</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="60" y="198" font-size="13" font-family="monospace"><tspan fill="#ffffff">boodschap = </tspan><tspan fill="#ff6b35">"Goedemorgen!"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="221" font-size="13" font-family="monospace"><tspan fill="#7c3aed">} else if</tspan><tspan fill="#ffffff"> (uur &lt; </tspan><tspan fill="#ff6b35">18</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="60" y="244" font-size="13" font-family="monospace"><tspan fill="#ffffff">boodschap = </tspan><tspan fill="#ff6b35">"Goedemiddag!"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="267" font-size="13" font-family="monospace"><tspan fill="#7c3aed">} else</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="60" y="290" font-size="13" font-family="monospace"><tspan fill="#ffffff">boodschap = </tspan><tspan fill="#ff6b35">"Goedenavond!"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="313" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="40" y="336" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(boodschap);</tspan></text>
  <text x="40" y="380" font-size="12" fill="#94a3b8">// Switch voor dag van de week</text>
  <text x="40" y="403" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> dag = </tspan><tspan fill="#ff6b35">"maandag"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="426" font-size="13" font-family="monospace"><tspan fill="#7c3aed">switch</tspan><tspan fill="#ffffff"> (dag) {</tspan></text>
  <text x="60" y="449" font-size="13" font-family="monospace"><tspan fill="#7c3aed">case</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ff6b35">"maandag"</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="80" y="469" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"Start van de week"</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7c3aed">break</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="60" y="492" font-size="13" font-family="monospace"><tspan fill="#7c3aed">case</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ff6b35">"vrijdag"</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="80" y="512" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"Bijna weekend!"</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7c3aed">break</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="60" y="535" font-size="13" font-family="monospace"><tspan fill="#7c3aed">default</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="80" y="555" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"Gewone dag"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="578" font-size="13" font-family="monospace" fill="#ffffff">}</text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="600" y="120" font-size="12" fill="#94a3b8">// uur = 14 → else if-tak</text>
  <text x="600" y="148" font-size="16" font-family="monospace" fill="#39ff14">Goedemiddag!</text>
  <line x1="600" y1="160" x2="1160" y2="160" stroke="#333" stroke-width="1"/>
  <text x="600" y="190" font-size="12" fill="#94a3b8">// dag = "maandag" → case maandag</text>
  <text x="600" y="218" font-size="16" font-family="monospace" fill="#39ff14">Start van de week</text>
  <line x1="600" y1="230" x2="1160" y2="230" stroke="#333" stroke-width="1"/>

  <rect x="600" y="260" width="560" height="220" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="880" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">if / else flowchart</text>
  <!-- flow -->
  <rect x="720" y="305" width="320" height="36" rx="6" fill="#252535"/>
  <text x="880" y="328" text-anchor="middle" font-size="12" fill="#ffffff">uur &lt; 12 ?</text>
  <line x1="720" y1="323" x2="680" y2="360" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="660" y="358" font-size="11" fill="#ff6b35">nee</text>
  <line x1="1040" y1="323" x2="1080" y2="360" stroke="#39ff14" stroke-width="1.5"/>
  <text x="1060" y="358" font-size="11" fill="#39ff14">ja</text>
  <rect x="620" y="360" width="160" height="30" rx="4" fill="#252535"/>
  <text x="700" y="380" text-anchor="middle" font-size="11" fill="#ffffff">uur &lt; 18 ?</text>
  <rect x="1000" y="360" width="130" height="30" rx="4" fill="#39ff14"/>
  <text x="1065" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f1117">Goedemorgen!</text>
  <line x1="620" y1="375" x2="580" y2="410" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="558" y="408" font-size="11" fill="#ff6b35">nee</text>
  <line x1="780" y1="375" x2="820" y2="410" stroke="#39ff14" stroke-width="1.5"/>
  <text x="800" y="408" font-size="11" fill="#39ff14">ja</text>
  <rect x="800" y="410" width="130" height="30" rx="4" fill="#00d4ff"/>
  <text x="865" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f1117">Goedemiddag!</text>
  <rect x="540" y="410" width="130" height="30" rx="4" fill="#7c3aed"/>
  <text x="605" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Goedenavond!</text>

  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
