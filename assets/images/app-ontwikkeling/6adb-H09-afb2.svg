<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Browser chrome -->
  <rect x="10" y="10" width="780" height="480" rx="12" fill="#f5f6fa" stroke="#ccc" stroke-width="1.5"/>
  <rect x="10" y="10" width="780" height="44" rx="12" fill="#e8e8ed"/>
  <rect x="10" y="44" width="780" height="10" fill="#e8e8ed"/>
  <circle cx="36" cy="32" r="7" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="58" cy="32" r="7" fill="#f9a825" opacity="0.5"/>
  <circle cx="80" cy="32" r="7" fill="#43e97b" opacity="0.5"/>
  <rect x="110" y="18" width="500" height="28" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="360" y="37" text-anchor="middle" font-size="12" fill="#bbb">receptenapp/add.html</text>

  <!-- Pagina achtergrond -->
  <rect x="10" y="54" width="780" height="436" fill="#f8f9ff" rx="0"/>

  <!-- Header balk -->
  <rect x="10" y="54" width="780" height="46" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <rect x="28" y="64" width="80" height="26" rx="4" fill="#c5cae9" opacity="0.6"/>
  <text x="68" y="81" text-anchor="middle" font-size="11" fill="#7986cb">LOGO</text>
  <text x="530" y="81" font-size="12" fill="#555">Overzicht</text>
  <text x="610" y="81" font-size="12" fill="#7986cb" font-weight="600">Recepten beheren</text>
  <line x1="606" y1="85" x2="760" y2="85" stroke="#7986cb" stroke-width="1.5"/>

  <!-- H1 -->
  <text x="400" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#555">Recepten beheren</text>

  <!-- H2 -->
  <text x="80" y="148" font-size="14" font-weight="600" fill="#7986cb">Voeg een recept toe</text>

  <!-- Formulier kaart -->
  <rect x="60" y="158" width="680" height="244" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Naam veld -->
  <text x="82" y="184" font-size="12" fill="#555" font-weight="600">Naam</text>
  <rect x="82" y="190" width="300" height="28" rx="5" fill="#f5f5f5" stroke="#d0d0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Beschrijving -->
  <text x="82" y="234" font-size="12" fill="#555" font-weight="600">Beschrijving</text>
  <rect x="82" y="240" width="616" height="52" rx="5" fill="#f5f5f5" stroke="#d0d0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Categorie -->
  <text x="82" y="312" font-size="12" fill="#555" font-weight="600">Categorie</text>
  <rect x="82" y="318" width="180" height="28" rx="5" fill="#f5f5f5" stroke="#d0d0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="232" y="337" font-size="14" fill="#888">▼</text>

  <!-- Bereidingstijd -->
  <text x="290" y="312" font-size="12" fill="#555" font-weight="600">Bereidingstijd (min)</text>
  <rect x="290" y="318" width="120" height="28" rx="5" fill="#f5f5f5" stroke="#d0d0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Knoppen -->
  <rect x="82" y="362" width="140" height="32" rx="6" fill="#43e97b"/>
  <text x="152" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">✓ Voeg toe</text>

  <rect x="234" y="362" width="200" height="32" rx="6" fill="#3498db"/>
  <text x="334" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">🎲 Willekeurig basisrecept</text>

  <rect x="446" y="362" width="156" height="32" rx="6" fill="#ff6b6b"/>
  <text x="524" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">🗑 Verwijder alles</text>

  <!-- Feedback zone -->
  <rect x="60" y="416" width="680" height="60" rx="8" fill="#fafafa" stroke="#d0d0e0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="443" text-anchor="middle" font-size="13" fill="#bbb">Feedback verschijnt hier</text>
  <text x="400" y="462" text-anchor="middle" font-size="11" fill="#d0d0d0">(succes / fout / melding)</text>
