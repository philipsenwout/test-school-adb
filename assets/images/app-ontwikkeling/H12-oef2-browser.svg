<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">kaarten.html</text>

  <!-- heading -->
  <text x="40" y="90" font-size="24" font-weight="bold" fill="#000">Onze diensten</text>
  <text x="40" y="116" font-size="14" fill="#666" font-style="italic">display: flex; gap: 1.5rem; — drie kaartjes gelijke breedte</text>

  <!-- Card 1 -->
  <rect x="40" y="130" width="256" height="180" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="8"/>
  <text x="168" y="178" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">Webdesign</text>
  <text x="168" y="206" text-anchor="middle" font-size="14" fill="#555">Wij ontwerpen moderne</text>
  <text x="168" y="226" text-anchor="middle" font-size="14" fill="#555">en gebruiksvriendelijke</text>
  <text x="168" y="246" text-anchor="middle" font-size="14" fill="#555">websites voor elk budget.</text>
  <rect x="80" y="272" width="176" height="28" fill="#003087" rx="4"/>
  <text x="168" y="291" text-anchor="middle" font-size="14" fill="#fff">Meer info</text>

  <!-- Card 2 -->
  <rect x="316" y="130" width="256" height="180" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="8"/>
  <text x="444" y="178" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">App-ontwikkeling</text>
  <text x="444" y="206" text-anchor="middle" font-size="14" fill="#555">Van idee tot werkende app:</text>
  <text x="444" y="226" text-anchor="middle" font-size="14" fill="#555">wij begeleiden elk stap</text>
  <text x="444" y="246" text-anchor="middle" font-size="14" fill="#555">van het ontwikkelproces.</text>
  <rect x="356" y="272" width="176" height="28" fill="#003087" rx="4"/>
  <text x="444" y="291" text-anchor="middle" font-size="14" fill="#fff">Meer info</text>

  <!-- Card 3 -->
  <rect x="592" y="130" width="256" height="180" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="8"/>
  <text x="720" y="178" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">Database-design</text>
  <text x="720" y="206" text-anchor="middle" font-size="14" fill="#555">Efficiënte databases op maat</text>
  <text x="720" y="226" text-anchor="middle" font-size="14" fill="#555">van uw bedrijfsprocessen,</text>
  <text x="720" y="246" text-anchor="middle" font-size="14" fill="#555">met snelheid en betrouwbaarheid.</text>
  <rect x="632" y="272" width="176" height="28" fill="#003087" rx="4"/>
  <text x="720" y="291" text-anchor="middle" font-size="14" fill="#fff">Meer info</text>

  <!-- gap annotation -->
  <line x1="296" y1="220" x2="316" y2="220" stroke="#f97316" stroke-width="2"/>
  <text x="306" y="213" text-anchor="middle" font-size="11" fill="#f97316">gap</text>
  <line x1="572" y1="220" x2="592" y2="220" stroke="#f97316" stroke-width="2"/>
  <text x="582" y="213" text-anchor="middle" font-size="11" fill="#f97316">gap</text>
</svg>
