<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Wanneer gebruik je een HTML-tabel?</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Een tabel is voor gegevens met relaties — niet voor lay-out!</text>

  <!-- Goede tabel (links) -->
  <rect x="30" y="58" width="355" height="240" rx="8" fill="#22C55E" opacity="0.08" stroke="#22C55E" stroke-width="1.5"/>
  <text x="207" y="78" text-anchor="middle" font-size="14" fill="#22C55E" font-weight="bold">✓ Juist gebruik van &lt;table&gt;</text>
  <text x="207" y="96" text-anchor="middle" font-size="11" fill="#888">Gegevens die rijen én kolommen hebben</text>

  <text x="50" y="120" font-size="12" fill="#22C55E">✓</text><text x="65" y="120" font-size="12" fill="#f0f0f0"> Uurrooster (dag × tijdslot)</text>
  <text x="50" y="140" font-size="12" fill="#22C55E">✓</text><text x="65" y="140" font-size="12" fill="#f0f0f0"> Spelerstatistieken</text>
  <text x="50" y="160" font-size="12" fill="#22C55E">✓</text><text x="65" y="160" font-size="12" fill="#f0f0f0"> Prijsoverzicht meerdere producten</text>
  <text x="50" y="180" font-size="12" fill="#22C55E">✓</text><text x="65" y="180" font-size="12" fill="#f0f0f0"> Vergelijkingstabel (A vs B vs C)</text>
  <text x="50" y="200" font-size="12" fill="#22C55E">✓</text><text x="65" y="200" font-size="12" fill="#f0f0f0"> Rapporttabel met cijfers</text>

  <!-- Visuele tabel voorbeeld -->
  <rect x="50" y="218" width="315" height="64" rx="4" fill="#2a2c3e" stroke="#22C55E" stroke-width="1"/>
  <line x1="160" y1="218" x2="160" y2="282" stroke="#333" stroke-width="1"/>
  <line x1="270" y1="218" x2="270" y2="282" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="244" x2="365" y2="244" stroke="#333" stroke-width="1"/>
  <text x="105" y="235" text-anchor="middle" font-size="10" fill="#22C55E" font-weight="bold">Dag</text>
  <text x="215" y="235" text-anchor="middle" font-size="10" fill="#22C55E" font-weight="bold">Vak</text>
  <text x="317" y="235" text-anchor="middle" font-size="10" fill="#22C55E" font-weight="bold">Lokaal</text>
  <text x="105" y="258" text-anchor="middle" font-size="10" fill="#aaa">Maandag</text>
  <text x="215" y="258" text-anchor="middle" font-size="10" fill="#aaa">Netwerken</text>
  <text x="317" y="258" text-anchor="middle" font-size="10" fill="#aaa">B104</text>
  <line x1="50" y1="264" x2="365" y2="264" stroke="#333" stroke-width="1"/>
  <text x="105" y="276" text-anchor="middle" font-size="10" fill="#aaa">Dinsdag</text>
  <text x="215" y="276" text-anchor="middle" font-size="10" fill="#aaa">App-ontwikkeling</text>
  <text x="317" y="276" text-anchor="middle" font-size="10" fill="#aaa">B102</text>

  <!-- Verkeerde tabel (rechts) -->
  <rect x="415" y="58" width="355" height="240" rx="8" fill="#f03e3e" opacity="0.06" stroke="#f03e3e" stroke-width="1.5"/>
  <text x="592" y="78" text-anchor="middle" font-size="14" fill="#f03e3e" font-weight="bold">✗ Verkeerd gebruik van &lt;table&gt;</text>
  <text x="592" y="96" text-anchor="middle" font-size="11" fill="#888">Tabel voor lay-out = foute aanpak</text>

  <text x="435" y="120" font-size="12" fill="#f03e3e">✗</text><text x="450" y="120" font-size="12" fill="#888"> Paginalay-out (gebruik CSS Grid)</text>
  <text x="435" y="140" font-size="12" fill="#f03e3e">✗</text><text x="450" y="140" font-size="12" fill="#888"> Kaartjesrij naast elkaar</text>
  <text x="435" y="160" font-size="12" fill="#f03e3e">✗</text><text x="450" y="160" font-size="12" fill="#888"> Navigatiemenu horizontaal</text>
  <text x="435" y="180" font-size="12" fill="#f03e3e">✗</text><text x="450" y="180" font-size="12" fill="#888"> Afbeeldingen naast tekst</text>
  <text x="435" y="200" font-size="12" fill="#f03e3e">✗</text><text x="450" y="200" font-size="12" fill="#888"> Formuliervelden uitlijnen</text>

  <rect x="435" y="215" width="315" height="64" rx="4" fill="#2a2c3e" stroke="#f03e3e" stroke-width="1"/>
  <text x="592" y="235" text-anchor="middle" font-size="10" fill="#f03e3e">Tabel voor lay-out was vroeger</text>
  <text x="592" y="250" text-anchor="middle" font-size="10" fill="#f03e3e">een hack — nu verboden!</text>
  <text x="592" y="268" text-anchor="middle" font-size="10" fill="#888">Gebruik Flexbox of CSS Grid</text>

  <!-- Tip -->
  <rect x="30" y="302" width="740" height="14" rx="3" fill="#2a2c3e"/>
  <text x="400" y="313" text-anchor="middle" font-size="10" fill="#888">Vraag jezelf: "Heeft deze data rijen EN kolommen met betekenis?" → Ja: &lt;table&gt; | Nee: CSS Grid/Flexbox</text>
</svg>
