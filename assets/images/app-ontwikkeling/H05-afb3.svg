<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Alt-tekst — Toegankelijkheid voor iedereen</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Wat hoort een screenreader wanneer hij deze afbeelding tegenkomt?</text>

  <!-- Gedeeld: afbeeldingskader -->
  <!-- Linker kant: FOUT -->
  <rect x="30" y="60" width="360" height="220" rx="8" fill="#f03e3e" opacity="0.08" stroke="#f03e3e" stroke-width="1.5"/>
  <text x="210" y="80" text-anchor="middle" font-size="13" fill="#f03e3e" font-weight="bold">✗ Slechte alt-tekst</text>

  <!-- Afbeelding mock (leerling die code schrijft) -->
  <rect x="60" y="92" width="140" height="90" rx="4" fill="#2a2c3e" stroke="#555" stroke-width="1"/>
  <text x="130" y="132" text-anchor="middle" font-size="10" fill="#888">[foto]</text>
  <text x="130" y="148" text-anchor="middle" font-size="9" fill="#555">leerling.jpg</text>

  <!-- Code voor foute alt -->
  <rect x="60" y="192" width="300" height="28" rx="3" fill="#0d1117"/>
  <text x="70" y="206" font-size="10" font-family="Courier New" fill="#79c0ff">&lt;img src="leerling.jpg"</text>
  <text x="70" y="216" font-size="10" font-family="Courier New" fill="#f03e3e">  alt=""&gt;</text>

  <!-- Screenreader output -->
  <rect x="215" y="92" width="155" height="90" rx="4" fill="#1e2030" stroke="#f03e3e" stroke-width="1"/>
  <text x="292" y="110" text-anchor="middle" font-size="10" fill="#f03e3e">Screenreader zegt:</text>
  <text x="292" y="132" text-anchor="middle" font-size="22" fill="#f03e3e">🔇</text>
  <text x="292" y="155" text-anchor="middle" font-size="11" fill="#f03e3e">"Afbeelding"</text>
  <text x="292" y="170" text-anchor="middle" font-size="9" fill="#888">(geen info)</text>

  <text x="210" y="245" text-anchor="middle" font-size="10" fill="#f03e3e">Probleem: blinde gebruiker</text>
  <text x="210" y="260" text-anchor="middle" font-size="10" fill="#f03e3e">weet niet wat de foto toont</text>
  <text x="210" y="275" text-anchor="middle" font-size="10" fill="#888">Ook slecht voor SEO!</text>

  <!-- Rechter kant: GOED -->
  <rect x="410" y="60" width="360" height="220" rx="8" fill="#2f9e44" opacity="0.08" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="590" y="80" text-anchor="middle" font-size="13" fill="#22C55E" font-weight="bold">✓ Goede alt-tekst</text>

  <!-- Afbeelding mock -->
  <rect x="440" y="92" width="140" height="90" rx="4" fill="#2a2c3e" stroke="#555" stroke-width="1"/>
  <text x="510" y="132" text-anchor="middle" font-size="10" fill="#888">[foto]</text>
  <text x="510" y="148" text-anchor="middle" font-size="9" fill="#555">leerling.jpg</text>

  <!-- Code voor goede alt -->
  <rect x="440" y="192" width="310" height="28" rx="3" fill="#0d1117"/>
  <text x="450" y="206" font-size="10" font-family="Courier New" fill="#79c0ff">&lt;img src="leerling.jpg"</text>
  <text x="450" y="216" font-size="10" font-family="Courier New" fill="#a8ff7a">  alt="Leerling typt HTML-code in VS Code"&gt;</text>

  <!-- Screenreader output -->
  <rect x="595" y="92" width="155" height="90" rx="4" fill="#1e2030" stroke="#22C55E" stroke-width="1"/>
  <text x="672" y="110" text-anchor="middle" font-size="10" fill="#22C55E">Screenreader zegt:</text>
  <text x="672" y="132" text-anchor="middle" font-size="20" fill="#22C55E">🔊</text>
  <text x="672" y="152" text-anchor="middle" font-size="9" fill="#22C55E">"Leerling typt</text>
  <text x="672" y="165" text-anchor="middle" font-size="9" fill="#22C55E">HTML-code in VS Code"</text>

  <text x="590" y="245" text-anchor="middle" font-size="10" fill="#22C55E">Voordeel: blinde gebruiker</text>
  <text x="590" y="260" text-anchor="middle" font-size="10" fill="#22C55E">begrijpt de context volledig</text>
  <text x="590" y="275" text-anchor="middle" font-size="10" fill="#888">Beter voor SEO + toegankelijkheid</text>

  <!-- Regels onderaan -->
  <rect x="30" y="292" width="740" height="55" rx="6" fill="#2a2c3e"/>
  <text x="400" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0f0f0">Vuistregels voor alt-tekst</text>
  <text x="80" y="328" font-size="10" fill="#22C55E">✓</text><text x="95" y="328" font-size="10" fill="#aaa"> Beschrijf inhoud + context</text>
  <text x="270" y="328" font-size="10" fill="#22C55E">✓</text><text x="285" y="328" font-size="10" fill="#aaa"> Decoratief beeld → alt=""</text>
  <text x="460" y="328" font-size="10" fill="#f03e3e">✗</text><text x="475" y="328" font-size="10" fill="#aaa"> Niet "afbeelding van..." zeggen</text>
  <text x="650" y="328" font-size="10" fill="#f03e3e">✗</text><text x="665" y="328" font-size="10" fill="#aaa"> Niet weglaten</text>
  <text x="400" y="343" text-anchor="middle" font-size="10" fill="#888">WCAG 2.1 vereist alt-tekst op alle inhoudelijke afbeeldingen (richtlijn 1.1.1)</text>
</svg>
