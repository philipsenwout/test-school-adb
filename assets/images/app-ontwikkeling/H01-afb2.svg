<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0E14"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Titel -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E8E9F3">HTML DOCUMENTBOOM</text>
  <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6E8E" letter-spacing="0.1em">BOOMSTRUCTUUR VAN EEN HTML-PAGINA (DOM)</text>
  <line x1="80" y1="64" x2="720" y2="64" stroke="#1F2035" stroke-width="1"/>

  <!-- DOCTYPE -->
  <rect x="330" y="76" width="140" height="30" rx="4" fill="#1A1C28" stroke="#F97316" stroke-width="1.5"/>
  <text x="400" y="96" text-anchor="middle" font-family="monospace, system-ui" font-size="12" fill="#F97316">&lt;!DOCTYPE html&gt;</text>

  <!-- html root -->
  <rect x="305" y="126" width="190" height="32" rx="6" fill="#F9731620" stroke="#F97316" stroke-width="2"/>
  <text x="400" y="146" text-anchor="middle" font-family="monospace, system-ui" font-size="14" font-weight="700" fill="#F97316">&lt;html&gt;</text>

  <!-- Lijn DOCTYPE naar html -->
  <line x1="400" y1="106" x2="400" y2="126" stroke="#2A2C45" stroke-width="1.5"/>

  <!-- Tak naar head en body -->
  <line x1="400" y1="158" x2="400" y2="178" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="220" y1="178" x2="580" y2="178" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="220" y1="178" x2="220" y2="198" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="580" y1="178" x2="580" y2="198" stroke="#2A2C45" stroke-width="1.5"/>

  <!-- head -->
  <rect x="140" y="198" width="160" height="32" rx="6" fill="#3B82F620" stroke="#3B82F6" stroke-width="2"/>
  <text x="220" y="218" text-anchor="middle" font-family="monospace, system-ui" font-size="14" font-weight="700" fill="#3B82F6">&lt;head&gt;</text>

  <!-- body -->
  <rect x="500" y="198" width="160" height="32" rx="6" fill="#00C2A820" stroke="#00C2A8" stroke-width="2"/>
  <text x="580" y="218" text-anchor="middle" font-family="monospace, system-ui" font-size="14" font-weight="700" fill="#00C2A8">&lt;body&gt;</text>

  <!-- head children: tak -->
  <line x1="220" y1="230" x2="220" y2="250" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="140" y1="250" x2="300" y2="250" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="140" y1="250" x2="140" y2="266" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="220" y1="250" x2="220" y2="266" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="300" y1="250" x2="300" y2="266" stroke="#2A2C45" stroke-width="1.5"/>

  <!-- meta -->
  <rect x="68" y="266" width="144" height="28" rx="4" fill="#1A1C28" stroke="#3B82F680" stroke-width="1"/>
  <text x="140" y="284" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#3B82F6">&lt;meta charset&gt;</text>

  <!-- title -->
  <rect x="156" y="266" width="128" height="28" rx="4" fill="#1A1C28" stroke="#3B82F680" stroke-width="1"/>
  <text x="220" y="284" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#3B82F6">&lt;title&gt;</text>

  <!-- link/style -->
  <rect x="236" y="266" width="128" height="28" rx="4" fill="#1A1C28" stroke="#3B82F680" stroke-width="1"/>
  <text x="300" y="284" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#3B82F6">&lt;link&gt; / &lt;style&gt;</text>

  <!-- body children: tak -->
  <line x1="580" y1="230" x2="580" y2="250" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="460" y1="250" x2="700" y2="250" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="460" y1="250" x2="460" y2="266" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="580" y1="250" x2="580" y2="266" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="700" y1="250" x2="700" y2="266" stroke="#2A2C45" stroke-width="1.5"/>

  <!-- header -->
  <rect x="390" y="266" width="140" height="28" rx="4" fill="#1A1C28" stroke="#00C2A880" stroke-width="1"/>
  <text x="460" y="284" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#00C2A8">&lt;header&gt;</text>

  <!-- main -->
  <rect x="510" y="266" width="140" height="28" rx="4" fill="#1A1C28" stroke="#00C2A880" stroke-width="1"/>
  <text x="580" y="284" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#00C2A8">&lt;main&gt;</text>

  <!-- footer -->
  <rect x="630" y="266" width="140" height="28" rx="4" fill="#1A1C28" stroke="#00C2A880" stroke-width="1"/>
  <text x="700" y="284" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#00C2A8">&lt;footer&gt;</text>

  <!-- main children: tak -->
  <line x1="580" y1="294" x2="580" y2="310" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="500" y1="310" x2="660" y2="310" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="500" y1="310" x2="500" y2="326" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="580" y1="310" x2="580" y2="326" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="660" y1="310" x2="660" y2="326" stroke="#2A2C45" stroke-width="1.5"/>

  <!-- h1 -->
  <rect x="440" y="326" width="120" height="26" rx="4" fill="#1A1C28" stroke="#00C2A860" stroke-width="1"/>
  <text x="500" y="343" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#A8AACB">&lt;h1&gt;...&lt;/h1&gt;</text>

  <!-- p -->
  <rect x="520" y="326" width="120" height="26" rx="4" fill="#1A1C28" stroke="#00C2A860" stroke-width="1"/>
  <text x="580" y="343" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#A8AACB">&lt;p&gt;...&lt;/p&gt;</text>

  <!-- div -->
  <rect x="600" y="326" width="120" height="26" rx="4" fill="#1A1C28" stroke="#00C2A860" stroke-width="1"/>
  <text x="660" y="343" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#A8AACB">&lt;div&gt;...&lt;/div&gt;</text>

  <!-- header children -->
  <line x1="460" y1="294" x2="460" y2="310" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="410" y1="310" x2="510" y2="310" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="410" y1="310" x2="410" y2="326" stroke="#2A2C45" stroke-width="1.5"/>
  <line x1="510" y1="310" x2="510" y2="326" stroke="#2A2C45" stroke-width="1.5"/>

  <rect x="348" y="326" width="124" height="26" rx="4" fill="#1A1C28" stroke="#00C2A860" stroke-width="1"/>
  <text x="410" y="343" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#A8AACB">&lt;nav&gt;</text>
  <rect x="448" y="326" width="124" height="26" rx="4" fill="#1A1C28" stroke="#00C2A860" stroke-width="1"/>
  <text x="510" y="343" text-anchor="middle" font-family="monospace, system-ui" font-size="11" fill="#A8AACB">&lt;h1&gt; / &lt;img&gt;</text>

  <!-- Legenda onderaan -->
  <rect x="80" y="376" width="640" height="60" rx="6" fill="#1A1C28" stroke="#2A2C45" stroke-width="1"/>
  <text x="400" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#E8E9F3">Legenda</text>
  <rect x="100" y="400" width="12" height="12" rx="2" fill="#F97316"/>
  <text x="120" y="411" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Root-element</text>
  <rect x="220" y="400" width="12" height="12" rx="2" fill="#3B82F6"/>
  <text x="240" y="411" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Metadata (head)</text>
  <rect x="370" y="400" width="12" height="12" rx="2" fill="#00C2A8"/>
  <text x="390" y="411" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Structuur (body)</text>
  <rect x="510" y="400" width="12" height="12" rx="2" fill="#A8AACB"/>
  <text x="530" y="411" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Inhoud-elementen</text>
  <text x="400" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Elk HTML-element is een knoop (node) in de DOM-boom. De browser leest de boom van boven naar beneden.</text>
</svg>
