<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">Het &lt;img&gt; element — Attributen</text>
  
  <!-- img element visueel -->
  <rect x="60" y="55" width="680" height="55" rx="6" fill="#7B3FE4" opacity="0.2"/>
  <text x="90" y="82" font-size="16" font-family="Courier New" fill="#f0f0f0">&lt;img</text>
  <text x="165" y="82" font-size="16" font-family="Courier New" fill="#2D9CDB"> src=</text>
  <text x="227" y="82" font-size="16" font-family="Courier New" fill="#22C55E">"foto.jpg"</text>
  <text x="360" y="82" font-size="16" font-family="Courier New" fill="#F97316"> alt=</text>
  <text x="410" y="82" font-size="16" font-family="Courier New" fill="#22C55E">"Omschrijving"</text>
  <text x="620" y="82" font-size="16" font-family="Courier New" fill="#f0f0f0">&gt;</text>

  <!-- src uitleg -->
  <line x1="190" y1="110" x2="190" y2="145" stroke="#2D9CDB" stroke-width="2"/>
  <rect x="80" y="145" width="240" height="80" rx="6" fill="#2D9CDB" opacity="0.2"/>
  <text x="200" y="165" text-anchor="middle" font-size="13" fill="#2D9CDB" font-weight="bold">src — Bron</text>
  <text x="98" y="185" font-size="11" fill="#aaa">Relatief: img/foto.jpg</text>
  <text x="98" y="201" font-size="11" fill="#aaa">Absoluut: https://...</text>
  <text x="98" y="217" font-size="11" fill="#F97316">Gebruik relatieve paden!</text>
  
  <!-- alt uitleg -->
  <line x1="460" y1="110" x2="460" y2="145" stroke="#F97316" stroke-width="2"/>
  <rect x="340" y="145" width="240" height="80" rx="6" fill="#F97316" opacity="0.2"/>
  <text x="460" y="165" text-anchor="middle" font-size="13" fill="#F97316" font-weight="bold">alt — Alternatieve tekst</text>
  <text x="358" y="185" font-size="11" fill="#aaa">Verplicht attribuut!</text>
  <text x="358" y="201" font-size="11" fill="#aaa">Gelezen door screenreaders</text>
  <text x="358" y="217" font-size="11" fill="#aaa">alt="" = decoratieve afbeelding</text>
  
  <!-- Extra attributen -->
  <rect x="60" y="250" width="680" height="75" rx="8" fill="#22C55E" opacity="0.1"/>
  <rect x="60" y="250" width="680" height="75" rx="8" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <text x="400" y="272" text-anchor="middle" font-size="13" fill="#22C55E">Optionele attributen</text>
  <text x="80" y="295" font-size="11" font-family="Courier New" fill="#f0f0f0">width="800" height="600"</text>
  <text x="310" y="295" font-size="11" fill="#aaa">→ Maakt ruimte reserveren voor snellere laadtijd</text>
  <text x="80" y="315" font-size="11" font-family="Courier New" fill="#f0f0f0">loading="lazy"</text>
  <text x="200" y="315" font-size="11" fill="#aaa">→ Laad afbeelding pas als ze in beeld komt</text>
</svg>
