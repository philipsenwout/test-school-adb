<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">uurrooster.html</text>

  <!-- caption -->
  <text x="40" y="84" font-size="15" font-weight="bold" fill="#000" text-anchor="start">Uurrooster 5ADB — Week van 6 oktober 2025</text>

  <!-- table border -->
  <rect x="40" y="94" width="700" height="260" fill="none" stroke="#999" stroke-width="1"/>

  <!-- thead row -->
  <rect x="40" y="94" width="700" height="36" fill="#e8e8e8"/>
  <!-- th cells -->
  <line x1="215" y1="94" x2="215" y2="354" stroke="#999" stroke-width="1"/>
  <line x1="390" y1="94" x2="390" y2="354" stroke="#999" stroke-width="1"/>
  <line x1="565" y1="94" x2="565" y2="354" stroke="#999" stroke-width="1"/>
  <text x="127" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Tijdstip</text>
  <text x="302" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Maandag</text>
  <text x="477" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Dinsdag</text>

  <!-- tbody rows -->
  <!-- row 1 -->
  <line x1="40" y1="130" x2="740" y2="130" stroke="#999" stroke-width="1"/>
  <text x="127" y="152" text-anchor="middle" font-size="14" fill="#000">8u30</text>
  <text x="302" y="152" text-anchor="middle" font-size="14" fill="#000">Netwerken</text>
  <text x="477" y="152" text-anchor="middle" font-size="14" fill="#000">App-ontwikkeling</text>

  <!-- row 2 -->
  <line x1="40" y1="166" x2="740" y2="166" stroke="#999" stroke-width="1"/>
  <text x="127" y="188" text-anchor="middle" font-size="14" fill="#000">10u00</text>
  <text x="302" y="188" text-anchor="middle" font-size="14" fill="#000">Netwerken</text>
  <text x="477" y="188" text-anchor="middle" font-size="14" fill="#000">App-ontwikkeling</text>

  <!-- row 3 -->
  <line x1="40" y1="202" x2="740" y2="202" stroke="#999" stroke-width="1"/>
  <text x="127" y="224" text-anchor="middle" font-size="14" fill="#000">13u00</text>
  <text x="302" y="224" text-anchor="middle" font-size="14" fill="#000">Databeheer</text>
  <text x="477" y="224" text-anchor="middle" font-size="14" fill="#000">App-ontwikkeling</text>

  <!-- row 4 -->
  <line x1="40" y1="238" x2="740" y2="238" stroke="#999" stroke-width="1"/>
  <text x="127" y="260" text-anchor="middle" font-size="14" fill="#000">14u30</text>
  <text x="302" y="260" text-anchor="middle" font-size="14" fill="#000">Databeheer</text>
  <text x="477" y="260" text-anchor="middle" font-size="14" fill="#000">E-STEM</text>

  <!-- tfoot -->
  <line x1="40" y1="274" x2="740" y2="274" stroke="#999" stroke-width="1"/>
  <rect x="40" y="274" width="700" height="36" fill="#f0f0f0"/>
  <!-- colspan="2": merges Tijdstip + Maandag columns -->
  <text x="215" y="298" text-anchor="middle" font-size="13" fill="#555">Week van 6 oktober 2025</text>

  <!-- colspan visual indication: no vertical line in tfoot -->
  <!-- partial line for Dinsdag column boundary -->
  <line x1="390" y1="274" x2="390" y2="310" stroke="#999" stroke-width="1"/>
