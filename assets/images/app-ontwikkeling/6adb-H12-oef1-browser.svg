<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" rx="8" fill="#2d2d2d"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="100" y="8" width="500" height="24" rx="12" fill="#1a1a1a"/>
  <text x="350" y="24" text-anchor="middle" fill="#888" font-size="12">localhost/receptenapp/</text>

  <!-- Page background (blurred) -->
  <rect x="0" y="40" width="800" height="460" fill="#f0f4ff" opacity="0.4"/>
  <!-- Blurred app content hint -->
  <rect x="30" y="60" width="740" height="50" rx="8" fill="#ddd" opacity="0.5"/>
  <rect x="30" y="125" width="200" height="150" rx="8" fill="#3498db" opacity="0.2"/>
  <rect x="245" y="125" width="200" height="150" rx="8" fill="#e74c3c" opacity="0.2"/>
  <rect x="460" y="125" width="200" height="150" rx="8" fill="#9b59b6" opacity="0.2"/>
  <!-- Overlay dimmer -->
  <rect x="0" y="40" width="800" height="460" fill="#000" opacity="0.35"/>

  <!-- Confirm dialog -->
  <rect x="200" y="140" width="400" height="200" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <!-- Shadow -->
  <rect x="204" y="144" width="400" height="200" rx="12" fill="#000" opacity="0.15"/>
  <rect x="200" y="140" width="400" height="200" rx="12" fill="white"/>

  <!-- Dialog header -->
  <rect x="200" y="140" width="400" height="50" rx="12" fill="#f5f5f5"/>
  <rect x="200" y="168" width="400" height="22" fill="#f5f5f5"/>
  <text x="400" y="170" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">localhost wil het volgende mededelen:</text>

  <!-- Dialog content -->
  <text x="400" y="220" text-anchor="middle" fill="#2d2d4e" font-size="14">Ben je zeker dat je</text>
  <text x="400" y="242" text-anchor="middle" fill="#2d2d4e" font-size="14" font-weight="bold">'Pasta carbonara'</text>
  <text x="400" y="264" text-anchor="middle" fill="#2d2d4e" font-size="14">wil verwijderen?</text>

  <!-- Buttons -->
  <rect x="230" y="295" width="140" height="36" rx="8" fill="#e0e0e0"/>
  <text x="300" y="317" text-anchor="middle" fill="#333" font-size="14">Annuleren</text>

  <rect x="390" y="295" width="140" height="36" rx="8" fill="#ff6b6b"/>
  <text x="460" y="317" text-anchor="middle" fill="white" font-size="14" font-weight="bold">OK</text>

  <!-- Code hint below dialog -->
  <rect x="150" y="370" width="500" height="50" rx="8" fill="#1a1a2e" opacity="0.9"/>
  <text x="400" y="392" text-anchor="middle" fill="#aaa" font-size="11" font-family="'Courier New', monospace">const bevestigd = confirm(`"${naam}" verwijderen?`);</text>
  <text x="400" y="410" text-anchor="middle" fill="#6c63ff" font-size="11" font-family="'Courier New', monospace">if (!bevestigd) return;  // Annuleren → stop de functie</text>
</svg>
