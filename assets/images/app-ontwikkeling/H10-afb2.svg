<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">box-sizing: content-box vs border-box</text>

  <!-- content-box (standaard) -->
  <rect x="30" y="55" width="355" height="290" rx="8" fill="#EF4444" opacity="0.08"/>
  <rect x="30" y="55" width="355" height="290" rx="8" fill="none" stroke="#EF4444" stroke-width="2"/>
  <text x="207" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">box-sizing: content-box</text>
  <text x="207" y="96" text-anchor="middle" font-size="11" fill="#aaa">(standaard — verwarrend)</text>

  <!-- Visueel: content-box element -->
  <rect x="60" y="110" width="295" height="30" rx="4" fill="#F97316" opacity="0.3" stroke="#F97316" stroke-dasharray="3,2"/>
  <rect x="90" y="115" width="235" height="20" rx="3" fill="#2D9CDB" opacity="0.4" stroke="#2D9CDB"/>
  <rect x="110" y="117" width="195" height="16" rx="2" fill="#7B3FE4" opacity="0.7"/>
  <text x="207" y="129" text-anchor="middle" font-size="10" fill="white">width: 200px</text>

  <text x="207" y="165" text-anchor="middle" font-size="12" fill="#f0f0f0">width = 200px</text>
  <text x="207" y="183" text-anchor="middle" font-size="12" fill="#aaa">+ padding: 20px links + 20px rechts</text>
  <text x="207" y="201" text-anchor="middle" font-size="12" fill="#aaa">+ border: 2px links + 2px rechts</text>
  <line x1="60" y1="215" x2="355" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="207" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">Totaal = 244px !</text>
  <text x="207" y="255" text-anchor="middle" font-size="11" fill="#aaa">Larger dan opgegeven → verwarrend</text>

  <rect x="60" y="270" width="295" height="55" rx="6" fill="#2a2d3e"/>
  <text x="207" y="292" text-anchor="middle" font-size="12" font-family="Courier New" fill="#EF4444">* {</text>
  <text x="207" y="312" text-anchor="middle" font-size="12" font-family="Courier New" fill="#aaa">  /* NIET aanbevolen */</text>
  <text x="207" y="328" text-anchor="middle" font-size="12" font-family="Courier New" fill="#EF4444">}</text>

  <!-- border-box (aanbevolen) -->
  <rect x="415" y="55" width="355" height="290" rx="8" fill="#22C55E" opacity="0.08"/>
  <rect x="415" y="55" width="355" height="290" rx="8" fill="none" stroke="#22C55E" stroke-width="2"/>
  <text x="592" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#22C55E">box-sizing: border-box</text>
  <text x="592" y="96" text-anchor="middle" font-size="11" fill="#aaa">(aanbevolen — intuïtief)</text>

  <!-- Visueel: border-box element -->
  <rect x="445" y="110" width="295" height="30" rx="4" fill="#F97316" opacity="0.3" stroke="#F97316" stroke-dasharray="3,2"/>
  <rect x="475" y="115" width="235" height="20" rx="3" fill="#2D9CDB" opacity="0.4" stroke="#2D9CDB"/>
  <rect x="495" y="117" width="155" height="16" rx="2" fill="#7B3FE4" opacity="0.7"/>
  <text x="572" y="129" text-anchor="middle" font-size="10" fill="white">content: 156px</text>

  <text x="592" y="165" text-anchor="middle" font-size="12" fill="#f0f0f0">width = 200px</text>
  <text x="592" y="183" text-anchor="middle" font-size="12" fill="#aaa">padding al inbegrepen</text>
  <text x="592" y="201" text-anchor="middle" font-size="12" fill="#aaa">border al inbegrepen</text>
  <line x1="445" y1="215" x2="740" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="592" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#22C55E">Totaal = 200px ✓</text>
  <text x="592" y="255" text-anchor="middle" font-size="11" fill="#aaa">Wat je opgeeft, is wat je krijgt!</text>

  <rect x="445" y="270" width="295" height="55" rx="6" fill="#2a2d3e"/>
  <text x="592" y="292" text-anchor="middle" font-size="12" font-family="Courier New" fill="#22C55E">*, *::before, *::after {</text>
  <text x="592" y="312" text-anchor="middle" font-size="12" font-family="Courier New" fill="#22C55E">  box-sizing: border-box;</text>
  <text x="592" y="328" text-anchor="middle" font-size="12" font-family="Courier New" fill="#22C55E">}</text>

  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#555">Tip: Altijd border-box instellen als eerste CSS-regel</text>
</svg>
