<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">functies.html</text>

  <!-- Code left -->
  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="95" font-size="12" fill="#94a3b8">// Functie 1: omtrek van een rechthoek</text>
  <text x="40" y="118" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">berekenOmtrek</tspan><tspan fill="#ffffff">(b, h) {</tspan></text>
  <text x="60" y="141" font-size="13" font-family="monospace"><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> 2 * (b + h);</tspan></text>
  <text x="40" y="164" font-size="13" font-family="monospace" fill="#ffffff">}</text>

  <text x="40" y="200" font-size="12" fill="#94a3b8">// Functie 2: controleren of getal even is</text>
  <text x="40" y="223" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">isEven</tspan><tspan fill="#ffffff">(getal) {</tspan></text>
  <text x="60" y="246" font-size="13" font-family="monospace"><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> getal % 2 === 0;</tspan></text>
  <text x="40" y="269" font-size="13" font-family="monospace" fill="#ffffff">}</text>

  <text x="40" y="305" font-size="12" fill="#94a3b8">// Functie 3: naam begroeten (standaardparameter)</text>
  <text x="40" y="328" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#00d4ff">begroet</tspan><tspan fill="#ffffff">(naam = </tspan><tspan fill="#ff6b35">"bezoeker"</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="60" y="351" font-size="13" font-family="monospace"><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> `Hallo, ${naam}!`;</tspan></text>
  <text x="40" y="374" font-size="13" font-family="monospace" fill="#ffffff">}</text>

  <text x="40" y="415" font-size="12" fill="#94a3b8">// Aanroepen</text>
  <text x="40" y="438" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(berekenOmtrek(10, 5));</tspan></text>
  <text x="40" y="461" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(berekenOmtrek(7, 3));</tspan></text>
  <text x="40" y="497" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(isEven(8));</tspan></text>
  <text x="40" y="520" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(isEven(7));</tspan></text>
  <text x="40" y="556" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(begroet(</tspan><tspan fill="#ff6b35">"Jana"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="579" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(begroet());</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>

  <text x="600" y="120" font-size="12" fill="#94a3b8">// berekenOmtrek(10, 5)</text>
  <text x="600" y="148" font-size="16" font-family="monospace" fill="#39ff14">30</text>
  <text x="680" y="148" font-size="13" fill="#94a3b8">← 2 × (10 + 5)</text>
  <line x1="600" y1="160" x2="1160" y2="160" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="185" font-size="12" fill="#94a3b8">// berekenOmtrek(7, 3)</text>
  <text x="600" y="213" font-size="16" font-family="monospace" fill="#39ff14">20</text>
  <text x="640" y="213" font-size="13" fill="#94a3b8">← 2 × (7 + 3)</text>
  <line x1="600" y1="225" x2="1160" y2="225" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="255" font-size="12" fill="#94a3b8">// isEven(8)</text>
  <text x="600" y="283" font-size="16" font-family="monospace" fill="#39ff14">true</text>
  <text x="660" y="283" font-size="13" fill="#94a3b8">← 8 % 2 === 0 ✓</text>
  <line x1="600" y1="295" x2="1160" y2="295" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="320" font-size="12" fill="#94a3b8">// isEven(7)</text>
  <text x="600" y="348" font-size="16" font-family="monospace" fill="#ff6b35">false</text>
  <text x="660" y="348" font-size="13" fill="#94a3b8">← 7 % 2 !== 0</text>
  <line x1="600" y1="360" x2="1160" y2="360" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="385" font-size="12" fill="#94a3b8">// begroet("Jana")</text>
  <text x="600" y="413" font-size="16" font-family="monospace" fill="#39ff14">Hallo, Jana!</text>
  <line x1="600" y1="425" x2="1160" y2="425" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="450" font-size="12" fill="#94a3b8">// begroet()  — geen argument → standaardwaarde</text>
  <text x="600" y="478" font-size="16" font-family="monospace" fill="#39ff14">Hallo, bezoeker!</text>
  <text x="600" y="500" font-size="12" fill="#94a3b8">← standaardparameter "bezoeker" gebruikt</text>
  <line x1="600" y1="512" x2="1160" y2="512" stroke="#333" stroke-width="0.5"/>

  <!-- Tips box -->
  <rect x="600" y="530" width="560" height="220" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="880" y="558" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">Wat heb je geleerd?</text>
  <text x="620" y="583" font-size="13" fill="#39ff14">✓</text>
  <text x="640" y="583" font-size="13" fill="#ffffff">Functie declareren met parameters</text>
  <text x="620" y="608" font-size="13" fill="#39ff14">✓</text>
  <text x="640" y="608" font-size="13" fill="#ffffff">return-waarde teruggeven</text>
  <text x="620" y="633" font-size="13" fill="#39ff14">✓</text>
  <text x="640" y="633" font-size="13" fill="#ffffff">Boolean teruggeven (isEven)</text>
  <text x="620" y="658" font-size="13" fill="#39ff14">✓</text>
  <text x="640" y="658" font-size="13" fill="#ffffff">Standaardparameter gebruiken</text>
  <text x="620" y="683" font-size="13" fill="#39ff14">✓</text>
  <text x="640" y="683" font-size="13" fill="#ffffff">Template literal in return</text>
  <text x="620" y="708" font-size="13" fill="#39ff14">✓</text>
  <text x="640" y="708" font-size="13" fill="#ffffff">Functie meerdere keren aanroepen met andere argumenten</text>

  <!-- cursor -->
  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
