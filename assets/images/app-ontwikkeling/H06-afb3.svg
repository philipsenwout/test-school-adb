<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">colspan en rowspan — Cellen samenvoegen</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Gebruik colspan voor horizontaal en rowspan voor verticaal samenvoegen</text>

  <!-- Visuele tabel met colspan/rowspan -->
  <text x="180" y="68" text-anchor="middle" font-size="13" fill="#7B3FE4">colspan ↔ horizontaal</text>
  <text x="580" y="68" text-anchor="middle" font-size="13" fill="#F97316">rowspan ↕ verticaal</text>

  <g transform="translate(30, 78)">
    <!-- Tabel rasterlijnen -->
    <rect x="0" y="0" width="300" height="250" rx="4" fill="none" stroke="#555" stroke-width="1"/>

    <!-- Kolommen -->
    <line x1="100" y1="0" x2="100" y2="250" stroke="#555" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="250" stroke="#555" stroke-width="1"/>

    <!-- Rij 1: colspan=3 -->
    <rect x="1" y="1" width="298" height="49" rx="3" fill="#7B3FE4" opacity="0.55"/>
    <text x="150" y="22" text-anchor="middle" font-size="11" fill="white" font-weight="bold">colspan="3"</text>
    <text x="150" y="38" text-anchor="middle" font-size="10" fill="#e0d0ff">Titel over 3 kolommen</text>

    <!-- Rij 2 normaal + rowspan -->
    <line x1="0" y1="50" x2="300" y2="50" stroke="#555" stroke-width="1"/>
    <rect x="1" y="51" width="98" height="49" rx="2" fill="#2D9CDB" opacity="0.4"/>
    <text x="50" y="78" text-anchor="middle" font-size="11" fill="white">Cel A</text>
    <rect x="101" y="51" width="98" height="49" rx="2" fill="#2D9CDB" opacity="0.3"/>
    <text x="150" y="78" text-anchor="middle" font-size="11" fill="white">Cel B</text>
    <!-- rowspan cel -->
    <rect x="201" y="51" width="98" height="149" rx="2" fill="#F97316" opacity="0.5"/>
    <text x="250" y="118" text-anchor="middle" font-size="11" fill="white">rowspan="3"</text>
    <text x="250" y="135" text-anchor="middle" font-size="10" fill="white">over 3 rijen</text>

    <line x1="0" y1="100" x2="200" y2="100" stroke="#555" stroke-width="1"/>
    <rect x="1" y="101" width="98" height="49" rx="2" fill="#2D9CDB" opacity="0.25"/>
    <text x="50" y="128" text-anchor="middle" font-size="11" fill="white">Cel D</text>
    <rect x="101" y="101" width="98" height="49" rx="2" fill="#2D9CDB" opacity="0.2"/>
    <text x="150" y="128" text-anchor="middle" font-size="11" fill="white">Cel E</text>

    <line x1="0" y1="150" x2="200" y2="150" stroke="#555" stroke-width="1"/>
    <rect x="1" y="151" width="198" height="49" rx="2" fill="#22C55E" opacity="0.3"/>
    <text x="100" y="178" text-anchor="middle" font-size="11" fill="white">colspan="2" — 2 kolommen</text>

    <line x1="0" y1="200" x2="300" y2="200" stroke="#555" stroke-width="1"/>
    <rect x="1" y="201" width="98" height="48" rx="2" fill="#7B3FE4" opacity="0.3"/>
    <text x="50" y="228" text-anchor="middle" font-size="11" fill="white">Cel H</text>
    <rect x="101" y="201" width="98" height="48" rx="2" fill="#7B3FE4" opacity="0.2"/>
    <text x="150" y="228" text-anchor="middle" font-size="11" fill="white">Cel I</text>
    <rect x="201" y="201" width="98" height="48" rx="2" fill="#7B3FE4" opacity="0.1"/>
    <text x="250" y="228" text-anchor="middle" font-size="11" fill="white">Cel J</text>
  </g>

  <!-- Code voorbeelden rechts -->
  <rect x="380" y="78" width="390" height="250" rx="8" fill="#1e2030" stroke="#555" stroke-width="1"/>
  <text x="575" y="100" text-anchor="middle" font-size="13" fill="#aaa">Code voorbeelden</text>

  <text x="400" y="125" font-size="11" fill="#7B3FE4" font-weight="bold">colspan — horizontaal samenvoegen:</text>
  <rect x="398" y="132" width="355" height="28" rx="3" fill="#0d1117"/>
  <text x="410" y="150" font-size="11" font-family="Courier New" fill="#a8ff7a">&lt;td colspan="3"&gt;Cel over 3 kolommen&lt;/td&gt;</text>
  <text x="400" y="174" font-size="10" fill="#888">→ cel neemt de breedte van 3 normale cellen in</text>

  <text x="400" y="198" font-size="11" fill="#F97316" font-weight="bold">rowspan — verticaal samenvoegen:</text>
  <rect x="398" y="205" width="355" height="28" rx="3" fill="#0d1117"/>
  <text x="410" y="223" font-size="11" font-family="Courier New" fill="#a8ff7a">&lt;td rowspan="3"&gt;Cel over 3 rijen&lt;/td&gt;</text>
  <text x="400" y="247" font-size="10" fill="#888">→ cel bezet ook ruimte in de volgende 2 rijen</text>

  <rect x="398" y="258" width="355" height="54" rx="4" fill="#2a2c3e"/>
  <text x="575" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0f0f0">Let op bij tellen!</text>
  <text x="408" y="292" font-size="10" fill="#aaa">Een rowspan/colspan "bezet" cellen in andere rijen.</text>
  <text x="408" y="306" font-size="10" fill="#aaa">Die cellen mag je NIET meer toevoegen in de HTML.</text>

  <text x="400" y="340" text-anchor="middle" font-size="10" fill="#666">Gebruik: uurroosters, kalenders, vergelijkingstabellen</text>
</svg>
