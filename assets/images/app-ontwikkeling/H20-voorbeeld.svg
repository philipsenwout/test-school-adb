<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">rekenmachine.html</text>

  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="90" font-size="12" fill="#94a3b8">// Rekenmachine met operatoren</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> a = </tspan><tspan fill="#ff6b35">15</tspan><tspan fill="#ffffff">, b = </tspan><tspan fill="#ff6b35">4</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="145" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(a + b);</tspan><tspan fill="#94a3b8">   // 19</tspan></text>
  <text x="40" y="168" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(a - b);</tspan><tspan fill="#94a3b8">   // 11</tspan></text>
  <text x="40" y="191" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(a * b);</tspan><tspan fill="#94a3b8">   // 60</tspan></text>
  <text x="40" y="214" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(a / b);</tspan><tspan fill="#94a3b8">   // 3.75</tspan></text>
  <text x="40" y="237" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(a % b);</tspan><tspan fill="#94a3b8">   // 3</tspan></text>
  <text x="40" y="260" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(a ** </tspan><tspan fill="#ff6b35">2</tspan><tspan fill="#ffffff">);</tspan><tspan fill="#94a3b8">  // 225</tspan></text>
  <text x="40" y="295" font-size="12" fill="#94a3b8">// Samengestelde toekenning</text>
  <text x="40" y="318" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> score = </tspan><tspan fill="#ff6b35">10</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="341" font-size="13" font-family="monospace"><tspan fill="#ffffff">score += </tspan><tspan fill="#ff6b35">5</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">   // 15</tspan></text>
  <text x="40" y="364" font-size="13" font-family="monospace"><tspan fill="#ffffff">score *= </tspan><tspan fill="#ff6b35">2</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">   // 30</tspan></text>
  <text x="40" y="387" font-size="13" font-family="monospace"><tspan fill="#ffffff">score++;</tspan><tspan fill="#94a3b8">       // 31</tspan></text>
  <text x="40" y="422" font-size="12" fill="#94a3b8">// Math-functies</text>
  <text x="40" y="445" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Math.round(</tspan><tspan fill="#ff6b35">3.7</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="468" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Math.max(</tspan><tspan fill="#ff6b35">5</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ff6b35">9</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ff6b35">3</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="491" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Math.sqrt(</tspan><tspan fill="#ff6b35">16</tspan><tspan fill="#ffffff">));</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="600" y="115" font-size="12" fill="#94a3b8">// Basisoperatoren</text>
  <text x="600" y="140" font-size="15" font-family="monospace" fill="#39ff14">19</text><text x="640" y="140" font-size="13" fill="#94a3b8"> ← 15 + 4</text>
  <text x="600" y="163" font-size="15" font-family="monospace" fill="#39ff14">11</text><text x="640" y="163" font-size="13" fill="#94a3b8"> ← 15 - 4</text>
  <text x="600" y="186" font-size="15" font-family="monospace" fill="#39ff14">60</text><text x="640" y="186" font-size="13" fill="#94a3b8"> ← 15 × 4</text>
  <text x="600" y="209" font-size="15" font-family="monospace" fill="#39ff14">3.75</text><text x="660" y="209" font-size="13" fill="#94a3b8"> ← 15 / 4</text>
  <text x="600" y="232" font-size="15" font-family="monospace" fill="#39ff14">3</text><text x="640" y="232" font-size="13" fill="#94a3b8"> ← 15 % 4 (rest van deling)</text>
  <text x="600" y="255" font-size="15" font-family="monospace" fill="#39ff14">225</text><text x="660" y="255" font-size="13" fill="#94a3b8"> ← 15² = 15 × 15</text>
  <line x1="600" y1="267" x2="1160" y2="267" stroke="#333" stroke-width="1"/>
  <text x="600" y="295" font-size="12" fill="#94a3b8">// score na +=, *=, ++</text>
  <text x="600" y="320" font-size="15" font-family="monospace" fill="#39ff14">15</text><text x="640" y="320" font-size="13" fill="#94a3b8"> → 20 → 30 → 31</text>
  <line x1="600" y1="335" x2="1160" y2="335" stroke="#333" stroke-width="1"/>
  <text x="600" y="363" font-size="12" fill="#94a3b8">// Math-functies</text>
  <text x="600" y="388" font-size="15" font-family="monospace" fill="#39ff14">4</text><text x="640" y="388" font-size="13" fill="#94a3b8"> ← Math.round(3.7)</text>
  <text x="600" y="411" font-size="15" font-family="monospace" fill="#39ff14">9</text><text x="640" y="411" font-size="13" fill="#94a3b8"> ← Math.max(5,9,3)</text>
  <text x="600" y="434" font-size="15" font-family="monospace" fill="#39ff14">4</text><text x="640" y="434" font-size="13" fill="#94a3b8"> ← Math.sqrt(16)</text>
  <line x1="600" y1="446" x2="1160" y2="446" stroke="#333" stroke-width="1"/>

  <rect x="600" y="475" width="560" height="190" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="880" y="503" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">Operatoren overzicht</text>
  <text x="620" y="530" font-size="12" fill="#ff6b35">+  -  *  /  %  **</text><text x="760" y="530" font-size="12" fill="#ffffff">   rekenkundig</text>
  <text x="620" y="555" font-size="12" fill="#ff6b35">+=  -=  *=  /=</text><text x="760" y="555" font-size="12" fill="#ffffff">  samengesteld</text>
  <text x="620" y="580" font-size="12" fill="#ff6b35">++  --</text><text x="760" y="580" font-size="12" fill="#ffffff">            increment/decrement</text>
  <text x="620" y="605" font-size="12" fill="#ff6b35">Math.round/ceil/floor</text><text x="830" y="605" font-size="12" fill="#ffffff"> afronden</text>
  <text x="620" y="630" font-size="12" fill="#ff6b35">Math.max/min/abs/sqrt</text><text x="840" y="630" font-size="12" fill="#ffffff"> wiskundig</text>
  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
