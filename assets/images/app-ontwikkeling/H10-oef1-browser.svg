<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" rx="8" fill="#1e1e2e"/>
  <rect x="0" y="0" width="900" height="44" rx="8" fill="#2a2a3e"/>
  <rect x="0" y="32" width="900" height="12" fill="#2a2a3e"/>
  <!-- Traffic lights -->
  <circle cx="22" cy="22" r="7" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="7" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="7" fill="#27c93f"/>
  <!-- URL bar -->
  <rect x="90" y="10" width="700" height="24" rx="12" fill="#1a1a2e"/>
  <text x="440" y="26" text-anchor="middle" font-size="12" fill="#7c9eff">oefening-boxmodel.html</text>
  <!-- Page content -->
  <rect x="0" y="44" width="900" height="516" fill="#ffffff"/>

  <!-- Box model demo card - centered -->
  <text x="450" y="90" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Box Model Oefening</text>

  <!-- Outer margin zone -->
  <rect x="100" y="110" width="340" height="200" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="270" y="128" text-anchor="middle" font-size="11" fill="#856404">margin: 30px</text>

  <!-- Border zone -->
  <rect x="130" y="136" width="280" height="152" rx="4" fill="#cfe2ff" stroke="#0d6efd" stroke-width="3"/>
  <text x="270" y="154" text-anchor="middle" font-size="11" fill="#084298">border: 3px solid #0d6efd</text>

  <!-- Padding zone -->
  <rect x="148" y="162" width="244" height="114" rx="2" fill="#d1e7dd"/>
  <text x="270" y="178" text-anchor="middle" font-size="11" fill="#0f5132">padding: 20px</text>

  <!-- Content zone -->
  <rect x="168" y="186" width="204" height="72" rx="2" fill="#ffffff" stroke="#198754" stroke-width="1.5"/>
  <text x="270" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Hallo wereld!</text>
  <text x="270" y="236" text-anchor="middle" font-size="11" fill="#555">width: 200px</text>
  <text x="270" y="252" text-anchor="middle" font-size="11" fill="#555">height: 60px</text>

  <!-- Labels right side -->
  <text x="500" y="130" font-size="13" font-weight="bold" fill="#1a1a2e">Eigenschappen:</text>
  <rect x="500" y="142" width="260" height="130" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="516" y="162" font-size="12" fill="#212529" font-family="Courier New">.doos {</text>
  <text x="516" y="180" font-size="12" fill="#d63384" font-family="Courier New">  width: 200px;</text>
  <text x="516" y="198" font-size="12" fill="#d63384" font-family="Courier New">  height: 60px;</text>
  <text x="516" y="216" font-size="12" fill="#0d6efd" font-family="Courier New">  padding: 20px;</text>
  <text x="516" y="234" font-size="12" fill="#198754" font-family="Courier New">  border: 3px solid;</text>
  <text x="516" y="252" font-size="12" fill="#856404" font-family="Courier New">  margin: 30px;</text>
  <text x="516" y="270" font-size="12" fill="#212529" font-family="Courier New">}</text>

  <!-- Total width note -->
  <rect x="100" y="330" width="660" height="50" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="430" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">⚠  Totale breedte (content-box): 200 + 20+20 + 3+3 + 30+30 = 306px</text>
  <text x="430" y="370" text-anchor="middle" font-size="12" fill="#856404">Met border-box: totale breedte = 200px (padding en border zitten erin)</text>

  <!-- Units demo -->
  <text x="450" y="420" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">CSS Eenheden</text>
  <rect x="100" y="430" width="660" height="90" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="120" y="455" font-size="12" fill="#0d6efd" font-family="Courier New">font-size: 16px</text>
  <text x="280" y="455" font-size="12" fill="#198754" font-family="Courier New">width: 50%</text>
  <text x="420" y="455" font-size="12" fill="#d63384" font-family="Courier New">padding: 1rem</text>
  <text x="580" y="455" font-size="12" fill="#6f42c1" font-family="Courier New">height: 10vh</text>
  <text x="120" y="478" font-size="11" fill="#6c757d">pixel (absoluut)</text>
  <text x="280" y="478" font-size="11" fill="#6c757d">% van ouder</text>
  <text x="420" y="478" font-size="11" fill="#6c757d">root font-size</text>
  <text x="580" y="478" font-size="11" fill="#6c757d">% van scherm</text>
  <text x="120" y="500" font-size="12" fill="#555" font-family="Courier New">margin: 2em</text>
  <text x="280" y="500" font-size="12" fill="#555" font-family="Courier New">gap: 0.5rem</text>
  <text x="120" y="518" font-size="11" fill="#6c757d">× font-size ouder</text>
  <text x="280" y="518" font-size="11" fill="#6c757d">root font-size</text>
</svg>
