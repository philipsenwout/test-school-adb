<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="820" height="480" fill="#1a1a2e"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="820" height="44" rx="8" fill="#2d2d2d"/>
  <circle cx="18" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="22" r="6" fill="#febc2e"/>
  <circle cx="58" cy="22" r="6" fill="#28c840"/>
  <rect x="80" y="10" width="300" height="24" rx="12" fill="#3a3a3a"/>
  <text x="230" y="25" text-anchor="middle" font-size="11" fill="#888">localhost:3000/login.html</text>
  <rect x="430" y="10" width="300" height="24" rx="12" fill="#3a3a3a"/>
  <text x="580" y="25" text-anchor="middle" font-size="11" fill="#888">localhost:3000/dashboard.html</text>

  <!-- Divider between two tabs -->
  <line x1="410" y1="0" x2="410" y2="480" stroke="#2a2a4a" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="205" y="430" text-anchor="middle" font-size="12" fill="#666">Stap 1 — Login</text>
  <text x="615" y="430" text-anchor="middle" font-size="12" fill="#666">Stap 2 — Na succesvolle login</text>

  <!-- LEFT: Login page -->
  <rect x="10" y="54" width="390" height="360" rx="8" fill="#16162a"/>
  <text x="205" y="95" text-anchor="middle" font-size="18" fill="#e0e0f0" font-weight="700">Inloggen</text>

  <!-- Email field -->
  <text x="40" y="125" font-size="12" fill="#888">E-mailadres</text>
  <rect x="40" y="132" width="310" height="34" rx="6" fill="#252550" stroke="#7c85ff" stroke-width="1.5"/>
  <text x="55" y="153" font-size="12" fill="#a8b8ff">jana@leden.be</text>

  <!-- Password field -->
  <text x="40" y="182" font-size="12" fill="#888">Wachtwoord</text>
  <rect x="40" y="189" width="310" height="34" rx="6" fill="#252550" stroke="#7c85ff" stroke-width="1.5"/>
  <text x="55" y="210" font-size="13" fill="#a8b8ff">••••••••</text>

  <!-- Error (none) -->
  <rect x="40" y="235" width="310" height="28" rx="4" fill="#1a3020" stroke="#28c840" stroke-width="1"/>
  <text x="205" y="253" text-anchor="middle" font-size="11" fill="#28c840">✓ Inloggen geslaagd, doorsturen...</text>

  <!-- Login button (active) -->
  <rect x="40" y="275" width="310" height="40" rx="8" fill="#7c85ff"/>
  <text x="195" y="299" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">Inloggen</text>

  <!-- Register link -->
  <text x="205" y="335" text-anchor="middle" font-size="12" fill="#888">Nog geen account?</text>
  <text x="205" y="352" text-anchor="middle" font-size="12" fill="#7c85ff">Registreren →</text>

  <!-- Arrow between pages -->
  <text x="410" y="255" text-anchor="middle" font-size="26" fill="#28c840">→</text>

  <!-- RIGHT: Dashboard page -->
  <rect x="420" y="54" width="390" height="360" rx="8" fill="#16162a"/>
  <text x="615" y="88" text-anchor="middle" font-size="15" fill="#e0e0f0" font-weight="700">Dashboard — Hallo, Jana! 👋</text>
  <line x1="430" y1="98" x2="800" y2="98" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Welcome box -->
  <rect x="440" y="108" width="360" height="56" rx="6" fill="#1a3020" stroke="#28c840" stroke-width="1"/>
  <text x="620" y="130" text-anchor="middle" font-size="13" fill="#28c840" font-weight="600">Ingelogd als: jana@leden.be</text>
  <text x="620" y="150" text-anchor="middle" font-size="11" fill="#888">Rol: lid</text>

  <!-- Profile card -->
  <rect x="440" y="178" width="170" height="80" rx="6" fill="#252550"/>
  <text x="525" y="200" text-anchor="middle" font-size="12" fill="#7c85ff" font-weight="700">Mijn profiel</text>
  <text x="525" y="220" text-anchor="middle" font-size="11" fill="#888">Naam: Jana</text>
  <text x="525" y="238" text-anchor="middle" font-size="11" fill="#888">Lid sinds: 2024</text>

  <!-- API response -->
  <rect x="626" y="178" width="174" height="80" rx="6" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="713" y="198" text-anchor="middle" font-size="11" fill="#888">/api/mij response:</text>
  <text x="636" y="216" font-size="10" fill="#c792ea" font-family="'Courier New', monospace">&#123; "naam": "Jana",</text>
  <text x="636" y="232" font-size="10" fill="#c792ea" font-family="'Courier New', monospace">  "rol": "lid" &#125;</text>
  <text x="636" y="248" font-size="10" fill="#28c840" font-family="'Courier New', monospace">200 OK</text>

  <!-- Logout button -->
  <rect x="440" y="278" width="360" height="36" rx="6" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="620" y="299" text-anchor="middle" font-size="13" fill="#ff5f57">Uitloggen</text>
</svg>
