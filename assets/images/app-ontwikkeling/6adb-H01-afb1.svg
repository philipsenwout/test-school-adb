<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Titel -->
  <text x="20" y="30" font-size="13" fill="#888" font-style="italic">Een array = een geordende lijst van waarden</text>

  <!-- Label mijnArray -->
  <text x="20" y="130" font-size="16" fill="#6c63ff" font-weight="bold" font-family="'Courier New', monospace">mijnArray</text>

  <!-- Pijl van label naar vakjes -->
  <line x1="105" y1="125" x2="145" y2="120" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5 vakjes -->
  <!-- Vakje 0 -->
  <rect x="155" y="80" width="100" height="80" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="205" y="100" font-size="11" fill="#888" text-anchor="middle">0</text>
  <text x="205" y="130" font-size="14" fill="#e8e8f0" text-anchor="middle">Melk</text>

  <!-- Vakje 1 -->
  <rect x="265" y="80" width="100" height="80" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="315" y="100" font-size="11" fill="#888" text-anchor="middle">1</text>
  <text x="315" y="130" font-size="14" fill="#e8e8f0" text-anchor="middle">Brood</text>

  <!-- Vakje 2 -->
  <rect x="375" y="80" width="100" height="80" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="425" y="100" font-size="11" fill="#888" text-anchor="middle">2</text>
  <text x="425" y="130" font-size="14" fill="#e8e8f0" text-anchor="middle">Appels</text>

  <!-- Vakje 3 -->
  <rect x="485" y="80" width="100" height="80" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="535" y="100" font-size="11" fill="#888" text-anchor="middle">3</text>
  <text x="535" y="130" font-size="14" fill="#e8e8f0" text-anchor="middle">Kaas</text>

  <!-- Vakje 4 -->
  <rect x="595" y="80" width="100" height="80" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="645" y="100" font-size="11" fill="#888" text-anchor="middle">4</text>
  <text x="645" y="130" font-size="14" fill="#e8e8f0" text-anchor="middle">Yoghurt</text>

  <!-- Index labels onder vakjes -->
  <text x="205" y="180" font-size="12" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[0]</text>
  <text x="315" y="180" font-size="12" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[1]</text>
  <text x="425" y="180" font-size="12" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[2]</text>
  <text x="535" y="180" font-size="12" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[3]</text>
  <text x="645" y="180" font-size="12" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">[4]</text>

  <!-- Code onderaan -->
  <rect x="100" y="220" width="600" height="50" rx="10" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1" opacity="0.9"/>
  <text x="400" y="251" font-size="14" fill="#e8e8f0" text-anchor="middle" font-family="'Courier New', monospace">const mijnArray = ['Melk', 'Brood', 'Appels', 'Kaas', 'Yoghurt'];</text>

  <!-- Toegang-voorbeeld -->
  <rect x="200" y="310" width="400" height="130" rx="10" fill="#0d0d1a" stroke="#6c63ff" stroke-width="1" opacity="0.8"/>
  <text x="400" y="335" font-size="13" fill="#888" text-anchor="middle">Hoe lees je een element?</text>
  <text x="400" y="365" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">mijnArray[0]  →  <tspan fill="#43e97b">"Melk"</tspan></text>
  <text x="400" y="390" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">mijnArray[2]  →  <tspan fill="#43e97b">"Appels"</tspan></text>
  <text x="400" y="415" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">mijnArray.length  →  <tspan fill="#f9a825">5</tspan></text>

  <!-- Decoratieve haakjes -->
  <text x="130" y="300" font-size="60" fill="#6c63ff" opacity="0.15" font-family="'Courier New', monospace">[</text>
  <text x="650" y="300" font-size="60" fill="#6c63ff" opacity="0.15" font-family="'Courier New', monospace">]</text>
</svg>
