<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Anatomie van een CSS-regel</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Elke CSS-regel heeft een selector en een declaratieblok</text>

  <!-- Grote CSS-regel visualisatie -->
  <!-- Selector -->
  <rect x="60" y="75" width="130" height="50" rx="6" fill="#7B3FE4" opacity="0.8"/>
  <text x="125" y="106" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Courier New, monospace">h1</text>
  <!-- Accolade open -->
  <text x="205" y="112" font-size="28" fill="#f0f0f0" font-family="Courier New, monospace">{</text>

  <!-- Declaratie blok -->
  <rect x="230" y="70" width="440" height="130" rx="6" fill="#2a2d3e" stroke="#2D9CDB" stroke-width="1.5"/>

  <!-- Eigenschap 1 -->
  <rect x="250" y="90" width="140" height="30" rx="4" fill="#F97316" opacity="0.7"/>
  <text x="320" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Courier New, monospace">color</text>
  <text x="395" y="110" font-size="20" fill="#f0f0f0" font-family="Courier New, monospace">:</text>
  <rect x="410" y="90" width="120" height="30" rx="4" fill="#22C55E" opacity="0.7"/>
  <text x="470" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Courier New, monospace">#3498db</text>
  <text x="535" y="110" font-size="20" fill="#f0f0f0" font-family="Courier New, monospace">;</text>

  <!-- Eigenschap 2 -->
  <rect x="250" y="130" width="140" height="30" rx="4" fill="#F97316" opacity="0.7"/>
  <text x="320" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Courier New, monospace">font-size</text>
  <text x="395" y="150" font-size="20" fill="#f0f0f0" font-family="Courier New, monospace">:</text>
  <rect x="410" y="130" width="120" height="30" rx="4" fill="#22C55E" opacity="0.7"/>
  <text x="470" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Courier New, monospace">2rem</text>
  <text x="535" y="150" font-size="20" fill="#f0f0f0" font-family="Courier New, monospace">;</text>

  <!-- Accolade dicht -->
  <text x="680" y="112" font-size="28" fill="#f0f0f0" font-family="Courier New, monospace">}</text>

  <!-- Pijlen en labels -->
  <!-- Selector pijl -->
  <line x1="125" y1="126" x2="125" y2="178" stroke="#7B3FE4" stroke-width="2"/>
  <polygon points="120,178 130,178 125,188" fill="#7B3FE4"/>
  <text x="125" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#7B3FE4">SELECTOR</text>
  <text x="125" y="226" text-anchor="middle" font-size="11" fill="#aaa">Welk element?</text>
  <text x="125" y="241" text-anchor="middle" font-size="10" fill="#888">h1, p, .klasse, #id</text>

  <!-- Eigenschap pijl -->
  <line x1="320" y1="206" x2="320" y2="178" stroke="#F97316" stroke-width="2"/>
  <polygon points="315,178 325,178 320,168" fill="#F97316"/>
  <text x="320" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#F97316">EIGENSCHAP</text>
  <text x="320" y="246" text-anchor="middle" font-size="11" fill="#aaa">Wat wijzigen?</text>
  <text x="320" y="261" text-anchor="middle" font-size="10" fill="#888">color, font-size, margin</text>

  <!-- Waarde pijl -->
  <line x1="470" y1="206" x2="470" y2="178" stroke="#22C55E" stroke-width="2"/>
  <polygon points="465,178 475,178 470,168" fill="#22C55E"/>
  <text x="470" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#22C55E">WAARDE</text>
  <text x="470" y="246" text-anchor="middle" font-size="11" fill="#aaa">Hoe wijzigen?</text>
  <text x="470" y="261" text-anchor="middle" font-size="10" fill="#888">#3498db, 2rem, bold</text>

  <!-- Declaratie label -->
  <rect x="230" y="278" width="440" height="32" rx="5" fill="#2D9CDB" opacity="0.2"/>
  <line x1="230" y1="272" x2="230" y2="278" stroke="#2D9CDB" stroke-width="1.5"/>
  <line x1="670" y1="272" x2="670" y2="278" stroke="#2D9CDB" stroke-width="1.5"/>
  <line x1="230" y1="272" x2="670" y2="272" stroke="#2D9CDB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="450" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D9CDB">DECLARATIEBLOK</text>

  <!-- CSS regel term -->
  <rect x="60" y="320" width="680" height="32" rx="5" fill="#7B3FE4" opacity="0.15"/>
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#c4b5fd">selector + declaratieblok = één CSS-REGEL — meerdere declaraties per blok mogelijk</text>
</svg>
