<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">blog.html</text>

  <!-- header -->
  <rect x="0" y="44" width="900" height="52" fill="#f0f0f0"/>
  <text x="40" y="79" font-size="28" font-weight="bold" fill="#000">MijnBlog — Fotografie</text>
  <!-- nav links in header -->
  <text x="500" y="76" font-size="15" fill="#0000ee" text-decoration="underline">Home</text>
  <text x="560" y="76" font-size="15" fill="#0000ee" text-decoration="underline">Artikels</text>
  <text x="630" y="76" font-size="15" fill="#0000ee" text-decoration="underline">Galerij</text>
  <text x="700" y="76" font-size="15" fill="#0000ee" text-decoration="underline">Contact</text>

  <!-- main area: articles + aside side by side -->
  <!-- article 1 -->
  <text x="40" y="125" font-size="20" font-weight="bold" fill="#000">Mijn eerste stappen met een DSLR-camera</text>
  <text x="40" y="148" font-size="13" fill="#555">Gepubliceerd op 10 maart 2025</text>
  <text x="40" y="172" font-size="15" fill="#000">Een DSLR-camera opent een hele nieuwe wereld. De eerste keer dat ik</text>
  <text x="40" y="192" font-size="15" fill="#000">door de zoeker keek, was ik meteen verkocht.</text>
  <text x="40" y="212" font-size="15" fill="#000">Diafragma, sluitertijd en ISO zijn de drie pijlers van belichting.</text>

  <!-- divider -->
  <line x1="40" y1="230" x2="600" y2="230" stroke="#ddd" stroke-width="1"/>

  <!-- article 2 -->
  <text x="40" y="258" font-size="20" font-weight="bold" fill="#000">Compositieregels: de regel van derden</text>
  <text x="40" y="281" font-size="13" fill="#555">Gepubliceerd op 5 februari 2025</text>
  <text x="40" y="305" font-size="15" fill="#000">De regel van derden verdeelt je foto in een raster van 3×3.</text>
  <text x="40" y="325" font-size="15" fill="#000">Interessante elementen plaats je op de snijpunten van dat raster.</text>

  <!-- aside -->
  <rect x="650" y="100" width="220" height="160" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1" rx="4"/>
  <text x="670" y="128" font-size="16" font-weight="bold" fill="#000">Over mij</text>
  <text x="670" y="152" font-size="14" fill="#000">Ik ben Jana, 16 jaar.</text>
  <text x="670" y="172" font-size="14" fill="#000">Ik fotografeer al 2 jaar</text>
  <text x="670" y="192" font-size="14" fill="#000">als hobby. Mijn favoriete</text>
  <text x="670" y="212" font-size="14" fill="#000">onderwerp: natuur.</text>

  <!-- footer -->
  <rect x="0" y="500" width="900" height="60" fill="#f0f0f0"/>
  <text x="40" y="535" font-size="14" fill="#555">© 2025 MijnBlog — Gemaakt met passie voor fotografie</text>
</svg>
