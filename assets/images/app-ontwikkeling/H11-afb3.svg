<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Selectors Combineren — Voorbeelden</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Combineer selectors voor nauwkeuriger en krachtiger CSS</text>

  <!-- Rij 1: Element + klasse -->
  <rect x="20" y="58" width="760" height="55" rx="5" fill="#1e2030"/>
  <text x="30" y="76" font-size="11" fill="#888" font-weight="bold">Element + klasse</text>
  <rect x="20" y="80" width="760" height="28" rx="3" fill="#0d1117"/>
  <text x="35" y="99" font-size="13" font-family="Courier New" fill="#c4b5fd">p</text>
  <text x="55" y="99" font-size="13" font-family="Courier New" fill="#a8ff7a">.highlight</text>
  <text x="175" y="99" font-size="13" font-family="Courier New" fill="#888"> { background: yellow; }</text>
  <text x="500" y="99" font-size="11" fill="#aaa">→ Alleen &lt;p&gt;-elementen met class="highlight"</text>

  <!-- Rij 2: Nakomeling -->
  <rect x="20" y="122" width="760" height="55" rx="5" fill="#1e2030"/>
  <text x="30" y="140" font-size="11" fill="#888" font-weight="bold">Nakomelingselector</text>
  <rect x="20" y="143" width="760" height="28" rx="3" fill="#0d1117"/>
  <text x="35" y="162" font-size="13" font-family="Courier New" fill="#c4b5fd">article</text>
  <text x="110" y="162" font-size="13" font-family="Courier New" fill="#a8ff7a"> span.highlight</text>
  <text x="285" y="162" font-size="13" font-family="Courier New" fill="#888"> { background: yellow; }</text>
  <text x="500" y="162" font-size="11" fill="#aaa">→ span.highlight binnen article (elk niveau)</text>

  <!-- Rij 3: Kind-selector -->
  <rect x="20" y="186" width="760" height="55" rx="5" fill="#1e2030"/>
  <text x="30" y="204" font-size="11" fill="#888" font-weight="bold">Kind-selector (directe kinderen)</text>
  <rect x="20" y="207" width="760" height="28" rx="3" fill="#0d1117"/>
  <text x="35" y="226" font-size="13" font-family="Courier New" fill="#c4b5fd">section</text>
  <text x="115" y="226" font-size="13" font-family="Courier New" fill="#f97316"> &gt; </text>
  <text x="145" y="226" font-size="13" font-family="Courier New" fill="#a8ff7a">p</text>
  <text x="165" y="226" font-size="13" font-family="Courier New" fill="#888"> { margin-left: 1rem; }</text>
  <text x="500" y="226" font-size="11" fill="#aaa">→ Alleen directe &lt;p&gt;-kinderen van &lt;section&gt;</text>

  <!-- Rij 4: Meervoudige selector -->
  <rect x="20" y="250" width="760" height="55" rx="5" fill="#1e2030"/>
  <text x="30" y="268" font-size="11" fill="#888" font-weight="bold">Meervoudige selector (komma)</text>
  <rect x="20" y="272" width="760" height="28" rx="3" fill="#0d1117"/>
  <text x="35" y="290" font-size="13" font-family="Courier New" fill="#c4b5fd">h1</text>
  <text x="65" y="290" font-size="13" font-family="Courier New" fill="#888">,</text>
  <text x="80" y="290" font-size="13" font-family="Courier New" fill="#c4b5fd"> h2</text>
  <text x="118" y="290" font-size="13" font-family="Courier New" fill="#888">,</text>
  <text x="133" y="290" font-size="13" font-family="Courier New" fill="#c4b5fd"> h3</text>
  <text x="175" y="290" font-size="13" font-family="Courier New" fill="#888"> { color: #514F8C; }</text>
  <text x="500" y="290" font-size="11" fill="#aaa">→ h1, h2 en h3 tegelijk stylen</text>

  <!-- Rij 5: ID + klasse combinatie -->
  <rect x="20" y="314" width="760" height="55" rx="5" fill="#1e2030"/>
  <text x="30" y="332" font-size="11" fill="#888" font-weight="bold">Gecombineerde selectors</text>
  <rect x="20" y="335" width="760" height="28" rx="3" fill="#0d1117"/>
  <text x="35" y="354" font-size="13" font-family="Courier New" fill="#f97316">#sidebar</text>
  <text x="125" y="354" font-size="13" font-family="Courier New" fill="#c4b5fd"> .widget</text>
  <text x="215" y="354" font-size="13" font-family="Courier New" fill="#f97316"> &gt; </text>
  <text x="247" y="354" font-size="13" font-family="Courier New" fill="#a8ff7a">h3</text>
  <text x="278" y="354" font-size="13" font-family="Courier New" fill="#888"> { font-size: 1.2rem; }</text>
  <text x="500" y="354" font-size="11" fill="#aaa">→ Directe h3-kinderen van .widget in #sidebar</text>
</svg>
