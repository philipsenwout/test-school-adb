<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">stappenplan.html</text>

  <!-- h1 -->
  <text x="40" y="96" font-size="32" font-weight="bold" fill="#000">Website online zetten: stappenplan</text>

  <!-- ol items -->
  <text x="40" y="136" font-size="16" fill="#000">1. Schrijf je HTML, CSS en JavaScript</text>
  <!-- nested ul under step 1 -->
  <circle cx="80" cy="160" r="3" fill="#000"/>
  <text x="96" y="166" font-size="16" fill="#000">Maak index.html aan</text>
  <circle cx="80" cy="188" r="3" fill="#000"/>
  <text x="96" y="194" font-size="16" fill="#000">Voeg stijlblad.css toe</text>
  <circle cx="80" cy="216" r="3" fill="#000"/>
  <text x="96" y="222" font-size="16" fill="#000">Schrijf script.js</text>

  <text x="40" y="252" font-size="16" fill="#000">2. Maak een GitHub-account aan</text>
  <text x="40" y="280" font-size="16" fill="#000">3. Maak een nieuw repository aan</text>
  <text x="40" y="308" font-size="16" fill="#000">4. Upload je bestanden naar het repository</text>
  <text x="40" y="336" font-size="16" fill="#000">5. Activeer GitHub Pages in de instellingen</text>
  <text x="40" y="364" font-size="16" fill="#000">6. Je site is live op username.github.io/reponaam</text>
</svg>
