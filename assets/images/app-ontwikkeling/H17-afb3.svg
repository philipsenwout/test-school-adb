<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="50" fill="#ffffff" font-size="26" font-weight="700" text-anchor="middle">De Browser Console — DevTools</text>
  <text x="600" y="76" fill="#aaaaaa" font-size="15" text-anchor="middle">console.log() toont output in de browser — jouw beste vriend bij het debuggen</text>

  <!-- Browser chrome -->
  <rect x="60" y="100" width="1080" height="670" rx="14" fill="#1e222d" stroke="#444" stroke-width="2"/>
  <!-- Browser top bar -->
  <rect x="60" y="100" width="1080" height="44" rx="14" fill="#2a2d3a"/>
  <rect x="60" y="125" width="1080" height="19" fill="#2a2d3a"/>
  <!-- Traffic lights -->
  <circle cx="95" cy="122" r="8" fill="#ff5f57"/>
  <circle cx="120" cy="122" r="8" fill="#ffbd2e"/>
  <circle cx="145" cy="122" r="8" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="200" y="110" width="700" height="26" rx="6" fill="#1a1d26" stroke="#444" stroke-width="1"/>
  <text x="550" y="128" fill="#aaaaaa" font-size="13" text-anchor="middle">localhost:5500/index.html</text>

  <!-- Tabs area for DevTools -->
  <rect x="60" y="144" width="1080" height="26" fill="#1a1d26"/>
  <text x="80" y="162" fill="#aaaaaa" font-size="12">Elements</text>
  <rect x="140" y="144" width="1" height="26" fill="#444"/>
  <text x="160" y="162" fill="#aaaaaa" font-size="12">Network</text>
  <rect x="220" y="144" width="1" height="26" fill="#444"/>
  <rect x="230" y="144" width="72" height="26" fill="#0f1117"/>
  <text x="265" y="162" fill="#00d4ff" font-size="12" font-weight="700">Console</text>
  <rect x="302" y="144" width="1" height="26" fill="#444"/>
  <text x="315" y="162" fill="#aaaaaa" font-size="12">Sources</text>

  <!-- Split view: code editor (top) and console (bottom) -->
  <!-- Code editor area -->
  <rect x="60" y="170" width="1080" height="290" fill="#0f1117"/>
  <text x="90" y="200" fill="#666" font-size="12">index.js — variabelen voorbeeld</text>
  <line x1="60" y1="210" x2="1140" y2="210" stroke="#222" stroke-width="1"/>

  <!-- Line numbers + code -->
  <g font-family="'Courier New', monospace" font-size="15">
    <text x="82" y="235" fill="#555">1</text>
    <text x="110" y="235" fill="#666">// Variabelen declareren</text>

    <text x="82" y="260" fill="#555">2</text>
    <text x="110" y="260" fill="#7c3aed">let</text>
    <text x="137" y="260" fill="#00d4ff"> voornaam</text>
    <text x="228" y="260" fill="#ffffff"> = </text>
    <text x="252" y="260" fill="#39ff14">"Jana"</text>
    <text x="310" y="260" fill="#ffffff">;</text>

    <text x="82" y="285" fill="#555">3</text>
    <text x="110" y="285" fill="#7c3aed">let</text>
    <text x="137" y="285" fill="#00d4ff"> leeftijd</text>
    <text x="208" y="285" fill="#ffffff"> = </text>
    <text x="232" y="285" fill="#ff6b35">17</text>
    <text x="248" y="285" fill="#ffffff">;</text>

    <text x="82" y="310" fill="#555">4</text>
    <text x="110" y="310" fill="#7c3aed">const</text>
    <text x="150" y="310" fill="#ff6b35"> MAX_SCORE</text>
    <text x="264" y="310" fill="#ffffff"> = </text>
    <text x="288" y="310" fill="#ff6b35">100</text>
    <text x="312" y="310" fill="#ffffff">;</text>

    <text x="82" y="335" fill="#555">5</text>

    <text x="82" y="360" fill="#555">6</text>
    <text x="110" y="360" fill="#00d4ff">console</text>
    <text x="172" y="360" fill="#ffffff">.</text>
    <text x="180" y="360" fill="#39ff14">log</text>
    <text x="204" y="360" fill="#ffffff">(</text>
    <text x="210" y="360" fill="#39ff14">"Hallo, ik ben:"</text>
    <text x="338" y="360" fill="#ffffff">, voornaam);</text>

    <text x="82" y="385" fill="#555">7</text>
    <text x="110" y="385" fill="#00d4ff">console</text>
    <text x="172" y="385" fill="#ffffff">.</text>
    <text x="180" y="385" fill="#39ff14">log</text>
    <text x="204" y="385" fill="#ffffff">(</text>
    <text x="210" y="385" fill="#39ff14">"Mijn leeftijd:"</text>
    <text x="332" y="385" fill="#ffffff">, leeftijd);</text>

    <text x="82" y="410" fill="#555">8</text>
    <text x="110" y="410" fill="#00d4ff">console</text>
    <text x="172" y="410" fill="#ffffff">.</text>
    <text x="180" y="410" fill="#39ff14">log</text>
    <text x="204" y="410" fill="#ffffff">(</text>
    <text x="210" y="410" fill="#39ff14">"Max score:"</text>
    <text x="316" y="410" fill="#ffffff">, MAX_SCORE);</text>

    <text x="82" y="435" fill="#555">9</text>
    <text x="110" y="435" fill="#666">// Waarde aanpassen</text>

    <text x="82" y="460" fill="#555">10</text>
    <text x="110" y="460" fill="#00d4ff">voornaam</text>
    <text x="200" y="460" fill="#ffffff"> = </text>
    <text x="224" y="460" fill="#39ff14">"Liam"</text>
    <text x="276" y="460" fill="#ffffff">;</text>

    <text x="82" y="485" fill="#555">11</text>
    <text x="110" y="485" fill="#00d4ff">console</text>
    <text x="172" y="485" fill="#ffffff">.</text>
    <text x="180" y="485" fill="#39ff14">log</text>
    <text x="204" y="485" fill="#ffffff">(</text>
    <text x="210" y="485" fill="#39ff14">"Nieuwe naam:"</text>
    <text x="332" y="485" fill="#ffffff">, voornaam);</text>
  </g>

  <!-- DevTools Console panel -->
  <rect x="60" y="460" width="1080" height="310" fill="#1a1d26" stroke="#333" stroke-width="1"/>
  <rect x="60" y="460" width="1080" height="28" fill="#222530"/>
  <text x="80" y="479" fill="#aaaaaa" font-size="13" font-weight="700">Console</text>
  <text x="200" y="479" fill="#666" font-size="12">Filter</text>
  <circle cx="1110" cy="474" r="8" fill="#666" opacity="0.4"/>
  <text x="1110" y="479" fill="#aaaaaa" font-size="12" text-anchor="middle">×</text>

  <!-- Console output lines -->
  <g font-family="'Courier New', monospace" font-size="15">
    <!-- line 1 -->
    <rect x="60" y="488" width="1080" height="36" fill="#1a2a1a" opacity="0.4"/>
    <text x="85" y="512" fill="#666" font-size="11">index.js:6</text>
    <text x="160" y="512" fill="#39ff14">Hallo, ik ben:</text>
    <text x="290" y="512" fill="#ffffff"> Jana</text>

    <!-- line 2 -->
    <text x="85" y="546" fill="#666" font-size="11">index.js:7</text>
    <text x="160" y="546" fill="#39ff14">Mijn leeftijd:</text>
    <text x="288" y="546" fill="#ff6b35"> 17</text>

    <!-- line 3 -->
    <rect x="60" y="524" width="1080" height="36" fill="#1a2a1a" opacity="0.4"/>
    <text x="85" y="580" fill="#666" font-size="11">index.js:8</text>
    <text x="160" y="580" fill="#39ff14">Max score:</text>
    <text x="264" y="580" fill="#ff6b35"> 100</text>

    <!-- line 4 -->
    <text x="85" y="614" fill="#666" font-size="11">index.js:11</text>
    <text x="160" y="614" fill="#39ff14">Nieuwe naam:</text>
    <text x="284" y="614" fill="#ffffff"> Liam</text>

    <!-- blinking cursor -->
    <text x="85" y="648" fill="#00d4ff">›</text>
    <rect x="102" y="634" width="10" height="18" fill="#00d4ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Tip box right -->
  <rect x="750" y="488" width="370" height="240" rx="10" fill="#0d1a2a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="935" y="515" fill="#00d4ff" font-size="14" font-weight="700" text-anchor="middle">💡 DevTools openen</text>
  <line x1="770" y1="524" x2="1110" y2="524" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <text x="770" y="548" fill="#ffffff" font-size="13">Windows / Linux:</text>
  <rect x="900" y="532" width="100" height="26" rx="5" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="950" y="550" fill="#ffffff" font-size="13" text-anchor="middle">F12</text>
  <text x="770" y="580" fill="#ffffff" font-size="13">Mac:</text>
  <rect x="800" y="564" width="220" height="26" rx="5" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="910" y="582" fill="#ffffff" font-size="13" text-anchor="middle">⌘ + ⌥ + J</text>
  <line x1="770" y1="600" x2="1110" y2="600" stroke="#333" stroke-width="1"/>
  <text x="770" y="624" fill="#aaaaaa" font-size="13">Klik op de tab "Console"</text>
  <text x="770" y="648" fill="#aaaaaa" font-size="13">om de output te zien</text>
  <text x="770" y="680" fill="#39ff14" font-size="13">console.log() = jouw debug-tool!</text>
  <text x="770" y="702" fill="#aaaaaa" font-size="12">Fout gevonden? Log de variabele!</text>
</svg>
