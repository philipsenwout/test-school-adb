<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">fizzbuzz.html</text>

  <!-- Code panel left -->
  <rect x="20" y="60" width="500" height="720" fill="#1a1a2e"/>
  <text x="40" y="90" font-size="14" fill="#94a3b8">// FizzBuzz — 1 tot 20</text>
  <text x="40" y="115" font-size="13" font-family="monospace" fill="#7c3aed">for</text>
  <text x="83" y="115" font-size="13" font-family="monospace" fill="#ffffff">(</text>
  <text x="93" y="115" font-size="13" font-family="monospace" fill="#00d4ff">let</text>
  <text x="124" y="115" font-size="13" font-family="monospace" fill="#ffffff">i = 1; i &lt;= 20; i++) {</text>
  <text x="60" y="140" font-size="13" font-family="monospace" fill="#7c3aed">if</text>
  <text x="85" y="140" font-size="13" font-family="monospace" fill="#ffffff">(i % 15 === 0) {</text>
  <text x="80" y="163" font-size="13" font-family="monospace" fill="#39ff14">console</text>
  <text x="160" y="163" font-size="13" font-family="monospace" fill="#ffffff">.log(</text>
  <text x="207" y="163" font-size="13" font-family="monospace" fill="#ff6b35">"FizzBuzz"</text>
  <text x="305" y="163" font-size="13" font-family="monospace" fill="#ffffff">);</text>
  <text x="60" y="186" font-size="13" font-family="monospace" fill="#7c3aed">} else if</text>
  <text x="135" y="186" font-size="13" font-family="monospace" fill="#ffffff">(i % 3 === 0) {</text>
  <text x="80" y="209" font-size="13" font-family="monospace" fill="#39ff14">console</text>
  <text x="160" y="209" font-size="13" font-family="monospace" fill="#ffffff">.log(</text>
  <text x="207" y="209" font-size="13" font-family="monospace" fill="#ff6b35">"Fizz"</text>
  <text x="263" y="209" font-size="13" font-family="monospace" fill="#ffffff">);</text>
  <text x="60" y="232" font-size="13" font-family="monospace" fill="#7c3aed">} else if</text>
  <text x="135" y="232" font-size="13" font-family="monospace" fill="#ffffff">(i % 5 === 0) {</text>
  <text x="80" y="255" font-size="13" font-family="monospace" fill="#39ff14">console</text>
  <text x="160" y="255" font-size="13" font-family="monospace" fill="#ffffff">.log(</text>
  <text x="207" y="255" font-size="13" font-family="monospace" fill="#ff6b35">"Buzz"</text>
  <text x="263" y="255" font-size="13" font-family="monospace" fill="#ffffff">);</text>
  <text x="60" y="278" font-size="13" font-family="monospace" fill="#7c3aed">} else</text>
  <text x="110" y="278" font-size="13" font-family="monospace" fill="#ffffff">{</text>
  <text x="80" y="301" font-size="13" font-family="monospace" fill="#39ff14">console</text>
  <text x="160" y="301" font-size="13" font-family="monospace" fill="#ffffff">.log(i);</text>
  <text x="60" y="324" font-size="13" font-family="monospace" fill="#ffffff">}</text>
  <text x="40" y="347" font-size="13" font-family="monospace" fill="#ffffff">}</text>

  <!-- Console output right -->
  <rect x="520" y="60" width="660" height="720" fill="#1e1e2e"/>
  <rect x="520" y="60" width="660" height="36" fill="#252535"/>
  <text x="575" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>

  <!-- FizzBuzz output in 4 columns -->
  <text x="540" y="125" font-size="14" fill="#94a3b8">// Output FizzBuzz 1–20:</text>

  <!-- Col 1: 1-5 -->
  <text x="545" y="155" font-size="14" font-family="monospace" fill="#ffffff">1</text>
  <text x="545" y="180" font-size="14" font-family="monospace" fill="#ffffff">2</text>
  <text x="545" y="205" font-size="14" font-family="monospace" fill="#39ff14">Fizz</text>
  <text x="545" y="230" font-size="14" font-family="monospace" fill="#ffffff">4</text>
  <text x="545" y="255" font-size="14" font-family="monospace" fill="#00d4ff">Buzz</text>
  <text x="545" y="280" font-size="14" font-family="monospace" fill="#39ff14">Fizz</text>
  <text x="545" y="305" font-size="14" font-family="monospace" fill="#ffffff">7</text>
  <text x="545" y="330" font-size="14" font-family="monospace" fill="#ffffff">8</text>
  <text x="545" y="355" font-size="14" font-family="monospace" fill="#39ff14">Fizz</text>
  <text x="545" y="380" font-size="14" font-family="monospace" fill="#00d4ff">Buzz</text>
  <text x="545" y="405" font-size="14" font-family="monospace" fill="#ffffff">11</text>
  <text x="545" y="430" font-size="14" font-family="monospace" fill="#39ff14">Fizz</text>
  <text x="545" y="455" font-size="14" font-family="monospace" fill="#ffffff">13</text>
  <text x="545" y="480" font-size="14" font-family="monospace" fill="#ffffff">14</text>
  <text x="545" y="505" font-size="14" font-family="monospace" fill="#ff6b35">FizzBuzz</text>
  <text x="545" y="530" font-size="14" font-family="monospace" fill="#ffffff">16</text>
  <text x="545" y="555" font-size="14" font-family="monospace" fill="#ffffff">17</text>
  <text x="545" y="580" font-size="14" font-family="monospace" fill="#39ff14">Fizz</text>
  <text x="545" y="605" font-size="14" font-family="monospace" fill="#ffffff">19</text>
  <text x="545" y="630" font-size="14" font-family="monospace" fill="#00d4ff">Buzz</text>

  <!-- Legend -->
  <rect x="720" y="150" width="440" height="220" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="940" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Legende</text>
  <rect x="740" y="190" width="16" height="16" fill="#39ff14" rx="2"/>
  <text x="766" y="204" font-size="13" fill="#ffffff">Groen = deelbaar door 3 → "Fizz"</text>
  <rect x="740" y="218" width="16" height="16" fill="#00d4ff" rx="2"/>
  <text x="766" y="232" font-size="13" fill="#ffffff">Cyaan = deelbaar door 5 → "Buzz"</text>
  <rect x="740" y="246" width="16" height="16" fill="#ff6b35" rx="2"/>
  <text x="766" y="260" font-size="13" fill="#ffffff">Oranje = deelbaar door 15 → "FizzBuzz"</text>
  <rect x="740" y="274" width="16" height="16" fill="#ffffff" rx="2"/>
  <text x="766" y="288" font-size="13" fill="#ffffff">Wit = gewoon getal</text>
  <text x="740" y="320" font-size="12" fill="#94a3b8">15 = 3 × 5 → EERST checken op % 15!</text>
  <text x="740" y="342" font-size="12" fill="#94a3b8">Volgorde if/else if is cruciaal.</text>

  <!-- i counter visualization -->
  <rect x="720" y="400" width="440" height="160" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="940" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">for-lus teller i</text>
  <text x="740" y="455" font-size="13" font-family="monospace" fill="#94a3b8">i=1  → 1%3≠0, 1%5≠0  → print 1</text>
  <text x="740" y="478" font-size="13" font-family="monospace" fill="#94a3b8">i=3  → 3%3=0           → "Fizz"</text>
  <text x="740" y="501" font-size="13" font-family="monospace" fill="#94a3b8">i=5  → 5%5=0           → "Buzz"</text>
  <text x="740" y="524" font-size="13" font-family="monospace" fill="#94a3b8">i=15 → 15%15=0         → "FizzBuzz"</text>
  <text x="740" y="547" font-size="13" font-family="monospace" fill="#94a3b8">i=21 → i &lt;= 20 false  → stop</text>
</svg>
