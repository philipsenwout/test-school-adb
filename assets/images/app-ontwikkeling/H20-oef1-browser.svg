<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="200" fill="#00d4ff" opacity="0.03"/>
  <circle cx="300" cy="600" r="180" fill="#ff6b35" opacity="0.03"/>

  <!-- Browser venster -->
  <rect x="60" y="30" width="1080" height="730" rx="14" fill="#1e2030" stroke="#2d3150" stroke-width="1.5"/>
  <rect x="60" y="30" width="1080" height="44" rx="14" ry="14" fill="#252840"/>
  <rect x="60" y="52" width="1080" height="22" fill="#252840"/>
  <circle cx="88" cy="52" r="7" fill="#ff5f57"/>
  <circle cx="110" cy="52" r="7" fill="#febc2e"/>
  <circle cx="132" cy="52" r="7" fill="#28c840"/>
  <rect x="200" y="40" width="720" height="24" rx="5" fill="#1a1d2e" stroke="#3d4166" stroke-width="1"/>
  <text x="560" y="56" text-anchor="middle" fill="#6b7280" font-size="12" font-family="Courier New, monospace">rekenmachine.html</text>
  <rect x="60" y="74" width="1080" height="30" fill="#1e2030" stroke="#2d3150" stroke-width="1"/>
  <text x="100" y="93" fill="#9ca3af" font-size="12" font-family="Inter, sans-serif">Elements</text>
  <text x="180" y="93" fill="#00d4ff" font-size="12" font-weight="600" font-family="Inter, sans-serif">Console</text>
  <text x="256" y="93" fill="#9ca3af" font-size="12" font-family="Inter, sans-serif">Sources</text>

  <!-- Console header -->
  <rect x="60" y="104" width="1080" height="26" fill="#161929"/>
  <text x="80" y="121" fill="#6b7280" font-size="11" font-family="Courier New, monospace">// Eenvoudige rekenmachine — console output</text>

  <!-- Initialisatie sectie -->
  <rect x="60" y="130" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="148" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; let a = 24, b = 6;  // Rekenmachine met a=24, b=6</text>

  <!-- Resultaat: undefined voor let -->
  <rect x="60" y="158" width="1080" height="24" fill="#111827"/>
  <text x="80" y="174" fill="#6b7280" font-size="11" font-family="Courier New, monospace">&lt; undefined</text>

  <!-- Lijn -->
  <line x1="60" y1="182" x2="1140" y2="182" stroke="#2d3150" stroke-width="1"/>

  <!-- Optelling -->
  <rect x="60" y="182" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="200" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`${a} + ${b} = ${a + b}`);</text>
  <rect x="60" y="210" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="210" width="4" height="30" fill="#39ff14"/>
  <text x="80" y="229" fill="#86efac" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">24 + 6 = 30</text>

  <!-- Aftrekking -->
  <rect x="60" y="240" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="258" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`${a} - ${b} = ${a - b}`);</text>
  <rect x="60" y="268" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="268" width="4" height="30" fill="#39ff14"/>
  <text x="80" y="287" fill="#86efac" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">24 - 6 = 18</text>

  <!-- Vermenigvuldiging -->
  <rect x="60" y="298" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="316" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`${a} * ${b} = ${a * b}`);</text>
  <rect x="60" y="326" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="326" width="4" height="30" fill="#ff6b35"/>
  <text x="80" y="345" fill="#fed7aa" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">24 * 6 = 144</text>

  <!-- Deling -->
  <rect x="60" y="356" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="374" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`${a} / ${b} = ${a / b}`);</text>
  <rect x="60" y="384" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="384" width="4" height="30" fill="#a78bfa"/>
  <text x="80" y="403" fill="#ddd6fe" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">24 / 6 = 4</text>

  <!-- Modulo -->
  <rect x="60" y="414" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="432" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`${a} % ${b} = ${a % b}`);</text>
  <rect x="60" y="442" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="442" width="4" height="30" fill="#fbbf24"/>
  <text x="80" y="461" fill="#fde68a" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">24 % 6 = 0   ← deelbaar!</text>

  <!-- Machtsverheffing -->
  <rect x="60" y="472" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="490" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`${b} ** 3 = ${b ** 3}`);</text>
  <rect x="60" y="500" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="500" width="4" height="30" fill="#f87171"/>
  <text x="80" y="519" fill="#fecaca" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">6 ** 3 = 216</text>

  <!-- Template literal overzicht -->
  <rect x="60" y="530" width="1080" height="28" fill="#1a1d2e"/>
  <text x="80" y="548" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; console.log(`Samenvatting: a=${a}, b=${b}`);</text>
  <rect x="60" y="558" width="1080" height="30" fill="#0f1e12"/>
  <rect x="60" y="558" width="4" height="30" fill="#00d4ff"/>
  <text x="80" y="577" fill="#a5f3fc" font-size="13" font-family="Courier New, monospace" font-weight="600" filter="url(#glow)">Samenvatting: a=24, b=6</text>

  <!-- Prompt -->
  <rect x="60" y="588" width="1080" height="172" fill="#111827"/>
  <line x1="60" y1="588" x2="1140" y2="588" stroke="#2d3150" stroke-width="1"/>

  <!-- Tip panel links -->
  <rect x="80" y="604" width="480" height="130" rx="8" fill="#1e2030" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="100" y="624" fill="#a5f3fc" font-size="13" font-weight="700" font-family="Inter, sans-serif">💡 Template Literals gebruiken</text>
  <text x="100" y="648" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">// Backtick + ${} voor variabelen</text>
  <text x="100" y="668" fill="#e2e8f0" font-size="12" font-family="Courier New, monospace">console.log(`a + b = ${a + b}`);</text>
  <text x="100" y="688" fill="#6b7280" font-size="11" font-family="Inter, sans-serif">// Vs de lange manier:</text>
  <text x="100" y="706" fill="#e2e8f0" font-size="12" font-family="Courier New, monospace">console.log("a + b = " + (a+b));</text>
  <text x="100" y="724" fill="#39ff14" font-size="11" font-family="Inter, sans-serif">← template literals zijn veel leesbaarder!</text>

  <!-- Resultaten samenvatting rechts -->
  <rect x="600" y="604" width="480" height="130" rx="8" fill="#1e2030" stroke="#39ff14" stroke-width="1.5"/>
  <text x="620" y="624" fill="#86efac" font-size="13" font-weight="700" font-family="Inter, sans-serif">Resultaten overzicht (a=24, b=6)</text>
  <line x1="620" y1="634" x2="1060" y2="634" stroke="#2d3150" stroke-width="1"/>
  <text x="620" y="654" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">24 + 6 = 30  |  24 - 6 = 18  |  24 * 6 = 144</text>
  <text x="620" y="674" fill="#9ca3af" font-size="11" font-family="Courier New, monospace">24 / 6 = 4   |  24 % 6 = 0   |  6 ** 3 = 216</text>
  <text x="620" y="700" fill="#6b7280" font-size="11" font-family="Inter, sans-serif">Probeer zelf: verander a en b en herbereken!</text>
  <text x="620" y="720" fill="#00d4ff" font-size="11" font-family="Courier New, monospace">a = 15; b = 4;</text>
  <text x="620" y="736" fill="#6b7280" font-size="10" font-family="Inter, sans-serif">Dan: 15 % 4 = ?  →  type het in de console!</text>

  <!-- Input prompt -->
  <text x="80" y="748" fill="#6b7280" font-size="12" font-family="Courier New, monospace">&gt; </text>
  <rect x="100" y="734" width="2" height="18" fill="#00d4ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="780" text-anchor="middle" fill="#3d4166" font-size="12" font-family="Inter, sans-serif">H20 — Operatoren — Console: rekenmachine output met template literals [ADB09] [basis]</text>
</svg>
