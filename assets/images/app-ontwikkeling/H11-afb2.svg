<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Nakomeling vs Kind-selector</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">De spatie selecteert ALLE nakomelingen — de &gt; selecteert alleen directe kinderen</text>

  <!-- Linker kant: Nakomelingselector (spatie) -->
  <rect x="20" y="58" width="365" height="300" rx="8" fill="#3b5bdb" opacity="0.08" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="202" y="78" text-anchor="middle" font-size="13" fill="#74c0fc" font-weight="bold">Nakomelingselector (spatie)</text>
  <text x="202" y="96" text-anchor="middle" font-size="11" fill="#888">Selecteert ALLE nakomelingen op elk niveau</text>

  <!-- Code -->
  <rect x="35" y="104" width="335" height="28" rx="3" fill="#0d1117"/>
  <text x="45" y="122" font-size="13" font-family="Courier New" fill="#c4b5fd">nav</text>
  <text x="85" y="122" font-size="13" font-family="Courier New" fill="#f0f0f0"> </text>
  <text x="95" y="122" font-size="13" font-family="Courier New" fill="#a8ff7a">a</text>
  <text x="115" y="122" font-size="13" font-family="Courier New" fill="#888"> { color: blue; }</text>

  <!-- HTML boom visualisatie -->
  <rect x="35" y="140" width="335" height="185" rx="5" fill="#1e2030"/>
  <text x="60" y="162" font-size="11" font-family="Courier New" fill="#c4b5fd">&lt;nav&gt;</text>
  <line x1="68" y1="168" x2="68" y2="310" stroke="#555" stroke-width="1"/>

  <line x1="68" y1="182" x2="90" y2="182" stroke="#555" stroke-width="1"/>
  <text x="95" y="187" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;ul&gt;</text>
  <line x1="98" y1="192" x2="98" y2="270" stroke="#555" stroke-width="1"/>

  <line x1="98" y1="205" x2="118" y2="205" stroke="#555" stroke-width="1"/>
  <text x="123" y="210" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;li&gt;</text>
  <line x1="126" y1="215" x2="148" y2="215" stroke="#555" stroke-width="1"/>
  <!-- Geselecteerd! -->
  <rect x="150" y="205" width="190" height="20" rx="3" fill="#74c0fc" opacity="0.2"/>
  <text x="155" y="218" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;a&gt;Home&lt;/a&gt;</text>
  <text x="348" y="218" font-size="10" fill="#74c0fc">✓</text>

  <line x1="98" y1="238" x2="118" y2="238" stroke="#555" stroke-width="1"/>
  <text x="123" y="243" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;li&gt;</text>
  <line x1="126" y1="248" x2="148" y2="248" stroke="#555" stroke-width="1"/>
  <!-- Geselecteerd! -->
  <rect x="150" y="238" width="195" height="20" rx="3" fill="#74c0fc" opacity="0.2"/>
  <text x="155" y="251" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;a&gt;Contact&lt;/a&gt;</text>
  <text x="348" y="251" font-size="10" fill="#74c0fc">✓</text>

  <line x1="98" y1="270" x2="118" y2="270" stroke="#555" stroke-width="1"/>
  <!-- Geselecteerd! Genest niveau -->
  <rect x="120" y="261" width="230" height="20" rx="3" fill="#74c0fc" opacity="0.2"/>
  <text x="123" y="274" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;a&gt;Diep genest link&lt;/a&gt;</text>
  <text x="355" y="274" font-size="10" fill="#74c0fc">✓</text>

  <text x="68" y="306" font-size="11" font-family="Courier New" fill="#c4b5fd">&lt;/nav&gt;</text>
  <text x="202" y="336" text-anchor="middle" font-size="10" fill="#74c0fc">Alle &lt;a&gt; binnen &lt;nav&gt; geselecteerd</text>
  <text x="202" y="350" text-anchor="middle" font-size="10" fill="#888">op welk niveau ook</text>

  <!-- Rechter kant: Kind-selector (>) -->
  <rect x="415" y="58" width="365" height="300" rx="8" fill="#7c3aed" opacity="0.08" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="597" y="78" text-anchor="middle" font-size="13" fill="#c4b5fd" font-weight="bold">Kind-selector (&gt;)</text>
  <text x="597" y="96" text-anchor="middle" font-size="11" fill="#888">Selecteert ALLEEN directe kinderen (1 niveau diep)</text>

  <!-- Code -->
  <rect x="430" y="104" width="335" height="28" rx="3" fill="#0d1117"/>
  <text x="440" y="122" font-size="13" font-family="Courier New" fill="#c4b5fd">nav</text>
  <text x="480" y="122" font-size="13" font-family="Courier New" fill="#f97316"> &gt; </text>
  <text x="510" y="122" font-size="13" font-family="Courier New" fill="#a8ff7a">a</text>
  <text x="530" y="122" font-size="13" font-family="Courier New" fill="#888"> { color: blue; }</text>

  <!-- HTML boom visualisatie -->
  <rect x="430" y="140" width="335" height="185" rx="5" fill="#1e2030"/>
  <text x="455" y="162" font-size="11" font-family="Courier New" fill="#c4b5fd">&lt;nav&gt;</text>
  <line x1="463" y1="168" x2="463" y2="310" stroke="#555" stroke-width="1"/>

  <line x1="463" y1="182" x2="485" y2="182" stroke="#555" stroke-width="1"/>
  <text x="490" y="187" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;ul&gt;</text>
  <line x1="493" y1="192" x2="493" y2="270" stroke="#555" stroke-width="1"/>

  <line x1="493" y1="205" x2="513" y2="205" stroke="#555" stroke-width="1"/>
  <text x="518" y="210" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;li&gt;</text>
  <line x1="521" y1="215" x2="543" y2="215" stroke="#555" stroke-width="1"/>
  <!-- NIET geselecteerd -->
  <text x="548" y="218" font-size="11" font-family="Courier New" fill="#666">&lt;a&gt;Home&lt;/a&gt;</text>
  <text x="740" y="218" font-size="10" fill="#555">✗</text>

  <line x1="493" y1="238" x2="513" y2="238" stroke="#555" stroke-width="1"/>
  <text x="518" y="243" font-size="11" font-family="Courier New" fill="#74c0fc">&lt;li&gt;</text>
  <line x1="521" y1="248" x2="543" y2="248" stroke="#555" stroke-width="1"/>
  <!-- NIET geselecteerd -->
  <text x="548" y="251" font-size="11" font-family="Courier New" fill="#666">&lt;a&gt;Contact&lt;/a&gt;</text>
  <text x="745" y="251" font-size="10" fill="#555">✗</text>

  <line x1="493" y1="270" x2="513" y2="270" stroke="#555" stroke-width="1"/>
  <text x="518" y="274" font-size="11" font-family="Courier New" fill="#888">&lt;a&gt;Diep genest&lt;/a&gt;</text>
  <text x="745" y="274" font-size="10" fill="#555">✗</text>

  <text x="463" y="306" font-size="11" font-family="Courier New" fill="#c4b5fd">&lt;/nav&gt;</text>
  <text x="597" y="336" text-anchor="middle" font-size="10" fill="#f03e3e">Geen directe &lt;a&gt; in &lt;nav&gt; → niets geselecteerd</text>
  <text x="597" y="350" text-anchor="middle" font-size="10" fill="#888">Gebruik nav ul &gt; li &gt; a voor li-kinderen</text>
</svg>
