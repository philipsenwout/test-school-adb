<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" rx="8" fill="#1e1e2e"/>
  <rect x="0" y="0" width="900" height="44" rx="8" fill="#2a2a3e"/>
  <rect x="0" y="32" width="900" height="12" fill="#2a2a3e"/>
  <circle cx="22" cy="22" r="7" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="7" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="7" fill="#27c93f"/>
  <rect x="90" y="10" width="700" height="24" rx="12" fill="#1a1a2e"/>
  <text x="440" y="26" text-anchor="middle" font-size="12" fill="#7c9eff">profielkaart.html</text>

  <!-- Page background -->
  <rect x="0" y="44" width="900" height="516" fill="#f0f2f5"/>

  <!-- Title -->
  <text x="450" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Badge gepositioneerd op een kaart</text>
  <text x="450" y="100" text-anchor="middle" font-size="12" fill="#6c757d">position: relative op de kaart — position: absolute op de badge</text>

  <!-- ── CARD 1: with badge ── -->
  <!-- Card container (position: relative) -->
  <rect x="80" y="118" width="220" height="280" rx="12" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>
  <!-- position:relative label on card border -->
  <rect x="80" y="118" width="220" height="280" rx="12" fill="none" stroke="#3b5bdb" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="190" y="113" text-anchor="middle" font-size="10" fill="#3b5bdb" font-weight="bold">position: relative</text>

  <!-- Card header -->
  <rect x="80" y="118" width="220" height="80" rx="12" fill="#3b5bdb"/>
  <rect x="80" y="166" width="220" height="32" fill="#3b5bdb"/>
  <!-- Avatar -->
  <circle cx="190" cy="158" r="30" fill="#fff" stroke="#3b5bdb" stroke-width="2"/>
  <text x="190" y="164" text-anchor="middle" font-size="22" fill="#3b5bdb">👤</text>
  <!-- Card content -->
  <text x="190" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">Lisa De Smedt</text>
  <text x="190" y="242" text-anchor="middle" font-size="12" fill="#6c757d">Front-end developer</text>
  <line x1="110" y1="256" x2="270" y2="256" stroke="#dee2e6" stroke-width="1"/>
  <text x="190" y="276" text-anchor="middle" font-size="12" fill="#495057">📍 Hasselt, België</text>
  <text x="190" y="296" text-anchor="middle" font-size="12" fill="#495057">💼 2 jaar ervaring</text>
  <rect x="130" y="318" width="120" height="34" rx="17" fill="#3b5bdb"/>
  <text x="190" y="339" text-anchor="middle" font-size="12" fill="#fff">Bekijk profiel</text>

  <!-- BADGE: position absolute top-right -->
  <rect x="270" y="108" width="44" height="22" rx="11" fill="#22c55e" stroke="#fff" stroke-width="2"/>
  <text x="292" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">NIEUW</text>
  <!-- Badge label -->
  <text x="314" y="112" font-size="10" fill="#22c55e" font-weight="bold">position: absolute</text>
  <text x="314" y="124" font-size="10" fill="#6c757d">top: -8px; right: -8px;</text>

  <!-- Arrow from badge to annotation -->
  <line x1="314" y1="119" x2="295" y2="119" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── CSS CODE PANEL ── -->
  <rect x="340" y="118" width="300" height="220" rx="8" fill="#1e1e2e"/>
  <text x="356" y="140" font-size="12" fill="#cdd6f4" font-family="Courier New">.kaart {</text>
  <text x="356" y="158" font-size="12" fill="#89b4fa" font-family="Courier New">  position: relative;</text>
  <text x="356" y="176" font-size="12" fill="#cba6f7" font-family="Courier New">  width: 220px;</text>
  <text x="356" y="194" font-size="12" fill="#a6e3a1" font-family="Courier New">  border-radius: 12px;</text>
  <text x="356" y="212" font-size="12" fill="#cdd6f4" font-family="Courier New">}</text>
  <text x="356" y="236" font-size="12" fill="#cdd6f4" font-family="Courier New">.badge {</text>
  <text x="356" y="254" font-size="12" fill="#89b4fa" font-family="Courier New">  position: absolute;</text>
  <text x="356" y="272" font-size="12" fill="#f38ba8" font-family="Courier New">  top: -8px;</text>
  <text x="356" y="290" font-size="12" fill="#f38ba8" font-family="Courier New">  right: -8px;</text>
  <text x="356" y="308" font-size="12" fill="#fab387" font-family="Courier New">  border-radius: 99px;</text>
  <text x="356" y="326" font-size="12" fill="#cdd6f4" font-family="Courier New">}</text>

  <!-- ── EXPLANATION BOX ── -->
  <rect x="340" y="352" width="520" height="72" rx="8" fill="#dbeafe" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="356" y="372" font-size="12" font-weight="bold" fill="#1e40af">Waarom werkt dit?</text>
  <text x="356" y="390" font-size="11" fill="#1e3a8a">position: relative op de kaart maakt de kaart het anker voor absolute kinderen.</text>
  <text x="356" y="408" font-size="11" fill="#1e3a8a">position: absolute op de badge positioneert de badge t.o.v. de kaart, niet de pagina.</text>

  <!-- ── CARD 2: without badge (contrast) ── -->
  <rect x="670" y="118" width="190" height="200" rx="12" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <rect x="670" y="118" width="190" height="200" rx="12" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="765" y="113" text-anchor="middle" font-size="10" fill="#adb5bd">zonder position: relative</text>
  <rect x="670" y="118" width="190" height="60" rx="12" fill="#adb5bd"/>
  <rect x="670" y="148" width="190" height="30" fill="#adb5bd"/>
  <text x="765" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="#495057">Zonder badge</text>
  <text x="765" y="200" text-anchor="middle" font-size="11" fill="#6c757d">position: relative</text>
  <text x="765" y="216" text-anchor="middle" font-size="11" fill="#6c757d">ontbreekt op de kaart</text>
  <text x="765" y="240" text-anchor="middle" font-size="11" fill="#dc2626">→ badge landt elders</text>
  <text x="765" y="256" text-anchor="middle" font-size="11" fill="#dc2626">op de pagina!</text>

  <!-- Compare arrow -->
  <line x1="650" y1="220" x2="670" y2="220" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="4,2"/>
</svg>
