<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#00d4ff">Anatomie van de for-lus</text>
  <text x="600" y="76" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#8892a4">Drie delen — elk met een specifieke rol</text>

  <!-- The large for statement -->
  <rect x="50" y="106" width="1100" height="100" rx="14" fill="#12161f" stroke="#2d3448" stroke-width="2"/>

  <!-- for keyword -->
  <text x="88" y="170" font-family="'Courier New', monospace" font-size="40" fill="#7c3aed" font-weight="bold">for</text>
  <text x="148" y="170" font-family="'Courier New', monospace" font-size="40" fill="#ffffff">(</text>

  <!-- Part 1: initialisatie -->
  <rect x="172" y="122" width="220" height="70" rx="8" fill="#0d2040" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="282" y="162" text-anchor="middle" font-family="'Courier New', monospace" font-size="30" fill="#00d4ff" font-weight="bold">let i = 0</text>

  <!-- semicolon -->
  <text x="396" y="170" font-family="'Courier New', monospace" font-size="40" fill="#6b7280">;</text>

  <!-- Part 2: voorwaarde -->
  <rect x="418" y="122" width="200" height="70" rx="8" fill="#0d2e1a" stroke="#39ff14" stroke-width="2.5"/>
  <text x="518" y="162" text-anchor="middle" font-family="'Courier New', monospace" font-size="30" fill="#39ff14" font-weight="bold">i &lt; 5</text>

  <!-- semicolon -->
  <text x="622" y="170" font-family="'Courier New', monospace" font-size="40" fill="#6b7280">;</text>

  <!-- Part 3: update -->
  <rect x="648" y="122" width="160" height="70" rx="8" fill="#2e1a0d" stroke="#ff6b35" stroke-width="2.5"/>
  <text x="728" y="162" text-anchor="middle" font-family="'Courier New', monospace" font-size="30" fill="#ff6b35" font-weight="bold">i++</text>

  <text x="812" y="170" font-family="'Courier New', monospace" font-size="40" fill="#ffffff">)</text>
  <text x="838" y="170" font-family="'Courier New', monospace" font-size="40" fill="#ffffff">{</text>
  <text x="880" y="170" font-family="'Courier New', monospace" font-size="28" fill="#8892a4"> ... </text>
  <text x="1010" y="170" font-family="'Courier New', monospace" font-size="40" fill="#ffffff">}</text>

  <!-- Labels below each part -->
  <!-- Initialisatie label -->
  <line x1="282" y1="192" x2="282" y2="240" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="120" y="242" width="324" height="120" rx="10" fill="#0d2040" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="282" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00d4ff" font-weight="bold">① INITIALISATIE</text>
  <text x="282" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#5599bb">Wordt ÉÉNMALIG uitgevoerd</text>
  <text x="282" y="312" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#5599bb">vóór de lus start.</text>
  <text x="282" y="332" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#3a6090">Variabele aanmaken + startwaarde.</text>
  <text x="282" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#3a6090">let i = 0 (start bij nul)</text>

  <!-- Voorwaarde label -->
  <line x1="518" y1="192" x2="518" y2="240" stroke="#39ff14" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="364" y="242" width="308" height="120" rx="10" fill="#0d2e1a" stroke="#39ff14" stroke-width="1.5"/>
  <text x="518" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#39ff14" font-weight="bold">② VOORWAARDE</text>
  <text x="518" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#6baa78">Gecontroleerd VÓÓR elke</text>
  <text x="518" y="312" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#6baa78">iteratie (ook de eerste).</text>
  <text x="518" y="332" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#3a6a3a">Als false → lus stopt.</text>
  <text x="518" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#3a6a3a">i &lt; 5 → loopt zolang i kleiner dan 5</text>

  <!-- Update label -->
  <line x1="728" y1="192" x2="728" y2="240" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="576" y="242" width="304" height="120" rx="10" fill="#2e1a0d" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="728" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ff6b35" font-weight="bold">③ UPDATE</text>
  <text x="728" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#c08060">Uitgevoerd NA elke iteratie,</text>
  <text x="728" y="312" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#c08060">vóór de voorwaarde hercheck.</text>
  <text x="728" y="332" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#6a3a1a">Verhoogt/verlaagt de teller.</text>
  <text x="728" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#6a3a1a">i++ = i = i + 1</text>

  <!-- Execution order diagram -->
  <rect x="940" y="106" width="210" height="256" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <text x="1045" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#8892a4" font-weight="bold">Uitvoerorde</text>
  <rect x="956" y="140" width="178" height="28" rx="5" fill="#0d2040" stroke="#00d4ff" stroke-width="1"/>
  <text x="1045" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00d4ff">① init  (1×)</text>
  <line x1="1045" y1="168" x2="1045" y2="182" stroke="#8892a4" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="956" y="184" width="178" height="28" rx="5" fill="#0d2e1a" stroke="#39ff14" stroke-width="1"/>
  <text x="1045" y="203" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">② voorwaarde</text>
  <line x1="1045" y1="212" x2="1045" y2="226" stroke="#8892a4" stroke-width="1.5"/>
  <rect x="956" y="228" width="178" height="28" rx="5" fill="#1a3a1a" stroke="#39ff14" stroke-width="1"/>
  <text x="1045" y="247" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">  code-blok</text>
  <line x1="1045" y1="256" x2="1045" y2="270" stroke="#8892a4" stroke-width="1.5"/>
  <rect x="956" y="272" width="178" height="28" rx="5" fill="#2e1a0d" stroke="#ff6b35" stroke-width="1"/>
  <text x="1045" y="291" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#ff6b35">③ update</text>
  <!-- curved arrow back -->
  <path d="M 1134 286 Q 1148 243 1134 212" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="1134,212 1130,222 1140,222" fill="#ff6b35"/>
  <text x="1148" y="254" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">herhaal</text>
  <rect x="956" y="316" width="178" height="28" rx="5" fill="#1a0d0d" stroke="#ff4444" stroke-width="1"/>
  <text x="1045" y="335" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#ff4444">✗ stop (false)</text>

  <!-- Variations section -->
  <rect x="50" y="390" width="870" height="380" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <text x="70" y="416" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" font-weight="bold">Varianten</text>

  <!-- Aftellen -->
  <rect x="70" y="428" width="390" height="130" rx="8" fill="#0f1117" stroke="#2d3448" stroke-width="1"/>
  <text x="90" y="450" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" font-weight="bold">Aftellen:</text>
  <text x="90" y="474" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">for</text>
  <text x="118" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> (</text>
  <text x="134" y="474" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff">let i = 5</text>
  <text x="242" y="474" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">; </text>
  <text x="258" y="474" font-family="'Courier New', monospace" font-size="14" fill="#39ff14">i &gt;= 1</text>
  <text x="320" y="474" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">; </text>
  <text x="336" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35">i--</text>
  <text x="364" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">)</text>
  <text x="90" y="498" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">// Uitvoer: 5  4  3  2  1</text>
  <text x="90" y="518" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">Update: i-- verlaagt i met 1</text>
  <text x="90" y="536" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">Voorwaarde: &gt;= in plaats van &lt;</text>
  <text x="90" y="552" font-family="'Courier New', monospace" font-size="11" fill="#3a4a5a">Start: 5 → 4 → 3 → 2 → 1 → (0 &gt;= 1 = false, stop)</text>

  <!-- Stappen van 2 -->
  <rect x="480" y="428" width="420" height="130" rx="8" fill="#0f1117" stroke="#2d3448" stroke-width="1"/>
  <text x="500" y="450" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" font-weight="bold">Stappen van twee:</text>
  <text x="500" y="474" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">for</text>
  <text x="528" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> (</text>
  <text x="544" y="474" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff">let i = 0</text>
  <text x="648" y="474" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">; </text>
  <text x="664" y="474" font-family="'Courier New', monospace" font-size="14" fill="#39ff14">i &lt;= 10</text>
  <text x="736" y="474" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">; </text>
  <text x="752" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35">i += 2</text>
  <text x="804" y="474" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">)</text>
  <text x="500" y="498" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">// Uitvoer: 0  2  4  6  8  10</text>
  <text x="500" y="518" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">Update: i += 2 verhoogt i met 2</text>
  <text x="500" y="536" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">Alleen even getallen worden getoond</text>

  <!-- Kwadraten -->
  <rect x="70" y="574" width="830" height="180" rx="8" fill="#0f1117" stroke="#2d3448" stroke-width="1"/>
  <text x="90" y="596" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" font-weight="bold">Telvariabele gebruiken in berekening:</text>
  <text x="90" y="620" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">for</text>
  <text x="118" y="620" font-family="'Courier New', monospace" font-size="14" fill="#ffffff"> (</text>
  <text x="134" y="620" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff">let i = 1</text>
  <text x="242" y="620" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">; </text>
  <text x="258" y="620" font-family="'Courier New', monospace" font-size="14" fill="#39ff14">i &lt;= 5</text>
  <text x="318" y="620" font-family="'Courier New', monospace" font-size="14" fill="#6b7280">; </text>
  <text x="334" y="620" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35">i++</text>
  <text x="366" y="620" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">) {</text>
  <text x="110" y="644" font-family="'Courier New', monospace" font-size="14" fill="#8892a4">  let kwadraat = i * i;</text>
  <text x="110" y="668" font-family="'Courier New', monospace" font-size="14" fill="#8892a4">  console.log(`${i} kwadraat = ${kwadraat}`);</text>
  <text x="90" y="692" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">}</text>
  <text x="440" y="620" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">// Uitvoer:</text>
  <text x="440" y="644" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">1 kwadraat = 1</text>
  <text x="440" y="664" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">2 kwadraat = 4</text>
  <text x="440" y="684" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">3 kwadraat = 9</text>
  <text x="600" y="644" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">4 kwadraat = 16</text>
  <text x="600" y="664" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">5 kwadraat = 25</text>

  <!-- Scope note -->
  <rect x="940" y="390" width="210" height="380" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <text x="1045" y="414" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" font-weight="bold">Scope van i</text>
  <text x="960" y="440" font-family="'Courier New', monospace" font-size="12" fill="#8892a4">let i bestaat</text>
  <text x="960" y="458" font-family="'Courier New', monospace" font-size="12" fill="#8892a4">ALLEEN binnen</text>
  <text x="960" y="476" font-family="'Courier New', monospace" font-size="12" fill="#8892a4">de lus.</text>
  <line x1="956" y1="488" x2="1144" y2="488" stroke="#2d3448" stroke-width="1"/>
  <rect x="960" y="498" width="170" height="30" rx="5" fill="#0d2040" stroke="#00d4ff" stroke-width="1"/>
  <text x="1045" y="518" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00d4ff">for (...) {</text>
  <rect x="970" y="532" width="150" height="26" rx="4" fill="#0d2e1a" stroke="#39ff14" stroke-width="1"/>
  <text x="1045" y="550" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#39ff14">  // i bestaat</text>
  <rect x="960" y="562" width="170" height="30" rx="5" fill="#0d2040" stroke="#00d4ff" stroke-width="1"/>
  <text x="1045" y="582" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00d4ff">}</text>
  <text x="960" y="608" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">// i bestaat</text>
  <text x="960" y="626" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">// NIET meer!</text>
  <rect x="960" y="634" width="170" height="60" rx="5" fill="#2e0d0d" stroke="#ff4444" stroke-width="1"/>
  <text x="1045" y="658" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">console.log(i)</text>
  <text x="1045" y="678" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#8892a4">→ ReferenceError!</text>
  <text x="960" y="710" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">Dankzij let-scope</text>
  <text x="960" y="726" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">is dit veilig design.</text>
  <text x="960" y="742" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">Gebruik i alleen</text>
  <text x="960" y="758" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">binnen de for-lus.</text>
</svg>
