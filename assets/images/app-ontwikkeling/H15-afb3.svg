<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">Media Query Syntax &amp; Veelgebruikte Patronen</text>

  <!-- Anatomie media query -->
  <rect x="30" y="55" width="740" height="90" rx="8" fill="#2a2d3e"/>
  <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0f0f0">Anatomie van een media query</text>

  <!-- Syntax visualisatie -->
  <text x="90" y="115" font-size="16" font-family="Courier New" fill="#2D9CDB">@media</text>
  <text x="195" y="115" font-size="16" font-family="Courier New" fill="#F97316">(min-width: 768px)</text>
  <text x="470" y="115" font-size="16" font-family="Courier New" fill="#f0f0f0">{  ...  }</text>

  <!-- Labels -->
  <line x1="115" y1="120" x2="115" y2="140" stroke="#2D9CDB" stroke-width="1.5"/>
  <text x="115" y="155" text-anchor="middle" font-size="10" fill="#2D9CDB">at-rule</text>
  <line x1="320" y1="120" x2="320" y2="140" stroke="#F97316" stroke-width="1.5"/>
  <text x="320" y="155" text-anchor="middle" font-size="10" fill="#F97316">conditie</text>
  <line x1="490" y1="120" x2="490" y2="140" stroke="#22C55E" stroke-width="1.5"/>
  <text x="490" y="155" text-anchor="middle" font-size="10" fill="#22C55E">declaratieblok</text>

  <!-- Veelgebruikte patterns -->
  <text x="400" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0f0f0">Veelgebruikte patronen</text>

  <!-- Grid 4 voorbeelden -->
  <rect x="30" y="198" width="355" height="75" rx="6" fill="#7B3FE4" opacity="0.1"/>
  <rect x="30" y="198" width="355" height="75" rx="6" fill="none" stroke="#7B3FE4" stroke-width="1.5"/>
  <text x="207" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B3FE4">Schermgrootte</text>
  <text x="50" y="240" font-size="11" font-family="Courier New" fill="#f0f0f0">@media (min-width: 768px) { }</text>
  <text x="50" y="258" font-size="10" fill="#aaa">Tablet en groter</text>
  <text x="50" y="272" font-size="11" font-family="Courier New" fill="#f0f0f0">@media (min-width: 1024px) { }</text>

  <rect x="415" y="198" width="355" height="75" rx="6" fill="#2D9CDB" opacity="0.1"/>
  <rect x="415" y="198" width="355" height="75" rx="6" fill="none" stroke="#2D9CDB" stroke-width="1.5"/>
  <text x="592" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D9CDB">Oriëntatie</text>
  <text x="435" y="240" font-size="11" font-family="Courier New" fill="#f0f0f0">@media (orientation: landscape) { }</text>
  <text x="435" y="258" font-size="10" fill="#aaa">Liggend (breedte > hoogte)</text>
  <text x="435" y="272" font-size="11" font-family="Courier New" fill="#f0f0f0">@media (orientation: portrait) { }</text>

  <rect x="30" y="288" width="355" height="75" rx="6" fill="#F97316" opacity="0.1"/>
  <rect x="30" y="288" width="355" height="75" rx="6" fill="none" stroke="#F97316" stroke-width="1.5"/>
  <text x="207" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#F97316">Dark mode</text>
  <text x="50" y="330" font-size="11" font-family="Courier New" fill="#f0f0f0">@media (prefers-color-scheme:</text>
  <text x="50" y="348" font-size="11" font-family="Courier New" fill="#f0f0f0">  dark) { }</text>
  <text x="207" y="362" text-anchor="middle" font-size="10" fill="#aaa">Systeem dark mode gedetecteerd</text>

  <rect x="415" y="288" width="355" height="75" rx="6" fill="#22C55E" opacity="0.1"/>
  <rect x="415" y="288" width="355" height="75" rx="6" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <text x="592" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#22C55E">Combineren</text>
  <text x="435" y="330" font-size="11" font-family="Courier New" fill="#f0f0f0">@media (min-width: 768px)</text>
  <text x="435" y="348" font-size="11" font-family="Courier New" fill="#f0f0f0">  and (orientation: landscape)</text>
  <text x="592" y="362" text-anchor="middle" font-size="10" fill="#aaa">Meerdere condities combineren</text>
</svg>
