<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">HTML Speciale Tekens — Entities</text>

  <!-- Tabel met entities -->
  <!-- Header rij -->
  <rect x="50" y="50" width="700" height="35" rx="4" fill="#7B3FE4" opacity="0.8"/>
