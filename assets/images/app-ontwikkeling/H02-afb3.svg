  <text x="380" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Symbool</text>
  <text x="580" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Gebruik</text>

  <!-- Rijen -->
  <rect x="50" y="85" width="700" height="30" fill="#7B3FE4" opacity="0.1"/>
