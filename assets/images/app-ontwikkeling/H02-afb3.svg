  <text x="380" y="105" text-anchor="middle" font-size="18" fill="#22C55E">&lt;</text>
  <text x="580" y="105" text-anchor="middle" font-size="12" fill="#aaa">HTML-tag in tekst tonen</text>

  <rect x="50" y="115" width="700" height="30" fill="#2D9CDB" opacity="0.1"/>
  <text x="150" y="135" text-anchor="middle" font-size="13" fill="#f0f0f0" font-family="Courier New, monospace">&amp;gt;</text>
  <text x="380" y="135" text-anchor="middle" font-size="18" fill="#22C55E">&gt;</text>
  <text x="580" y="135" text-anchor="middle" font-size="12" fill="#aaa">HTML-tag in tekst tonen</text>

  <rect x="50" y="145" width="700" height="30" fill="#7B3FE4" opacity="0.1"/>
