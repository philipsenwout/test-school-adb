<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>

  <text x="600" y="50" fill="#ffffff" font-size="28" font-weight="700" text-anchor="middle">typeof — Wat is het type van een waarde?</text>
  <text x="600" y="76" fill="#aaaaaa" font-size="15" text-anchor="middle">typeof geeft altijd een string terug als antwoord</text>

  <!-- Table header -->
  <rect x="80" y="100" width="1040" height="50" rx="10" fill="#161b27" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="132" fill="#00d4ff" font-size="16" font-weight="700" text-anchor="middle">Code</text>
  <text x="580" y="132" fill="#00d4ff" font-size="16" font-weight="700" text-anchor="middle">Resultaat van typeof</text>
  <text x="950" y="132" fill="#00d4ff" font-size="16" font-weight="700" text-anchor="middle">Type</text>
  <line x1="340" y1="100" x2="340" y2="730" stroke="#333" stroke-width="1.5"/>
  <line x1="740" y1="100" x2="740" y2="730" stroke="#333" stroke-width="1.5"/>

  <!-- Row 1 -->
  <rect x="80" y="150" width="1040" height="72" rx="0" fill="#0d1a2a" opacity="0.5"/>
  <text x="200" y="192" fill="#39ff14" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof 42</text>
  <text x="540" y="180" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"number"</text>
  <text x="540" y="204" fill="#aaaaaa" font-size="12" text-anchor="middle">Geheel getal</text>
  <rect x="840" y="163" width="200" height="36" rx="8" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="940" y="186" fill="#00d4ff" font-size="16" font-weight="700" text-anchor="middle">number</text>

  <!-- Row 2 -->
  <text x="200" y="260" fill="#39ff14" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof 3.14</text>
  <text x="540" y="248" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"number"</text>
  <text x="540" y="272" fill="#aaaaaa" font-size="12" text-anchor="middle">Decimaal getal — ook number!</text>
  <rect x="840" y="231" width="200" height="36" rx="8" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="940" y="254" fill="#00d4ff" font-size="16" font-weight="700" text-anchor="middle">number</text>

  <!-- Row 3 -->
  <rect x="80" y="286" width="1040" height="72" rx="0" fill="#0d1a2a" opacity="0.5"/>
  <text x="200" y="328" fill="#ff6b35" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof "hallo"</text>
  <text x="540" y="316" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"string"</text>
  <text x="540" y="340" fill="#aaaaaa" font-size="12" text-anchor="middle">Tekst tussen aanhalingstekens</text>
  <rect x="840" y="299" width="200" height="36" rx="8" fill="#39ff14" opacity="0.2" stroke="#39ff14" stroke-width="1.5"/>
  <text x="940" y="322" fill="#39ff14" font-size="16" font-weight="700" text-anchor="middle">string</text>

  <!-- Row 4 -->
  <text x="200" y="396" fill="#ff6b35" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof 'abc'</text>
  <text x="540" y="384" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"string"</text>
  <text x="540" y="408" fill="#aaaaaa" font-size="12" text-anchor="middle">Enkele aanhalingstekens = ook string</text>
  <rect x="840" y="367" width="200" height="36" rx="8" fill="#39ff14" opacity="0.2" stroke="#39ff14" stroke-width="1.5"/>
  <text x="940" y="390" fill="#39ff14" font-size="16" font-weight="700" text-anchor="middle">string</text>

  <!-- Row 5 -->
  <rect x="80" y="422" width="1040" height="72" rx="0" fill="#0d1a2a" opacity="0.5"/>
  <text x="200" y="464" fill="#7c3aed" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof true</text>
  <text x="540" y="452" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"boolean"</text>
  <text x="540" y="476" fill="#aaaaaa" font-size="12" text-anchor="middle">Enkel true of false</text>
  <rect x="840" y="435" width="200" height="36" rx="8" fill="#7c3aed" opacity="0.25" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="940" y="458" fill="#7c3aed" font-size="16" font-weight="700" text-anchor="middle">boolean</text>

  <!-- Row 6 - SURPRISE -->
  <rect x="80" y="494" width="1040" height="88" rx="0" fill="#2a1a1a" opacity="0.6"/>
  <!-- Warning label -->
  <rect x="92" y="504" width="110" height="26" rx="6" fill="#ff5f57"/>
  <text x="147" y="521" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">⚠ VERRASSING</text>
  <text x="200" y="556" fill="#ff5f57" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof null</text>
  <text x="540" y="544" fill="#ff5f57" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"object"</text>
  <text x="540" y="568" fill="#aaaaaa" font-size="12" text-anchor="middle">⚠ Historische bug in JavaScript!</text>
  <text x="540" y="580" fill="#666" font-size="11" text-anchor="middle">null is GEEN object — typeof null is misleidend</text>
  <rect x="840" y="512" width="200" height="36" rx="8" fill="#ff5f57" opacity="0.2" stroke="#ff5f57" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="940" y="535" fill="#ff5f57" font-size="15" font-weight="700" text-anchor="middle">"object" ← BUG!</text>

  <!-- Row 7 -->
  <text x="200" y="628" fill="#00d4ff" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof undefined</text>
  <text x="540" y="616" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"undefined"</text>
  <text x="540" y="640" fill="#aaaaaa" font-size="12" text-anchor="middle">Geen waarde toegewezen</text>
  <rect x="840" y="600" width="200" height="36" rx="8" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="940" y="623" fill="#00d4ff" font-size="16" font-weight="700" text-anchor="middle">undefined</text>

  <!-- Row 8 -->
  <rect x="80" y="649" width="1040" height="72" rx="0" fill="#0d1a2a" opacity="0.5"/>
  <text x="200" y="691" fill="#ff6b35" font-size="18" font-family="'Courier New', monospace" text-anchor="middle">typeof { }</text>
  <text x="540" y="679" fill="#ffffff" font-size="16" font-family="'Courier New', monospace" text-anchor="middle">"object"</text>
  <text x="540" y="703" fill="#aaaaaa" font-size="12" text-anchor="middle">Object — meerdere waarden samen</text>
  <rect x="840" y="662" width="200" height="36" rx="8" fill="#ff6b35" opacity="0.2" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="940" y="685" fill="#ff6b35" font-size="16" font-weight="700" text-anchor="middle">object</text>

  <!-- Bottom border and table close -->
  <line x1="80" y1="730" x2="1120" y2="730" stroke="#333" stroke-width="1.5"/>
  <rect x="80" y="100" width="1040" height="630" rx="0" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="80" y="100" width="1040" height="630" rx="10" fill="none" stroke="#444" stroke-width="1.5"/>

  <!-- Tip box -->
  <rect x="80" y="742" width="1040" height="44" rx="10" fill="#0d1a2a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="600" y="764" fill="#00d4ff" font-size="14" font-weight="700" text-anchor="middle">💡 Gebruik typeof om te debuggen: </text>
  <text x="750" y="764" fill="#ffffff" font-size="14">console.log(typeof variabele)</text>
  <text x="980" y="764" fill="#aaaaaa" font-size="13"> → geeft het type als string</text>
</svg>
