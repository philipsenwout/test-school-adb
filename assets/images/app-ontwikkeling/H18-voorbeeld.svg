<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">datatypes.html</text>

  <!-- Code left -->
  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="92" font-size="12" fill="#94a3b8">// 5 primitieve datatypes</text>
  <text x="40" y="118" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> leeftijd = </tspan><tspan fill="#ff6b35">16</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">         // number</tspan></text>
  <text x="40" y="141" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> prijs = </tspan><tspan fill="#ff6b35">9.99</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">         // number</tspan></text>
  <text x="40" y="164" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> naam = </tspan><tspan fill="#ff6b35">"Jana"</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">       // string</tspan></text>
  <text x="40" y="187" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> isActief = </tspan><tspan fill="#ff6b35">true</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">     // boolean</tspan></text>
  <text x="40" y="210" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> resultaat = </tspan><tspan fill="#ff6b35">null</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#94a3b8">     // null</tspan></text>
  <text x="40" y="233" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> score;</tspan><tspan fill="#94a3b8">              // undefined</tspan></text>
  <text x="40" y="270" font-size="12" fill="#94a3b8">// typeof controleren</text>
  <text x="40" y="293" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(typeof leeftijd);</tspan></text>
  <text x="40" y="316" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(typeof naam);</tspan></text>
  <text x="40" y="339" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(typeof isActief);</tspan></text>
  <text x="40" y="362" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(typeof resultaat);</tspan></text>
  <text x="40" y="385" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(typeof score);</tspan></text>
  <text x="40" y="425" font-size="12" fill="#94a3b8">// template literals</text>
  <text x="40" y="448" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> bericht = `Hallo, ${naam}!</tspan></text>
  <text x="40" y="468" font-size="13" font-family="monospace"><tspan fill="#ffffff">Je bent ${leeftijd} jaar oud.`;</tspan></text>
  <text x="40" y="491" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(bericht);</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="600" y="120" font-size="12" fill="#94a3b8">// typeof resultaten</text>
  <text x="600" y="148" font-size="16" font-family="monospace" fill="#39ff14">"number"</text>
  <line x1="600" y1="160" x2="1160" y2="160" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="185" font-size="16" font-family="monospace" fill="#39ff14">"string"</text>
  <line x1="600" y1="197" x2="1160" y2="197" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="222" font-size="16" font-family="monospace" fill="#39ff14">"boolean"</text>
  <line x1="600" y1="234" x2="1160" y2="234" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="259" font-size="16" font-family="monospace" fill="#ff6b35">"object"</text>
  <text x="760" y="259" font-size="11" fill="#94a3b8">← bekende JS-eigenaardigheid!</text>
  <line x1="600" y1="271" x2="1160" y2="271" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="296" font-size="16" font-family="monospace" fill="#39ff14">"undefined"</text>
  <line x1="600" y1="308" x2="1160" y2="308" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="340" font-size="12" fill="#94a3b8">// template literal output</text>
  <text x="600" y="368" font-size="15" font-family="monospace" fill="#39ff14">Hallo, Jana! Je bent 16 jaar oud.</text>
  <line x1="600" y1="380" x2="1160" y2="380" stroke="#333" stroke-width="0.5"/>

  <rect x="600" y="410" width="560" height="200" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="880" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#00d4ff">Overzicht datatypes</text>
  <text x="620" y="465" font-size="12" fill="#ff6b35">number</text><text x="720" y="465" font-size="12" fill="#ffffff">  16, 9.99, -5, Infinity, NaN</text>
  <text x="620" y="490" font-size="12" fill="#ff6b35">string</text><text x="720" y="490" font-size="12" fill="#ffffff">  "Jana", 'hallo', `${naam}`</text>
  <text x="620" y="515" font-size="12" fill="#ff6b35">boolean</text><text x="720" y="515" font-size="12" fill="#ffffff"> true / false</text>
  <text x="620" y="540" font-size="12" fill="#ff6b35">null</text><text x="720" y="540" font-size="12" fill="#ffffff">    opzettelijk leeg (typeof → "object" !)</text>
  <text x="620" y="565" font-size="12" fill="#ff6b35">undefined</text><text x="720" y="565" font-size="12" fill="#ffffff"> niet geïnitialiseerd</text>
  <text x="600" y="595" font-size="11" fill="#94a3b8">Tip: typeof geeft altijd een string terug</text>

  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
