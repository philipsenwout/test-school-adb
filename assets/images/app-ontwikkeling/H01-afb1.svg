<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Achtergrond -->
  <rect width="800" height="400" fill="#1a1c28"/>

  <!-- Titel -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">HTML Documentstructuur</text>

  <!-- DOCTYPE -->
  <rect x="100" y="55" width="600" height="40" rx="6" fill="#2D9CDB" opacity="0.9"/>
  <text x="400" y="80" text-anchor="middle" font-size="14" fill="white">&lt;!DOCTYPE html&gt;</text>

  <!-- HTML -->
  <rect x="100" y="105" width="600" height="275" rx="6" fill="none" stroke="#7B3FE4" stroke-width="2"/>
  <text x="120" y="130" font-size="14" fill="#7B3FE4">&lt;html lang="nl"&gt;</text>

  <!-- HEAD -->
  <rect x="140" y="140" width="200" height="110" rx="6" fill="#7B3FE4" opacity="0.25"/>
  <rect x="140" y="140" width="200" height="110" rx="6" fill="none" stroke="#7B3FE4" stroke-width="1.5"/>
  <text x="240" y="160" text-anchor="middle" font-size="13" fill="#7B3FE4">&lt;head&gt;</text>
  <text x="160" y="182" font-size="11" fill="#aaa">&lt;meta charset="UTF-8"&gt;</text>
  <text x="160" y="198" font-size="11" fill="#aaa">&lt;meta name="viewport"...&gt;</text>
  <text x="160" y="214" font-size="11" fill="#aaa">&lt;title&gt;Mijn pagina&lt;/title&gt;</text>
  <text x="160" y="230" font-size="11" fill="#aaa">&lt;link rel="stylesheet"...&gt;</text>
  <text x="240" y="245" text-anchor="middle" font-size="13" fill="#7B3FE4">&lt;/head&gt;</text>

  <!-- BODY -->
  <rect x="380" y="140" width="290" height="220" rx="6" fill="#22C55E" opacity="0.15"/>
  <rect x="380" y="140" width="290" height="220" rx="6" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <text x="525" y="162" text-anchor="middle" font-size="13" fill="#22C55E">&lt;body&gt;</text>

  <!-- Semantische elementen in body -->
  <rect x="395" y="170" width="260" height="30" rx="4" fill="#F97316" opacity="0.7"/>
  <text x="525" y="190" text-anchor="middle" font-size="12" fill="white">&lt;header&gt; ... &lt;/header&gt;</text>

  <rect x="395" y="208" width="260" height="30" rx="4" fill="#2D9CDB" opacity="0.7"/>
  <text x="525" y="228" text-anchor="middle" font-size="12" fill="white">&lt;nav&gt; ... &lt;/nav&gt;</text>

  <rect x="395" y="246" width="260" height="30" rx="4" fill="#7B3FE4" opacity="0.7"/>
  <text x="525" y="266" text-anchor="middle" font-size="12" fill="white">&lt;main&gt; ... &lt;/main&gt;</text>

  <rect x="395" y="284" width="260" height="30" rx="4" fill="#22C55E" opacity="0.7"/>
  <text x="525" y="304" text-anchor="middle" font-size="12" fill="white">&lt;footer&gt; ... &lt;/footer&gt;</text>

  <text x="525" y="348" text-anchor="middle" font-size="13" fill="#22C55E">&lt;/body&gt;</text>

  <!-- Sluittag html -->
  <text x="120" y="370" font-size="14" fill="#7B3FE4">&lt;/html&gt;</text>

  <!-- Pijl: Head = metadata -->
  <line x1="345" y1="195" x2="375" y2="195" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="350" y="245" font-size="11" fill="#888" text-anchor="middle">Metadata</text>
  <text x="350" y="260" font-size="11" fill="#888" text-anchor="middle">(niet zichtbaar)</text>
</svg>
