<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Browser chrome -->
  <rect x="30" y="10" width="740" height="480" rx="10" fill="#e8eaf0"/>
  <!-- Toolbar -->
  <rect x="30" y="10" width="740" height="40" rx="10" fill="#d0d3dd"/>
  <rect x="30" y="38" width="740" height="12" fill="#d0d3dd"/>
  <!-- Verkeerslichtknoppen -->
  <circle cx="56" cy="30" r="7" fill="#ff5f57"/>
  <circle cx="76" cy="30" r="7" fill="#febc2e"/>
  <circle cx="96" cy="30" r="7" fill="#28c840"/>
  <!-- URL balk -->
  <rect x="120" y="18" width="480" height="24" rx="12" fill="#ffffff" opacity="0.9"/>
  <text x="360" y="33" font-size="12" fill="#6b7280" text-anchor="middle">localhost:5500/index.html</text>

  <!-- Pagina-inhoud -->
  <rect x="30" y="50" width="740" height="440" rx="0" fill="#f8f9ff"/>
  <rect x="30" y="470" width="740" height="20" rx="0" fill="#f8f9ff"/>

  <!-- H1 titel -->
  <text x="60" y="90" font-size="22" font-weight="700" fill="#2d2d4e">Mijn Recepten</text>
  <line x1="60" y1="98" x2="740" y2="98" stroke="#e5e7eb" stroke-width="1"/>

  <!-- KAART 1: Tomatensoep (rood/voorgerecht) -->
  <rect x="55" y="112" width="330" height="155" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="55" y="112" width="6" height="155" rx="3" fill="#e74c3c"/>
  <!-- Prullenbak kaart 1 -->
  <text x="348" y="130" font-size="14" fill="#9ca3af" opacity="0.7">🗑</text>
  <text x="75" y="145" font-size="16" font-weight="700" fill="#2d2d4e">Tomatensoep</text>
  <text x="75" y="165" font-size="12" fill="#6b7280">Romige soep met verse tomaten</text>
  <text x="75" y="183" font-size="12" fill="#6b7280">en basilicum.</text>
  <rect x="75" y="220" width="88" height="22" rx="11" fill="#e74c3c"/>
  <text x="119" y="235" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">voorgerecht</text>
  <text x="180" y="236" font-size="14" fill="#9ca3af">⏱</text>
  <text x="198" y="236" font-size="12" fill="#6b7280">15 min</text>

  <!-- KAART 2: Spaghetti carbonara (blauw/hoofdgerecht) -->
  <rect x="415" y="112" width="330" height="155" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="415" y="112" width="6" height="155" rx="3" fill="#3498db"/>
  <!-- Prullenbak kaart 2 -->
  <text x="708" y="130" font-size="14" fill="#9ca3af" opacity="0.7">🗑</text>
  <text x="435" y="145" font-size="16" font-weight="700" fill="#2d2d4e">Spaghetti carbonara</text>
  <text x="435" y="165" font-size="12" fill="#6b7280">Klassieke Italiaanse pasta met ei,</text>
  <text x="435" y="183" font-size="12" fill="#6b7280">spek en parmezaan.</text>
  <rect x="435" y="220" width="98" height="22" rx="11" fill="#3498db"/>
  <text x="484" y="235" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">hoofdgerecht</text>
  <text x="548" y="236" font-size="14" fill="#9ca3af">⏱</text>
  <text x="566" y="236" font-size="12" fill="#6b7280">25 min</text>

  <!-- KAART 3: Tiramisu (paars/dessert) -->
  <rect x="55" y="282" width="330" height="155" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="55" y="282" width="6" height="155" rx="3" fill="#9b59b6"/>
  <!-- Prullenbak kaart 3 -->
  <text x="348" y="300" font-size="14" fill="#9ca3af" opacity="0.7">🗑</text>
  <text x="75" y="315" font-size="16" font-weight="700" fill="#2d2d4e">Tiramisu</text>
  <text x="75" y="335" font-size="12" fill="#6b7280">Italiaans dessert met mascarpone,</text>
  <text x="75" y="353" font-size="12" fill="#6b7280">koffie en ladyfingers.</text>
  <rect x="75" y="390" width="68" height="22" rx="11" fill="#9b59b6"/>
  <text x="109" y="405" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">dessert</text>
  <text x="158" y="406" font-size="14" fill="#9ca3af">⏱</text>
  <text x="176" y="406" font-size="12" fill="#6b7280">40 min</text>

  <!-- Footer -->
  <rect x="30" y="460" width="740" height="30" fill="#1a1a2e"/>
  <text x="400" y="479" font-size="11" fill="#e8e8f0" text-anchor="middle" opacity="0.7">Receptenapp — 6ADB App-ontwikkeling</text>
</svg>
