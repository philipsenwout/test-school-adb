<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#e8eaf6"/>

  <!-- Browser window -->
  <rect x="30" y="20" width="740" height="440" rx="12" fill="#ffffff" stroke="#ccc" stroke-width="1.5"/>
  <rect x="30" y="20" width="740" height="44" rx="12" fill="#f5f5f5"/>
  <rect x="30" y="52" width="740" height="12" fill="#f5f5f5"/>
  <circle cx="62" cy="42" r="7" fill="#ff5f57"/>
  <circle cx="84" cy="42" r="7" fill="#ffbd2e"/>
  <circle cx="106" cy="42" r="7" fill="#28ca41"/>
  <!-- Address bar with API URL -->
  <rect x="120" y="28" width="540" height="26" rx="13" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="390" y="45" text-anchor="middle" font-size="12" fill="#333" font-family="monospace">localhost:3006/api/recepten</text>
  <!-- Lock icon -->
  <text x="136" y="46" font-size="12" fill="#43e97b">&#128275;</text>

  <!-- JSON content area (dark, like browser raw JSON view) -->
  <rect x="50" y="76" width="700" height="300" rx="8" fill="#1e1e2e"/>

  <!-- JSON content -->
  <text x="70" y="104" font-size="13" fill="white" font-family="monospace">[</text>

  <text x="90" y="126" font-size="13" fill="white" font-family="monospace">&#123;</text>
  <text x="110" y="144" font-size="13" fill="#f9a825" font-family="monospace">"naam"<tspan fill="white">: </tspan><tspan fill="#43e97b">"Spaghetti carbonara"</tspan><tspan fill="white">,</tspan></text>
  <text x="110" y="162" font-size="13" fill="#f9a825" font-family="monospace">"bereidingstijd"<tspan fill="white">: </tspan><tspan fill="#6c63ff">25</tspan><tspan fill="white">,</tspan></text>
  <text x="110" y="180" font-size="13" fill="#f9a825" font-family="monospace">"moeilijkheid"<tspan fill="white">: </tspan><tspan fill="#43e97b">"gemiddeld"</tspan></text>
  <text x="90" y="198" font-size="13" fill="white" font-family="monospace">&#125;,</text>

  <text x="90" y="220" font-size="13" fill="white" font-family="monospace">&#123;</text>
  <text x="110" y="238" font-size="13" fill="#f9a825" font-family="monospace">"naam"<tspan fill="white">: </tspan><tspan fill="#43e97b">"Tiramisu"</tspan><tspan fill="white">,</tspan></text>
  <text x="110" y="256" font-size="13" fill="#f9a825" font-family="monospace">"bereidingstijd"<tspan fill="white">: </tspan><tspan fill="#6c63ff">40</tspan><tspan fill="white">,</tspan></text>
  <text x="110" y="274" font-size="13" fill="#f9a825" font-family="monospace">"moeilijkheid"<tspan fill="white">: </tspan><tspan fill="#43e97b">"moeilijk"</tspan></text>
  <text x="90" y="292" font-size="13" fill="white" font-family="monospace">&#125;,</text>

  <text x="90" y="314" font-size="13" fill="white" font-family="monospace">&#123;</text>
  <text x="110" y="332" font-size="13" fill="#f9a825" font-family="monospace">"naam"<tspan fill="white">: </tspan><tspan fill="#43e97b">"Nachos"</tspan><tspan fill="white">,</tspan></text>
  <text x="110" y="350" font-size="13" fill="#f9a825" font-family="monospace">"bereidingstijd"<tspan fill="white">: </tspan><tspan fill="#6c63ff">10</tspan><tspan fill="white">,</tspan></text>
  <text x="110" y="368" font-size="13" fill="#f9a825" font-family="monospace">"moeilijkheid"<tspan fill="white">: </tspan><tspan fill="#43e97b">"makkelijk"</tspan></text>
  <text x="90" y="386" font-size="13" fill="white" font-family="monospace">&#125;</text>

  <text x="70" y="366" font-size="13" fill="white" font-family="monospace">]</text>

  <!-- Terminal hint at bottom -->
  <rect x="50" y="388" width="700" height="58" rx="8" fill="#0a0a18" stroke="#43e97b" stroke-width="1"/>
  <text x="70" y="408" font-size="12" fill="#888" font-family="monospace">$ node server.js</text>
  <text x="70" y="428" font-size="13" fill="#43e97b" font-family="monospace">&#9654; Server gestart op poort 3006</text>
  <text x="70" y="444" font-size="11" fill="#888" font-family="monospace">Druk Ctrl+C om te stoppen</text>
  <text x="680" y="428" font-size="11" fill="#6c63ff" text-anchor="end">Express 4.x</text>
</svg>
