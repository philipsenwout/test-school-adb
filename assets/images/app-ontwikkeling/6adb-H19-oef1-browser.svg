<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#e8eaf6"/>

  <!-- Browser window -->
  <rect x="30" y="20" width="740" height="440" rx="12" fill="#ffffff" stroke="#ccc" stroke-width="1.5"/>
  <rect x="30" y="20" width="740" height="44" rx="12" fill="#f5f5f5"/>
  <rect x="30" y="52" width="740" height="12" fill="#f5f5f5"/>
  <circle cx="62" cy="42" r="7" fill="#ff5f57"/>
  <circle cx="84" cy="42" r="7" fill="#ffbd2e"/>
  <circle cx="106" cy="42" r="7" fill="#28ca41"/>
  <rect x="130" y="30" width="500" height="24" rx="12" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="380" y="47" text-anchor="middle" font-size="12" fill="#888">localhost:5500/berichten.html</text>

  <!-- Page content -->
  <text x="400" y="102" text-anchor="middle" font-size="20" font-weight="700" fill="#2d2d4e">Wachtrij van berichten</text>
  <text x="400" y="122" text-anchor="middle" font-size="13" fill="#888">Berichten verschijnen één voor één met vertraging</text>

  <!-- Message 1 - appeared -->
  <rect x="80" y="138" width="640" height="66" rx="10" fill="#f0fff8" stroke="#43e97b" stroke-width="1.5"/>
  <circle cx="116" cy="171" r="18" fill="#43e97b"/>
  <text x="116" y="177" text-anchor="middle" font-size="16" fill="white">&#10003;</text>
  <text x="150" y="162" font-size="14" font-weight="600" fill="#2d2d4e">Bericht 1 verschijnt na 1 seconde</text>
  <text x="150" y="182" font-size="12" fill="#888">Inhoud: "Hallo! Dit is het eerste bericht."</text>
  <text x="696" y="162" font-size="11" fill="#43e97b" text-anchor="end">14:32:01</text>
  <text x="696" y="178" font-size="10" fill="#aaa" text-anchor="end">✓ verschenen</text>

  <!-- Message 2 - appeared -->
  <rect x="80" y="218" width="640" height="66" rx="10" fill="#f0fff8" stroke="#43e97b" stroke-width="1.5"/>
  <circle cx="116" cy="251" r="18" fill="#43e97b"/>
  <text x="116" y="257" text-anchor="middle" font-size="16" fill="white">&#10003;</text>
  <text x="150" y="242" font-size="14" font-weight="600" fill="#2d2d4e">Bericht 2 verschijnt na 2 seconden</text>
  <text x="150" y="262" font-size="12" fill="#888">Inhoud: "Het tweede bericht is hier!"</text>
  <text x="696" y="242" font-size="11" fill="#43e97b" text-anchor="end">14:32:02</text>
  <text x="696" y="258" font-size="10" fill="#aaa" text-anchor="end">✓ verschenen</text>

  <!-- Message 3 - appeared -->
  <rect x="80" y="298" width="640" height="66" rx="10" fill="#f0fff8" stroke="#43e97b" stroke-width="1.5"/>
  <circle cx="116" cy="331" r="18" fill="#43e97b"/>
  <text x="116" y="337" text-anchor="middle" font-size="16" fill="white">&#10003;</text>
  <text x="150" y="322" font-size="14" font-weight="600" fill="#2d2d4e">Bericht 3 verschijnt na 3 seconden</text>
  <text x="150" y="342" font-size="12" fill="#888">Inhoud: "En hier is het derde bericht."</text>
  <text x="696" y="322" font-size="11" fill="#43e97b" text-anchor="end">14:32:03</text>
  <text x="696" y="338" font-size="10" fill="#aaa" text-anchor="end">✓ verschenen</text>

  <!-- Code hint at bottom -->
  <rect x="80" y="378" width="640" height="70" rx="8" fill="#1a1a2e"/>
  <text x="400" y="398" text-anchor="middle" font-size="11" fill="#888" font-family="monospace">// async/await code achter de schermen:</text>
  <text x="110" y="418" font-size="12" fill="white" font-family="monospace">await <tspan fill="#43e97b">wacht</tspan>(<tspan fill="#f9a825">1000</tspan>);  p.textContent = <tspan fill="#43e97b">'Bericht 1'</tspan>;</text>
  <text x="110" y="438" font-size="12" fill="white" font-family="monospace">await <tspan fill="#43e97b">wacht</tspan>(<tspan fill="#f9a825">1000</tspan>);  p.textContent = <tspan fill="#43e97b">'Bericht 2'</tspan>;</text>
  <text x="110" y="456" font-size="12" fill="white" font-family="monospace">await <tspan fill="#43e97b">wacht</tspan>(<tspan fill="#f9a825">1000</tspan>);  p.textContent = <tspan fill="#43e97b">'Bericht 3'</tspan>;</text>
</svg>
