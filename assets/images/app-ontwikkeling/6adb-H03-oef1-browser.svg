<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="500" rx="10" fill="#e8e8e8"/>

  <!-- Titelbalk -->
  <rect x="0" y="0" width="800" height="38" rx="10" fill="#d0d0d0"/>
  <rect x="0" y="20" width="800" height="18" fill="#d0d0d0"/>

  <!-- Venster knoppen -->
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Adresbalk -->
  <rect x="100" y="8" width="500" height="22" rx="4" fill="#ffffff"/>
  <text x="350" y="23" font-size="12" fill="#555" text-anchor="middle">naamkaartje.html</text>

  <!-- Pagina achtergrond -->
  <rect x="0" y="38" width="800" height="462" fill="#f5f7ff"/>

  <!-- Pagina titel -->
  <text x="400" y="75" font-size="14" fill="#888" text-anchor="middle">Naamkaartje Generator</text>

  <!-- Code snippet links van de kaart -->
  <rect x="20" y="95" width="300" height="180" rx="10" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="35" y="118" font-size="11" fill="#888" font-family="'Courier New', monospace">// template literal gebruiken</text>
  <text x="35" y="140" font-size="11" fill="#6c63ff" font-family="'Courier New', monospace">const naam = <tspan fill="#43e97b">"Jana Peeters"</tspan>;</text>
  <text x="35" y="158" font-size="11" fill="#6c63ff" font-family="'Courier New', monospace">const hobby = <tspan fill="#43e97b">"Fotograferen"</tspan>;</text>
  <text x="35" y="176" font-size="11" fill="#6c63ff" font-family="'Courier New', monospace">const stad = <tspan fill="#43e97b">"Hasselt"</tspan>;</text>
  <text x="35" y="200" font-size="11" fill="#888" font-family="'Courier New', monospace">kaart.innerHTML = `</text>
  <text x="47" y="218" font-size="11" fill="#f9a825" font-family="'Courier New', monospace">  &lt;h2&gt;${naam}&lt;/h2&gt;</text>
  <text x="47" y="234" font-size="11" fill="#f9a825" font-family="'Courier New', monospace">  &lt;p&gt;Hobby: ${hobby}&lt;/p&gt;</text>
  <text x="35" y="252" font-size="11" fill="#888" font-family="'Courier New', monospace">` ;</text>

  <!-- Naamkaartje rechterkant -->
  <rect x="360" y="88" width="400" height="280" rx="14" fill="#ffffff" stroke="#6c63ff" stroke-width="2.5"/>

  <!-- Decoratieve streep bovenaan kaart -->
  <rect x="360" y="88" width="400" height="8" rx="4" fill="#6c63ff"/>
  <rect x="360" y="90" width="400" height="6" fill="#6c63ff"/>

  <!-- Naam groot -->
  <text x="560" y="145" font-size="24" fill="#2d2d4e" text-anchor="middle" font-weight="bold">Jana Peeters</text>

  <!-- Gebruikersnaam -->
  <text x="560" y="168" font-size="14" fill="#888" text-anchor="middle">@jana_peeters</text>

  <!-- Scheidingslijn -->
  <line x1="385" y1="184" x2="735" y2="184" stroke="#e0e0f0" stroke-width="1.5"/>

  <!-- Twee kolommen info -->
  <rect x="375" y="196" width="175" height="60" rx="8" fill="#f0f4ff"/>
  <text x="463" y="218" font-size="11" fill="#888" text-anchor="middle">Hobby</text>
  <text x="463" y="240" font-size="14" fill="#2d2d4e" text-anchor="middle" font-weight="bold">Fotograferen</text>

  <rect x="565" y="196" width="175" height="60" rx="8" fill="#f0f4ff"/>
  <text x="653" y="218" font-size="11" fill="#888" text-anchor="middle">Stad</text>
  <text x="653" y="240" font-size="14" fill="#2d2d4e" text-anchor="middle" font-weight="bold">Hasselt</text>

  <!-- Scheidingslijn -->
  <line x1="385" y1="272" x2="735" y2="272" stroke="#e0e0f0" stroke-width="1"/>

  <!-- Tag onderaan -->
  <rect x="490" y="288" width="140" height="28" rx="14" fill="#6c63ff" opacity="0.1" stroke="#6c63ff" stroke-width="1"/>
  <text x="560" y="307" font-size="12" fill="#6c63ff" text-anchor="middle">Leerling 6ADB</text>

  <!-- Decoratieve accent cirkel rechtsboven kaart -->
  <circle cx="740" cy="110" r="20" fill="#6c63ff" opacity="0.1"/>
  <text x="740" y="116" font-size="18" fill="#6c63ff" text-anchor="middle" opacity="0.6">&#128247;</text>

  <!-- Uitleg pijl -->
  <line x1="322" y1="220" x2="355" y2="220" stroke="#6c63ff" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="353,216 360,220 353,224" fill="#6c63ff"/>
  <text x="335" y="214" font-size="10" fill="#888" text-anchor="middle">resultaat</text>

  <!-- Voettekst met instructie -->
  <rect x="20" y="400" width="760" height="80" rx="10" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1" opacity="0.9"/>
  <text x="400" y="424" font-size="12" fill="#888" text-anchor="middle">Jouw opdracht: maak dit naamkaartje met jouw eigen gegevens via template literals</text>
  <text x="400" y="448" font-size="13" fill="#6c63ff" text-anchor="middle" font-family="'Courier New', monospace">const gebruikersnaam = `@${naam.toLowerCase().replace(' ', '_')}`;</text>
  <text x="400" y="470" font-size="12" fill="#43e97b" text-anchor="middle" font-family="'Courier New', monospace">// → "@jana_peeters"</text>
</svg>
