<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#4a4a6a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8f0">DOM Boomstructuur</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#a0a0c0">Document Object Model — hiërarchische structuur</text>

  <!-- document node -->
  <rect x="320" y="70" width="160" height="38" rx="10" fill="#6c63ff"/>
  <text x="400" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="white" font-family="'Courier New', monospace">document</text>

  <!-- line document -> html -->
  <line x1="400" y1="108" x2="400" y2="128" stroke="#4a4a6a" stroke-width="2"/>

  <!-- html node -->
  <rect x="330" y="128" width="140" height="38" rx="10" fill="#5b52e0"/>
  <text x="400" y="152" text-anchor="middle" font-size="14" font-weight="600" fill="white" font-family="'Courier New', monospace">html</text>

  <!-- lines html -> head, html -> body -->
  <line x1="370" y1="166" x2="240" y2="196" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="430" y1="166" x2="560" y2="196" stroke="#4a4a6a" stroke-width="2"/>

  <!-- head node -->
  <rect x="160" y="196" width="160" height="38" rx="10" fill="#3498db"/>
  <text x="240" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="white" font-family="'Courier New', monospace">head</text>

  <!-- body node -->
  <rect x="480" y="196" width="160" height="38" rx="10" fill="#3498db"/>
  <text x="560" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="white" font-family="'Courier New', monospace">body</text>

  <!-- lines head -> title, head -> meta -->
  <line x1="210" y1="234" x2="140" y2="274" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="270" y1="234" x2="310" y2="274" stroke="#4a4a6a" stroke-width="2"/>

  <!-- title node -->
  <rect x="70" y="274" width="120" height="36" rx="10" fill="#43e97b"/>
  <text x="130" y="297" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e" font-family="'Courier New', monospace">title</text>

  <!-- meta node -->
  <rect x="250" y="274" width="120" height="36" rx="10" fill="#43e97b"/>
  <text x="310" y="297" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e" font-family="'Courier New', monospace">meta</text>

  <!-- lines body -> header, body -> main, body -> footer -->
  <line x1="520" y1="234" x2="430" y2="274" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="560" y1="234" x2="560" y2="274" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="600" y1="234" x2="680" y2="274" stroke="#4a4a6a" stroke-width="2"/>

  <!-- header node -->
  <rect x="370" y="274" width="120" height="36" rx="10" fill="#43e97b"/>
  <text x="430" y="297" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e" font-family="'Courier New', monospace">header</text>

  <!-- main node -->
  <rect x="500" y="274" width="120" height="36" rx="10" fill="#43e97b"/>
  <text x="560" y="297" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e" font-family="'Courier New', monospace">main</text>

  <!-- footer node -->
  <rect x="630" y="274" width="120" height="36" rx="10" fill="#43e97b"/>
  <text x="690" y="297" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e" font-family="'Courier New', monospace">footer</text>

  <!-- line main -> ul -->
  <line x1="560" y1="310" x2="560" y2="350" stroke="#4a4a6a" stroke-width="2"/>

  <!-- ul node -->
  <rect x="500" y="350" width="120" height="36" rx="10" fill="#f9a825"/>
  <text x="560" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e" font-family="'Courier New', monospace">ul</text>

  <!-- lines ul -> li x3 -->
  <line x1="530" y1="386" x2="460" y2="426" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="560" y1="386" x2="560" y2="426" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="590" y1="386" x2="660" y2="426" stroke="#4a4a6a" stroke-width="2"/>

  <!-- li nodes -->
  <rect x="410" y="426" width="90" height="34" rx="10" fill="#ff6b6b"/>
  <text x="455" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="white" font-family="'Courier New', monospace">li</text>

  <rect x="515" y="426" width="90" height="34" rx="10" fill="#ff6b6b"/>
  <text x="560" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="white" font-family="'Courier New', monospace">li</text>

  <rect x="620" y="426" width="90" height="34" rx="10" fill="#ff6b6b"/>
  <text x="665" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="white" font-family="'Courier New', monospace">li</text>

  <!-- Legend -->
  <rect x="30" y="390" width="14" height="14" rx="3" fill="#6c63ff"/>
  <text x="50" y="402" font-size="11" fill="#a0a0c0">document</text>
  <rect x="30" y="410" width="14" height="14" rx="3" fill="#3498db"/>
  <text x="50" y="422" font-size="11" fill="#a0a0c0">head / body</text>
  <rect x="30" y="430" width="14" height="14" rx="3" fill="#43e97b"/>
  <text x="50" y="442" font-size="11" fill="#a0a0c0">semantische elementen</text>
  <rect x="30" y="450" width="14" height="14" rx="3" fill="#f9a825"/>
  <text x="50" y="462" font-size="11" fill="#a0a0c0">lijst-elementen</text>
  <rect x="30" y="470" width="14" height="14" rx="3" fill="#ff6b6b"/>
  <text x="50" y="482" font-size="11" fill="#a0a0c0">list items</text>
</svg>
