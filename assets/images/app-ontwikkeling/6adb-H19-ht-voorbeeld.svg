<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="500" fill="#1e1e1e" rx="10"/>
  <rect width="800" height="44" fill="#2d2d2d" rx="10"/>
  <rect y="22" width="800" height="22" fill="#2d2d2d"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="22" r="6" fill="#27c93f"/>
  <text x="400" y="28" font-size="13" fill="#aaa" text-anchor="middle">onderzoek.html — Mini-onderzoek met publieke API</text>

  <!-- Onderzoeksvraag blok -->
  <rect x="40" y="60" width="720" height="60" fill="#1a2d1a" rx="6"/>
  <text x="60" y="84" font-size="13" fill="#2DBA4E" font-weight="bold">Onderzoeksvraag:</text>
  <text x="60" y="106" font-size="12" fill="#ccc">"Welke landen hebben meer dan 100 miljoen inwoners?"  (API: restcountries.com/v3.1/all)</text>

  <!-- Code blok -->
  <rect x="40" y="132" width="720" height="120" fill="#0d1117" rx="6"/>
  <text x="60" y="158" font-size="12" fill="#c9d1d9" font-family="'Courier New', monospace"><tspan fill="#79c0ff">const</tspan> res = <tspan fill="#79c0ff">await</tspan> fetch(<tspan fill="#a5d6ff">'https://restcountries.com/v3.1/all'</tspan>);</text>
  <text x="60" y="180" font-size="12" fill="#c9d1d9" font-family="'Courier New', monospace"><tspan fill="#79c0ff">const</tspan> landen = <tspan fill="#79c0ff">await</tspan> res.json();</text>
  <text x="60" y="202" font-size="12" fill="#c9d1d9" font-family="'Courier New', monospace"><tspan fill="#79c0ff">const</tspan> groot = landen.<tspan fill="#d2a8ff">filter</tspan>(l =&gt; l.population &gt; <tspan fill="#79c0ff">100_000_000</tspan>);</text>
  <text x="60" y="224" font-size="12" fill="#c9d1d9" font-family="'Courier New', monospace">groot.<tspan fill="#d2a8ff">forEach</tspan>(l =&gt; console.<tspan fill="#d2a8ff">log</tspan>(l.name.common, l.population));</text>
  <text x="60" y="246" font-size="12" fill="#555" font-family="'Courier New', monospace">// Resultaten: 13 landen</text>

  <!-- Resultatenlijst -->
  <rect x="40" y="264" width="340" height="150" fill="#252525" rx="6"/>
  <text x="60" y="286" font-size="12" fill="#aaa" font-weight="bold">Resultaten (13 landen):</text>
  <text x="60" y="306" font-size="12" fill="#ccc">1. China — 1,412,000,000</text>
  <text x="60" y="326" font-size="12" fill="#ccc">2. India — 1,380,000,000</text>
  <text x="60" y="346" font-size="12" fill="#ccc">3. USA — 331,000,000</text>
  <text x="60" y="366" font-size="12" fill="#ccc">4. Indonesië — 273,000,000</text>
  <text x="60" y="386" font-size="12" fill="#555">... (9 meer)</text>

  <!-- Conclusie -->
  <rect x="400" y="264" width="360" height="150" fill="#1a2d1a" rx="6"/>
  <text x="420" y="288" font-size="12" fill="#2DBA4E" font-weight="bold">Conclusie (deel 3):</text>
  <text x="420" y="308" font-size="12" fill="#ccc">"Er zijn 13 landen met meer dan</text>
  <text x="420" y="328" font-size="12" fill="#ccc">100 miljoen inwoners. Aziatische</text>
  <text x="420" y="348" font-size="12" fill="#ccc">landen domineren de lijst. Dit</text>
  <text x="420" y="368" font-size="12" fill="#ccc">ondersteunt mijn hypothese.</text>
  <text x="420" y="388" font-size="12" fill="#ccc">Betrouwbaarheid: ★★★★☆"</text>

  <!-- Score rij -->
  <rect x="40" y="430" width="720" height="36" fill="#333" rx="6"/>
  <text x="80" y="453" font-size="12" fill="#2DBA4E">Deel 1: 2/2</text>
  <text x="220" y="453" font-size="12" fill="#2DBA4E">Deel 2: 4/4</text>
  <text x="360" y="453" font-size="12" fill="#2DBA4E">Deel 3: 4/4</text>
  <text x="540" y="453" font-size="12" fill="#fff" font-weight="bold">Totaal: 10/10</text>
</svg>
