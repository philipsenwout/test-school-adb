<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#f0f4ff"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2d4e">De browser praat met de server via HTTP</text>

  <!-- CLIENT (browser) - LEFT -->
  <rect x="30" y="80" width="220" height="200" rx="14" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>
  <!-- Browser tabs -->
  <rect x="40" y="90" width="60" height="18" rx="4" fill="#6c63ff" opacity="0.5"/>
  <rect x="108" y="90" width="50" height="18" rx="4" fill="#444" opacity="0.5"/>
  <!-- Address bar -->
  <rect x="40" y="115" width="200" height="16" rx="8" fill="#333"/>
  <text x="140" y="127" text-anchor="middle" font-size="9" fill="#aaa" font-family="monospace">localhost:3000</text>
  <!-- Browser content area -->
  <rect x="40" y="138" width="200" height="120" rx="4" fill="#fff" fill-opacity="0.05"/>
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#6c63ff">&#127760; Browser</text>
  <!-- Simulated content lines -->
  <rect x="52" y="170" width="80" height="8" rx="3" fill="#6c63ff" opacity="0.3"/>
  <rect x="52" y="184" width="120" height="8" rx="3" fill="#888" opacity="0.3"/>
  <rect x="52" y="198" width="100" height="8" rx="3" fill="#888" opacity="0.3"/>
  <rect x="52" y="212" width="60" height="8" rx="3" fill="#43e97b" opacity="0.3"/>
  <text x="140" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="white">Client (browser)</text>

  <!-- SERVER - RIGHT -->
  <rect x="550" y="80" width="220" height="200" rx="14" fill="#1a1a2e" stroke="#43e97b" stroke-width="2"/>
  <!-- Server rack visual -->
  <rect x="580" y="100" width="160" height="20" rx="4" fill="#333"/>
  <rect x="588" y="105" width="8" height="10" rx="2" fill="#43e97b" opacity="0.8"/>
  <rect x="600" y="105" width="8" height="10" rx="2" fill="#43e97b" opacity="0.8"/>
  <rect x="612" y="105" width="8" height="10" rx="2" fill="#f9a825" opacity="0.6"/>
  <rect x="580" y="128" width="160" height="20" rx="4" fill="#333"/>
  <rect x="588" y="133" width="8" height="10" rx="2" fill="#43e97b" opacity="0.8"/>
  <rect x="600" y="133" width="8" height="10" rx="2" fill="#43e97b" opacity="0.5"/>
  <rect x="580" y="156" width="160" height="20" rx="4" fill="#333"/>
  <rect x="588" y="161" width="8" height="10" rx="2" fill="#f9a825" opacity="0.8"/>
  <!-- Code label -->
  <rect x="570" y="185" width="180" height="52" rx="6" fill="#0a0a18"/>
  <text x="660" y="202" text-anchor="middle" font-size="10" fill="#888" font-family="monospace">// server.js</text>
  <text x="660" y="218" text-anchor="middle" font-size="10" fill="#43e97b" font-family="monospace">app.get('/api/recepten'</text>
  <text x="660" y="232" text-anchor="middle" font-size="10" fill="#f9a825" font-family="monospace">let recepten = [...]</text>
  <text x="660" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="white">Express Server (Node.js)</text>

  <!-- Data store below server -->
  <rect x="590" y="295" width="140" height="52" rx="8" fill="#2a2a3e" stroke="#6c63ff" stroke-width="1"/>
  <text x="660" y="314" text-anchor="middle" font-size="11" fill="#888" font-family="monospace">let recepten = [</text>
  <text x="660" y="330" text-anchor="middle" font-size="11" fill="#f9a825" font-family="monospace">  &#123; naam: "..." &#125;,</text>
  <text x="660" y="346" text-anchor="middle" font-size="11" fill="#888" font-family="monospace">]</text>
  <line x1="660" y1="295" x2="660" y2="280" stroke="#6c63ff" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- HTTP arrows -->
  <!-- Request: left to right (top) -->
  <line x1="255" y1="155" x2="548" y2="140" stroke="#6c63ff" stroke-width="2.5" marker-end="url(#arrowBlue2)"/>
  <!-- GET label above -->
  <rect x="285" y="128" width="230" height="22" rx="4" fill="#6c63ff" fill-opacity="0.15"/>
  <text x="400" y="143" text-anchor="middle" font-size="12" fill="#6c63ff" font-weight="600" font-family="monospace">GET /api/recepten</text>

  <!-- Response: right to left (bottom) -->
  <line x1="548" y1="195" x2="255" y2="210" stroke="#43e97b" stroke-width="2.5" marker-end="url(#arrowGreen2)"/>
  <!-- 200 OK label below -->
  <rect x="285" y="210" width="230" height="22" rx="4" fill="#43e97b" fill-opacity="0.15"/>
  <text x="400" y="225" text-anchor="middle" font-size="12" fill="#43e97b" font-weight="600" font-family="monospace">200 OK + JSON array</text>

  <!-- Middle label: JavaScript code -->
  <rect x="270" y="248" width="260" height="52" rx="8" fill="#1a1a2e"/>
  <text x="400" y="266" text-anchor="middle" font-size="11" fill="#888" font-family="monospace">// In de browser:</text>
  <text x="400" y="283" text-anchor="middle" font-size="12" fill="white" font-family="monospace">await <tspan fill="#43e97b">fetch</tspan>(<tspan fill="#f9a825">'/api/recepten'</tspan>)</text>
  <text x="400" y="299" text-anchor="middle" font-size="12" fill="white" font-family="monospace">→ res.<tspan fill="#43e97b">json</tspan>() → <tspan fill="#f9a825">data</tspan></text>

  <!-- Step numbers -->
  <circle cx="330" cy="140" r="11" fill="#6c63ff"/>
  <text x="330" y="145" text-anchor="middle" font-size="11" fill="white">1</text>
  <circle cx="470" cy="221" r="11" fill="#43e97b"/>
  <text x="470" y="226" text-anchor="middle" font-size="11" fill="white">2</text>
  <circle cx="330" cy="274" r="11" fill="#f9a825"/>
  <text x="330" y="279" text-anchor="middle" font-size="11" fill="white">3</text>

  <!-- DOM update note -->
  <rect x="30" y="370" width="220" height="60" rx="8" fill="#1a1a2e"/>
  <text x="140" y="390" text-anchor="middle" font-size="11" fill="#888">// DOM bijwerken:</text>
  <text x="140" y="408" text-anchor="middle" font-size="11" fill="white" font-family="monospace">div.textContent =</text>
  <text x="140" y="424" text-anchor="middle" font-size="11" fill="#43e97b" font-family="monospace">  data[0].naam;</text>
  <circle cx="222" cy="370" r="11" fill="#ff6b6b"/>
  <text x="222" y="375" text-anchor="middle" font-size="11" fill="white">4</text>

  <!-- Legend -->
  <rect x="0" y="446" width="800" height="34" fill="#1a1a2e" fill-opacity="0.6"/>
  <text x="400" y="467" text-anchor="middle" font-size="12" fill="#aaa">Client ↔ Server communicatie via HTTP — de basis van elke webapplicatie</text>

  <defs>
    <marker id="arrowBlue2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43e97b"/>
    </marker>
  </defs>
</svg>
