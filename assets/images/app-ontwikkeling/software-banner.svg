      <stop offset="50%"  stop-color="#082040"/>
      <stop offset="100%" stop-color="#0a3060"/>
    </linearGradient>
    <!-- Glow cyan -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow oranje -->
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff6b00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow paars -->
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Scherm gradient -->
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d2a4a"/>
      <stop offset="100%" stop-color="#0a1f38"/>
    </linearGradient>
    <linearGradient id="laptop-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2240"/>
    </linearGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
