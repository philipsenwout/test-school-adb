  <text x="158" y="194" font-size="14" fill="#f78c6c" font-family="'Courier New', monospace"> 0</text>
  <text x="20" y="216" font-size="14" fill="#e0e0e0" font-family="'Courier New', monospace">  &#125;,</text>
  <text x="20" y="244" font-size="14" fill="#e0e0e0" font-family="'Courier New', monospace">  &#123;</text>
  <text x="20" y="266" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "id":</text>
  <text x="108" y="266" font-size="14" fill="#f78c6c" font-family="'Courier New', monospace"> 2,</text>
  <text x="20" y="288" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "titel":</text>
  <text x="130" y="288" font-size="14" fill="#a8e6a3" font-family="'Courier New', monospace"> "CSS styling toevoegen",</text>
  <text x="20" y="310" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "voltooid":</text>
  <text x="158" y="310" font-size="14" fill="#f78c6c" font-family="'Courier New', monospace"> 0</text>
  <text x="20" y="332" font-size="14" fill="#e0e0e0" font-family="'Courier New', monospace">  &#125;,</text>
  <text x="20" y="360" font-size="14" fill="#e0e0e0" font-family="'Courier New', monospace">  &#123;</text>
  <text x="20" y="382" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "id":</text>
  <text x="108" y="382" font-size="14" fill="#f78c6c" font-family="'Courier New', monospace"> 3,</text>
  <text x="20" y="404" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "titel":</text>
  <text x="130" y="404" font-size="14" fill="#a8e6a3" font-family="'Courier New', monospace"> "API-route testen",</text>
  <text x="20" y="426" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "voltooid":</text>
  <text x="158" y="426" font-size="14" fill="#f78c6c" font-family="'Courier New', monospace"> 0</text>
  <text x="20" y="448" font-size="14" fill="#e0e0e0" font-family="'Courier New', monospace">  &#125;</text>
  <text x="20" y="466" font-size="14" fill="#e0e0e0" font-family="'Courier New', monospace">]</text>

