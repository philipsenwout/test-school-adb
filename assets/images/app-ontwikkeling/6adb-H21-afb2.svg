  <text x="20" y="172" font-size="14" fill="#c792ea" font-family="'Courier New', monospace">    "titel":</text>
  <text x="130" y="172" font-size="14" fill="#a8e6a3" font-family="'Courier New', monospace"> "HTML-pagina bouwen",</text>
