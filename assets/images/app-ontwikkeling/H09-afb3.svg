<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="darkOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#000000cc"/>
    </linearGradient>
    <linearGradient id="bgPhoto1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7c59"/>
      <stop offset="30%" stop-color="#8ab89a"/>
      <stop offset="60%" stop-color="#d4e6c3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bgPhoto2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7c59"/>
      <stop offset="30%" stop-color="#8ab89a"/>
      <stop offset="60%" stop-color="#d4e6c3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="semiOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00000088"/>
      <stop offset="100%" stop-color="#000000cc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Tekst op achtergrondafbeelding — Leesbaarheid</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Tekst zonder overlay is vaak onleesbaar — gebruik altijd een semi-transparante laag</text>

  <!-- FOUT: tekst direct op foto -->
  <rect x="20" y="58" width="360" height="200" rx="8" fill="url(#bgPhoto1)" stroke="#f03e3e" stroke-width="1.5"/>
  <text x="200" y="80" text-anchor="middle" font-size="13" fill="#f03e3e" font-weight="bold">✗ Zonder overlay</text>

  <!-- Tekst op de foto zonder overlay -->
  <text x="200" y="130" text-anchor="middle" font-size="22" fill="white" font-weight="bold">Welkom</text>
  <text x="200" y="156" text-anchor="middle" font-size="14" fill="white">Ontdek onze prachtige</text>
  <text x="200" y="175" text-anchor="middle" font-size="14" fill="white">collectie producten</text>
  <rect x="150" y="188" width="100" height="28" rx="5" fill="white" opacity="0.8"/>
  <text x="200" y="206" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Meer info</text>

  <!-- Probleem-annotatie -->
  <text x="200" y="240" text-anchor="middle" font-size="10" fill="#f03e3e">Tekst onleesbaar op lichte delen</text>
  <text x="200" y="254" text-anchor="middle" font-size="10" fill="#f03e3e">van de afbeelding!</text>

  <!-- CSS code FOUT -->
  <rect x="20" y="270" width="360" height="70" rx="5" fill="#0d1117"/>
  <text x="35" y="288" font-size="10" font-family="Courier New" fill="#79c0ff">.hero {</text>
  <text x="50" y="303" font-size="10" font-family="Courier New" fill="#a8ff7a">  background-image: url('foto.jpg');</text>
  <text x="50" y="318" font-size="10" font-family="Courier New" fill="#888">  /* geen overlay → onleesbaar */</text>
  <text x="35" y="333" font-size="10" font-family="Courier New" fill="#79c0ff">}</text>

  <!-- GOED: met overlay -->
  <rect x="420" y="58" width="360" height="200" rx="8" fill="url(#bgPhoto2)" stroke="#22C55E" stroke-width="1.5"/>
  <!-- Overlay laag -->
  <rect x="420" y="58" width="360" height="200" rx="8" fill="url(#semiOverlay)"/>
  <text x="600" y="80" text-anchor="middle" font-size="13" fill="#22C55E" font-weight="bold">✓ Met semi-transparante overlay</text>

  <!-- Tekst op foto MET overlay - nu leesbaar -->
  <text x="600" y="130" text-anchor="middle" font-size="22" fill="white" font-weight="bold">Welkom</text>
  <text x="600" y="156" text-anchor="middle" font-size="14" fill="#f0f0f0">Ontdek onze prachtige</text>
  <text x="600" y="175" text-anchor="middle" font-size="14" fill="#f0f0f0">collectie producten</text>
  <rect x="550" y="188" width="100" height="28" rx="5" fill="#7B3FE4"/>
  <text x="600" y="206" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Meer info</text>

  <!-- Goed-annotatie -->
  <text x="600" y="240" text-anchor="middle" font-size="10" fill="#22C55E">Overlay zorgt voor donkere achtergrond</text>
  <text x="600" y="254" text-anchor="middle" font-size="10" fill="#22C55E">→ tekst altijd leesbaar</text>

  <!-- CSS code GOED -->
  <rect x="420" y="270" width="360" height="70" rx="5" fill="#0d1117"/>
  <text x="435" y="288" font-size="10" font-family="Courier New" fill="#79c0ff">.hero {</text>
  <text x="450" y="303" font-size="10" font-family="Courier New" fill="#a8ff7a">  background-image:</text>
  <text x="460" y="316" font-size="10" font-family="Courier New" fill="#a8ff7a">    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),</text>
  <text x="460" y="328" font-size="10" font-family="Courier New" fill="#a8ff7a">    url('foto.jpg');</text>
  <text x="435" y="340" font-size="10" font-family="Courier New" fill="#79c0ff">}</text>
</svg>
