<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">recept.html</text>

  <!-- h1 -->
  <text x="40" y="96" font-size="32" font-weight="bold" fill="#000">Spaghetti Bolognese</text>

  <!-- figure placeholder -->
  <rect x="40" y="110" width="200" height="130" fill="#e0e0e0" stroke="#bbb" stroke-width="1"/>
  <text x="140" y="168" text-anchor="middle" font-size="13" fill="#888">foto recept</text>
  <text x="140" y="185" text-anchor="middle" font-size="12" fill="#888">200×130</text>
  <!-- figcaption -->
  <text x="40" y="258" font-size="14" fill="#555" font-style="italic">Figuur 1: Spaghetti bolognese. Bron: eigen recept.</text>

  <!-- h2 Ingredienten -->
  <text x="40" y="296" font-size="24" font-weight="bold" fill="#000">Ingrediënten</text>
  <circle cx="52" cy="320" r="3" fill="#000"/>
  <text x="68" y="326" font-size="16" fill="#000">500 g gehakt</text>
  <circle cx="52" cy="348" r="3" fill="#000"/>
  <text x="68" y="354" font-size="16" fill="#000">400 g tomatensaus &amp; 2 teentjes knoflook</text>
  <circle cx="52" cy="376" r="3" fill="#000"/>
  <text x="68" y="382" font-size="16" fill="#000">300 g spaghetti</text>

  <!-- h2 Bereiding -->
  <text x="40" y="424" font-size="24" font-weight="bold" fill="#000">Bereiding</text>
  <text x="40" y="454" font-size="16" fill="#000">1. Verhit olie in een pan &gt; 180°C</text>
  <text x="40" y="478" font-size="16" fill="#000">2. Bak het gehakt bruin</text>
  <text x="40" y="502" font-size="16" fill="#000">3. Voeg tomatensaus toe, laat 20 min sudderen</text>
</svg>
