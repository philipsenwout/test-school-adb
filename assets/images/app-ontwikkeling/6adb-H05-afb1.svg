<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M1,7 L4,1 L7,7 Z" fill="#ff6b6b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8f0">Event Bubbling — het event stijgt op</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#a0a0c0">Een klik op een knop verspreidt zich naar boven door de DOM-boom</text>

  <!-- document layer -->
  <rect x="30" y="76" width="560" height="380" rx="14" fill="#1e1e38" stroke="#4a4a6a" stroke-width="2"/>
  <text x="56" y="102" font-size="14" fill="#8080c0" font-family="'Courier New', monospace">document</text>
  <text x="56" y="118" font-size="11" fill="#6060a0" font-family="'Courier New', monospace">addEventListener('click', ...)</text>

  <!-- body layer -->
  <rect x="60" y="128" width="480" height="298" rx="12" fill="#26264a" stroke="#5a5a8a" stroke-width="2"/>
  <text x="84" y="152" font-size="14" fill="#9090c8" font-family="'Courier New', monospace">body</text>
  <text x="84" y="168" font-size="11" fill="#7070a8" font-family="'Courier New', monospace">addEventListener('click', ...)</text>

  <!-- div layer -->
  <rect x="96" y="180" width="400" height="216" rx="10" fill="#30308a" stroke="#6c63ff" stroke-width="2"/>
  <text x="118" y="204" font-size="14" fill="#c0b0ff" font-family="'Courier New', monospace">div</text>
  <text x="118" y="220" font-size="11" fill="#a090e0" font-family="'Courier New', monospace">addEventListener('click', ...)</text>

  <!-- button -->
  <rect x="200" y="268" width="190" height="90" rx="10" fill="#6c63ff" stroke="#a0a0ff" stroke-width="2"/>
  <text x="295" y="304" text-anchor="middle" font-size="16" font-weight="700" fill="white">KLIK MIJ</text>
  <!-- click star icon -->
  <text x="295" y="340" text-anchor="middle" font-size="22" fill="#f9a825">✦</text>

  <!-- Bubbling arrows on right side of layers -->
  <!-- button to div -->
  <line x1="640" y1="335" x2="640" y2="248" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  <rect x="660" y="278" width="110" height="28" rx="6" fill="#3a1020"/>
  <text x="715" y="297" text-anchor="middle" font-size="12" fill="#ff9090" font-weight="600">bubbling</text>

  <!-- div to body -->
  <line x1="660" y1="218" x2="660" y2="158" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  <rect x="674" y="176" width="110" height="28" rx="6" fill="#3a1020"/>
  <text x="729" y="195" text-anchor="middle" font-size="12" fill="#ff9090" font-weight="600">bubbling</text>

  <!-- body to document -->
  <line x1="640" y1="140" x2="640" y2="102" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  <rect x="654" y="114" width="110" height="28" rx="6" fill="#3a1020"/>
  <text x="709" y="133" text-anchor="middle" font-size="12" fill="#ff9090" font-weight="600">bubbling</text>

  <!-- connector lines from layers to arrows -->
  <line x1="590" y1="313" x2="636" y2="313" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="556" y1="220" x2="656" y2="220" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="590" y1="152" x2="636" y2="152" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Legend / explanation -->
  <rect x="30" y="468" width="740" height="40" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="400" y="492" text-anchor="middle" font-size="13" fill="#e8e8f0">
    <tspan fill="#f9a825">event.stopPropagation()</tspan> stopt het bubbling —
    <tspan fill="#43e97b">event.target</tspan> = het element waarop geklikt werd
  </text>
</svg>
