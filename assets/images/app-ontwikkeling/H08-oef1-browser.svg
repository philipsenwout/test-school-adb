<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#f5f5f5"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">index.html</text>

  <!-- page background: light grey (#f5f5f5) already set on root rect -->

  <!-- h1 in navy blue #003087 -->
  <text x="40" y="102" font-size="32" font-weight="bold" fill="#003087">Mijn eerste CSS-pagina</text>

  <!-- p.uitgelicht: yellow background, orange border -->
  <rect x="36" y="115" width="820" height="76" fill="#fff9c4" stroke="#ffa040" stroke-width="2" rx="2"/>
  <text x="48" y="144" font-size="16" fill="#333333" line-spacing="1.7">Dit is de eerste alinea — ze heeft de klasse "uitgelicht".</text>
  <text x="48" y="168" font-size="16" fill="#333333">De gele achtergrond en oranje rand komen van de CSS-klasse.</text>

  <!-- p (normal, no class) -->
  <text x="40" y="222" font-size="16" fill="#333333">Dit is de tweede alinea. Ze heeft geen klasse en dus geen extra opmaak.</text>
  <text x="40" y="248" font-size="16" fill="#333333">Ze erft de tekstkleur #333 en het lettertype Arial van de body-selector.</text>
</svg>
