<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">registratie.html</text>

  <!-- h1 -->
  <text x="40" y="92" font-size="28" font-weight="bold" fill="#000">Registreer voor SchoolApp</text>

  <!-- fieldset: Persoonlijke gegevens -->
  <rect x="40" y="105" width="500" height="135" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="56" y="102" font-size="13" fill="#555" font-weight="bold">Persoonlijke gegevens</text>
  <!-- Voornaam -->
  <text x="56" y="132" font-size="14" fill="#000">Voornaam *</text>
  <rect x="180" y="116" width="340" height="24" fill="#fff" stroke="#999" stroke-width="1" rx="2"/>
  <!-- Achternaam -->
  <text x="56" y="164" font-size="14" fill="#000">Achternaam *</text>
  <rect x="180" y="148" width="340" height="24" fill="#fff" stroke="#999" stroke-width="1" rx="2"/>
  <!-- E-mail -->
  <text x="56" y="196" font-size="14" fill="#000">E-mailadres *</text>
  <rect x="180" y="180" width="340" height="24" fill="#fff" stroke="#999" stroke-width="1" rx="2"/>
  <!-- Wachtwoord -->
  <text x="56" y="228" font-size="14" fill="#000">Wachtwoord *</text>
  <rect x="180" y="212" width="340" height="24" fill="#fff" stroke="#999" stroke-width="1" rx="2"/>

  <!-- fieldset: Klas -->
  <rect x="40" y="252" width="500" height="70" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="56" y="249" font-size="13" fill="#555" font-weight="bold">Klas</text>
  <!-- radio buttons -->
  <circle cx="60" cy="278" r="7" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="60" cy="278" r="3" fill="#666"/>
  <text x="76" y="283" font-size="14" fill="#000">5ADB</text>
  <circle cx="140" cy="278" r="7" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="156" y="283" font-size="14" fill="#000">6ADB</text>

  <!-- fieldset: Favoriete vak -->
  <rect x="40" y="334" width="500" height="100" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="56" y="331" font-size="13" fill="#555" font-weight="bold">Favoriete vak</text>
  <!-- checkboxes -->
  <rect x="56" y="348" width="14" height="14" fill="none" stroke="#666" stroke-width="1.5" rx="2"/>
  <text x="78" y="360" font-size="14" fill="#000">Netwerken</text>
  <rect x="176" y="348" width="14" height="14" fill="none" stroke="#666" stroke-width="1.5" rx="2"/>
  <text x="198" y="360" font-size="14" fill="#000">App-ontwikkeling</text>
  <rect x="56" y="376" width="14" height="14" fill="#666" stroke="#666" stroke-width="1.5" rx="2"/>
  <text x="76" y="377" font-size="10" fill="#fff">✓</text>
  <text x="78" y="388" font-size="14" fill="#000">Databeheer</text>
  <rect x="176" y="376" width="14" height="14" fill="none" stroke="#666" stroke-width="1.5" rx="2"/>
  <text x="198" y="388" font-size="14" fill="#000">E-STEM</text>

  <!-- note + submit button -->
  <text x="40" y="456" font-size="13" fill="#555">* Verplicht veld</text>
  <rect x="40" y="468" width="160" height="34" fill="#222" rx="4"/>
  <text x="120" y="490" text-anchor="middle" font-size="14" fill="#fff">Registreer</text>
</svg>
