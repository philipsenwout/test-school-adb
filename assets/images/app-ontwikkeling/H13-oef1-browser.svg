<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#1a1a1a"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">galerij.html</text>

  <!-- heading -->
  <text x="40" y="88" font-size="26" font-weight="bold" fill="#ffffff">Mijn Fotogalerij</text>
  <text x="40" y="110" font-size="13" fill="#888" font-style="italic">display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;</text>

  <!-- Grid: 3 columns × 2 rows = 6 cells -->
  <!-- Row 1 -->
  <rect x="40" y="122" width="260" height="155" fill="#2d2d3a" rx="6" stroke="#444" stroke-width="1"/>
  <rect x="40" y="122" width="260" height="120" fill="#3a3a4a" rx="6"/>
  <text x="170" y="189" text-anchor="middle" font-size="12" fill="#888">Berg</text>
  <text x="170" y="265" text-anchor="middle" font-size="13" fill="#ccc">Berg bij zonsopgang</text>

  <rect x="320" y="122" width="260" height="155" fill="#2d2d3a" rx="6" stroke="#444" stroke-width="1"/>
  <rect x="320" y="122" width="260" height="120" fill="#2a3a4a" rx="6"/>
  <text x="450" y="189" text-anchor="middle" font-size="12" fill="#888">Zee</text>
  <text x="450" y="265" text-anchor="middle" font-size="13" fill="#ccc">Rustige zee in de ochtend</text>

  <rect x="600" y="122" width="260" height="155" fill="#2d2d3a" rx="6" stroke="#444" stroke-width="1"/>
  <rect x="600" y="122" width="260" height="120" fill="#2a4a3a" rx="6"/>
  <text x="730" y="189" text-anchor="middle" font-size="12" fill="#888">Bos</text>
  <text x="730" y="265" text-anchor="middle" font-size="13" fill="#ccc">Herfstbos in de Ardennen</text>

  <!-- Row 2 -->
  <rect x="40" y="295" width="260" height="155" fill="#2d2d3a" rx="6" stroke="#444" stroke-width="1"/>
  <rect x="40" y="295" width="260" height="120" fill="#4a3a2a" rx="6"/>
  <text x="170" y="362" text-anchor="middle" font-size="12" fill="#888">Stad</text>
  <text x="170" y="438" text-anchor="middle" font-size="13" fill="#ccc">Stadsgezicht bij avond</text>

  <rect x="320" y="295" width="260" height="155" fill="#2d2d3a" rx="6" stroke="#444" stroke-width="1"/>
  <rect x="320" y="295" width="260" height="120" fill="#4a4a2a" rx="6"/>
  <text x="450" y="362" text-anchor="middle" font-size="12" fill="#888">Woestijn</text>
  <text x="450" y="438" text-anchor="middle" font-size="13" fill="#ccc">Duinen in de Sahara</text>

  <rect x="600" y="295" width="260" height="155" fill="#2d2d3a" rx="6" stroke="#444" stroke-width="1"/>
  <rect x="600" y="295" width="260" height="120" fill="#2a2a4a" rx="6"/>
  <text x="730" y="362" text-anchor="middle" font-size="12" fill="#888">Meer</text>
  <text x="730" y="438" text-anchor="middle" font-size="13" fill="#ccc">Bergmeer in de Alpen</text>
</svg>
