<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="500" rx="10" fill="#2a2a2a"/>

  <!-- Titelbalk -->
  <rect x="0" y="0" width="800" height="38" rx="10" fill="#3a3a3a"/>
  <rect x="0" y="20" width="800" height="18" fill="#3a3a3a"/>

  <!-- Venster knoppen -->
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Adresbalk -->
  <rect x="100" y="8" width="500" height="22" rx="4" fill="#1a1a1a"/>
  <text x="350" y="23" font-size="12" fill="#888" text-anchor="middle">index.html</text>

  <!-- Pagina inhoud (klein) -->
  <rect x="0" y="38" width="800" height="130" fill="#f5f5f5"/>
  <rect x="20" y="52" width="180" height="14" rx="3" fill="#ddd"/>
  <rect x="20" y="74" width="320" height="9" rx="2" fill="#eee"/>
  <rect x="20" y="91" width="280" height="9" rx="2" fill="#eee"/>
  <text x="400" y="100" font-size="12" fill="#ccc" text-anchor="middle" font-style="italic">(paginainhoud)</text>

  <!-- DevTools scheidingslijn -->
  <line x1="0" y1="168" x2="800" y2="168" stroke="#555" stroke-width="2"/>

  <!-- DevTools header -->
  <rect x="0" y="168" width="800" height="332" fill="#1e1e1e"/>

  <!-- DevTools tabbladen -->
  <rect x="0" y="168" width="800" height="34" fill="#252525"/>
  <text x="20" y="190" font-size="12" fill="#888">Elements</text>
  <text x="82" y="190" font-size="12" fill="#ffffff" font-weight="bold">Console</text>
  <line x1="82" y1="201" x2="125" y2="201" stroke="#6c63ff" stroke-width="2"/>
  <text x="147" y="190" font-size="12" fill="#888">Sources</text>
  <text x="212" y="190" font-size="12" fill="#888">Network</text>

  <!-- Console inhoud -->
  <rect x="0" y="202" width="800" height="298" fill="#1e1e1e"/>

  <!-- Lijn 1: > mijnBoek -->
  <text x="16" y="228" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="228" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnBoek</text>

  <!-- Object uitgevouwen -->
  <rect x="16" y="236" width="750" height="130" rx="4" fill="#242424"/>

  <!-- Driehoekje uitgevouwen -->
  <text x="24" y="255" font-size="12" fill="#4a9eff" font-family="'Courier New', monospace">▼ Object</text>

  <!-- Object properties ingesprongen -->
  <text x="50" y="274" font-size="12" fill="#a78bfa" font-family="'Courier New', monospace">titel:</text>
  <text x="100" y="274" font-size="12" fill="#43e97b" font-family="'Courier New', monospace">"Harry Potter"</text>

  <text x="50" y="292" font-size="12" fill="#a78bfa" font-family="'Courier New', monospace">auteur:</text>
  <text x="108" y="292" font-size="12" fill="#43e97b" font-family="'Courier New', monospace">"J.K. Rowling"</text>

  <text x="50" y="310" font-size="12" fill="#a78bfa" font-family="'Courier New', monospace">paginas:</text>
  <text x="116" y="310" font-size="12" fill="#4a9eff" font-family="'Courier New', monospace">309</text>

  <text x="50" y="328" font-size="12" fill="#a78bfa" font-family="'Courier New', monospace">isGelezen:</text>
  <text x="124" y="328" font-size="12" fill="#f9a825" font-family="'Courier New', monospace">true</text>

  <text x="50" y="346" font-size="12" fill="#555" font-family="'Courier New', monospace">[[Prototype]]: Object</text>
  <text x="50" y="362" font-size="12" fill="#555" font-family="'Courier New', monospace">beoordeling: ƒ beoordeling()</text>

  <line x1="16" y1="375" x2="784" y2="375" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lijn 2: > mijnBoek.titel -->
  <text x="16" y="395" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="395" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnBoek.<tspan fill="#6c63ff">titel</tspan></text>

  <text x="16" y="415" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">←</text>
  <text x="32" y="415" font-size="13" fill="#43e97b" font-family="'Courier New', monospace">'Harry Potter'</text>

  <line x1="16" y1="425" x2="784" y2="425" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Lijn 3: > mijnBoek.beoordeling() -->
  <text x="16" y="448" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <text x="32" y="448" font-size="13" fill="#e8e8f0" font-family="'Courier New', monospace">mijnBoek.<tspan fill="#6c63ff">beoordeling</tspan>()</text>

  <text x="16" y="468" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">←</text>
  <text x="32" y="468" font-size="13" fill="#43e97b" font-family="'Courier New', monospace">'&#9733;&#9733;&#9733;&#9733;&#9734;'</text>

  <!-- Prompt cursor -->
  <text x="16" y="490" font-size="13" fill="#4a9eff" font-family="'Courier New', monospace">›</text>
  <rect x="30" y="478" width="8" height="14" fill="#4a9eff" opacity="0.7"/>
</svg>
