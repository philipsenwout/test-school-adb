<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <text x="400" y="28" text-anchor="middle" fill="#2d2d4e" font-size="16" font-weight="bold">Statistieken — berekeningen op de array</text>

  <!-- Stats panel -->
  <rect x="20" y="45" width="760" height="110" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="40" y="72" fill="#2d2d4e" font-size="14" font-weight="bold">📊 Statistieken</text>

  <!-- Stat 1 -->
  <rect x="40" y="83" width="155" height="55" rx="8" fill="#6c63ff" fill-opacity="0.1" stroke="#6c63ff" stroke-width="1"/>
  <text x="118" y="103" text-anchor="middle" fill="#6c63ff" font-size="10">Totaal recepten</text>
  <text x="118" y="128" text-anchor="middle" fill="#6c63ff" font-size="26" font-weight="bold">4</text>

  <!-- Stat 2 -->
  <rect x="210" y="83" width="155" height="55" rx="8" fill="#43e97b" fill-opacity="0.1" stroke="#43e97b" stroke-width="1"/>
  <text x="287" y="103" text-anchor="middle" fill="#43e97b" font-size="10">Gemiddelde tijd</text>
  <text x="287" y="128" text-anchor="middle" fill="#43e97b" font-size="26" font-weight="bold">23 min</text>

  <!-- Stat 3 -->
  <rect x="380" y="83" width="155" height="55" rx="8" fill="#f9a825" fill-opacity="0.1" stroke="#f9a825" stroke-width="1"/>
  <text x="457" y="103" text-anchor="middle" fill="#f9a825" font-size="10">Snelste recept</text>
  <text x="457" y="118" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold">Nachos</text>
  <text x="457" y="133" text-anchor="middle" fill="#f9a825" font-size="11">10 min</text>

  <!-- Stat 4 -->
  <rect x="550" y="83" width="215" height="55" rx="8" fill="#ff6b6b" fill-opacity="0.1" stroke="#ff6b6b" stroke-width="1"/>
  <text x="657" y="103" text-anchor="middle" fill="#ff6b6b" font-size="10">Populairste categorie</text>
  <text x="657" y="128" text-anchor="middle" fill="#3498db" font-size="18" font-weight="bold">hoofdgerecht (2×)</text>

  <!-- Code blocks -->
  <rect x="20" y="168" width="370" height="145" rx="8" fill="#1a1a2e"/>
  <text x="40" y="189" fill="#888" font-size="11" font-family="'Courier New', monospace">// Totaal</text>
  <text x="40" y="207" fill="#43e97b" font-size="11" font-family="'Courier New', monospace">alleRecepten.<tspan fill="#f9a825">length</tspan>  <tspan fill="#888">// 4</tspan></text>

  <text x="40" y="228" fill="#888" font-size="11" font-family="'Courier New', monospace">// Gemiddelde bereidingstijd</text>
  <text x="40" y="246" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">const som = alleRecepten.<tspan fill="#f9a825">reduce</tspan>(</text>
  <text x="40" y="262" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">  (acc, r) =&gt; acc + r.bereidingstijd, 0);</text>
  <text x="40" y="278" fill="#43e97b" font-size="11" font-family="'Courier New', monospace">const gem = <tspan fill="#f9a825">Math.round</tspan>(som / alleRecepten.length);</text>
  <text x="40" y="295" fill="#888" font-size="11" font-family="'Courier New', monospace">// → 23</text>

  <rect x="410" y="168" width="370" height="145" rx="8" fill="#1a1a2e"/>
  <text x="430" y="189" fill="#888" font-size="11" font-family="'Courier New', monospace">// Snelste recept</text>
  <text x="430" y="207" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">const snelste = alleRecepten.<tspan fill="#f9a825">reduce</tspan>(</text>
  <text x="430" y="223" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">  (min, r) =&gt; r.bereidingstijd &lt; min.bereidingstijd ? r : min</text>
  <text x="430" y="239" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">);</text>
  <text x="430" y="258" fill="#888" font-size="11" font-family="'Courier New', monospace">// Populairste categorie</text>
  <text x="430" y="276" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">const tellers = &#123;&#125;;</text>
  <text x="430" y="292" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">alleRecepten.<tspan fill="#f9a825">forEach</tspan>(r =&gt; tellers[r.categorie] = (tellers[r.categorie] || 0) + 1);</text>

  <!-- Live update note -->
  <rect x="20" y="325" width="760" height="50" rx="8" fill="#f0f4ff" stroke="#6c63ff" stroke-width="1"/>
  <text x="400" y="348" text-anchor="middle" fill="#6c63ff" font-size="13" font-weight="bold">Statistieken worden herberekend bij elke toonRecepten() aanroep</text>
  <text x="400" y="365" text-anchor="middle" fill="#888" font-size="11">→ altijd actueel, ook na toevoegen of verwijderen van een recept</text>

  <!-- updateStatistieken code -->
  <rect x="20" y="385" width="760" height="80" rx="8" fill="#1a1a2e"/>
  <text x="40" y="406" fill="#888" font-size="11" font-family="'Courier New', monospace">function updateStatistieken() &#123;</text>
  <text x="40" y="424" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">  totaalEl.<tspan fill="#6c63ff">textContent</tspan> = alleRecepten.length;  gemEl.<tspan fill="#6c63ff">textContent</tspan> = <tspan fill="#43e97b">`${gem} min`</tspan>;  snelsteEl.<tspan fill="#6c63ff">textContent</tspan> = snelste.naam;</text>
  <text x="40" y="442" fill="#888" font-size="11" font-family="'Courier New', monospace">&#125;  // wordt aangeroepen op het einde van toonRecepten()</text>
  <text x="40" y="456" fill="#e8e8f0" font-size="11" font-family="'Courier New', monospace">receptenSectie.<tspan fill="#6c63ff">addEventListener</tspan>(<tspan fill="#43e97b">'receptenUpdate'</tspan>, () =&gt; &#123; toonRecepten(); <tspan fill="#6c63ff">updateStatistieken</tspan>(); &#125;);</text>
</svg>
