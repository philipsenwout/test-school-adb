<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#f0f4ff"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2d4e">Een class is een blauwdruk voor objecten</text>

  <!-- Blueprint box -->
  <rect x="40" y="70" width="240" height="200" rx="10" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>
  <!-- Grid lines on blueprint -->
  <line x1="40" y1="100" x2="280" y2="100" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="130" x2="280" y2="130" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="160" x2="280" y2="160" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="190" x2="280" y2="190" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="220" x2="280" y2="220" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="70" x2="100" y2="270" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="160" y1="70" x2="160" y2="270" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="70" x2="220" y2="270" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Blueprint label -->
  <rect x="60" y="85" width="160" height="28" rx="4" fill="#6c63ff" opacity="0.2"/>
  <text x="140" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#6c63ff">class Auto { }</text>
  <!-- Blueprint properties -->
  <text x="60" y="140" font-size="12" fill="#43e97b">  #merk</text>
  <text x="60" y="158" font-size="12" fill="#43e97b">  #kleur</text>
  <text x="60" y="176" font-size="12" fill="#43e97b">  #snelheid</text>
  <line x1="55" y1="185" x2="265" y2="185" stroke="#888" stroke-width="1" opacity="0.5"/>
  <text x="60" y="203" font-size="12" fill="#f9a825">  rijd()</text>
  <text x="60" y="221" font-size="12" fill="#f9a825">  rem()</text>
  <text x="60" y="239" font-size="12" fill="#f9a825">  toeter()</text>
  <!-- Blueprint label bottom -->
  <text x="160" y="262" text-anchor="middle" font-size="11" fill="#888" font-style="italic">BLAUWDRUK</text>

  <!-- Arrows from blueprint to instances -->
  <line x1="280" y1="170" x2="470" y2="130" stroke="#6c63ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="170" x2="470" y2="230" stroke="#6c63ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="170" x2="470" y2="335" stroke="#6c63ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>

  <!-- new Auto() label on arrows -->
  <text x="355" y="115" text-anchor="middle" font-size="11" fill="#6c63ff" transform="rotate(-10,355,115)">new Auto()</text>
  <text x="358" y="210" text-anchor="middle" font-size="11" fill="#6c63ff">new Auto()</text>
  <text x="355" y="280" text-anchor="middle" font-size="11" fill="#6c63ff" transform="rotate(10,355,280)">new Auto()</text>

  <!-- Instance 1 -->
  <rect x="470" y="80" width="200" height="100" rx="10" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <!-- Car icon simple -->
  <rect x="490" y="110" width="60" height="30" rx="6" fill="#6c63ff" opacity="0.7"/>
  <rect x="498" y="100" width="42" height="16" rx="4" fill="#6c63ff" opacity="0.5"/>
  <circle cx="500" cy="143" r="7" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <circle cx="540" cy="143" r="7" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="620" y="128" font-size="12" fill="#2d2d4e" font-weight="600">auto1</text>
  <text x="620" y="146" font-size="11" fill="#888">merk: "Toyota"</text>
  <text x="620" y="162" font-size="11" fill="#888">kleur: "rood"</text>

  <!-- Instance 2 -->
  <rect x="470" y="195" width="200" height="100" rx="10" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <rect x="490" y="225" width="60" height="30" rx="6" fill="#6c63ff" opacity="0.7"/>
  <rect x="498" y="215" width="42" height="16" rx="4" fill="#6c63ff" opacity="0.5"/>
  <circle cx="500" cy="258" r="7" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <circle cx="540" cy="258" r="7" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="620" y="243" font-size="12" fill="#2d2d4e" font-weight="600">auto2</text>
  <text x="620" y="261" font-size="11" fill="#888">merk: "BMW"</text>
  <text x="620" y="277" font-size="11" fill="#888">kleur: "blauw"</text>

  <!-- Instance 3 -->
  <rect x="470" y="308" width="200" height="100" rx="10" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <rect x="490" y="338" width="60" height="30" rx="6" fill="#6c63ff" opacity="0.7"/>
  <rect x="498" y="328" width="42" height="16" rx="4" fill="#6c63ff" opacity="0.5"/>
  <circle cx="500" cy="371" r="7" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <circle cx="540" cy="371" r="7" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="620" y="356" font-size="12" fill="#2d2d4e" font-weight="600">auto3</text>
  <text x="620" y="374" font-size="11" fill="#888">merk: "Volvo"</text>
  <text x="620" y="390" font-size="11" fill="#888">kleur: "wit"</text>

  <!-- Labels below -->
  <text x="160" y="300" text-anchor="middle" font-size="13" fill="#2d2d4e" font-weight="600">1 blauwdruk (class)</text>
  <text x="570" y="438" text-anchor="middle" font-size="13" fill="#2d2d4e" font-weight="600">3 instanties (objects)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>

  <!-- Legend bar -->
  <rect x="40" y="430" width="720" height="36" rx="6" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="452" text-anchor="middle" font-size="12" fill="#2d2d4e">Elke instantie heeft dezelfde structuur maar eigen waarden — gemaakt met <tspan font-weight="700" fill="#6c63ff">new Auto()</tspan></text>
</svg>
