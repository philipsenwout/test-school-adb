<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#f0f0f0"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">index.html</text>

  <!-- Hero section: dark-blue to purple gradient, height ~40vh of 516px = ~206px -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003087;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6b21a8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="44" width="900" height="220" fill="url(#heroGrad)"/>

  <!-- Centered text on hero -->
  <text x="450" y="148" text-anchor="middle" font-size="36" font-weight="bold" fill="#ffffff">Welkom bij TechSchool</text>
  <text x="450" y="192" text-anchor="middle" font-size="18" fill="#e0e0ff">Leer programmeren, netwerken en databeheer</text>
  <rect x="350" y="210" width="200" height="36" fill="rgba(255,255,255,0.15)" rx="6" stroke="#ffffff" stroke-width="1"/>
  <text x="450" y="233" text-anchor="middle" font-size="15" fill="#ffffff">Meer info</text>

  <!-- Content below hero -->
  <text x="40" y="310" font-size="22" font-weight="bold" fill="#003087">Onze vakken</text>
  <text x="40" y="340" font-size="15" fill="#333">Ontdek ons breed aanbod van technische vakken voor 5e en 6e jaar ADB.</text>
</svg>
