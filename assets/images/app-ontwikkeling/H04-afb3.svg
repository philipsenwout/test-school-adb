<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="360" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Vier soorten links in HTML</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Overzicht van alle link-types en wanneer je ze gebruikt</text>

  <!-- Kolom 1: Interne link -->
  <rect x="20" y="60" width="175" height="175" rx="8" fill="#3b5bdb" opacity="0.15" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="107" y="82" text-anchor="middle" font-size="13" fill="#74c0fc" font-weight="bold">Interne link</text>
  <text x="107" y="100" text-anchor="middle" font-size="10" fill="#888">Naar eigen pagina</text>
  <rect x="30" y="108" width="155" height="36" rx="3" fill="#0d1117"/>
  <text x="40" y="121" font-size="9" font-family="Courier New" fill="#79c0ff">&lt;a href=</text>
  <text x="40" y="135" font-size="9" font-family="Courier New" fill="#a8ff7a">  "over.html"</text>
  <text x="40" y="149" font-size="9" font-family="Courier New" fill="#79c0ff">&gt;Over ons&lt;/a&gt;</text>
  <text x="107" y="170" text-anchor="middle" font-size="10" fill="#aaa">Relatief pad</text>
  <text x="107" y="186" text-anchor="middle" font-size="10" fill="#aaa">Geen protocol nodig</text>
  <text x="107" y="220" text-anchor="middle" font-size="11" fill="#22C55E">✓ Navigatie op website</text>

  <!-- Kolom 2: Externe link -->
  <rect x="210" y="60" width="175" height="175" rx="8" fill="#7B3FE4" opacity="0.15" stroke="#7B3FE4" stroke-width="1.5"/>
  <text x="297" y="82" text-anchor="middle" font-size="13" fill="#c4b5fd" font-weight="bold">Externe link</text>
  <text x="297" y="100" text-anchor="middle" font-size="10" fill="#888">Naar andere website</text>
  <rect x="220" y="108" width="155" height="50" rx="3" fill="#0d1117"/>
  <text x="230" y="121" font-size="9" font-family="Courier New" fill="#79c0ff">&lt;a href=</text>
  <text x="230" y="135" font-size="9" font-family="Courier New" fill="#a8ff7a">  "https://google.be"</text>
  <text x="230" y="149" font-size="9" font-family="Courier New" fill="#79c0ff">  target="_blank"</text>
  <text x="230" y="163" font-size="9" font-family="Courier New" fill="#79c0ff">  rel="noopener"&gt;</text>
  <text x="297" y="185" text-anchor="middle" font-size="10" fill="#aaa">Absoluut pad (https://)</text>
  <text x="297" y="220" text-anchor="middle" font-size="11" fill="#22C55E">✓ Links naar bronnen</text>

  <!-- Kolom 3: Ankerlink -->
  <rect x="400" y="60" width="175" height="175" rx="8" fill="#2D9CDB" opacity="0.15" stroke="#2D9CDB" stroke-width="1.5"/>
  <text x="487" y="82" text-anchor="middle" font-size="13" fill="#67e8f9" font-weight="bold">Ankerlink</text>
  <text x="487" y="100" text-anchor="middle" font-size="10" fill="#888">Naar sectie op pagina</text>
  <rect x="410" y="108" width="155" height="36" rx="3" fill="#0d1117"/>
  <text x="420" y="121" font-size="9" font-family="Courier New" fill="#79c0ff">&lt;a href=</text>
  <text x="420" y="135" font-size="9" font-family="Courier New" fill="#a8ff7a">  "#inleiding"</text>
  <text x="420" y="149" font-size="9" font-family="Courier New" fill="#79c0ff">&gt;Inleiding&lt;/a&gt;</text>
  <text x="487" y="170" text-anchor="middle" font-size="10" fill="#aaa"># + id van het element</text>
  <text x="487" y="186" text-anchor="middle" font-size="10" fill="#aaa">Geen paginalading</text>
  <text x="487" y="220" text-anchor="middle" font-size="11" fill="#22C55E">✓ Inhoudsopgave</text>

  <!-- Kolom 4: E-maillink -->
  <rect x="590" y="60" width="190" height="175" rx="8" fill="#F97316" opacity="0.12" stroke="#F97316" stroke-width="1.5"/>
  <text x="685" y="82" text-anchor="middle" font-size="13" fill="#fdba74" font-weight="bold">E-mail &amp; Telefoon</text>
  <text x="685" y="100" text-anchor="middle" font-size="10" fill="#888">Opent app rechtstreeks</text>
  <rect x="600" y="108" width="170" height="50" rx="3" fill="#0d1117"/>
  <text x="610" y="121" font-size="9" font-family="Courier New" fill="#79c0ff">&lt;a href=</text>
  <text x="610" y="135" font-size="9" font-family="Courier New" fill="#a8ff7a">  "mailto:info@school.be"</text>
  <text x="610" y="149" font-size="9" font-family="Courier New" fill="#79c0ff">&gt;Mail ons&lt;/a&gt;</text>
  <text x="685" y="170" text-anchor="middle" font-size="10" fill="#aaa">tel: voor telefoonnummer</text>
  <text x="685" y="186" text-anchor="middle" font-size="10" fill="#aaa">Opent e-mail/telefoonapp</text>
  <text x="685" y="220" text-anchor="middle" font-size="11" fill="#22C55E">✓ Contactpagina</text>

  <!-- Tabel samenvatting onderaan -->
  <rect x="20" y="250" width="760" height="95" rx="6" fill="#1e2030" stroke="#2a2c3e" stroke-width="1"/>
  <text x="400" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0f0f0">Snelgids</text>
  <!-- Headers -->
  <text x="100" y="286" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">Type</text>
  <text x="280" y="286" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">href begint met</text>
  <text x="520" y="286" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">Wanneer</text>
  <!-- Rijen -->
  <text x="100" y="304" text-anchor="middle" font-size="10" fill="#74c0fc">Intern</text>
  <text x="280" y="304" text-anchor="middle" font-family="Courier New" font-size="10" fill="#a8ff7a">"pagina.html"</text>
  <text x="520" y="304" text-anchor="middle" font-size="10" fill="#aaa">Eigen pagina's op dezelfde site</text>
  <text x="100" y="320" text-anchor="middle" font-size="10" fill="#c4b5fd">Extern</text>
  <text x="280" y="320" text-anchor="middle" font-family="Courier New" font-size="10" fill="#a8ff7a">"https://..."</text>
  <text x="520" y="320" text-anchor="middle" font-size="10" fill="#aaa">Andere websites</text>
  <text x="100" y="336" text-anchor="middle" font-size="10" fill="#67e8f9">Anker</text>
  <text x="280" y="336" text-anchor="middle" font-family="Courier New" font-size="10" fill="#a8ff7a">"#sectie-id"</text>
  <text x="520" y="336" text-anchor="middle" font-size="10" fill="#aaa">Sectie op dezelfde pagina</text>
</svg>
