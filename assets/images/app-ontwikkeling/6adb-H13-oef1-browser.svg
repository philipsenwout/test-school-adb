<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="40" rx="8" fill="#2d2d2d"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="100" y="8" width="500" height="24" rx="12" fill="#1a1a1a"/>
  <text x="350" y="24" text-anchor="middle" fill="#888" font-size="12">localhost/receptenapp/</text>

  <!-- Page -->
  <rect x="0" y="40" width="800" height="440" fill="#f8f9ff"/>

  <!-- Header -->
  <rect x="0" y="40" width="800" height="55" fill="#1a1a2e"/>
  <text x="30" y="73" fill="white" font-size="18" font-weight="bold">🍽 Mijn Recepten</text>
  <text x="650" y="65" fill="#aaa" font-size="13">Overzicht</text>
  <text x="720" y="65" fill="#6c63ff" font-size="13">Toevoegen</text>

  <!-- Filter zone -->
  <rect x="20" y="110" width="760" height="50" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="35" y="133" fill="#2d2d4e" font-size="12" font-weight="bold">Filter:</text>

  <!-- Checkbox Hoofdgerecht CHECKED -->
  <rect x="95" y="120" width="14" height="14" rx="3" fill="#3498db"/>
  <text x="95" y="132" fill="white" font-size="10" font-weight="bold">✓</text>
  <text x="115" y="132" fill="#3498db" font-size="12" font-weight="bold">Hoofdgerecht</text>

  <!-- Checkbox Dessert CHECKED -->
  <rect x="240" y="120" width="14" height="14" rx="3" fill="#9b59b6"/>
  <text x="240" y="132" fill="white" font-size="10" font-weight="bold">✓</text>
  <text x="260" y="132" fill="#9b59b6" font-size="12" font-weight="bold">Dessert</text>

  <!-- Checkbox Voorgerecht UNCHECKED -->
  <rect x="360" y="120" width="14" height="14" rx="3" fill="white" stroke="#ccc" stroke-width="1.5"/>
  <text x="380" y="132" fill="#999" font-size="12">Voorgerecht</text>

  <!-- Checkbox Snack UNCHECKED -->
  <rect x="490" y="120" width="14" height="14" rx="3" fill="white" stroke="#ccc" stroke-width="1.5"/>
  <text x="510" y="132" fill="#999" font-size="12">Snack</text>

  <!-- Status -->
  <text x="660" y="133" fill="#6c63ff" font-size="11">2 van 4 actief</text>

  <!-- Card 1: hoofdgerecht -->
  <rect x="100" y="180" width="260" height="160" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="100" y="180" width="5" height="160" rx="2" fill="#3498db"/>
  <text x="120" y="207" fill="#2d2d4e" font-size="14" font-weight="bold">Spaghetti carbonara</text>
  <text x="120" y="228" fill="#888" font-size="11">Klassieke pasta met ei en spek.</text>
  <rect x="120" y="255" width="76" height="18" rx="9" fill="#3498db" fill-opacity="0.15"/>
  <text x="158" y="268" text-anchor="middle" fill="#3498db" font-size="10" font-weight="bold">hoofdgerecht</text>
  <text x="240" y="268" fill="#888" font-size="11">⏱ 25 min</text>
  <text x="350" y="195" text-anchor="end" fill="#999" font-size="18">🗑</text>

  <!-- Card 2: dessert -->
  <rect x="440" y="180" width="260" height="160" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="440" y="180" width="5" height="160" rx="2" fill="#9b59b6"/>
  <text x="460" y="207" fill="#2d2d4e" font-size="14" font-weight="bold">Tiramisu</text>
  <text x="460" y="228" fill="#888" font-size="11">Italiaans dessert met mascarpone.</text>
  <rect x="460" y="255" width="50" height="18" rx="9" fill="#9b59b6" fill-opacity="0.15"/>
  <text x="485" y="268" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="bold">dessert</text>
  <text x="555" y="268" fill="#888" font-size="11">⏱ 40 min</text>
  <text x="690" y="195" text-anchor="end" fill="#999" font-size="18">🗑</text>

  <!-- Info bar -->
  <rect x="20" y="360" width="760" height="36" rx="8" fill="#6c63ff" fill-opacity="0.1" stroke="#6c63ff" stroke-width="1"/>
  <text x="400" y="382" text-anchor="middle" fill="#6c63ff" font-size="13">2 recepten gevonden — 2 categorieën verborgen (voorgerecht, snack)</text>

  <!-- Statistics -->
  <rect x="20" y="410" width="760" height="55" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="40" y="432" fill="#888" font-size="12" font-weight="bold">Statistieken:</text>
  <text x="40" y="452" fill="#2d2d4e" font-size="11">🍽 Totaal: 4 recepten</text>
  <text x="240" y="452" fill="#2d2d4e" font-size="11">⚡ Snelste: Nachos (10 min)</text>
  <text x="500" y="452" fill="#2d2d4e" font-size="11">⏱ Gemiddeld: 23 min</text>
</svg>
