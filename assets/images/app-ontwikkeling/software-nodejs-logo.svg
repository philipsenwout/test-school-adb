<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#417e38;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5aa232;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#node-grad)"/>
  <!-- Node.js hexagon shape simplified -->
  <polygon points="50,8 86,28 86,72 50,92 14,72 14,28"
           fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- N letter -->
  <text x="50" y="65" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="48" font-weight="700" fill="white" letter-spacing="-2">N</text>
  <!-- Dot accent -->
  <circle cx="74" cy="70" r="5" fill="#8dc63f"/>
</svg>
