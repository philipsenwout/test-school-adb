<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">typeconversie.html</text>

  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="90" font-size="12" fill="#94a3b8">// Expliciete typeconversie</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Number(</tspan><tspan fill="#ff6b35">"42"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="138" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Number(</tspan><tspan fill="#ff6b35">"3.14"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="161" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Number(</tspan><tspan fill="#ff6b35">true</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="184" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Number(</tspan><tspan fill="#ff6b35">"hallo"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="220" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(parseInt(</tspan><tspan fill="#ff6b35">"42px"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="243" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(parseFloat(</tspan><tspan fill="#ff6b35">"3.14m"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="279" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(String(</tspan><tspan fill="#ff6b35">42</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="302" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Boolean(</tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="325" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(Boolean(</tspan><tspan fill="#ff6b35">"hallo"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="40" y="365" font-size="12" fill="#94a3b8">// Impliciete conversie (gevaarlijk)</text>
  <text x="40" y="388" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"5"</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#ff6b35">3</tspan><tspan fill="#ffffff">);</tspan><tspan fill="#94a3b8">   // "53"!</tspan></text>
  <text x="40" y="411" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"10"</tspan><tspan fill="#ffffff"> - </tspan><tspan fill="#ff6b35">3</tspan><tspan fill="#ffffff">);</tspan><tspan fill="#94a3b8">  // 7</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="600" y="115" font-size="12" fill="#94a3b8">// Number()</text>
  <text x="600" y="140" font-size="15" font-family="monospace" fill="#39ff14">42</text><text x="640" y="140" font-size="13" fill="#94a3b8">← "42" → 42</text>
  <line x1="600" y1="152" x2="1160" y2="152" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="175" font-size="15" font-family="monospace" fill="#39ff14">3.14</text><text x="660" y="175" font-size="13" fill="#94a3b8">← "3.14" → 3.14</text>
  <line x1="600" y1="187" x2="1160" y2="187" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="210" font-size="15" font-family="monospace" fill="#39ff14">1</text><text x="640" y="210" font-size="13" fill="#94a3b8">← true → 1</text>
  <line x1="600" y1="222" x2="1160" y2="222" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="245" font-size="15" font-family="monospace" fill="#ff6b35">NaN</text><text x="660" y="245" font-size="13" fill="#94a3b8">← "hallo" → NaN (Not a Number)</text>
  <line x1="600" y1="257" x2="1160" y2="257" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="285" font-size="12" fill="#94a3b8">// parseInt / parseFloat</text>
  <text x="600" y="308" font-size="15" font-family="monospace" fill="#39ff14">42</text><text x="640" y="308" font-size="13" fill="#94a3b8">← "42px" → 42 (stopt bij niet-cijfer)</text>
  <line x1="600" y1="320" x2="1160" y2="320" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="343" font-size="15" font-family="monospace" fill="#39ff14">3.14</text><text x="660" y="343" font-size="13" fill="#94a3b8">← "3.14m" → 3.14</text>
  <line x1="600" y1="355" x2="1160" y2="355" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="383" font-size="12" fill="#94a3b8">// String / Boolean</text>
  <text x="600" y="406" font-size="15" font-family="monospace" fill="#39ff14">"42"</text>
  <line x1="600" y1="418" x2="1160" y2="418" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="441" font-size="15" font-family="monospace" fill="#ff6b35">false</text><text x="665" y="441" font-size="13" fill="#94a3b8">← 0 is falsy</text>
  <line x1="600" y1="453" x2="1160" y2="453" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="476" font-size="15" font-family="monospace" fill="#39ff14">true</text><text x="660" y="476" font-size="13" fill="#94a3b8">← niet-lege string is truthy</text>
  <line x1="600" y1="488" x2="1160" y2="488" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="520" font-size="12" fill="#94a3b8">// Impliciete conversie</text>
  <text x="600" y="543" font-size="15" font-family="monospace" fill="#ff6b35">"53"</text><text x="660" y="543" font-size="13" fill="#94a3b8">← + plakt strings aan elkaar!</text>
  <line x1="600" y1="555" x2="1160" y2="555" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="578" font-size="15" font-family="monospace" fill="#39ff14">7</text><text x="640" y="578" font-size="13" fill="#94a3b8">← - converteert naar number</text>

  <rect x="600" y="610" width="560" height="80" rx="6" fill="#2a1a1a" stroke="#ff6b35" stroke-width="1"/>
  <text x="880" y="635" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff6b35">⚠️ Gebruik altijd expliciete conversie!</text>
  <text x="880" y="660" text-anchor="middle" font-size="12" fill="#ffffff">Number("42") is veiliger dan "42" - 0</text>
  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
