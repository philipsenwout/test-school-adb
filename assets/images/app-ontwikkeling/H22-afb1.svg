<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#39ff14"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#00d4ff">if / else — Stroomdiagram</text>
  <text x="600" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#8892a4">Beslissingsstructuur met twee paden</text>

  <!-- START oval -->
  <ellipse cx="600" cy="145" rx="80" ry="34" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="600" y="151" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#00d4ff" font-weight="bold">START</text>

  <!-- Arrow START → diamond -->
  <line x1="600" y1="179" x2="600" y2="228" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Diamond - condition -->
  <polygon points="600,240 740,310 600,380 460,310" fill="#1a1f2e" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="600" y="303" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#ffffff">voorwaarde</text>
  <text x="600" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#00d4ff" font-weight="bold">punt &gt;= 50 ?</text>

  <!-- TRUE label -->
  <text x="785" y="308" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#39ff14" font-weight="bold">JA (true)</text>

  <!-- FALSE label -->
  <text x="415" y="308" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#ff6b35" font-weight="bold">NEE (false)</text>

  <!-- Arrow → if-block (right) -->
  <line x1="740" y1="310" x2="870" y2="310" stroke="#39ff14" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Arrow → else-block (left) -->
  <line x1="460" y1="310" x2="330" y2="310" stroke="#ff6b35" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- IF block (right - green) -->
  <rect x="870" y="265" width="240" height="90" rx="10" fill="#0d2e1a" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <text x="990" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#39ff14" font-weight="bold">if-blok</text>
  <text x="990" y="322" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#a8d5b5">"Geslaagd!"</text>
  <text x="990" y="342" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#6b8f78">console.log(...)</text>

  <!-- ELSE block (left - orange) -->
  <rect x="90" y="265" width="240" height="90" rx="10" fill="#2e1a0d" stroke="#ff6b35" stroke-width="2.5" filter="url(#glow-orange)"/>
  <text x="210" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35" font-weight="bold">else-blok</text>
  <text x="210" y="322" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#d5a882">"Niet geslaagd."</text>
  <text x="210" y="342" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#8f7a6b">console.log(...)</text>

  <!-- Arrow from if-block down -->
  <line x1="990" y1="355" x2="990" y2="490" stroke="#39ff14" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="990" y1="490" x2="600" y2="490" stroke="#39ff14" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="600" y1="490" x2="600" y2="528" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Arrow from else-block down -->
  <line x1="210" y1="355" x2="210" y2="490" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="210" y1="490" x2="600" y2="490" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Join label -->
  <text x="600" y="516" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#8892a4">samenvoegen</text>

  <!-- END oval -->
  <ellipse cx="600" cy="565" rx="80" ry="34" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
  <text x="600" y="571" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#00d4ff" font-weight="bold">EINDE</text>

  <!-- Code example box -->
  <rect x="350" y="620" width="500" height="140" rx="12" fill="#12161f" stroke="#2d3448" stroke-width="1.5"/>
  <rect x="350" y="620" width="500" height="28" rx="12" fill="#1e2438"/>
  <rect x="350" y="634" width="500" height="14" fill="#1e2438"/>
  <text x="370" y="640" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">JavaScript</text>
  <text x="370" y="668" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">let</text>
  <text x="406" y="668" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">punt = 48;</text>
  <text x="370" y="692" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">if</text>
  <text x="393" y="692" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">(punt &gt;= 50) {</text>
  <text x="390" y="714" font-family="'Courier New', monospace" font-size="14" fill="#8892a4">  console.log(</text>
  <text x="527" y="714" font-family="'Courier New', monospace" font-size="14" fill="#39ff14">"Geslaagd!"</text>
  <text x="619" y="714" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">);</text>
  <text x="370" y="736" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">} else</text>
  <text x="416" y="736" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">{</text>
  <text x="390" y="752" font-family="'Courier New', monospace" font-size="14" fill="#8892a4">  console.log(</text>
  <text x="527" y="752" font-family="'Courier New', monospace" font-size="14" fill="#ff6b35">"Niet geslaagd."</text>
  <text x="660" y="752" font-family="'Courier New', monospace" font-size="14" fill="#ffffff">);</text>
</svg>
