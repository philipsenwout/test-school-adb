  <text x="536" y="320" text-anchor="end" font-size="11" fill="#74c0fc">&lt;/article&gt;</text>

  <text x="548" y="402" text-anchor="end" font-size="11" fill="#74c0fc">&lt;/main&gt;</text>

  <!-- ASIDE -->
  <rect x="568" y="152" width="172" height="256" rx="4" fill="#3d2b00" stroke="#fd7e14" stroke-width="1.5"/>
