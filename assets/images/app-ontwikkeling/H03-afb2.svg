  <text x="536" y="240" text-anchor="end" font-size="11" fill="#74c0fc">&lt;/article&gt;</text>

  <!-- ARTICLE 2 -->
  <rect x="76" y="254" width="468" height="72" rx="3" fill="#1c4070" stroke="#339af0" stroke-width="1"/>
  <text x="88" y="269" font-size="11" fill="#74c0fc">&lt;article&gt;</text>
  <text x="104" y="287" font-size="13" font-weight="bold" fill="#e7f5ff">CSS Grid vs. Flexbox</text>
