  <text x="728" y="95" text-anchor="end" font-size="11" fill="#aac4ff">&lt;/header&gt;</text>

  <!-- NAV -->
  <rect x="60" y="108" width="680" height="36" rx="4" fill="#364fc7" stroke="#748ffc" stroke-width="1.5"/>
