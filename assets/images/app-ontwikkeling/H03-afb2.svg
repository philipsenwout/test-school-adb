  <text x="654" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffe8cc">Populaire tags</text>
  <text x="588" y="216" font-size="12" fill="#ffd8a8">• HTML</text>
  <text x="588" y="236" font-size="12" fill="#ffd8a8">• CSS</text>
  <text x="588" y="256" font-size="12" fill="#ffd8a8">• JavaScript</text>
  <text x="588" y="276" font-size="12" fill="#ffd8a8">• Responsive</text>
