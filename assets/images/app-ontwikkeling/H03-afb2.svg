<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="480" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Semantische paginastructuur</text>

  <!-- HEADER -->
  <rect x="60" y="44" width="680" height="56" rx="4" fill="#3b5bdb" stroke="#7c9eff" stroke-width="1.5"/>
