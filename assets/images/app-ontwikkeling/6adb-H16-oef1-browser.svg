  <rect x="598" y="118" width="12" height="12" rx="3" fill="#3498db"/>
  <text x="615" y="129" fill="#3498db" font-size="11">Hfdg.</text>
  <rect x="655" y="118" width="12" height="12" rx="3" fill="#9b59b6"/>
  <text x="672" y="129" fill="#9b59b6" font-size="11">Dessert</text>
  <rect x="718" y="118" width="12" height="12" rx="3" fill="#e74c3c"/>
  <text x="735" y="129" fill="#e74c3c" font-size="11">+</text>

  <!-- Cards row 1 -->
  <rect x="20" y="158" width="235" height="120" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="20" y="158" width="4" height="120" rx="2" fill="#e74c3c"/>
  <text x="36" y="180" fill="#2d2d4e" font-size="12" font-weight="bold">Tomatensoep</text>
  <text x="36" y="196" fill="#888" font-size="10">Romige soep met verse tomaten.</text>
  <rect x="36" y="210" width="66" height="15" rx="7" fill="#e74c3c" fill-opacity="0.15"/>
