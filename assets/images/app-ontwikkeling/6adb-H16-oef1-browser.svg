  <text x="640" y="65" fill="#aaa" font-size="13">Overzicht</text>
  <text x="710" y="65" fill="#6c63ff" font-size="13">Toevoegen</text>

  <!-- Search + filter row -->
  <rect x="20" y="108" width="500" height="36" rx="8" fill="white" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="36" y="130" fill="#888" font-size="13">🔍</text>
  <text x="58" y="130" fill="#999" font-size="13">Zoek een recept…</text>
  <rect x="535" y="108" width="245" height="36" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
