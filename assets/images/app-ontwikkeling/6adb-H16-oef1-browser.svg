  <text x="560" y="221" text-anchor="middle" fill="#9b59b6" font-size="9">dessert</text>
  <text x="610" y="221" fill="#888" font-size="10">⏱ 40 min</text>
  <text x="770" y="173" text-anchor="end" fill="#999" font-size="16">🗑</text>

  <!-- Card row 2 -->
  <rect x="20" y="290" width="235" height="120" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="20" y="290" width="4" height="120" rx="2" fill="#f39c12"/>
  <text x="36" y="312" fill="#2d2d4e" font-size="12" font-weight="bold">Nachos met guac</text>
  <text x="36" y="328" fill="#888" font-size="10">Krokante chips met avocadodip.</text>
  <rect x="36" y="342" width="38" height="15" rx="7" fill="#f39c12" fill-opacity="0.15"/>
  <text x="55" y="353" text-anchor="middle" fill="#f39c12" font-size="9">snack</text>
  <text x="100" y="353" fill="#888" font-size="10">⏱ 10 min</text>
  <text x="245" y="305" text-anchor="end" fill="#999" font-size="16">🗑</text>

  <!-- Stats bar -->
  <rect x="20" y="425" width="760" height="50" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="40" y="445" fill="#888" font-size="12" font-weight="bold">📊 Statistieken:</text>
  <text x="40" y="462" fill="#2d2d4e" font-size="11">🍽 Totaal: 4 recepten</text>
  <text x="220" y="462" fill="#2d2d4e" font-size="11">⚡ Snelste: Nachos (10 min)</text>
  <text x="460" y="462" fill="#2d2d4e" font-size="11">⏱ Gemiddeld: 23 min</text>
  <text x="650" y="462" fill="#2d2d4e" font-size="11">🏆 Hfdg.: 1×</text>

  <!-- Live footer -->
  <rect x="0" y="485" width="800" height="35" fill="#1a1a2e"/>
  <text x="30" y="506" fill="#6c63ff" font-size="11" font-weight="bold">🍽 Recepten App</text>
  <text x="400" y="506" text-anchor="middle" fill="#555" font-size="10">Vanilla JS · ES Modules · localStorage</text>
  <text x="775" y="506" text-anchor="end" fill="#43e97b" font-size="11" font-weight="bold">donderdag 2/4/2026 — 14:35:22</text>
