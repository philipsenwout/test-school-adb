  <text x="376" y="221" fill="#888" font-size="10">⏱ 25 min</text>
  <text x="495" y="173" text-anchor="end" fill="#999" font-size="16">🗑</text>

  <rect x="520" y="158" width="260" height="120" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
