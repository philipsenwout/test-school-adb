  <text x="126" y="221" fill="#888" font-size="10">⏱ 15 min</text>
  <text x="245" y="173" text-anchor="end" fill="#999" font-size="16">🗑</text>

  <rect x="270" y="158" width="235" height="120" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="270" y="158" width="4" height="120" rx="2" fill="#3498db"/>
  <text x="286" y="180" fill="#2d2d4e" font-size="12" font-weight="bold">Spaghetti carbonara</text>
