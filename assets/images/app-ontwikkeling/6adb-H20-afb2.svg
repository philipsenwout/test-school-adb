<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="white">npm workflow — een project opzetten</text>

  <!-- Step blocks with arrows -->
  <!-- Arrow defs -->
  <defs>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>

  <!-- STEP 1: npm init -->
  <rect x="30" y="60" width="170" height="100" rx="12" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <text x="115" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#6c63ff">Stap 1</text>
  <text x="115" y="110" text-anchor="middle" font-size="14" fill="white" font-family="monospace">npm init</text>
  <text x="115" y="130" text-anchor="middle" font-size="11" fill="#888">Terminal in je</text>
  <text x="115" y="146" text-anchor="middle" font-size="11" fill="#888">projectmap</text>

  <!-- Arrow 1→2 -->
  <line x1="204" y1="110" x2="238" y2="110" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- STEP 2: package.json -->
  <rect x="242" y="60" width="170" height="100" rx="12" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <text x="327" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#6c63ff">Stap 2</text>
  <!-- File icon -->
  <rect x="300" y="96" width="24" height="30" rx="2" fill="#f9a825" opacity="0.8"/>
  <polygon points="316,96 324,104 324,96" fill="#1a1a2e" opacity="0.5"/>
  <text x="327" y="138" text-anchor="middle" font-size="11" fill="white" font-family="monospace">package.json</text>
  <text x="327" y="153" text-anchor="middle" font-size="11" fill="#888">aangemaakt ✓</text>

  <!-- Arrow 2→3 -->
  <line x1="416" y1="110" x2="450" y2="110" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- STEP 3: npm install express -->
  <rect x="454" y="60" width="170" height="100" rx="12" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <text x="539" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#6c63ff">Stap 3</text>
  <text x="539" y="108" text-anchor="middle" font-size="12" fill="white" font-family="monospace">npm install</text>
  <text x="539" y="126" text-anchor="middle" font-size="12" fill="#43e97b" font-family="monospace">express</text>
  <!-- Download arrow -->
  <text x="539" y="148" text-anchor="middle" font-size="16">&#11015;</text>

  <!-- Arrow 3→4 -->
  <line x1="628" y1="110" x2="662" y2="110" stroke="#6c63ff" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- STEP 4: node_modules -->
  <rect x="666" y="60" width="104" height="100" rx="12" fill="#6c63ff" fill-opacity="0.18" stroke="#6c63ff" stroke-width="2"/>
  <text x="718" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#6c63ff">Stap 4</text>
  <!-- Folder icon -->
  <rect x="700" y="97" width="36" height="26" rx="3" fill="#f9a825" opacity="0.8"/>
  <rect x="700" y="93" width="16" height="8" rx="2" fill="#f9a825"/>
  <text x="718" y="138" text-anchor="middle" font-size="10" fill="white" font-family="monospace">node_modules/</text>

  <!-- Package.json contents box -->
  <rect x="30" y="185" width="380" height="130" rx="10" fill="#0a0a18" stroke="#f9a825" stroke-width="1.5"/>
  <text x="220" y="208" text-anchor="middle" font-size="12" fill="#f9a825" font-weight="600">&#128196; package.json — inhoud na install</text>
  <text x="50" y="228" font-size="12" fill="#888" font-family="monospace">&#123;</text>
  <text x="68" y="246" font-size="12" fill="#aaa" font-family="monospace">"name": <tspan fill="#43e97b">"mijn-app"</tspan>,</text>
  <text x="68" y="263" font-size="12" fill="#aaa" font-family="monospace">"version": <tspan fill="#43e97b">"1.0.0"</tspan>,</text>
  <text x="68" y="280" font-size="12" fill="#aaa" font-family="monospace">"dependencies": &#123;</text>
  <text x="88" y="297" font-size="12" fill="#f9a825" font-family="monospace">"express": <tspan fill="#43e97b">"^4.18.2"</tspan></text>
  <text x="68" y="308" font-size="12" fill="#888" font-family="monospace">  &#125;</text>
  <text x="50" y="308" font-size="12" fill="#888" font-family="monospace">&#125;</text>

  <!-- .gitignore box -->
  <rect x="430" y="185" width="340" height="130" rx="10" fill="#0a0a18" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="600" y="208" text-anchor="middle" font-size="12" fill="#ff6b6b" font-weight="600">&#128204; .gitignore — nooit committen!</text>
  <!-- node_modules crossed out -->
  <rect x="460" y="220" width="280" height="36" rx="6" fill="#ff6b6b" fill-opacity="0.1"/>
  <text x="600" y="244" text-anchor="middle" font-size="14" fill="#ff6b6b" font-family="monospace">node_modules/</text>
  <!-- Red cross -->
  <circle cx="736" cy="238" r="14" fill="#ff6b6b"/>
  <text x="736" y="244" text-anchor="middle" font-size="16" fill="white">&#10007;</text>
  <text x="600" y="276" text-anchor="middle" font-size="11" fill="#888">node_modules/ bevat honderden bestanden</text>
  <text x="600" y="294" text-anchor="middle" font-size="11" fill="#888">→ te groot voor Git, altijd uitsluiten</text>
  <text x="600" y="310" text-anchor="middle" font-size="11" fill="#43e97b">→ npm install herstelt alles via package.json</text>

  <!-- Bottom workflow summary -->
  <rect x="30" y="334" width="740" height="80" rx="10" fill="#2a2a3e"/>
  <text x="400" y="357" text-anchor="middle" font-size="13" fill="#888">Typische projectstructuur:</text>
  <text x="80" y="378" font-size="12" fill="#f9a825" font-family="monospace">mijn-project/</text>
  <text x="100" y="396" font-size="12" fill="white" font-family="monospace">├── package.json</text>
  <text x="100" y="412" font-size="12" fill="white" font-family="monospace">├── server.js</text>
  <text x="250" y="378" font-size="12" fill="#ff6b6b" font-family="monospace">├── .gitignore     ← bevat: node_modules/</text>
  <text x="250" y="396" font-size="12" fill="#888" font-family="monospace">└── node_modules/  ← NIET in Git!</text>

  <!-- Bottom tip -->
  <rect x="30" y="428" width="740" height="36" rx="8" fill="#43e97b" fill-opacity="0.12" stroke="#43e97b" stroke-width="1"/>
  <text x="400" y="450" text-anchor="middle" font-size="12" fill="#43e97b">Tip: voer npm install uit na git clone — dan worden alle dependencies opnieuw gedownload</text>
</svg>
