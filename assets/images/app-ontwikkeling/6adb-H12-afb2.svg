<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#2d2d4e" font-size="16" font-weight="bold">Recept verwijderen: findIndex() + splice()</text>

  <!-- STAP 1: VOOR -->
  <text x="30" y="65" fill="#6c63ff" font-size="13" font-weight="bold">Stap 1 — VOOR:</text>
  <text x="30" y="82" fill="#888" font-size="11">alleRecepten = [Pasta, Soep, Salade]</text>

  <!-- 3 boxes -->
  <rect x="30" y="90" width="120" height="60" rx="8" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2"/>
  <text x="90" y="116" text-anchor="middle" fill="#888" font-size="10">[0]</text>
  <text x="90" y="135" text-anchor="middle" fill="#2d2d4e" font-size="13" font-weight="bold">Pasta</text>

  <rect x="165" y="90" width="120" height="60" rx="8" fill="#f9a825" fill-opacity="0.2" stroke="#f9a825" stroke-width="2"/>
  <text x="225" y="116" text-anchor="middle" fill="#888" font-size="10">[1]</text>
  <text x="225" y="135" text-anchor="middle" fill="#2d2d4e" font-size="13" font-weight="bold">Soep</text>

  <rect x="300" y="90" width="120" height="60" rx="8" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2"/>
  <text x="360" y="116" text-anchor="middle" fill="#888" font-size="10">[2]</text>
  <text x="360" y="135" text-anchor="middle" fill="#2d2d4e" font-size="13" font-weight="bold">Salade</text>

  <!-- findIndex annotation -->
  <line x1="225" y1="150" x2="225" y2="175" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="130" y="175" width="190" height="30" rx="6" fill="#f9a825" fill-opacity="0.2" stroke="#f9a825" stroke-width="1"/>
  <text x="225" y="195" text-anchor="middle" fill="#2d2d4e" font-size="11" font-family="'Courier New', monospace">findIndex(r =&gt; r.naam === 'Soep')</text>
  <text x="440" y="195" fill="#f9a825" font-size="13" font-weight="bold">→ index 1</text>

  <!-- STAP 2: VERWIJDEREN -->
  <text x="30" y="240" fill="#ff6b6b" font-size="13" font-weight="bold">Stap 2 — VERWIJDEREN:</text>
  <text x="30" y="257" fill="#888" font-size="11" font-family="'Courier New', monospace">alleRecepten.splice(1, 1)  ← verwijder 1 element op index 1</text>

  <rect x="165" y="265" width="120" height="60" rx="8" fill="#ff6b6b" fill-opacity="0.2" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6"/>
  <text x="225" y="291" text-anchor="middle" fill="#ff6b6b" font-size="11">[1] ✗</text>
  <text x="225" y="310" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold" text-decoration="line-through">Soep</text>
  <line x1="155" y1="255" x2="155" y2="335" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4" opacity="0.5"/>
  <line x1="295" y1="255" x2="295" y2="335" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4" opacity="0.5"/>

  <!-- STAP 3: NA -->
  <text x="490" y="65" fill="#43e97b" font-size="13" font-weight="bold">Stap 3 — NA:</text>
  <text x="490" y="82" fill="#888" font-size="11">alleRecepten = [Pasta, Salade]</text>

  <rect x="490" y="90" width="120" height="60" rx="8" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2"/>
  <text x="550" y="116" text-anchor="middle" fill="#888" font-size="10">[0]</text>
  <text x="550" y="135" text-anchor="middle" fill="#2d2d4e" font-size="13" font-weight="bold">Pasta</text>

  <rect x="625" y="90" width="120" height="60" rx="8" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2"/>
  <text x="685" y="116" text-anchor="middle" fill="#888" font-size="10">[1]</text>
  <text x="685" y="135" text-anchor="middle" fill="#2d2d4e" font-size="13" font-weight="bold">Salade</text>

  <!-- Arrow between stap 1 and stap 3 -->
  <line x1="430" y1="120" x2="480" y2="120" stroke="#43e97b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="112" text-anchor="middle" fill="#43e97b" font-size="10">na splice</text>

  <!-- updateLS + dispatchEvent -->
  <rect x="490" y="175" width="280" height="70" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1"/>
  <text x="630" y="200" text-anchor="middle" fill="#e8e8f0" font-size="12" font-weight="bold">Na verwijdering:</text>
  <text x="510" y="220" fill="#43e97b" font-size="11" font-family="'Courier New', monospace">updateLS(alleRecepten);  // localStorage bijwerken</text>
  <text x="510" y="238" fill="#6c63ff" font-size="11" font-family="'Courier New', monospace">receptenSectie.dispatchEvent(update);  // UI verversen</text>

  <!-- Bottom note -->
  <rect x="30" y="355" width="740" height="45" rx="8" fill="#43e97b" fill-opacity="0.1" stroke="#43e97b" stroke-width="1"/>
  <text x="400" y="375" text-anchor="middle" fill="#2d2d4e" font-size="12">💡 splice() muteert de originele array. Het verwijderde element wordt teruggegeven: </text>
  <text x="400" y="393" text-anchor="middle" fill="#6c63ff" font-size="11" font-family="'Courier New', monospace">const verwijderd = alleRecepten.splice(index, 1)[0];  // bewaar voor undo!</text>
</svg>
