<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#1a1c28"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#f0f0f0">Tabelstructuur — thead, tbody en tfoot</text>
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#888899">Een HTML-tabel is opgedeeld in drie semantische zones</text>

  <!-- Tabel structuur visueel -->
  <rect x="100" y="58" width="600" height="320" rx="8" fill="none" stroke="#7B3FE4" stroke-width="2"/>
  <text x="60" y="80" font-size="12" fill="#7B3FE4">&lt;table&gt;</text>

  <!-- thead -->
  <rect x="115" y="68" width="570" height="65" rx="5" fill="#7B3FE4" opacity="0.45"/>
  <text x="130" y="88" font-size="12" fill="#e0d0ff">&lt;thead&gt;</text>
  <rect x="130" y="93" width="540" height="32" rx="4" fill="#7B3FE4" opacity="0.65"/>
  <text x="400" y="114" text-anchor="middle" font-size="12" fill="white">&lt;th&gt;Naam&lt;/th&gt;  |  &lt;th&gt;Punten&lt;/th&gt;  |  &lt;th&gt;Assists&lt;/th&gt;</text>
  <text x="130" y="127" font-size="12" fill="#e0d0ff">&lt;/thead&gt;</text>
  <!-- Label rechts -->
  <rect x="710" y="78" width="75" height="24" rx="4" fill="#7B3FE4" opacity="0.7"/>
  <text x="747" y="94" text-anchor="middle" font-size="10" fill="white">Koprij(en)</text>

  <!-- tbody -->
  <rect x="115" y="138" width="570" height="145" rx="5" fill="#2D9CDB" opacity="0.18"/>
  <text x="130" y="158" font-size="12" fill="#a0d8ef">&lt;tbody&gt;</text>

  <rect x="130" y="163" width="540" height="28" rx="4" fill="#2D9CDB" opacity="0.4"/>
  <text x="400" y="181" text-anchor="middle" font-size="12" fill="white">&lt;td&gt;Sander&lt;/td&gt;  |  &lt;td&gt;25&lt;/td&gt;  |  &lt;td&gt;8&lt;/td&gt;</text>

  <rect x="130" y="196" width="540" height="28" rx="4" fill="#2D9CDB" opacity="0.3"/>
  <text x="400" y="214" text-anchor="middle" font-size="12" fill="white">&lt;td&gt;Thomas&lt;/td&gt;  |  &lt;td&gt;18&lt;/td&gt;  |  &lt;td&gt;12&lt;/td&gt;</text>

  <rect x="130" y="229" width="540" height="28" rx="4" fill="#2D9CDB" opacity="0.2"/>
  <text x="400" y="247" text-anchor="middle" font-size="12" fill="white">&lt;td&gt;Lore&lt;/td&gt;  |  &lt;td&gt;22&lt;/td&gt;  |  &lt;td&gt;15&lt;/td&gt;</text>

  <text x="130" y="275" font-size="12" fill="#a0d8ef">&lt;/tbody&gt;</text>
  <!-- Label rechts -->
  <rect x="710" y="195" width="75" height="24" rx="4" fill="#2D9CDB" opacity="0.7"/>
  <text x="747" y="211" text-anchor="middle" font-size="10" fill="white">Datarijen</text>

  <!-- tfoot -->
  <rect x="115" y="288" width="570" height="80" rx="5" fill="#22C55E" opacity="0.18"/>
  <text x="130" y="308" font-size="12" fill="#a0ffb0">&lt;tfoot&gt;</text>
  <rect x="130" y="313" width="540" height="30" rx="4" fill="#22C55E" opacity="0.35"/>
  <text x="400" y="332" text-anchor="middle" font-size="12" fill="white">&lt;td colspan="2"&gt;Teamtotalen&lt;/td&gt;  |  &lt;td&gt;65 assists&lt;/td&gt;</text>
  <text x="130" y="358" font-size="12" fill="#a0ffb0">&lt;/tfoot&gt;</text>
  <!-- Label rechts -->
  <rect x="710" y="312" width="75" height="24" rx="4" fill="#22C55E" opacity="0.7"/>
  <text x="747" y="328" text-anchor="middle" font-size="10" fill="white">Totaalrij</text>

  <text x="60" y="382" font-size="12" fill="#7B3FE4">&lt;/table&gt;</text>
  <text x="400" y="395" text-anchor="middle" font-size="10" fill="#666">Gebruik scope="col" op &lt;th&gt; voor betere toegankelijkheid via screenreader</text>
</svg>
