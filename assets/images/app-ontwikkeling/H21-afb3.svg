<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">Truthy en Falsy in JavaScript</text>
  <text x="600" y="85" text-anchor="middle" font-size="16" fill="#94a3b8">Elke waarde in JS is ofwel truthy of falsy — niet alleen true/false</text>

  <!-- FALSY left -->
  <rect x="40" y="110" width="520" height="580" rx="12" fill="#1e1e2e" stroke="#ff6b35" stroke-width="2"/>
  <rect x="40" y="110" width="520" height="52" rx="12" fill="#ff6b35"/>
  <rect x="40" y="140" width="520" height="22" fill="#ff6b35"/>
  <text x="300" y="145" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">FALSY</text>
  <text x="300" y="175" text-anchor="middle" font-size="14" fill="#ff6b35">Gedraagt zich als false in een if-statement</text>

  <!-- falsy values -->
  <rect x="65" y="195" width="470" height="52" rx="8" fill="#2a1a1a"/>
  <text x="185" y="227" font-size="22" font-family="monospace" fill="#ff8c42">false</text>
  <text x="380" y="227" font-size="14" fill="#94a3b8">de boolean false zelf</text>

  <rect x="65" y="257" width="470" height="52" rx="8" fill="#2a1a1a"/>
  <text x="185" y="289" font-size="22" font-family="monospace" fill="#ff8c42">0</text>
  <text x="380" y="289" font-size="14" fill="#94a3b8">het getal nul</text>

  <rect x="65" y="319" width="470" height="52" rx="8" fill="#2a1a1a"/>
  <text x="185" y="351" font-size="22" font-family="monospace" fill="#ff8c42">""  of  ''</text>
  <text x="380" y="351" font-size="14" fill="#94a3b8">lege string</text>

  <rect x="65" y="381" width="470" height="52" rx="8" fill="#2a1a1a"/>
  <text x="185" y="413" font-size="22" font-family="monospace" fill="#ff8c42">null</text>
  <text x="380" y="413" font-size="14" fill="#94a3b8">opzettelijk leeg</text>

  <rect x="65" y="443" width="470" height="52" rx="8" fill="#2a1a1a"/>
  <text x="185" y="475" font-size="22" font-family="monospace" fill="#ff8c42">undefined</text>
  <text x="380" y="475" font-size="14" fill="#94a3b8">niet geïnitialiseerd</text>

  <rect x="65" y="505" width="470" height="52" rx="8" fill="#2a1a1a"/>
  <text x="185" y="537" font-size="22" font-family="monospace" fill="#ff8c42">NaN</text>
  <text x="380" y="537" font-size="14" fill="#94a3b8">Not a Number</text>

  <rect x="65" y="580" width="470" height="80" rx="8" fill="#3a1a1a"/>
  <text x="300" y="608" text-anchor="middle" font-size="13" font-family="monospace" fill="#ff8c42">if (0) { }       // wordt niet uitgevoerd</text>
  <text x="300" y="630" text-anchor="middle" font-size="13" font-family="monospace" fill="#ff8c42">if ("") { }      // wordt niet uitgevoerd</text>
  <text x="300" y="652" text-anchor="middle" font-size="13" font-family="monospace" fill="#ff8c42">if (null) { }    // wordt niet uitgevoerd</text>

  <!-- TRUTHY right -->
  <rect x="640" y="110" width="520" height="580" rx="12" fill="#1e1e2e" stroke="#39ff14" stroke-width="2"/>
  <rect x="640" y="110" width="520" height="52" rx="12" fill="#39ff14"/>
  <rect x="640" y="140" width="520" height="22" fill="#39ff14"/>
  <text x="900" y="145" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f1117">TRUTHY</text>
  <text x="900" y="175" text-anchor="middle" font-size="14" fill="#39ff14">Alles wat NIET falsy is → is truthy</text>

  <!-- truthy values -->
  <rect x="665" y="195" width="470" height="52" rx="8" fill="#1a2a1a"/>
  <text x="785" y="227" font-size="22" font-family="monospace" fill="#39ff14">true</text>
  <text x="960" y="227" font-size="14" fill="#94a3b8">de boolean true</text>

  <rect x="665" y="257" width="470" height="52" rx="8" fill="#1a2a1a"/>
  <text x="785" y="289" font-size="22" font-family="monospace" fill="#39ff14">1  -1  3.14</text>
  <text x="960" y="289" font-size="14" fill="#94a3b8">elk getal ≠ 0</text>

  <rect x="665" y="319" width="470" height="52" rx="8" fill="#1a2a1a"/>
  <text x="785" y="351" font-size="22" font-family="monospace" fill="#39ff14">"hallo"</text>
  <text x="960" y="351" font-size="14" fill="#94a3b8">niet-lege string</text>

  <rect x="665" y="381" width="470" height="52" rx="8" fill="#1a2a1a"/>
  <text x="785" y="413" font-size="22" font-family="monospace" fill="#39ff14">[]</text>
  <text x="960" y="413" font-size="14" fill="#94a3b8">lege array (ja, truthy!)</text>

  <rect x="665" y="443" width="470" height="52" rx="8" fill="#1a2a1a"/>
  <text x="785" y="475" font-size="22" font-family="monospace" fill="#39ff14">{}</text>
  <text x="960" y="475" font-size="14" fill="#94a3b8">leeg object (ja, truthy!)</text>

  <rect x="665" y="505" width="470" height="52" rx="8" fill="#1a2a1a"/>
  <text x="785" y="537" font-size="22" font-family="monospace" fill="#39ff14">"0"  "false"</text>
  <text x="960" y="537" font-size="14" fill="#94a3b8">niet-lege strings!</text>

  <rect x="665" y="580" width="470" height="80" rx="8" fill="#1a3a1a"/>
  <text x="900" y="608" text-anchor="middle" font-size="13" font-family="monospace" fill="#39ff14">if (1) { }         // wordt uitgevoerd</text>
  <text x="900" y="630" text-anchor="middle" font-size="13" font-family="monospace" fill="#39ff14">if ("hallo") { }   // wordt uitgevoerd</text>
  <text x="900" y="652" text-anchor="middle" font-size="13" font-family="monospace" fill="#39ff14">if ([]) { }        // wordt uitgevoerd!</text>

  <!-- Bottom tip -->
  <rect x="200" y="705" width="800" height="70" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="600" y="733" text-anchor="middle" font-size="14" fill="#00d4ff">Gebruik in if-statements:</text>
  <text x="600" y="758" text-anchor="middle" font-size="13" font-family="monospace" fill="#ffffff">if (naam) { }  // werkt als naam niet leeg/null/undefined is</text>
</svg>
