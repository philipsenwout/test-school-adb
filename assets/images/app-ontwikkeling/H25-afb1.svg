<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">Anatomie van een JavaScript-functie</text>

  <!-- Main code block -->
  <rect x="100" y="80" width="1000" height="130" rx="12" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>
  <!-- Line numbers -->
  <rect x="100" y="80" width="50" height="130" rx="12" fill="#252535"/>
  <rect x="130" y="80" width="20" height="130" fill="#252535"/>
  <text x="125" y="122" text-anchor="middle" font-size="14" fill="#94a3b8">1</text>
  <text x="125" y="152" text-anchor="middle" font-size="14" fill="#94a3b8">2</text>
  <text x="125" y="182" text-anchor="middle" font-size="14" fill="#94a3b8">3</text>

  <!-- Code -->
  <text x="170" y="122" font-size="20" font-family="monospace">
    <tspan fill="#7c3aed">function</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#00d4ff">berekenOmtrek</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#ff6b35">breedte</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ff6b35">hoogte</tspan>
    <tspan fill="#ffffff">) {</tspan>
  </text>
  <text x="210" y="152" font-size="20" font-family="monospace">
    <tspan fill="#7c3aed">return</tspan>
    <tspan fill="#ffffff"> 2 * (</tspan>
    <tspan fill="#ff6b35">breedte</tspan>
    <tspan fill="#ffffff"> + </tspan>
    <tspan fill="#ff6b35">hoogte</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="170" y="182" font-size="20" font-family="monospace" fill="#ffffff">}</text>

  <!-- Label arrows -->
  <!-- keyword -->
  <line x1="220" y1="80" x2="220" y2="30" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="130" y="5" width="180" height="28" rx="6" fill="#7c3aed"/>
  <text x="220" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">function keyword</text>

  <!-- naam -->
  <line x1="380" y1="80" x2="380" y2="30" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="380,80 375,92 385,92" fill="#00d4ff"/>
  <rect x="300" y="5" width="160" height="28" rx="6" fill="#00d4ff"/>
  <text x="380" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f1117">naam van de functie</text>

  <!-- parameters -->
  <line x1="600" y1="80" x2="600" y2="30" stroke="#ff6b35" stroke-width="2"/>
  <polygon points="600,80 595,92 605,92" fill="#ff6b35"/>
  <rect x="510" y="5" width="180" height="28" rx="6" fill="#ff6b35"/>
  <text x="600" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">parameters (invoer)</text>

  <!-- body -->
  <line x1="850" y1="152" x2="1130" y2="152" stroke="#39ff14" stroke-width="2"/>
  <polygon points="1130,152 1118,147 1118,157" fill="#39ff14"/>
  <rect x="1030" y="138" width="140" height="28" rx="6" fill="#39ff14"/>
  <text x="1100" y="157" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f1117">functie-body</text>

  <!-- return -->
  <line x1="225" y1="210" x2="225" y2="250" stroke="#ff6b35" stroke-width="2"/>
  <polygon points="225,250 220,238 230,238" fill="#ff6b35"/>
  <rect x="120" y="250" width="210" height="28" rx="6" fill="#ff6b35"/>
  <text x="225" y="269" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">return = uitvoer / resultaat</text>

  <!-- Aanroepen section -->
  <rect x="100" y="310" width="460" height="150" rx="12" fill="#1a1a2e" stroke="#39ff14" stroke-width="1.5"/>
  <text x="330" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#39ff14">Functie aanroepen</text>
  <text x="130" y="375" font-size="16" font-family="monospace">
    <tspan fill="#00d4ff">berekenOmtrek</tspan><tspan fill="#ffffff">(10, 5);</tspan>
  </text>
  <text x="130" y="400" font-size="14" fill="#94a3b8">→ 2 × (10 + 5) = 30</text>
  <text x="130" y="430" font-size="16" font-family="monospace">
    <tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> resultaat = </tspan><tspan fill="#00d4ff">berekenOmtrek</tspan><tspan fill="#ffffff">(8, 3);</tspan>
  </text>
  <text x="130" y="453" font-size="14" fill="#94a3b8">→ resultaat = 22</text>

  <!-- Drie notaties -->
  <rect x="620" y="310" width="480" height="370" rx="12" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="860" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#00d4ff">Drie manieren om een functie te schrijven</text>

  <text x="640" y="370" font-size="12" fill="#7c3aed">1. Klassieke declaratie</text>
  <rect x="640" y="378" width="440" height="52" rx="6" fill="#0f1117"/>
  <text x="660" y="402" font-size="13" font-family="monospace"><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff"> optellen(a, b) { </tspan><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> a + b; }</tspan></text>
  <text x="660" y="422" font-size="11" fill="#94a3b8">Kan vóór de declaratie worden gebruikt (hoisting)</text>

  <text x="640" y="455" font-size="12" fill="#ff6b35">2. Function expression</text>
  <rect x="640" y="463" width="440" height="52" rx="6" fill="#0f1117"/>
  <text x="660" y="487" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> optellen = </tspan><tspan fill="#7c3aed">function</tspan><tspan fill="#ffffff">(a, b) { </tspan><tspan fill="#7c3aed">return</tspan><tspan fill="#ffffff"> a+b; }</tspan></text>
  <text x="660" y="507" font-size="11" fill="#94a3b8">Functie als waarde in een variabele</text>

  <text x="640" y="540" font-size="12" fill="#39ff14">3. Arrow function</text>
  <rect x="640" y="548" width="440" height="52" rx="6" fill="#0f1117"/>
  <text x="660" y="572" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> optellen = (a, b) </tspan><tspan fill="#ff6b35">=&gt;</tspan><tspan fill="#ffffff"> a + b;</tspan></text>
  <text x="660" y="592" font-size="11" fill="#94a3b8">Kortste notatie — impliciete return</text>

  <rect x="640" y="618" width="440" height="48" rx="6" fill="#252535"/>
  <text x="860" y="640" text-anchor="middle" font-size="12" fill="#94a3b8">Alle drie doen hetzelfde:</text>
  <text x="860" y="658" text-anchor="middle" font-size="13" font-family="monospace" fill="#39ff14">optellen(3, 4) → 7</text>

  <!-- Vuistregel -->
  <rect x="100" y="490" width="460" height="100" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="330" y="516" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">Parameters vs Argumenten</text>
  <text x="120" y="543" font-size="13" fill="#ffffff">Parameter = naam in de definitie (breedte, hoogte)</text>
  <text x="120" y="566" font-size="13" fill="#ffffff">Argument = waarde bij aanroepen (10, 5)</text>
  <text x="120" y="585" font-size="12" fill="#94a3b8">Beide termen worden vaak door elkaar gebruikt.</text>

  <!-- Bottom -->
  <rect x="100" y="615" width="460" height="65" rx="8" fill="#1a2a1a" stroke="#39ff14" stroke-width="1"/>
  <text x="330" y="643" text-anchor="middle" font-size="13" fill="#ffffff">Zonder return geeft de functie</text>
  <text x="330" y="663" text-anchor="middle" font-size="13" font-family="monospace" fill="#ff6b35">undefined</text>
  <text x="430" y="663" font-size="13" fill="#ffffff">terug.</text>
</svg>
