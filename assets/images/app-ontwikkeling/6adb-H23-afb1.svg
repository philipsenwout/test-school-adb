<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c85ff"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28c840"/>
    </marker>
  </defs>

  <rect width="820" height="480" fill="#1a1a2e"/>
  <text x="410" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#e0e0f0">Full-stack flow — van browser tot database</text>

  <!-- BROWSER block -->
  <rect x="30" y="60" width="170" height="300" rx="10" fill="#16162a" stroke="#7c85ff" stroke-width="2"/>
  <rect x="30" y="60" width="170" height="32" rx="10" fill="#252560"/>
  <text x="115" y="80" text-anchor="middle" font-size="13" fill="#7c85ff" font-weight="700">Browser</text>

  <text x="50" y="116" font-size="11" fill="#888">1. Pagina laadt</text>
  <rect x="44" y="122" width="140" height="22" rx="4" fill="#252550"/>
  <text x="114" y="136" text-anchor="middle" font-size="11" fill="#a8b8ff" font-family="'Courier New', monospace">laadTaken()</text>

  <text x="50" y="164" font-size="11" fill="#888">2. API aanroepen</text>
  <rect x="44" y="170" width="140" height="22" rx="4" fill="#252550"/>
  <text x="114" y="184" text-anchor="middle" font-size="11" fill="#a8b8ff" font-family="'Courier New', monospace">fetch('/api/taken')</text>

  <text x="50" y="216" font-size="11" fill="#888">5. JSON verwerken</text>
  <rect x="44" y="222" width="140" height="22" rx="4" fill="#252550"/>
  <text x="114" y="236" text-anchor="middle" font-size="11" fill="#a8b8ff" font-family="'Courier New', monospace">response.json()</text>

  <text x="50" y="268" font-size="11" fill="#888">6. HTML tonen</text>
  <rect x="44" y="274" width="140" height="22" rx="4" fill="#252550"/>
  <text x="114" y="288" text-anchor="middle" font-size="11" fill="#a8b8ff" font-family="'Courier New', monospace">innerHTML = ...</text>

  <!-- NODE.JS block -->
  <rect x="320" y="60" width="180" height="300" rx="10" fill="#16162a" stroke="#c792ea" stroke-width="2"/>
  <rect x="320" y="60" width="180" height="32" rx="10" fill="#3a1e50"/>
  <text x="410" y="80" text-anchor="middle" font-size="13" fill="#c792ea" font-weight="700">Node.js (server.js)</text>

  <text x="340" y="116" font-size="11" fill="#888">3. Route ontvangen</text>
  <rect x="334" y="122" width="152" height="22" rx="4" fill="#252540"/>
  <text x="410" y="136" text-anchor="middle" font-size="11" fill="#c792ea" font-family="'Courier New', monospace">app.get('/api/taken')</text>

  <text x="340" y="164" font-size="11" fill="#888">4. Database query</text>
  <rect x="334" y="170" width="152" height="22" rx="4" fill="#252540"/>
  <text x="410" y="184" text-anchor="middle" font-size="11" fill="#c792ea" font-family="'Courier New', monospace">pool.execute(SQL)</text>

  <text x="340" y="216" font-size="11" fill="#888">→ JSON terugsturen</text>
  <rect x="334" y="222" width="152" height="22" rx="4" fill="#252540"/>
  <text x="410" y="236" text-anchor="middle" font-size="11" fill="#c792ea" font-family="'Courier New', monospace">res.json(rijen)</text>

  <!-- MYSQL block -->
  <rect x="620" y="60" width="170" height="300" rx="10" fill="#16162a" stroke="#f78c6c" stroke-width="2"/>
  <rect x="620" y="60" width="170" height="32" rx="10" fill="#3a2010"/>
  <text x="705" y="80" text-anchor="middle" font-size="13" fill="#f78c6c" font-weight="700">MySQL</text>

  <text x="640" y="116" font-size="11" fill="#888">Query uitvoeren</text>
  <rect x="634" y="122" width="140" height="36" rx="4" fill="#252540"/>
  <text x="704" y="137" text-anchor="middle" font-size="11" fill="#f78c6c" font-family="'Courier New', monospace">SELECT * FROM</text>
  <text x="704" y="152" text-anchor="middle" font-size="11" fill="#f78c6c" font-family="'Courier New', monospace">taken</text>

  <text x="640" y="176" font-size="11" fill="#888">Rijen teruggeven</text>
  <rect x="634" y="182" width="140" height="56" rx="4" fill="#1a1a30"/>
  <text x="644" y="198" font-size="10" fill="#a8e6a3" font-family="'Courier New', monospace">&#123; id:1, titel:... &#125;</text>
  <text x="644" y="214" font-size="10" fill="#a8e6a3" font-family="'Courier New', monospace">&#123; id:2, titel:... &#125;</text>
  <text x="644" y="230" font-size="10" fill="#a8e6a3" font-family="'Courier New', monospace">&#123; id:3, titel:... &#125;</text>

  <!-- Arrows between blocks -->
  <!-- Browser → Node.js (request) -->
  <line x1="200" y1="181" x2="318" y2="181" stroke="#7c85ff" stroke-width="2" marker-end="url(#a1)"/>
  <text x="260" y="172" text-anchor="middle" font-size="10" fill="#7c85ff">GET /api/taken</text>

  <!-- Node.js → MySQL -->
  <line x1="500" y1="181" x2="618" y2="181" stroke="#c792ea" stroke-width="2" marker-end="url(#a1)"/>
  <text x="560" y="172" text-anchor="middle" font-size="10" fill="#c792ea">SQL query</text>

  <!-- MySQL → Node.js (return) -->
  <line x1="618" y1="210" x2="500" y2="210" stroke="#28c840" stroke-width="2" marker-end="url(#a2)"/>
  <text x="560" y="224" text-anchor="middle" font-size="10" fill="#28c840">rijen[ ]</text>

  <!-- Node.js → Browser (return) -->
  <line x1="318" y1="238" x2="200" y2="238" stroke="#28c840" stroke-width="2" marker-end="url(#a2)"/>
  <text x="260" y="252" text-anchor="middle" font-size="10" fill="#28c840">JSON-array</text>

  <!-- Summary line at bottom -->
  <rect x="30" y="390" width="760" height="70" rx="8" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="410" y="412" text-anchor="middle" font-size="12" fill="#888" font-weight="700">Full-stack = front-end + back-end samenwerken</text>
  <text x="60" y="432" font-size="11" fill="#555">• Browser: toont data, vangt gebruikersinvoer op, roept fetch() aan</text>
  <text x="60" y="450" font-size="11" fill="#555">• Node.js: ontvangt aanvragen, voert SQL uit, stuurt JSON terug</text>
  <text x="60" y="468" font-size="11" fill="#555">• MySQL: bewaart alle data permanent, ook na server herstart</text>
</svg>
