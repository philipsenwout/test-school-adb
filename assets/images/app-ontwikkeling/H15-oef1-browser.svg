  <!-- ============================================================
       Verbindingspijlen tussen de drie schermen
       ============================================================ -->
  <!-- Pijl mobiel -> tablet -->
  <line x1="322" y1="380" x2="348" y2="380" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="348,376 356,380 348,384" fill="#334155"/>

  <!-- Pijl tablet -> desktop -->
