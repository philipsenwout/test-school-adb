<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Achtergrond -->
  <rect width="1200" height="750" fill="#0f1117"/>

  <!-- Titel -->
  <text x="600" y="38" text-anchor="middle" fill="#00d4ff" font-size="20" font-weight="700" letter-spacing="1">Responsive Receptenpagina — drie schermformaten</text>

  <!-- ============================================================
       MOBIEL — 1 kolom (320px breed)
       ============================================================ -->
