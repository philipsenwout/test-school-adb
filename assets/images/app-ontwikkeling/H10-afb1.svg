<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="420" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">Het CSS Box Model</text>

  <!-- Margin (buitenste) -->
  <rect x="80" y="55" width="640" height="310" rx="8" fill="#F97316" opacity="0.15"/>
  <rect x="80" y="55" width="640" height="310" rx="8" fill="none" stroke="#F97316" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="165" y="80" font-size="14" font-weight="bold" fill="#F97316">MARGIN</text>
  <text x="165" y="96" font-size="11" fill="#aaa">Ruimte buiten het element</text>

  <!-- Border -->
  <rect x="160" y="115" width="480" height="210" rx="6" fill="#2D9CDB" opacity="0.2"/>
  <rect x="160" y="115" width="480" height="210" rx="6" fill="none" stroke="#2D9CDB" stroke-width="3"/>
  <text x="215" y="138" font-size="14" font-weight="bold" fill="#2D9CDB">BORDER</text>
  <text x="215" y="154" font-size="11" fill="#aaa">Rand rond element</text>

  <!-- Padding -->
  <rect x="210" y="165" width="380" height="130" rx="4" fill="#22C55E" opacity="0.15"/>
  <rect x="210" y="165" width="380" height="130" rx="4" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="255" y="185" font-size="14" font-weight="bold" fill="#22C55E">PADDING</text>
  <text x="255" y="200" font-size="11" fill="#aaa">Ruimte binnen de rand</text>

  <!-- Content -->
  <rect x="270" y="210" width="260" height="70" rx="4" fill="#7B3FE4" opacity="0.6"/>
  <text x="400" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="white">CONTENT</text>
  <text x="400" y="268" text-anchor="middle" font-size="11" fill="#ddd">width × height</text>

  <!-- Maatpijlen rechts -->
  <line x1="720" y1="55" x2="720" y2="365" stroke="#F97316" stroke-width="1.5"/>
  <text x="740" y="210" font-size="12" fill="#F97316" transform="rotate(-90, 740, 210)">margin-top/bottom</text>

  <!-- Labels pijlen links -->
  <line x1="60" y1="115" x2="80" y2="115" stroke="#2D9CDB" stroke-width="1.5"/>
  <text x="30" y="119" font-size="10" fill="#2D9CDB">border</text>
  <line x1="60" y1="165" x2="210" y2="165" stroke="#22C55E" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="30" y="169" font-size="10" fill="#22C55E">padding</text>
  <line x1="60" y1="210" x2="270" y2="210" stroke="#7B3FE4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="30" y="214" font-size="10" fill="#7B3FE4">content</text>

  <!-- Totale breedte uitleg -->
  <rect x="80" y="385" width="640" height="30" rx="5" fill="#2a2d3e"/>
  <text x="400" y="405" text-anchor="middle" font-size="12" fill="#f0f0f0">Totale breedte = margin-left + border-left + padding-left + width + padding-right + border-right + margin-right</text>
</svg>
