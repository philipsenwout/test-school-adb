<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">artikel.html</text>

  <!-- h1 -->
  <text x="40" y="94" font-size="30" font-weight="bold" fill="#000">Over kleurrijke paraplu's</text>

  <!-- first paragraph (before float, just intro) -->
  <text x="40" y="132" font-size="15" fill="#333">Paraplu's zijn meer dan alleen bescherming tegen de regen.</text>
  <text x="40" y="154" font-size="15" fill="#333">Ze zijn een fashion statement, een kunstwerk en soms een symbool.</text>

  <!-- Floated image left -->
  <rect x="40" y="170" width="160" height="210" fill="#d8d0e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="120" y="262" text-anchor="middle" font-size="12" fill="#888">paraplu.jpg</text>
  <text x="120" y="278" text-anchor="middle" font-size="11" fill="#999">200×300</text>
  <!-- float indicator -->
  <text x="40" y="390" font-size="11" fill="#888" font-style="italic">float: left; margin: 0 10px 10px 0;</text>

  <!-- Text flowing next to the floated image -->
  <text x="218" y="186" font-size="15" fill="#333">In Japan zijn paraplu's een onderdeel van de cultuur.</text>
  <text x="218" y="208" font-size="15" fill="#333">Mensen verzamelen ze in alle kleuren en patronen.</text>
  <text x="218" y="230" font-size="15" fill="#333">Van eenvoudig doorzichtig tot met bloemmotieven —</text>
  <text x="218" y="252" font-size="15" fill="#333">de variatie is enorm. Zelfs bij helder weer draag je</text>
  <text x="218" y="274" font-size="15" fill="#333">een paraplu als zonwering, de zogeheten higasa.</text>
  <text x="218" y="296" font-size="15" fill="#333">In Europa is de paraplu in de eerste plaats praktisch,</text>
  <text x="218" y="318" font-size="15" fill="#333">maar de trend naar kleurrijkere modellen groeit.</text>
  <text x="218" y="340" font-size="15" fill="#333">Designers lanceren elk seizoen nieuwe collecties.</text>

  <!-- Second paragraph after float (clear: left) -->
  <text x="40" y="420" font-size="15" fill="#333">Na de Tweede Wereldoorlog werden paraplu's als luxe-item beschouwd.</text>
  <text x="40" y="444" font-size="15" fill="#333">Vandaag zijn ze voor iedereen betaalbaar en overal verkrijgbaar.</text>
</svg>
