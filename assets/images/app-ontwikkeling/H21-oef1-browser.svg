<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">vergelijken.html</text>

  <!-- Page area -->
  <rect x="20" y="60" width="580" height="720" fill="#f8f9fa"/>
  <rect x="30" y="70" width="200" height="8" rx="4" fill="#dee2e6"/>
  <rect x="30" y="88" width="300" height="6" rx="3" fill="#e9ecef"/>
  <rect x="30" y="104" width="250" height="6" rx="3" fill="#e9ecef"/>
  <text x="310" y="400" text-anchor="middle" font-size="14" fill="#adb5bd">HTML-pagina</text>

  <!-- DevTools panel -->
  <rect x="600" y="60" width="580" height="720" fill="#1e1e2e"/>
  <!-- DevTools tab bar -->
  <rect x="600" y="60" width="580" height="36" fill="#252535"/>
  <rect x="600" y="60" width="90" height="36" fill="#1e1e2e"/>
  <text x="645" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="730" y="83" text-anchor="middle" font-size="13" fill="#94a3b8">Elements</text>
  <text x="810" y="83" text-anchor="middle" font-size="13" fill="#94a3b8">Sources</text>

  <!-- Console filter bar -->
  <rect x="600" y="96" width="580" height="30" fill="#252535" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="116" font-size="13" fill="#94a3b8">🚫  Filter</text>

  <!-- Console output -->
  <text x="620" y="150" font-size="12" fill="#94a3b8">// === strikte gelijkheid</text>
  <text x="620" y="172" font-size="13" font-family="monospace" fill="#00d4ff">console.log(5 === 5);</text>
  <text x="620" y="192" font-size="13" font-family="monospace" fill="#39ff14">→ true</text>

  <line x1="620" y1="205" x2="1160" y2="205" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="225" font-size="13" font-family="monospace" fill="#00d4ff">console.log('5' === 5);</text>
  <text x="620" y="245" font-size="13" font-family="monospace" fill="#ff6b35">→ false</text>
  <text x="820" y="245" font-size="11" fill="#94a3b8">// types verschillen</text>

  <line x1="620" y1="258" x2="1160" y2="258" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="278" font-size="12" fill="#94a3b8">// == losse gelijkheid (vermijden!)</text>
  <text x="620" y="298" font-size="13" font-family="monospace" fill="#00d4ff">console.log('5' == 5);</text>
  <text x="620" y="318" font-size="13" font-family="monospace" fill="#39ff14">→ true</text>
  <text x="720" y="318" font-size="11" fill="#ff6b35">// ⚠ gevaarlijk!</text>

  <line x1="620" y1="330" x2="1160" y2="330" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="350" font-size="12" fill="#94a3b8">// vergelijkingsoperatoren</text>
  <text x="620" y="370" font-size="13" font-family="monospace" fill="#00d4ff">console.log(10 > 5);</text>
  <text x="620" y="390" font-size="13" font-family="monospace" fill="#39ff14">→ true</text>

  <line x1="620" y1="403" x2="1160" y2="403" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="423" font-size="13" font-family="monospace" fill="#00d4ff">console.log(3 >= 3);</text>
  <text x="620" y="443" font-size="13" font-family="monospace" fill="#39ff14">→ true</text>

  <line x1="620" y1="456" x2="1160" y2="456" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="476" font-size="12" fill="#94a3b8">// truthy / falsy</text>
  <text x="620" y="496" font-size="13" font-family="monospace" fill="#00d4ff">if (0) { console.log("0 is truthy"); }</text>
  <text x="620" y="516" font-size="13" font-family="monospace" fill="#94a3b8">→ (geen output — 0 is falsy)</text>

  <line x1="620" y1="528" x2="1160" y2="528" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="548" font-size="13" font-family="monospace" fill="#00d4ff">if ("hallo") { console.log("truthy!"); }</text>
  <text x="620" y="568" font-size="13" font-family="monospace" fill="#39ff14">→ truthy!</text>

  <line x1="620" y1="580" x2="1160" y2="580" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="600" font-size="13" font-family="monospace" fill="#00d4ff">console.log(null === undefined);</text>
  <text x="620" y="620" font-size="13" font-family="monospace" fill="#ff6b35">→ false</text>
  <text x="820" y="620" font-size="11" fill="#94a3b8">// types verschillen</text>

  <line x1="620" y1="632" x2="1160" y2="632" stroke="#333" stroke-width="0.5"/>
  <text x="620" y="652" font-size="13" font-family="monospace" fill="#00d4ff">console.log(null == undefined);</text>
  <text x="620" y="672" font-size="13" font-family="monospace" fill="#39ff14">→ true</text>
  <text x="720" y="672" font-size="11" fill="#ff6b35">// ⚠ speciaal geval</text>

  <!-- Cursor -->
  <text x="620" y="710" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="633" y="696" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
