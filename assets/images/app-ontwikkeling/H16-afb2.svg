  <line x1="180" y1="62" x2="1020" y2="62" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <text x="600" y="84" text-anchor="middle" font-size="14" fill="#888">De breedte van je tekst heeft een grote invloed op leesbaarheid en leescomfort</text>

