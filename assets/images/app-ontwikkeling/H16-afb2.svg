  <rect x="648" y="545" width="490" height="76" rx="6" fill="#0a1a0a"/>
  <text x="663" y="565" font-size="12" fill="#39ff14">&#x2713;  Oog vindt moeiteloos de volgende regel</text>
  <text x="663" y="583" font-size="12" fill="#39ff14">&#x2713;  Minder saccades nodig — vloeiend ritme</text>
  <text x="663" y="601" font-size="12" fill="#39ff14">&#x2713;  Optimale leessnelheid en begrip</text>
  <text x="663" y="619" font-size="12" fill="#39ff14">&#x2192;  Wetenschappelijk aanbevolen: 50–75 tekens</text>

  <!-- ===== CSS CODE BLOCK ===== -->
  <rect x="40" y="655" width="530" height="115" rx="10" fill="#101020" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="40" y="655" width="530" height="30" rx="10" fill="#7c3aed" opacity="0.2"/>
