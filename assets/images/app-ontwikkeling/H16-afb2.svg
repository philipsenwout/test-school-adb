  <text x="895" y="674" text-anchor="middle" font-size="13" font-weight="600" fill="#00d4ff">Krantenkolom — Korte regels werken ook</text>

  <rect x="650" y="682" width="155" height="80" rx="4" fill="#0f1117" stroke="#1e2d3d" stroke-width="1"/>
  <text x="660" y="698" font-size="9" fill="#aaa">Gisteren werd in de</text>
  <text x="660" y="710" font-size="9" fill="#aaa">Brusselse wijk een</text>
  <text x="660" y="722" font-size="9" fill="#aaa">nieuwe fietsroute</text>
  <text x="660" y="734" font-size="9" fill="#aaa">geopend door de</text>
  <text x="660" y="746" font-size="9" fill="#aaa">burgemeester. Meer</text>
  <text x="660" y="758" font-size="9" fill="#aaa">dan 200 bewoners...</text>

  <rect x="820" y="682" width="155" height="80" rx="4" fill="#0f1117" stroke="#1e2d3d" stroke-width="1"/>
  <text x="830" y="698" font-size="9" fill="#aaa">De aanleg kostte de</text>
  <text x="830" y="710" font-size="9" fill="#aaa">stad 1,2 miljoen euro</text>
  <text x="830" y="722" font-size="9" fill="#aaa">en werd gefinancierd</text>
  <text x="830" y="734" font-size="9" fill="#aaa">via Europese subsidies</text>
  <text x="830" y="746" font-size="9" fill="#aaa">voor duurzame mobiliteit</text>
  <text x="830" y="758" font-size="9" fill="#aaa">in stedelijke gebieden.</text>

  <rect x="990" y="682" width="155" height="80" rx="4" fill="#0f1117" stroke="#1e2d3d" stroke-width="1"/>
  <text x="1000" y="698" font-size="9" fill="#aaa">Korte regels werken</text>
  <text x="1000" y="710" font-size="9" fill="#aaa">ook! Krant: 35–50</text>
  <text x="1000" y="722" font-size="9" fill="#aaa">tekens. Web artikel:</text>
  <text x="1000" y="734" font-size="9" fill="#aaa">60–75 tekens is</text>
  <text x="1000" y="746" font-size="9" fill="#aaa">de sweet spot voor</text>
  <text x="1000" y="758" font-size="9" fill="#aaa">optimaal leesgemak.</text>

