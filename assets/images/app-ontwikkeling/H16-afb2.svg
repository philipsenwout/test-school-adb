  <text x="540" y="532" font-size="10" fill="#ff4444">180+</text>

  <!-- Why it's bad -->
  <rect x="60" y="545" width="490" height="76" rx="6" fill="#1e0a0a"/>
  <text x="75" y="565" font-size="12" fill="#ff6b6b">&#x2718;  Oog verliest de volgende regel — regressies nemen toe</text>
  <text x="75" y="583" font-size="12" fill="#ff6b6b">&#x2718;  Meer cognitieve belasting: oog moet ver bewegen</text>
  <text x="75" y="601" font-size="12" fill="#ff6b6b">&#x2718;  Vermoeidheid na 10–15 seconden lezen</text>
  <text x="75" y="619" font-size="12" fill="#ff8888">&#x2192;  Minder begrip, hogere foutrate bij terugspringen</text>

