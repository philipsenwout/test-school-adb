  <text x="75" y="368" font-size="12.5" fill="#c8c8c8">non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat</text>
  <text x="75" y="386" font-size="12.5" fill="#c8c8c8">voluptatem ut enim ad minima veniam quis nostrum exercitationem ullam corporis suscipit</text>
