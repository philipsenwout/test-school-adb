  <text x="60" y="702" font-size="13" font-family="'Courier New', monospace" fill="#888">p, article {</text>
  <text x="80" y="722" font-size="13" font-family="'Courier New', monospace" fill="#7c3aed">  max-width</text>
  <text x="182" y="722" font-size="13" font-family="'Courier New', monospace" fill="#ffffff">: 70ch;</text>
  <text x="80" y="742" font-size="13" font-family="'Courier New', monospace" fill="#00d4ff">  line-height</text>
