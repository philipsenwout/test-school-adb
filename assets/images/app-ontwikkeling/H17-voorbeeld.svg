<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">variabelen.html</text>

  <!-- Code left -->
  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="92" font-size="12" fill="#94a3b8">// variabelen.js — "use strict"</text>
  <text x="40" y="115" font-size="13" font-family="monospace" fill="#7c3aed">"use strict";</text>
  <text x="40" y="148" font-size="12" fill="#94a3b8">// const — vaste waarden</text>
  <text x="40" y="171" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> naam = </tspan><tspan fill="#ff6b35">"Jana"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="194" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> geboortejaar = </tspan><tspan fill="#ff6b35">2009</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="217" font-size="13" font-family="monospace"><tspan fill="#00d4ff">const</tspan><tspan fill="#ffffff"> kleur = </tspan><tspan fill="#ff6b35">"blauw"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="252" font-size="12" fill="#94a3b8">// let — aanpasbare waarden</text>
  <text x="40" y="275" font-size="13" font-family="monospace"><tspan fill="#7c3aed">let</tspan><tspan fill="#ffffff"> teller = </tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="298" font-size="13" font-family="monospace"><tspan fill="#7c3aed">let</tspan><tspan fill="#ffffff"> score = </tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="333" font-size="12" fill="#94a3b8">// aanpassen met let</text>
  <text x="40" y="356" font-size="13" font-family="monospace"><tspan fill="#ffffff">teller = </tspan><tspan fill="#ff6b35">1</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="379" font-size="13" font-family="monospace"><tspan fill="#ffffff">teller = </tspan><tspan fill="#ff6b35">2</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="402" font-size="13" font-family="monospace"><tspan fill="#ffffff">score = </tspan><tspan fill="#ff6b35">50</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="425" font-size="13" font-family="monospace"><tspan fill="#ffffff">score = </tspan><tspan fill="#ff6b35">75</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="460" font-size="12" fill="#94a3b8">// alles loggen</text>
  <text x="40" y="483" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(naam, geboortejaar, kleur);</tspan></text>
  <text x="40" y="506" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"teller:"</tspan><tspan fill="#ffffff">, teller);</tspan></text>
  <text x="40" y="529" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"score:"</tspan><tspan fill="#ffffff">, score);</tspan></text>
  <text x="40" y="564" font-size="12" fill="#94a3b8">// const aanpassen → fout</text>
  <text x="40" y="587" font-size="13" font-family="monospace"><tspan fill="#94a3b8">// naam = "Senne"; ❌</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>

  <text x="600" y="120" font-size="12" fill="#94a3b8">// Alle const-waarden</text>
  <text x="600" y="148" font-size="16" font-family="monospace" fill="#39ff14">Jana 2009 blauw</text>
  <line x1="600" y1="160" x2="1160" y2="160" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="185" font-size="12" fill="#94a3b8">// let teller (na 2 aanpassingen)</text>
  <text x="600" y="213" font-size="16" font-family="monospace"><tspan fill="#94a3b8">teller: </tspan><tspan fill="#39ff14">2</tspan></text>
  <line x1="600" y1="225" x2="1160" y2="225" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="250" font-size="12" fill="#94a3b8">// let score (na 2 aanpassingen)</text>
  <text x="600" y="278" font-size="16" font-family="monospace"><tspan fill="#94a3b8">score: </tspan><tspan fill="#39ff14">75</tspan></text>
  <line x1="600" y1="290" x2="1160" y2="290" stroke="#333" stroke-width="0.5"/>

  <text x="600" y="315" font-size="12" fill="#94a3b8">// const aanpassen → TypeError</text>
  <text x="600" y="343" font-size="14" font-family="monospace" fill="#ff6b35">TypeError: Assignment to constant variable.</text>
  <line x1="600" y1="355" x2="1160" y2="355" stroke="#333" stroke-width="0.5"/>

  <rect x="600" y="380" width="560" height="160" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="880" y="408" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">Wat heb je geleerd?</text>
  <text x="620" y="433" font-size="13" fill="#39ff14">✓</text><text x="640" y="433" font-size="13" fill="#ffffff">const voor vaste waarden</text>
  <text x="620" y="458" font-size="13" fill="#39ff14">✓</text><text x="640" y="458" font-size="13" fill="#ffffff">let voor aanpasbare waarden</text>
  <text x="620" y="483" font-size="13" fill="#39ff14">✓</text><text x="640" y="483" font-size="13" fill="#ffffff">camelCase naamgeving</text>
  <text x="620" y="508" font-size="13" fill="#39ff14">✓</text><text x="640" y="508" font-size="13" fill="#ffffff">console.log() voor debugging</text>
  <text x="620" y="533" font-size="13" fill="#ff6b35">✓</text><text x="640" y="533" font-size="13" fill="#ffffff">const aanpassen → TypeError</text>

  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
