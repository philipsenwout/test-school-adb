<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="white">Hetzelfde stoplicht — drie manieren</text>

  <!-- Column dividers -->
  <line x1="270" y1="48" x2="270" y2="450" stroke="#333" stroke-width="1"/>
  <line x1="535" y1="48" x2="535" y2="450" stroke="#333" stroke-width="1"/>

  <!-- === COLUMN 1: Callbacks === -->
  <rect x="15" y="48" width="245" height="28" rx="6" fill="#ff6b6b"/>
  <text x="138" y="67" text-anchor="middle" font-size="13" font-weight="700" fill="white">Callbacks</text>

  <rect x="15" y="82" width="245" height="322" rx="6" fill="#231a1a"/>
  <text x="28" y="106" font-size="11" fill="#888" font-family="monospace">wachtOp(<tspan fill="#f9a825">'rood'</tspan>, () =&gt; &#123;</text>
  <text x="40" y="122" font-size="11" fill="#f9a825" font-family="monospace">  console.log('Rood');</text>
  <text x="40" y="138" font-size="11" fill="#888" font-family="monospace">  wachtOp(<tspan fill="#f9a825">'oranje'</tspan>, () =&gt; &#123;</text>
  <text x="56" y="154" font-size="11" fill="#f9a825" font-family="monospace">    console.log('Oranje');</text>
  <text x="56" y="170" font-size="11" fill="#888" font-family="monospace">    wachtOp(<tspan fill="#43e97b">'groen'</tspan>, () =&gt; &#123;</text>
  <text x="72" y="186" font-size="11" fill="#43e97b" font-family="monospace">      console.log('Groen');</text>
  <text x="72" y="202" font-size="11" fill="#888" font-family="monospace">      wachtOp(<tspan fill="#f9a825">'oranje'</tspan>, () =&gt; &#123;</text>
  <text x="88" y="218" font-size="11" fill="#f9a825" font-family="monospace">        console.log(</text>
  <text x="96" y="234" font-size="11" fill="#f9a825" font-family="monospace">        'Oranje2');</text>
  <text x="72" y="250" font-size="11" fill="#888" font-family="monospace">      &#125;);</text>
  <text x="56" y="266" font-size="11" fill="#888" font-family="monospace">    &#125;);</text>
  <text x="40" y="282" font-size="11" fill="#888" font-family="monospace">  &#125;);</text>
  <text x="28" y="298" font-size="11" fill="#888" font-family="monospace">&#125;);</text>

  <!-- Callback Hell label -->
  <rect x="24" y="316" width="228" height="72" rx="6" fill="#ff6b6b" fill-opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
  <text x="138" y="340" text-anchor="middle" font-size="12" fill="#ff6b6b" font-weight="700">&#128561; Callback Hell</text>
  <text x="138" y="358" text-anchor="middle" font-size="11" fill="#aaa">Diep genest, moeilijk</text>
  <text x="138" y="374" text-anchor="middle" font-size="11" fill="#aaa">te lezen en debuggen</text>

  <!-- === COLUMN 2: Promises === -->
  <rect x="278" y="48" width="248" height="28" rx="6" fill="#f9a825"/>
  <text x="402" y="67" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">Promises</text>

  <rect x="278" y="82" width="248" height="322" rx="6" fill="#221e12"/>
  <text x="292" y="106" font-size="11" fill="#888" font-family="monospace">wachtOp(<tspan fill="#f9a825">'rood'</tspan>)</text>
  <text x="292" y="122" font-size="11" fill="#888" font-family="monospace">  .then(() =&gt; &#123;</text>
  <text x="308" y="138" font-size="11" fill="#f9a825" font-family="monospace">    console.log('Rood');</text>
  <text x="308" y="154" font-size="11" fill="#888" font-family="monospace">    return wachtOp(<tspan fill="#f9a825">'oranje'</tspan>);</text>
  <text x="292" y="170" font-size="11" fill="#888" font-family="monospace">  &#125;)</text>
  <text x="292" y="186" font-size="11" fill="#888" font-family="monospace">  .then(() =&gt; &#123;</text>
  <text x="308" y="202" font-size="11" fill="#f9a825" font-family="monospace">    console.log('Oranje');</text>
  <text x="308" y="218" font-size="11" fill="#888" font-family="monospace">    return wachtOp(<tspan fill="#43e97b">'groen'</tspan>);</text>
  <text x="292" y="234" font-size="11" fill="#888" font-family="monospace">  &#125;)</text>
  <text x="292" y="250" font-size="11" fill="#888" font-family="monospace">  .then(() =&gt; &#123;</text>
  <text x="308" y="266" font-size="11" fill="#43e97b" font-family="monospace">    console.log('Groen');</text>
  <text x="308" y="282" font-size="11" fill="#888" font-family="monospace">    return wachtOp(<tspan fill="#f9a825">'oranje'</tspan>);</text>
  <text x="292" y="298" font-size="11" fill="#888" font-family="monospace">  &#125;)</text>
  <text x="292" y="314" font-size="11" fill="#888" font-family="monospace">  .catch(err =&gt; ...);</text>

  <!-- Promise label -->
  <rect x="287" y="330" width="228" height="58" rx="6" fill="#f9a825" fill-opacity="0.15" stroke="#f9a825" stroke-width="1"/>
  <text x="401" y="354" text-anchor="middle" font-size="12" fill="#f9a825" font-weight="700">&#128336; Promises</text>
  <text x="401" y="374" text-anchor="middle" font-size="11" fill="#aaa">Lineair, maar veel syntax</text>

  <!-- === COLUMN 3: async/await === -->
  <rect x="543" y="48" width="242" height="28" rx="6" fill="#43e97b"/>
  <text x="664" y="67" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">async / await</text>

  <rect x="543" y="82" width="242" height="322" rx="6" fill="#12201a"/>
  <text x="558" y="106" font-size="11" fill="#888" font-family="monospace">async function stoplicht() &#123;</text>
  <text x="574" y="126" font-size="11" fill="#888" font-family="monospace">  await wachtOp(<tspan fill="#f9a825">'rood'</tspan>);</text>
  <text x="574" y="144" font-size="11" fill="#43e97b" font-family="monospace">  console.log('Rood');</text>
  <text x="558" y="162" font-size="11" fill="#888" font-family="monospace"></text>
  <text x="574" y="178" font-size="11" fill="#888" font-family="monospace">  await wachtOp(<tspan fill="#f9a825">'oranje'</tspan>);</text>
  <text x="574" y="196" font-size="11" fill="#f9a825" font-family="monospace">  console.log('Oranje');</text>
  <text x="558" y="214" font-size="11" fill="#888" font-family="monospace"></text>
  <text x="574" y="230" font-size="11" fill="#888" font-family="monospace">  await wachtOp(<tspan fill="#43e97b">'groen'</tspan>);</text>
  <text x="574" y="248" font-size="11" fill="#43e97b" font-family="monospace">  console.log('Groen');</text>
  <text x="558" y="268" font-size="11" fill="#888" font-family="monospace"></text>
  <text x="574" y="284" font-size="11" fill="#888" font-family="monospace">  await wachtOp(<tspan fill="#f9a825">'oranje'</tspan>);</text>
  <text x="574" y="302" font-size="11" fill="#f9a825" font-family="monospace">  console.log('Oranje');</text>
  <text x="558" y="320" font-size="11" fill="#888" font-family="monospace">&#125;</text>

  <!-- Async/await label -->
  <rect x="552" y="330" width="224" height="58" rx="6" fill="#43e97b" fill-opacity="0.15" stroke="#43e97b" stroke-width="1"/>
  <text x="664" y="354" text-anchor="middle" font-size="12" fill="#43e97b" font-weight="700">&#10003; Aanbevolen!</text>
  <text x="664" y="374" text-anchor="middle" font-size="11" fill="#aaa">Leest als gewone code</text>

  <!-- Bottom bar -->
  <rect x="0" y="414" width="800" height="66" fill="#0d0d1a"/>
  <text x="400" y="438" text-anchor="middle" font-size="12" fill="#888">Resultaat in alle drie gevallen hetzelfde:</text>
  <text x="400" y="458" text-anchor="middle" font-size="14" fill="white" font-family="monospace">Rood → Oranje → Groen → Oranje → ...</text>
  <text x="400" y="474" text-anchor="middle" font-size="11" fill="#6c63ff">Gebruik altijd async/await in moderne JavaScript</text>
</svg>
