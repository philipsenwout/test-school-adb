<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="52" fill="#ffffff" font-size="28" font-weight="700" text-anchor="middle">let vs const — Wanneer gebruik je wat?</text>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="750" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- LEFT: let -->
  <text x="300" y="110" fill="#39ff14" font-size="24" font-weight="700" text-anchor="middle">let</text>
  <text x="300" y="135" fill="#aaaaaa" font-size="14" text-anchor="middle">Waarde kan veranderen</text>

  <!-- let box 1 -->
  <rect x="60" y="155" width="480" height="80" rx="12" fill="#161b27" stroke="#39ff14" stroke-width="2"/>
  <text x="80" y="185" fill="#aaaaaa" font-size="13">Stap 1 — aanmaken:</text>
  <text x="80" y="210" fill="#7c3aed" font-size="16" font-family="'Courier New', monospace">let</text>
  <text x="112" y="210" fill="#00d4ff" font-size="16" font-family="'Courier New', monospace"> score</text>
  <text x="186" y="210" fill="#ffffff" font-size="16" font-family="'Courier New', monospace"> = </text>
  <text x="212" y="210" fill="#39ff14" font-size="16" font-family="'Courier New', monospace">0</text>
  <text x="228" y="210" fill="#ffffff" font-size="16" font-family="'Courier New', monospace">;</text>

  <!-- arrow down -->
  <line x1="300" y1="238" x2="300" y2="270" stroke="#39ff14" stroke-width="2.5"/>
  <polygon points="293,270 300,285 307,270" fill="#39ff14"/>
  <text x="320" y="260" fill="#39ff14" font-size="13">wijzigen ✓</text>

  <!-- let box 2 -->
  <rect x="60" y="288" width="480" height="80" rx="12" fill="#161b27" stroke="#39ff14" stroke-width="2"/>
  <text x="80" y="318" fill="#aaaaaa" font-size="13">Stap 2 — aanpassen:</text>
  <text x="80" y="343" fill="#00d4ff" font-size="16" font-family="'Courier New', monospace"> score</text>
  <text x="154" y="343" fill="#ffffff" font-size="16" font-family="'Courier New', monospace"> = </text>
  <text x="180" y="343" fill="#39ff14" font-size="16" font-family="'Courier New', monospace">10</text>
  <text x="204" y="343" fill="#ffffff" font-size="16" font-family="'Courier New', monospace">;</text>

  <!-- arrow down -->
  <line x1="300" y1="370" x2="300" y2="402" stroke="#39ff14" stroke-width="2.5"/>
  <polygon points="293,402 300,417 307,402" fill="#39ff14"/>

  <!-- let box 3 -->
  <rect x="60" y="420" width="480" height="80" rx="12" fill="#161b27" stroke="#39ff14" stroke-width="2"/>
  <text x="80" y="450" fill="#aaaaaa" font-size="13">Stap 3 — opnieuw aanpassen:</text>
  <text x="80" y="475" fill="#00d4ff" font-size="16" font-family="'Courier New', monospace"> score</text>
  <text x="154" y="475" fill="#ffffff" font-size="16" font-family="'Courier New', monospace"> = </text>
  <text x="180" y="475" fill="#39ff14" font-size="16" font-family="'Courier New', monospace">25</text>
  <text x="204" y="475" fill="#ffffff" font-size="16" font-family="'Courier New', monospace">;</text>

  <!-- when to use let -->
  <rect x="60" y="530" width="480" height="160" rx="12" fill="#0a1f0a" stroke="#39ff14" stroke-width="1.5"/>
  <text x="300" y="560" fill="#39ff14" font-size="15" font-weight="700" text-anchor="middle">Gebruik let wanneer:</text>
  <text x="80" y="588" fill="#ffffff" font-size="14">→  De waarde kan veranderen</text>
  <text x="80" y="612" fill="#ffffff" font-size="14">→  Teller in een lus (i, j, ...)</text>
  <text x="80" y="636" fill="#ffffff" font-size="14">→  Invoer van de gebruiker</text>
  <text x="80" y="660" fill="#ffffff" font-size="14">→  Resultaat van een berekening</text>

  <!-- RIGHT: const -->
  <text x="900" y="110" fill="#ff6b35" font-size="24" font-weight="700" text-anchor="middle">const</text>
  <text x="900" y="135" fill="#aaaaaa" font-size="14" text-anchor="middle">Waarde blijft altijd hetzelfde</text>

  <!-- const box 1 -->
  <rect x="660" y="155" width="480" height="80" rx="12" fill="#161b27" stroke="#ff6b35" stroke-width="2"/>
  <text x="680" y="185" fill="#aaaaaa" font-size="13">Aanmaken (eenmalig):</text>
  <text x="680" y="210" fill="#7c3aed" font-size="16" font-family="'Courier New', monospace">const</text>
  <text x="728" y="210" fill="#ff6b35" font-size="16" font-family="'Courier New', monospace"> MAX_LEERLINGEN</text>
  <text x="880" y="210" fill="#ffffff" font-size="16" font-family="'Courier New', monospace"> = </text>
  <text x="906" y="210" fill="#39ff14" font-size="16" font-family="'Courier New', monospace">30</text>
  <text x="924" y="210" fill="#ffffff" font-size="16" font-family="'Courier New', monospace">;</text>

  <!-- Lock icon -->
  <g transform="translate(840, 258)">
    <rect x="-25" y="0" width="50" height="38" rx="6" fill="#ff6b35" opacity="0.25" stroke="#ff6b35" stroke-width="2"/>
    <path d="M-12 0 Q0 -20 12 0" stroke="#ff6b35" stroke-width="3" fill="none"/>
    <circle cx="0" cy="19" r="6" fill="#ff6b35"/>
  </g>

  <!-- Error box -->
  <rect x="660" y="322" width="480" height="90" rx="12" fill="#2a0a0a" stroke="#ff6b35" stroke-width="2"/>
  <text x="680" y="352" fill="#ff6b35" font-size="13" font-weight="700">✗ Dit is VERBODEN:</text>
  <text x="680" y="378" fill="#ff6b35" font-size="16" font-family="'Courier New', monospace">MAX_LEERLINGEN = 35;</text>
  <text x="680" y="400" fill="#ff6b35" font-size="12" font-family="'Courier New', monospace">TypeError: Assignment to constant variable.</text>

  <!-- Error arrow -->
  <line x1="900" y1="415" x2="900" y2="435" stroke="#ff6b35" stroke-width="2"/>
  <polygon points="893,435 900,450 907,435" fill="#ff6b35"/>

  <!-- Error explanation -->
  <rect x="660" y="452" width="480" height="60" rx="12" fill="#1a0a0a" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="900" y="478" fill="#ff6b35" font-size="14" text-anchor="middle">JavaScript gooit een TypeError!</text>
  <text x="900" y="498" fill="#aaaaaa" font-size="12" text-anchor="middle">De code stopt met uitvoeren.</text>

  <!-- when to use const -->
  <rect x="660" y="530" width="480" height="160" rx="12" fill="#1a0a00" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="900" y="560" fill="#ff6b35" font-size="15" font-weight="700" text-anchor="middle">Gebruik const wanneer:</text>
  <text x="680" y="588" fill="#ffffff" font-size="14">→  Vaste configuratiewaarden</text>
  <text x="680" y="612" fill="#ffffff" font-size="14">→  Maximum of minimum waarden</text>
  <text x="680" y="636" fill="#ffffff" font-size="14">→  Namen of titels die niet veranderen</text>
  <text x="680" y="660" fill="#ffffff" font-size="14">→  Wiskundige constanten (PI, EULERS)</text>

  <!-- Bottom tip -->
  <rect x="80" y="715" width="1040" height="60" rx="10" fill="#0d1a2a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="600" y="741" fill="#00d4ff" font-size="15" font-weight="700" text-anchor="middle">💡 Gouden regel</text>
  <text x="600" y="763" fill="#ffffff" font-size="14" text-anchor="middle">Gebruik standaard altijd  const  — schakel over naar  let  als je de waarde moet wijzigen.</text>
</svg>
