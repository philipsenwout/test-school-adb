<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f1117"/>

  <text x="600" y="46" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#00d4ff">Oefening — Puntenbeoordeling</text>
  <text x="600" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#8892a4">Verwachte console-uitvoer voor vier testwaarden</text>

  <!-- Browser window -->
  <rect x="100" y="94" width="1000" height="672" rx="14" fill="#1a1d26" stroke="#2d3448" stroke-width="2"/>
  <!-- Browser chrome -->
  <rect x="100" y="94" width="1000" height="42" rx="14" fill="#1e2438"/>
  <rect x="100" y="122" width="1000" height="14" fill="#1e2438"/>
  <!-- Traffic lights -->
  <circle cx="132" cy="115" r="7" fill="#ff5f57"/>
  <circle cx="156" cy="115" r="7" fill="#febc2e"/>
  <circle cx="180" cy="115" r="7" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="210" y="104" width="720" height="22" rx="5" fill="#0f1117" stroke="#2d3448" stroke-width="1"/>
  <text x="570" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">oefening-puntenbeoordeling.js</text>

  <!-- DevTools panel -->
  <rect x="100" y="136" width="1000" height="630" rx="0" fill="#0f1117"/>
  <rect x="100" y="136" width="1000" height="8" fill="#0f1117"/>

  <!-- Console header -->
  <rect x="100" y="136" width="1000" height="36" fill="#12161f" stroke-width="0"/>
  <text x="136" y="160" font-family="'Courier New', monospace" font-size="13" fill="#8892a4">Console</text>
  <line x1="100" y1="172" x2="1100" y2="172" stroke="#2d3448" stroke-width="1"/>

  <!-- Code section header -->
  <rect x="116" y="182" width="968" height="210" rx="8" fill="#12161f" stroke="#2d3448" stroke-width="1"/>
  <text x="136" y="202" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">// JavaScript code — puntenbeoordeling.js</text>
  <text x="136" y="224" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed">let</text>
  <text x="168" y="224" font-family="'Courier New', monospace" font-size="13" fill="#ffffff"> punt = </text>
  <text x="242" y="224" font-family="'Courier New', monospace" font-size="13" fill="#39ff14">95</text>
  <text x="258" y="224" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">;</text>
  <text x="136" y="246" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed">if</text>
  <text x="158" y="246" font-family="'Courier New', monospace" font-size="13" fill="#ffffff"> (punt &gt;= 90) { console.log(</text>
  <text x="438" y="246" font-family="'Courier New', monospace" font-size="13" fill="#e8c585">"Uitstekend!"</text>
  <text x="536" y="246" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">); }</text>
  <text x="136" y="268" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed">else if</text>
  <text x="196" y="268" font-family="'Courier New', monospace" font-size="13" fill="#ffffff"> (punt &gt;= 70) { console.log(</text>
  <text x="480" y="268" font-family="'Courier New', monospace" font-size="13" fill="#e8c585">"Goed"</text>
  <text x="524" y="268" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">); }</text>
  <text x="136" y="290" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed">else if</text>
  <text x="196" y="290" font-family="'Courier New', monospace" font-size="13" fill="#ffffff"> (punt &gt;= 50) { console.log(</text>
  <text x="480" y="290" font-family="'Courier New', monospace" font-size="13" fill="#e8c585">"Voldoende"</text>
  <text x="558" y="290" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">); }</text>
  <text x="136" y="312" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed">else</text>
  <text x="172" y="312" font-family="'Courier New', monospace" font-size="13" fill="#ffffff"> { console.log(</text>
  <text x="334" y="312" font-family="'Courier New', monospace" font-size="13" fill="#e8c585">"Onvoldoende"</text>
  <text x="434" y="312" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">); }</text>

  <line x1="116" y1="402" x2="1084" y2="402" stroke="#2d3448" stroke-width="1"/>

  <!-- Console output header -->
  <text x="136" y="424" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">// Console uitvoer voor 4 testwaarden:</text>

  <!-- Row 1: punt = 95 -->
  <rect x="116" y="432" width="968" height="52" rx="6" fill="#12161f"/>
  <text x="136" y="452" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt = 95</text>
  <text x="230" y="452" font-family="'Courier New', monospace" font-size="12" fill="#2d3448">|</text>
  <text x="244" y="452" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt &gt;= 90 →</text>
  <text x="356" y="452" font-family="'Courier New', monospace" font-size="12" fill="#39ff14">true</text>
  <rect x="432" y="436" width="8" height="34" rx="2" fill="#7c3aed"/>
  <text x="452" y="456" font-family="'Courier New', monospace" font-size="18" fill="#7c3aed" font-weight="bold">✦ Uitstekend!</text>
  <text x="620" y="456" font-family="'Courier New', monospace" font-size="13" fill="#a38dd0">punt: 90–100 | categorie: top</text>

  <!-- Row 2: punt = 78 -->
  <rect x="116" y="488" width="968" height="52" rx="6" fill="#0f1117"/>
  <text x="136" y="508" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt = 78</text>
  <text x="230" y="508" font-family="'Courier New', monospace" font-size="12" fill="#2d3448">|</text>
  <text x="244" y="508" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt &gt;= 70 →</text>
  <text x="356" y="508" font-family="'Courier New', monospace" font-size="12" fill="#39ff14">true</text>
  <rect x="432" y="492" width="8" height="34" rx="2" fill="#39ff14"/>
  <text x="452" y="512" font-family="'Courier New', monospace" font-size="18" fill="#39ff14" font-weight="bold">✔ Goed</text>
  <text x="556" y="512" font-family="'Courier New', monospace" font-size="13" fill="#6baa78">punt: 70–89 | goed prestatie</text>

  <!-- Row 3: punt = 63 -->
  <rect x="116" y="544" width="968" height="52" rx="6" fill="#12161f"/>
  <text x="136" y="564" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt = 63</text>
  <text x="230" y="564" font-family="'Courier New', monospace" font-size="12" fill="#2d3448">|</text>
  <text x="244" y="564" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt &gt;= 50 →</text>
  <text x="356" y="564" font-family="'Courier New', monospace" font-size="12" fill="#39ff14">true</text>
  <rect x="432" y="548" width="8" height="34" rx="2" fill="#00d4ff"/>
  <text x="452" y="568" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff" font-weight="bold">~ Voldoende</text>
  <text x="600" y="568" font-family="'Courier New', monospace" font-size="13" fill="#5599bb">punt: 50–69 | geslaagd</text>

  <!-- Row 4: punt = 34 -->
  <rect x="116" y="600" width="968" height="52" rx="6" fill="#0f1117"/>
  <text x="136" y="620" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">punt = 34</text>
  <text x="230" y="620" font-family="'Courier New', monospace" font-size="12" fill="#2d3448">|</text>
  <text x="244" y="620" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">geen enkele →</text>
  <text x="360" y="620" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">false</text>
  <rect x="432" y="604" width="8" height="34" rx="2" fill="#ff4444"/>
  <text x="452" y="624" font-family="'Courier New', monospace" font-size="18" fill="#ff4444" font-weight="bold">✗ Onvoldoende</text>
  <text x="638" y="624" font-family="'Courier New', monospace" font-size="13" fill="#aa5555">punt: 0–49 | niet geslaagd</text>

  <!-- Ternary bonus -->
  <line x1="116" y1="660" x2="1084" y2="660" stroke="#2d3448" stroke-width="1"/>
  <text x="136" y="680" font-family="'Courier New', monospace" font-size="12" fill="#6b7280">// Uitbreiding — ternaire operator:</text>
  <text x="136" y="700" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed">let</text>
  <text x="166" y="700" font-family="'Courier New', monospace" font-size="13" fill="#ffffff"> status = punt &gt;= 50</text>
  <text x="380" y="700" font-family="'Courier New', monospace" font-size="16" fill="#00d4ff" font-weight="bold"> ?</text>
  <text x="400" y="700" font-family="'Courier New', monospace" font-size="13" fill="#39ff14"> "geslaagd"</text>
  <text x="508" y="700" font-family="'Courier New', monospace" font-size="16" fill="#00d4ff" font-weight="bold"> :</text>
  <text x="528" y="700" font-family="'Courier New', monospace" font-size="13" fill="#ff4444"> "niet geslaagd"</text>
  <text x="684" y="700" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">;</text>
  <text x="136" y="722" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">// → (voor punt = 63):</text>
  <text x="310" y="722" font-family="'Courier New', monospace" font-size="14" fill="#39ff14">"geslaagd"</text>
  <text x="136" y="744" font-family="'Courier New', monospace" font-size="13" fill="#6b7280">// → (voor punt = 34):</text>
  <text x="310" y="744" font-family="'Courier New', monospace" font-size="14" fill="#ff4444">"niet geslaagd"</text>
</svg>
