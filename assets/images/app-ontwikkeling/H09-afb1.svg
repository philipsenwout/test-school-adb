<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">CSS Kleurnotaties — HEX, RGB en HSL</text>

  <!-- HEX sectie -->
  <rect x="30" y="55" width="225" height="200" rx="8" fill="#7B3FE4" opacity="0.1"/>
  <rect x="30" y="55" width="225" height="200" rx="8" fill="none" stroke="#7B3FE4" stroke-width="2"/>
  <text x="142" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#7B3FE4">HEX</text>
  <rect x="60" y="90" width="165" height="40" rx="4" fill="#7B3FE4"/>
  <text x="142" y="116" text-anchor="middle" font-size="16" font-weight="bold" fill="white" font-family="Courier New">#7B3FE4</text>
  <text x="70" y="150" font-size="11" fill="#aaa">7B = Rood (0-FF)</text>
  <text x="70" y="168" font-size="11" fill="#aaa">3F = Groen (0-FF)</text>
  <text x="70" y="186" font-size="11" fill="#aaa">E4 = Blauw (0-FF)</text>
  <text x="142" y="220" text-anchor="middle" font-size="11" fill="#555">Hexadecimaal (0-9, A-F)</text>
  <text x="142" y="240" text-anchor="middle" font-size="11" fill="#555">#RGB als shorthand: #7B3 = #77BB33</text>

  <!-- RGB sectie -->
  <rect x="290" y="55" width="220" height="200" rx="8" fill="#2D9CDB" opacity="0.1"/>
  <rect x="290" y="55" width="220" height="200" rx="8" fill="none" stroke="#2D9CDB" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D9CDB">RGB / RGBA</text>
  <rect x="320" y="90" width="160" height="40" rx="4" fill="rgb(45, 156, 219)"/>
  <text x="400" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Courier New">rgb(45,156,219)</text>
  <text x="310" y="150" font-size="11" fill="#aaa">R: Rood  (0-255)</text>
  <text x="310" y="168" font-size="11" fill="#aaa">G: Groen (0-255)</text>
  <text x="310" y="186" font-size="11" fill="#aaa">B: Blauw (0-255)</text>
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#555">rgba(45,156,219, 0.5)</text>
  <text x="400" y="236" text-anchor="middle" font-size="11" fill="#555">Alpha = doorzichtigheid (0-1)</text>

  <!-- HSL sectie -->
  <rect x="545" y="55" width="225" height="200" rx="8" fill="#22C55E" opacity="0.1"/>
  <rect x="545" y="55" width="225" height="200" rx="8" fill="none" stroke="#22C55E" stroke-width="2"/>
  <text x="658" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#22C55E">HSL / HSLA</text>
  <rect x="575" y="90" width="165" height="40" rx="4" fill="hsl(140, 60%, 40%)"/>
  <text x="658" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Courier New">hsl(140,60%,40%)</text>
  <text x="565" y="150" font-size="11" fill="#aaa">H: Tint (0-360°)</text>
  <text x="565" y="168" font-size="11" fill="#aaa">S: Verzadiging (0-100%)</text>
  <text x="565" y="186" font-size="11" fill="#aaa">L: Helderheid (0-100%)</text>
  <text x="658" y="218" text-anchor="middle" font-size="11" fill="#555">Meest intuitief voor designers</text>
  <text x="658" y="236" text-anchor="middle" font-size="11" fill="#555">Eenvoudig aanpassen: alleen L</text>

  <!-- Kleurenwiel indicatie voor HSL -->
  <circle cx="400" cy="310" r="45" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Hue kleuren op het wiel -->
  <path d="M400,310 L445,310" stroke="red" stroke-width="3"/>
  <text x="452" y="314" font-size="10" fill="red">0°</text>
  <path d="M400,310 L422,271" stroke="#88ff00" stroke-width="3"/>
  <text x="427" y="268" font-size="10" fill="#88ff00">90°</text>
  <path d="M400,310 L355,310" stroke="cyan" stroke-width="3"/>
  <text x="320" y="314" font-size="10" fill="cyan">180°</text>
  <path d="M400,310 L378,349" stroke="#7B3FE4" stroke-width="3"/>
  <text x="355" y="360" font-size="10" fill="#7B3FE4">270°</text>
  <text x="400" y="372" text-anchor="middle" font-size="11" fill="#aaa">Kleurenwiel — Hue-waarden (0–360°)</text>
</svg>
