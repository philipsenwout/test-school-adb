<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">CSS Specificiteit — Wie wint bij conflict?</text>

  <!-- Piramide -->
  <!-- Niveau 4: !important (top) -->
  <polygon points="400,55 470,120 330,120" fill="#EF4444" opacity="0.9"/>
  <text x="400" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">!important</text>

  <!-- Niveau 3: Inline stijlen -->
  <polygon points="330,120 470,120 510,185 290,185" fill="#F97316" opacity="0.85"/>
  <text x="400" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Inline stijlen</text>
  <text x="400" y="176" text-anchor="middle" font-size="11" fill="white">style="..."</text>

  <!-- Niveau 2: ID selectors -->
  <polygon points="290,185 510,185 555,255 245,255" fill="#7B3FE4" opacity="0.8"/>
  <text x="400" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ID Selectors</text>
  <text x="400" y="247" text-anchor="middle" font-size="12" fill="white">#mijn-id { }</text>

  <!-- Niveau 1: Class/attribuut/pseudo-klasse -->
  <polygon points="245,255 555,255 605,325 195,325" fill="#2D9CDB" opacity="0.75"/>
  <text x="400" y="296" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Class / Attribuut / Pseudo-klasse</text>
  <text x="400" y="314" text-anchor="middle" font-size="12" fill="white">.klasse { }   [attr] { }   :hover { }</text>

  <!-- Niveau 0: Element/pseudo-element (basis) -->
  <polygon points="195,325 605,325 650,370 150,370" fill="#22C55E" opacity="0.7"/>
  <text x="400" y="354" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Element / Pseudo-element</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="white">h1 { }   p { }   ::before { }</text>

  <!-- Specificiteitswaarden rechts -->
  <text x="670" y="100" font-size="13" fill="#EF4444" font-weight="bold">∞</text>
  <text x="690" y="100" font-size="11" fill="#aaa">altijd wint</text>
  <text x="670" y="160" font-size="13" fill="#F97316" font-weight="bold">1,0,0,0</text>
  <text x="670" y="228" font-size="13" fill="#7B3FE4" font-weight="bold">0,1,0,0</text>
  <text x="670" y="296" font-size="13" fill="#2D9CDB" font-weight="bold">0,0,1,0</text>
  <text x="670" y="354" font-size="13" fill="#22C55E" font-weight="bold">0,0,0,1</text>

  <!-- Voorbeeld links -->
  <text x="30" y="100" font-size="11" fill="#EF4444">color: red !important;</text>
  <text x="30" y="160" font-size="11" fill="#F97316" font-family="Courier New">&lt;p style="color:red"&gt;</text>
  <text x="30" y="228" font-size="11" fill="#7B3FE4" font-family="Courier New">#titel { color: red; }</text>
  <text x="30" y="296" font-size="11" fill="#2D9CDB" font-family="Courier New">.klasse { color: red; }</text>
  <text x="30" y="354" font-size="11" fill="#22C55E" font-family="Courier New">p { color: red; }</text>
</svg>
