<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">logisch.html</text>

  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="90" font-size="12" fill="#94a3b8">// Logische operatoren</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> leeftijd = </tspan><tspan fill="#ff6b35">20</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="138" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> heeftRijbewijs = </tspan><tspan fill="#ff6b35">true</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="161" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> isMoe = </tspan><tspan fill="#ff6b35">false</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="194" font-size="12" fill="#94a3b8">// &amp;&amp; — beide moeten true zijn</text>
  <text x="40" y="217" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> magRijden = leeftijd &gt;= </tspan><tspan fill="#ff6b35">18</tspan><tspan fill="#ffffff"> &amp;&amp; heeftRijbewijs &amp;&amp; !isMoe;</tspan></text>
  <text x="40" y="240" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(magRijden);</tspan></text>
  <text x="40" y="275" font-size="12" fill="#94a3b8">// || — één mag true zijn</text>
  <text x="40" y="298" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> heeftKorting = leeftijd &lt; </tspan><tspan fill="#ff6b35">26</tspan><tspan fill="#ffffff"> || leeftijd &gt; </tspan><tspan fill="#ff6b35">65</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="321" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(heeftKorting);</tspan></text>
  <text x="40" y="358" font-size="12" fill="#94a3b8">// ?? nullish coalescing</text>
  <text x="40" y="381" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> gebruikersNaam = </tspan><tspan fill="#ff6b35">null</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="404" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> weergaveNaam = gebruikersNaam ?? </tspan><tspan fill="#ff6b35">"Gast"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="427" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(weergaveNaam);</tspan></text>
  <text x="40" y="462" font-size="12" fill="#94a3b8">// Short-circuit</text>
  <text x="40" y="485" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> x = </tspan><tspan fill="#ff6b35">null</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="508" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(x || </tspan><tspan fill="#ff6b35">"standaard"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="600" y="120" font-size="12" fill="#94a3b8">// 20&gt;=18 &amp;&amp; heeftRijbewijs &amp;&amp; !false</text>
  <text x="600" y="148" font-size="16" font-family="monospace" fill="#39ff14">true</text><text x="660" y="148" font-size="12" fill="#94a3b8"> ← alle drie true</text>
  <line x1="600" y1="160" x2="1160" y2="160" stroke="#333" stroke-width="1"/>
  <text x="600" y="188" font-size="12" fill="#94a3b8">// 20 &lt; 26 || 20 &gt; 65</text>
  <text x="600" y="216" font-size="16" font-family="monospace" fill="#39ff14">true</text><text x="660" y="216" font-size="12" fill="#94a3b8"> ← eerste deel (20&lt;26) is true</text>
  <line x1="600" y1="228" x2="1160" y2="228" stroke="#333" stroke-width="1"/>
  <text x="600" y="260" font-size="12" fill="#94a3b8">// null ?? "Gast" → null dus fallback</text>
  <text x="600" y="288" font-size="16" font-family="monospace" fill="#39ff14">Gast</text><text x="660" y="288" font-size="12" fill="#94a3b8"> ← ?? geeft rechterkant als null/undefined</text>
  <line x1="600" y1="300" x2="1160" y2="300" stroke="#333" stroke-width="1"/>
  <text x="600" y="328" font-size="12" fill="#94a3b8">// null || "standaard" → short-circuit</text>
  <text x="600" y="356" font-size="16" font-family="monospace" fill="#39ff14">standaard</text>
  <line x1="600" y1="368" x2="1160" y2="368" stroke="#333" stroke-width="1"/>

  <rect x="600" y="400" width="560" height="240" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="880" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#00d4ff">Waarheidstabel &amp;&amp; en ||</text>
  <text x="640" y="458" font-size="12" font-weight="bold" fill="#94a3b8">A</text>
  <text x="700" y="458" font-size="12" font-weight="bold" fill="#94a3b8">B</text>
  <text x="760" y="458" font-size="12" font-weight="bold" fill="#00d4ff">A &amp;&amp; B</text>
  <text x="880" y="458" font-size="12" font-weight="bold" fill="#ff6b35">A || B</text>
  <line x1="620" y1="465" x2="1140" y2="465" stroke="#333" stroke-width="0.5"/>
  <text x="640" y="487" font-size="12" fill="#39ff14">T</text><text x="700" y="487" font-size="12" fill="#39ff14">T</text><text x="780" y="487" font-size="12" fill="#39ff14">true</text><text x="880" y="487" font-size="12" fill="#39ff14">true</text>
  <text x="640" y="510" font-size="12" fill="#39ff14">T</text><text x="700" y="510" font-size="12" fill="#ff6b35">F</text><text x="780" y="510" font-size="12" fill="#ff6b35">false</text><text x="880" y="510" font-size="12" fill="#39ff14">true</text>
  <text x="640" y="533" font-size="12" fill="#ff6b35">F</text><text x="700" y="533" font-size="12" fill="#39ff14">T</text><text x="780" y="533" font-size="12" fill="#ff6b35">false</text><text x="880" y="533" font-size="12" fill="#39ff14">true</text>
  <text x="640" y="556" font-size="12" fill="#ff6b35">F</text><text x="700" y="556" font-size="12" fill="#ff6b35">F</text><text x="780" y="556" font-size="12" fill="#ff6b35">false</text><text x="880" y="556" font-size="12" fill="#ff6b35">false</text>
  <text x="880" y="615" text-anchor="middle" font-size="12" fill="#94a3b8">! keert de boolean om: !true → false</text>

  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
