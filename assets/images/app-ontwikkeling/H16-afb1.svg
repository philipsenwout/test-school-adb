<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="1">Hoe ogen tekst lezen — Saccades &amp; Fixatiepunten</text>
  <line x1="200" y1="65" x2="1000" y2="65" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>

  <!-- === TEXT BLOCK === -->
  <rect x="60" y="90" width="870" height="200" rx="10" fill="#161b27" stroke="#1e2d3d" stroke-width="1.5"/>
  <text x="90" y="120" font-size="13" fill="#aaaaaa" letter-spacing="0.5">Tekst die de leerling leest:</text>

  <!-- Line 1 -->
  <text x="90" y="152" font-size="18" fill="#e8e8e8" letter-spacing="0.3">Typografie is de kunst van het rangschikken van letters en tekst</text>
  <!-- Line 2 -->
  <text x="90" y="192" font-size="18" fill="#e8e8e8" letter-spacing="0.3">zodat ze leesbaar, begrijpelijk en visueel aantrekkelijk zijn</text>
  <!-- Line 3 -->
  <text x="90" y="232" font-size="18" fill="#e8e8e8" letter-spacing="0.3">voor de lezer die de inhoud wil begrijpen en verwerken.</text>

  <!-- === SACCADE ARCS — Line 1 === -->
  <!-- Saccade 1: Typografie → kunst -->
  <path d="M 142 145 Q 195 118 250 145" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <!-- Saccade 2: kunst → rangschikken -->
  <path d="M 250 145 Q 330 112 415 145" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <!-- Saccade 3: rangschikken → tekst -->
  <path d="M 415 145 Q 495 115 570 145" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <!-- Saccade 4: tekst → leesbaar -->
  <path d="M 570 145 Q 650 112 730 145" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>

  <!-- Saccade arcs — Line 2 -->
  <path d="M 115 185 Q 200 160 285 185" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <path d="M 285 185 Q 380 158 470 185" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <path d="M 470 185 Q 565 158 650 185" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>

  <!-- Saccade arcs — Line 3 -->
  <path d="M 120 225 Q 215 198 310 225" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <path d="M 310 225 Q 415 198 520 225" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>
  <path d="M 520 225 Q 610 200 695 225" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)"/>

  <!-- Fixation points — Line 1 -->
  <circle cx="142" cy="152" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="142" cy="152" r="3" fill="#39ff14"/>
  <circle cx="250" cy="152" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="250" cy="152" r="3" fill="#39ff14"/>
  <circle cx="415" cy="152" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="415" cy="152" r="3" fill="#39ff14"/>
  <circle cx="570" cy="152" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="570" cy="152" r="3" fill="#39ff14"/>
  <circle cx="730" cy="152" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="730" cy="152" r="3" fill="#39ff14"/>

  <!-- Fixation points — Line 2 -->
  <circle cx="115" cy="192" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="115" cy="192" r="3" fill="#39ff14"/>
  <circle cx="285" cy="192" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="285" cy="192" r="3" fill="#39ff14"/>
  <circle cx="470" cy="192" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="470" cy="192" r="3" fill="#39ff14"/>
  <circle cx="650" cy="192" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="650" cy="192" r="3" fill="#39ff14"/>

  <!-- Fixation points — Line 3 -->
  <circle cx="120" cy="232" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="120" cy="232" r="3" fill="#39ff14"/>
  <circle cx="310" cy="232" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="310" cy="232" r="3" fill="#39ff14"/>
  <circle cx="520" cy="232" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="520" cy="232" r="3" fill="#39ff14"/>
  <circle cx="695" cy="232" r="7" fill="none" stroke="#39ff14" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="695" cy="232" r="3" fill="#39ff14"/>

  <!-- === LEGEND PANEL === -->
  <rect x="960" y="90" width="210" height="200" rx="10" fill="#161b27" stroke="#1e2d3d" stroke-width="1.5"/>
  <text x="1065" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Legende</text>
  <line x1="975" y1="126" x2="1155" y2="126" stroke="#1e2d3d" stroke-width="1"/>

  <!-- Saccade legend -->
  <path d="M 980 152 Q 1010 136 1040 152" fill="none" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <text x="1055" y="156" font-size="13" fill="#00d4ff" font-weight="600">Saccades</text>
  <text x="1055" y="171" font-size="11" fill="#888">sprongetjes v.h. oog</text>

  <!-- Fixation legend -->
  <circle cx="997" cy="204" r="7" fill="none" stroke="#39ff14" stroke-width="2.5"/>
  <circle cx="997" cy="204" r="3" fill="#39ff14"/>
  <text x="1012" y="208" font-size="13" fill="#39ff14" font-weight="600">Fixatiepunten</text>
  <text x="1012" y="223" font-size="11" fill="#888">pauzes (200–300 ms)</text>

  <!-- Duration callout -->
  <rect x="975" y="238" width="182" height="40" rx="6" fill="#0f1117" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1066" y="254" text-anchor="middle" font-size="11" fill="#c4b5fd">Saccade = 20–200 ms</text>
  <text x="1066" y="270" text-anchor="middle" font-size="11" fill="#c4b5fd">Fixatie = 200–300 ms</text>

  <!-- === WORD SHAPE PROOF SECTION === -->
  <rect x="60" y="315" width="1110" height="145" rx="10" fill="#161b27" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="88" y="342" font-size="14" font-weight="700" fill="#ff6b35">Bewijs: we lezen woordbeelden, niet letter per letter</text>
  <line x1="75" y1="352" x2="1155" y2="352" stroke="#ff6b35" stroke-width="0.8" opacity="0.4"/>

  <!-- Scrambled word display -->
  <text x="88" y="385" font-size="22" fill="#ffffff" letter-spacing="1" font-weight="600">Aoclhol</text>
  <text x="88" y="410" font-size="13" fill="#888">→ Alcohol</text>

  <text x="260" y="385" font-size="22" fill="#ffffff" letter-spacing="1" font-weight="600">Tipogyafre</text>
  <text x="260" y="410" font-size="13" fill="#888">→ Typografie</text>

  <text x="490" y="385" font-size="22" fill="#ffffff" letter-spacing="1" font-weight="600">De bnard in de NoeDmtar-e...</text>
  <text x="490" y="410" font-size="13" fill="#888">→ Je leest het toch! (brand in Notre-Dame)</text>

  <text x="88" y="448" font-size="13" fill="#aaaaaa">Zolang de eerste en laatste letter kloppen, herkent ons brein het woord via de globale <tspan fill="#00d4ff" font-weight="600">woordvorm (shape)</tspan>.</text>

  <!-- === KEY INSIGHT BOXES === -->
  <!-- Box 1: Implicatie voor ontwerp -->
  <rect x="60" y="480" width="350" height="130" rx="10" fill="#0a1628" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="60" y="480" width="350" height="36" rx="10" fill="#00d4ff" opacity="0.15"/>
  <text x="235" y="503" text-anchor="middle" font-size="14" font-weight="700" fill="#00d4ff">Implicatie voor ontwerp</text>
  <text x="80" y="530" font-size="13" fill="#e0e0e0">✓  Gebruik bekende lettervormen</text>
  <text x="80" y="550" font-size="13" fill="#e0e0e0">✓  Vermijd AL CAPS voor lange tekst</text>
  <text x="80" y="570" font-size="13" fill="#e0e0e0">✓  Regellengte bepaalt het leesritme</text>
  <text x="80" y="590" font-size="13" fill="#e0e0e0">✓  Witruimte helpt oog fixeren</text>

  <!-- Box 2: Oogbewegingen statistieken -->
  <rect x="435" y="480" width="350" height="130" rx="10" fill="#0a1628" stroke="#39ff14" stroke-width="1.5"/>
  <rect x="435" y="480" width="350" height="36" rx="10" fill="#39ff14" opacity="0.1"/>
  <text x="610" y="503" text-anchor="middle" font-size="14" font-weight="700" fill="#39ff14">Oogbeweging — cijfers</text>
  <text x="455" y="530" font-size="13" fill="#e0e0e0">👁  7–9 woorden per fixatie (gemiddeld)</text>
  <text x="455" y="550" font-size="13" fill="#e0e0e0">⚡  Saccade duurt 20–200 ms</text>
  <text x="455" y="570" font-size="13" fill="#e0e0e0">⏸  Fixatie duurt 200–300 ms</text>
  <text x="455" y="590" font-size="13" fill="#e0e0e0">↩  5–15% regressies (terugspringen)</text>

  <!-- Box 3: CSS tip -->
  <rect x="810" y="480" width="360" height="130" rx="10" fill="#0a1628" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="810" y="480" width="360" height="36" rx="10" fill="#7c3aed" opacity="0.2"/>
  <text x="990" y="503" text-anchor="middle" font-size="14" font-weight="700" fill="#c4b5fd">CSS — Leesbaarheid</text>
  <rect x="828" y="515" width="324" height="82" rx="6" fill="#0f1117"/>
  <text x="840" y="534" font-size="12" font-family="'Courier New', monospace" fill="#7c3aed">line-height</text>
  <text x="940" y="534" font-size="12" font-family="'Courier New', monospace" fill="#ffffff">: 1.6;      </text>
  <text x="840" y="552" font-size="12" font-family="'Courier New', monospace" fill="#7c3aed">max-width</text>
  <text x="935" y="552" font-size="12" font-family="'Courier New', monospace" fill="#ffffff">: 70ch;     </text>
  <text x="840" y="570" font-size="12" font-family="'Courier New', monospace" fill="#7c3aed">font-size</text>
  <text x="930" y="570" font-size="12" font-family="'Courier New', monospace" fill="#ffffff">: 1.1rem;   </text>
  <text x="840" y="588" font-size="12" font-family="'Courier New', monospace" fill="#7c3aed">letter-spacing</text>
  <text x="960" y="588" font-size="12" font-family="'Courier New', monospace" fill="#ffffff">: 0.02em;</text>

  <!-- === BOTTOM: EYE SCAN PATH VISUALIZATION === -->
  <rect x="60" y="630" width="1110" height="140" rx="10" fill="#161b27" stroke="#1e2d3d" stroke-width="1.5"/>
  <text x="88" y="658" font-size="14" font-weight="700" fill="#ffffff">Gutenberg-diagram — Visueel leespad over een pagina</text>

  <!-- Page zones -->
  <rect x="88" y="670" width="240" height="85" rx="6" fill="#00d4ff" opacity="0.08" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="208" y="700" text-anchor="middle" font-size="12" fill="#00d4ff" font-weight="600">Primaire optische zone</text>
  <text x="208" y="718" text-anchor="middle" font-size="11" fill="#888">Links-boven: eerste blik</text>
  <text x="208" y="736" text-anchor="middle" font-size="11" fill="#888">Logo / H1 hier plaatsen</text>

  <rect x="488" y="670" width="240" height="85" rx="6" fill="#888" opacity="0.06" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="608" y="700" text-anchor="middle" font-size="12" fill="#888">Sterk inactief gebied</text>
  <text x="608" y="720" text-anchor="middle" font-size="11" fill="#666">Midden: vaak geskipt</text>

  <rect x="880" y="670" width="240" height="85" rx="6" fill="#ff6b35" opacity="0.08" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1000" y="700" text-anchor="middle" font-size="12" fill="#ff6b35" font-weight="600">Terminale zone</text>
  <text x="1000" y="718" text-anchor="middle" font-size="11" fill="#888">Rechts-onder: CTA hier</text>
  <text x="1000" y="736" text-anchor="middle" font-size="11" fill="#888">Knop / Conclusie</text>

  <!-- Diagonal scan arrow -->
  <path d="M 200 695 Q 600 712 920 742" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrow-cyan)" opacity="0.7"/>

  <!-- Footer label -->
  <text x="600" y="785" text-anchor="middle" font-size="12" fill="#555">H16 — Typografie | App-ontwikkeling 5ADB | Leerplandoel ADB09</text>
</svg>
