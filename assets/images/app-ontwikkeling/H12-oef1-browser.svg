<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">navigatie.html</text>

  <!-- Nav bar: dark background, flexbox: site name left, links right -->
  <rect x="0" y="44" width="900" height="54" fill="#1a1a2e"/>

  <!-- Site name left -->
  <text x="30" y="77" font-size="20" font-weight="bold" fill="#ffffff">TechSchool</text>

  <!-- Nav links right (space-between result) -->
  <text x="570" y="77" font-size="15" fill="#ccccff">Home</text>
  <text x="640" y="77" font-size="15" fill="#ccccff">Cursussen</text>
  <text x="740" y="77" font-size="15" fill="#ccccff">Over ons</text>
  <text x="820" y="77" font-size="15" fill="#ccccff">Contact</text>

  <!-- Flexbox label annotation below nav -->
  <line x1="0" y1="98" x2="900" y2="98" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="118" text-anchor="middle" font-size="13" fill="#888" font-style="italic">display: flex; justify-content: space-between; align-items: center;</text>

  <!-- Arrow showing flex direction -->
  <line x1="100" y1="135" x2="800" y2="135" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="450" y="129" text-anchor="middle" font-size="12" fill="#aaa">hoofdas (row) →</text>

  <!-- Page body below -->
  <text x="40" y="185" font-size="16" fill="#333">De navigatiebalk gebruikt Flexbox om de sitenaam links en de links rechts te plaatsen.</text>
  <text x="40" y="213" font-size="16" fill="#333">justify-content: space-between duwt de twee groepen naar de uiteinden.</text>
  <text x="40" y="241" font-size="16" fill="#333">align-items: center centreert ze verticaal in de balk.</text>
</svg>
