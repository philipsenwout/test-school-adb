<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1200" height="800" fill="#0f1117"/>
  <rect x="20" y="20" width="1160" height="760" rx="10" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="40" rx="10" fill="#2d2d3d"/>
  <rect x="20" y="48" width="1160" height="12" fill="#2d2d3d"/>
  <circle cx="50" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="7" fill="#febc2e"/>
  <circle cx="98" cy="40" r="7" fill="#28c840"/>
  <rect x="200" y="28" width="600" height="24" rx="4" fill="#1a1a2e"/>
  <text x="500" y="45" text-anchor="middle" font-size="13" fill="#94a3b8">vergelijken.html</text>

  <rect x="20" y="60" width="560" height="720" fill="#1a1a2e"/>
  <text x="40" y="90" font-size="12" fill="#94a3b8">// Vergelijkingsoperatoren</text>
  <text x="40" y="115" font-size="13" font-family="monospace"><tspan fill="#00d4ff">let</tspan><tspan fill="#ffffff"> leeftijd = </tspan><tspan fill="#ff6b35">17</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="40" y="145" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(leeftijd &gt; </tspan><tspan fill="#ff6b35">18</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="168" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(leeftijd &gt;= </tspan><tspan fill="#ff6b35">16</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="191" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(leeftijd === </tspan><tspan fill="#ff6b35">17</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="214" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(leeftijd !== </tspan><tspan fill="#ff6b35">18</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="250" font-size="12" fill="#94a3b8">// === vs == verschil</text>
  <text x="40" y="273" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">5</tspan><tspan fill="#ffffff"> === </tspan><tspan fill="#ff6b35">"5"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="296" font-size="13" font-family="monospace"><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">5</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#ff6b35">"5"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="40" y="332" font-size="12" fill="#94a3b8">// Truthy/falsy</text>
  <text x="40" y="355" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ff6b35">0</tspan><tspan fill="#ffffff">) { </tspan><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"0 truthy"</tspan><tspan fill="#ffffff">); }</tspan></text>
  <text x="40" y="378" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ff6b35">"hallo"</tspan><tspan fill="#ffffff">) { </tspan><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"truthy!"</tspan><tspan fill="#ffffff">); }</tspan></text>
  <text x="40" y="401" font-size="13" font-family="monospace"><tspan fill="#7c3aed">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ff6b35">null</tspan><tspan fill="#ffffff">) { </tspan><tspan fill="#39ff14">console</tspan><tspan fill="#ffffff">.log(</tspan><tspan fill="#ff6b35">"null truthy"</tspan><tspan fill="#ffffff">); }</tspan></text>

  <!-- Console right -->
  <rect x="580" y="60" width="600" height="720" fill="#1e1e2e"/>
  <rect x="580" y="60" width="600" height="36" fill="#252535"/>
  <text x="635" y="83" text-anchor="middle" font-size="13" fill="#ffffff">Console</text>
  <text x="600" y="115" font-size="12" fill="#94a3b8">// Vergelijkingen met leeftijd = 17</text>
  <text x="600" y="140" font-size="15" font-family="monospace" fill="#ff6b35">false</text><text x="670" y="140" font-size="12" fill="#94a3b8"> ← 17 &gt; 18</text>
  <line x1="600" y1="152" x2="1160" y2="152" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="175" font-size="15" font-family="monospace" fill="#39ff14">true</text><text x="660" y="175" font-size="12" fill="#94a3b8"> ← 17 &gt;= 16</text>
  <line x1="600" y1="187" x2="1160" y2="187" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="210" font-size="15" font-family="monospace" fill="#39ff14">true</text><text x="660" y="210" font-size="12" fill="#94a3b8"> ← 17 === 17</text>
  <line x1="600" y1="222" x2="1160" y2="222" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="245" font-size="15" font-family="monospace" fill="#39ff14">true</text><text x="660" y="245" font-size="12" fill="#94a3b8"> ← 17 !== 18</text>
  <line x1="600" y1="257" x2="1160" y2="257" stroke="#333" stroke-width="1"/>
  <text x="600" y="285" font-size="12" fill="#94a3b8">// === vs ==</text>
  <text x="600" y="308" font-size="15" font-family="monospace" fill="#ff6b35">false</text><text x="670" y="308" font-size="12" fill="#94a3b8"> ← 5 === "5" (types verschillen)</text>
  <line x1="600" y1="320" x2="1160" y2="320" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="343" font-size="15" font-family="monospace" fill="#39ff14">true</text><text x="660" y="343" font-size="12" fill="#ff6b35"> ← 5 == "5" ⚠️ gevaarlijk!</text>
  <line x1="600" y1="355" x2="1160" y2="355" stroke="#333" stroke-width="1"/>
  <text x="600" y="383" font-size="12" fill="#94a3b8">// truthy/falsy</text>
  <text x="600" y="406" font-size="14" font-family="monospace" fill="#94a3b8">(geen output — 0 is falsy)</text>
  <line x1="600" y1="418" x2="1160" y2="418" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="441" font-size="15" font-family="monospace" fill="#39ff14">truthy!</text>
  <line x1="600" y1="453" x2="1160" y2="453" stroke="#333" stroke-width="0.5"/>
  <text x="600" y="476" font-size="14" font-family="monospace" fill="#94a3b8">(geen output — null is falsy)</text>
  <line x1="600" y1="488" x2="1160" y2="488" stroke="#333" stroke-width="1"/>

  <rect x="600" y="510" width="560" height="70" rx="6" fill="#1a2a1a" stroke="#39ff14" stroke-width="1"/>
  <text x="880" y="535" text-anchor="middle" font-size="13" font-weight="bold" fill="#39ff14">Vuistregel</text>
  <text x="880" y="560" text-anchor="middle" font-size="12" fill="#ffffff">Gebruik altijd === en !== — nooit == of !=</text>

  <text x="600" y="755" font-size="13" fill="#94a3b8">&gt;</text>
  <rect x="613" y="740" width="8" height="16" fill="#ffffff" opacity="0.7"/>
</svg>
