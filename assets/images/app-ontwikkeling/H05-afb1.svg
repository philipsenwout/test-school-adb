<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="300" fill="#1a1c28"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0f0f0">Afbeeldingsformaten vergelijking</text>

  <!-- Header -->
  <rect x="40" y="50" width="720" height="35" rx="4" fill="#7B3FE4" opacity="0.6"/>
  <text x="160" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Formaat</text>
  <text x="300" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Type</text>
  <text x="430" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Transparantie</text>
  <text x="560" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Beste voor</text>
  <text x="700" y="72" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Kwaliteit</text>

  <!-- Rijen -->
  <rect x="40" y="85" width="720" height="35" fill="#7B3FE4" opacity="0.1"/>
  <text x="160" y="107" text-anchor="middle" font-size="13" fill="#22C55E" font-weight="bold">SVG</text>
  <text x="300" y="107" text-anchor="middle" font-size="11" fill="#aaa">Vector</text>
  <text x="430" y="107" text-anchor="middle" font-size="11" fill="#22C55E">✓ Ja</text>
  <text x="560" y="107" text-anchor="middle" font-size="11" fill="#aaa">Logo's, iconen, diagrammen</text>
  <text x="700" y="107" text-anchor="middle" font-size="11" fill="#22C55E">Oneindig</text>

  <rect x="40" y="120" width="720" height="35" fill="#2D9CDB" opacity="0.1"/>
  <text x="160" y="142" text-anchor="middle" font-size="13" fill="#2D9CDB" font-weight="bold">JPG/JPEG</text>
  <text x="300" y="142" text-anchor="middle" font-size="11" fill="#aaa">Bitmap</text>
  <text x="430" y="142" text-anchor="middle" font-size="11" fill="#F97316">✗ Nee</text>
  <text x="560" y="142" text-anchor="middle" font-size="11" fill="#aaa">Foto's</text>
  <text x="700" y="142" text-anchor="middle" font-size="11" fill="#aaa">Verliesgevend</text>

  <rect x="40" y="155" width="720" height="35" fill="#7B3FE4" opacity="0.1"/>
  <text x="160" y="177" text-anchor="middle" font-size="13" fill="#7B3FE4" font-weight="bold">PNG</text>
  <text x="300" y="177" text-anchor="middle" font-size="11" fill="#aaa">Bitmap</text>
  <text x="430" y="177" text-anchor="middle" font-size="11" fill="#22C55E">✓ Ja</text>
  <text x="560" y="177" text-anchor="middle" font-size="11" fill="#aaa">Logo's, screenshots, tekeningen</text>
  <text x="700" y="177" text-anchor="middle" font-size="11" fill="#22C55E">Verliesvrij</text>

  <rect x="40" y="190" width="720" height="35" fill="#2D9CDB" opacity="0.1"/>
  <text x="160" y="212" text-anchor="middle" font-size="13" fill="#2D9CDB" font-weight="bold">WebP</text>
  <text x="300" y="212" text-anchor="middle" font-size="11" fill="#aaa">Bitmap</text>
  <text x="430" y="212" text-anchor="middle" font-size="11" fill="#22C55E">✓ Ja</text>
  <text x="560" y="212" text-anchor="middle" font-size="11" fill="#aaa">Alles (modern)</text>
  <text x="700" y="212" text-anchor="middle" font-size="11" fill="#22C55E">Uitstekend</text>

  <rect x="40" y="225" width="720" height="35" fill="#7B3FE4" opacity="0.1"/>
  <text x="160" y="247" text-anchor="middle" font-size="13" fill="#F97316" font-weight="bold">GIF</text>
  <text x="300" y="247" text-anchor="middle" font-size="11" fill="#aaa">Bitmap</text>
  <text x="430" y="247" text-anchor="middle" font-size="11" fill="#22C55E">✓ Ja</text>
  <text x="560" y="247" text-anchor="middle" font-size="11" fill="#aaa">Kleine animaties</text>
  <text x="700" y="247" text-anchor="middle" font-size="11" fill="#aaa">Beperkt (256 kleuren)</text>

  <text x="400" y="285" text-anchor="middle" font-size="11" fill="#666">Keuze vuistregel: foto → JPG/WebP | logo/icoon → SVG | screenshot → PNG</text>
</svg>
