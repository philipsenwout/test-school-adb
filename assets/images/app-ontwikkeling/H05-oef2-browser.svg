<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">galerij.html</text>

  <!-- header -->
  <text x="40" y="96" font-size="32" font-weight="bold" fill="#000">Mijn Fotogalerij</text>

  <!-- 4 figure placeholders in 2x2 layout -->
  <!-- figure 1 -->
  <rect x="40" y="116" width="180" height="120" fill="#d0d0d0" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="130" y="168" text-anchor="middle" font-size="12" fill="#666">img/foto1.jpg</text>
  <text x="130" y="184" text-anchor="middle" font-size="11" fill="#888">400×300</text>
  <text x="40" y="252" font-size="14" fill="#444" font-style="italic">Een mooie zonsondergang aan zee.</text>

  <!-- figure 2 -->
  <rect x="250" y="116" width="180" height="120" fill="#d0d0d0" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="340" y="168" text-anchor="middle" font-size="12" fill="#666">img/foto2.jpg</text>
  <text x="340" y="184" text-anchor="middle" font-size="11" fill="#888">400×300</text>
  <text x="250" y="252" font-size="14" fill="#444" font-style="italic">Bos in de herfst nabij Gent.</text>

  <!-- figure 3 -->
  <rect x="460" y="116" width="180" height="120" fill="#d0d0d0" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="550" y="168" text-anchor="middle" font-size="12" fill="#666">img/foto3.jpg</text>
  <text x="550" y="184" text-anchor="middle" font-size="11" fill="#888">400×300</text>
  <text x="460" y="252" font-size="14" fill="#444" font-style="italic">Oude brug over de Leie.</text>

  <!-- figure 4 -->
  <rect x="670" y="116" width="180" height="120" fill="#d0d0d0" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="760" y="168" text-anchor="middle" font-size="12" fill="#666">img/foto4.jpg</text>
  <text x="760" y="184" text-anchor="middle" font-size="11" fill="#888">400×300</text>
  <text x="670" y="252" font-size="14" fill="#444" font-style="italic">Marktplein op zondag.</text>
</svg>
