<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="sans-serif">
  <!-- Browser chrome -->
  <rect width="900" height="560" fill="#ffffff"/>
  <rect width="900" height="44" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="22" r="6" fill="#febc2e"/>
  <circle cx="52" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="500" height="24" rx="12" fill="#2a2a3e"/>
  <text x="450" y="26" text-anchor="middle" fill="#888" font-size="12">oefening-selectoren.html</text>

  <!-- nav: dark background, white links -->
  <rect x="0" y="44" width="900" height="46" fill="#222222"/>
  <!-- nav items: first three white, "actief" has accent bg -->
  <rect x="40" y="52" width="70" height="30" fill="#444" rx="3"/>
  <text x="75" y="72" text-anchor="middle" font-size="15" fill="#ffffff">Home</text>
  <rect x="120" y="52" width="70" height="30" fill="none" rx="3"/>
  <text x="155" y="72" text-anchor="middle" font-size="15" fill="#ffffff">Nieuws</text>
  <!-- actief item: different bg -->
  <rect x="200" y="52" width="80" height="30" fill="#6b21a8" rx="3"/>
  <text x="240" y="72" text-anchor="middle" font-size="15" fill="#ffffff">Contact</text>
  <rect x="290" y="52" width="90" height="30" fill="none" rx="3"/>
  <text x="335" y="72" text-anchor="middle" font-size="15" fill="#ffffff">Over ons</text>

  <!-- main -->
  <!-- h1 -->
  <text x="40" y="128" font-size="28" font-weight="bold" fill="#000">Mijn portfolio</text>

  <!-- p.intro: larger, bold -->
  <text x="40" y="164" font-size="20" font-weight="bold" fill="#000">Welkom op mijn website.</text>

  <!-- normal p -->
  <text x="40" y="196" font-size="16" fill="#000">Ik ben een eerstejaars student App-ontwikkeling.</text>

  <!-- ul.projecten with zebra, first/last underlined, span red italic -->
  <!-- item 1: underlined (first-child), white bg -->
  <rect x="36" y="216" width="500" height="30" fill="#ffffff"/>
  <text x="52" y="237" font-size="16" fill="#000" text-decoration="underline">Project 1</text>

  <!-- item 2: light grey bg -->
  <rect x="36" y="246" width="500" height="30" fill="#f0f0f0"/>
  <text x="52" y="267" font-size="16" fill="#000">Project 2</text>

  <!-- item 3: white bg, with red italic span -->
  <rect x="36" y="276" width="500" height="30" fill="#ffffff"/>
  <text x="52" y="297" font-size="16" fill="#000">Project 3 <tspan fill="#cc0000" font-style="italic">(nieuw)</tspan></text>

  <!-- item 4: light grey bg, underlined (last-child) -->
  <rect x="36" y="306" width="500" height="30" fill="#f0f0f0"/>
  <text x="52" y="327" font-size="16" fill="#000" text-decoration="underline">Project 4</text>
</svg>
