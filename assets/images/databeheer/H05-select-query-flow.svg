<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0E14"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Titel -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E8E9F3">SELECT QUERY — VERWERKINGSFLOW</text>
  <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6E8E" letter-spacing="0.1em">HOE DE DATABASE EEN SELECT-OPDRACHT VERWERKT</text>
  <line x1="80" y1="64" x2="720" y2="64" stroke="#1F2035" stroke-width="1"/>

  <!-- Query box bovenaan -->
  <rect x="160" y="74" width="480" height="52" rx="8" fill="#09090F" stroke="#3B82F6" stroke-width="2"/>
  <text x="196" y="96" font-family="monospace, system-ui" font-size="13" fill="#C084FC">SELECT </text>
  <text x="248" y="96" font-family="monospace, system-ui" font-size="13" fill="#A8AACB">naam, geboortedatum</text>
  <text x="196" y="116" font-family="monospace, system-ui" font-size="13" fill="#C084FC">FROM </text>
  <text x="234" y="116" font-family="monospace, system-ui" font-size="13" fill="#FCD34D">Leerling</text>
  <text x="296" y="116" font-family="monospace, system-ui" font-size="13" fill="#C084FC"> WHERE </text>
  <text x="352" y="116" font-family="monospace, system-ui" font-size="13" fill="#A8AACB">klas_id = </text>
  <text x="414" y="116" font-family="monospace, system-ui" font-size="13" fill="#86EFAC">3</text>
  <text x="424" y="116" font-family="monospace, system-ui" font-size="13" fill="#C084FC"> ORDER BY </text>
  <text x="510" y="116" font-family="monospace, system-ui" font-size="13" fill="#A8AACB">naam</text>
  <text x="548" y="116" font-family="monospace, system-ui" font-size="13" fill="#6B6E8E">;</text>

  <!-- Pijl query naar tabel -->
  <line x1="400" y1="126" x2="400" y2="150" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STAP 1: Volledige tabel -->
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6B6E8E">STAP 1: FROM</text>

  <!-- Tabel Leerling — alle rijen -->
  <rect x="80" y="152" width="560" height="22" rx="3" fill="#3B82F620" stroke="#3B82F650" stroke-width="1"/>
  <text x="120" y="167" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3B82F6">leerling_id</text>
  <text x="230" y="167" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3B82F6">naam</text>
  <text x="330" y="167" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3B82F6">geboortedatum</text>
  <text x="460" y="167" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3B82F6">klas_id</text>

  <!-- Rij 1 (klas 3 → highlight) -->
  <rect x="80" y="174" width="560" height="20" rx="0" fill="#3B82F610" stroke="#3B82F630" stroke-width="0.5"/>
  <text x="120" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">1</text>
  <text x="230" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">Ali Janssen</text>
  <text x="330" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">2009-04-12</text>
  <text x="460" y="188" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#00C2A8">3  ✓</text>

  <!-- Rij 2 (klas 2 → uitgefilterd) -->
  <rect x="80" y="194" width="560" height="20" rx="0" fill="#1A1C28" stroke="#2A2C45" stroke-width="0.5" opacity="0.5"/>
  <text x="120" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2</text>
  <text x="230" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Jana Pieters</text>
  <text x="330" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2008-11-30</text>
  <text x="460" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">2  ✗</text>

  <!-- Rij 3 (klas 3 → highlight) -->
  <rect x="80" y="214" width="560" height="20" rx="0" fill="#3B82F610" stroke="#3B82F630" stroke-width="0.5"/>
  <text x="120" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">3</text>
  <text x="230" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">Tibo Maes</text>
  <text x="330" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">2009-01-05</text>
  <text x="460" y="228" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#00C2A8">3  ✓</text>

  <!-- WHERE filter pijl -->
  <line x1="400" y1="236" x2="400" y2="262" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6B6E8E">STAP 2: WHERE klas_id = 3 (filter)</text>

  <!-- Gefilterde rijen -->
  <rect x="160" y="264" width="400" height="22" rx="3" fill="#3B82F620" stroke="#3B82F650" stroke-width="1"/>
  <text x="200" y="279" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3B82F6">naam</text>
  <text x="340" y="279" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3B82F6">geboortedatum</text>

  <rect x="160" y="286" width="400" height="20" rx="0" fill="#3B82F610" stroke="#3B82F630" stroke-width="0.5"/>
  <text x="200" y="300" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">Ali Janssen</text>
  <text x="340" y="300" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">2009-04-12</text>

  <rect x="160" y="306" width="400" height="20" rx="0" fill="#3B82F610" stroke="#3B82F630" stroke-width="0.5"/>
  <text x="200" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">Tibo Maes</text>
  <text x="340" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">2009-01-05</text>

  <!-- SELECT kolommen pijl -->
  <line x1="400" y1="328" x2="400" y2="354" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400" y="347" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6B6E8E">STAP 3: ORDER BY naam + SELECT kolommen</text>

  <!-- Eindresultaat -->
  <rect x="200" y="358" width="400" height="22" rx="3" fill="#22C55E20" stroke="#22C55E50" stroke-width="1.5"/>
  <text x="290" y="373" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22C55E">naam</text>
  <text x="430" y="373" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22C55E">geboortedatum</text>

  <rect x="200" y="380" width="400" height="20" rx="0" fill="#22C55E10" stroke="#22C55E30" stroke-width="0.5"/>
  <text x="290" y="394" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">Ali Janssen</text>
  <text x="430" y="394" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">2009-04-12</text>

  <rect x="200" y="400" width="400" height="20" rx="0" fill="#22C55E10" stroke="#22C55E30" stroke-width="0.5"/>
  <text x="290" y="414" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">Tibo Maes</text>
  <text x="430" y="414" font-family="system-ui, sans-serif" font-size="10" fill="#E8E9F3">2009-01-05</text>

  <!-- Resultaat label -->
  <text x="610" y="394" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22C55E">✓ Resultaat</text>
  <text x="610" y="410" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">2 rijen, gesorteerd</text>
  <text x="610" y="425" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">op naam (A→Z)</text>
</svg>
