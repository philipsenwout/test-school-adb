<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0E14"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Titel -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E8E9F3">ENTITEIT — ATTRIBUTEN — PRIMAIRE SLEUTEL</text>
  <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6E8E" letter-spacing="0.1em">ERD-NOTATIE: TABELSTRUCTUUR VAN "LEERLING"</text>
  <line x1="80" y1="64" x2="720" y2="64" stroke="#1F2035" stroke-width="1"/>

  <!-- ERD Blok (links) -->
  <!-- Entiteitblok -->
  <rect x="80" y="90" width="240" height="290" rx="8" fill="#13141D" stroke="#3B82F6" stroke-width="2"/>
  <!-- Entiteitnaam header -->
  <rect x="80" y="90" width="240" height="40" rx="7" fill="#3B82F620" stroke="#3B82F6" stroke-width="2"/>
  <text x="200" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#3B82F6">Leerling</text>

  <!-- Attribuut 1: PK -->
  <rect x="80" y="130" width="240" height="42" rx="0" fill="#F59E0B15"/>
  <rect x="80" y="130" width="4" height="42" fill="#F59E0B"/>
  <text x="100" y="148" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B" font-weight="700">🔑  leerling_id</text>
  <text x="100" y="163" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">INT  |  AUTO_INCREMENT  |  NOT NULL</text>
  <text x="296" y="148" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#F59E0B" font-weight="700">PRIMARY KEY</text>
  <line x1="80" y1="172" x2="320" y2="172" stroke="#1F2035" stroke-width="1"/>

  <!-- Attribuut 2: naam -->
  <rect x="80" y="172" width="240" height="38" rx="0" fill="#1A1C28"/>
  <text x="100" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#E8E9F3">naam</text>
  <text x="100" y="204" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">VARCHAR(100)  |  NOT NULL</text>
  <line x1="80" y1="210" x2="320" y2="210" stroke="#1F2035" stroke-width="1"/>

  <!-- Attribuut 3: voornaam -->
  <rect x="80" y="210" width="240" height="38" rx="0" fill="#13141D"/>
  <text x="100" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#E8E9F3">voornaam</text>
  <text x="100" y="242" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">VARCHAR(100)  |  NOT NULL</text>
  <line x1="80" y1="248" x2="320" y2="248" stroke="#1F2035" stroke-width="1"/>

  <!-- Attribuut 4: geboortedatum -->
  <rect x="80" y="248" width="240" height="38" rx="0" fill="#1A1C28"/>
  <text x="100" y="266" font-family="system-ui, sans-serif" font-size="11" fill="#E8E9F3">geboortedatum</text>
  <text x="100" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">DATE  |  NULL toegestaan</text>
  <line x1="80" y1="286" x2="320" y2="286" stroke="#1F2035" stroke-width="1"/>

  <!-- Attribuut 5: e-mailadres -->
  <rect x="80" y="286" width="240" height="38" rx="0" fill="#13141D"/>
  <text x="100" y="304" font-family="system-ui, sans-serif" font-size="11" fill="#E8E9F3">e-mailadres</text>
  <text x="100" y="318" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">VARCHAR(150)  |  UNIQUE</text>
  <line x1="80" y1="324" x2="320" y2="324" stroke="#1F2035" stroke-width="1"/>

  <!-- Attribuut 6: klas_id (FK) -->
  <rect x="80" y="324" width="240" height="38" rx="0" fill="#1A1C28"/>
  <rect x="80" y="324" width="4" height="38" fill="#22C55E"/>
  <text x="100" y="342" font-family="system-ui, sans-serif" font-size="11" fill="#22C55E">🔗  klas_id</text>
  <text x="100" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">INT  |  FOREIGN KEY → Klas(klas_id)</text>
  <text x="316" y="342" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#22C55E" font-weight="700">FOREIGN KEY</text>

  <!-- Rand afsluiten -->
  <rect x="80" y="90" width="240" height="290" rx="8" fill="none" stroke="#3B82F6" stroke-width="2"/>

  <!-- SQL tabel aanmaken (rechts) -->
  <rect x="360" y="90" width="360" height="200" rx="8" fill="#09090F" stroke="#2A2C45" stroke-width="1"/>
  <text x="375" y="110" font-family="monospace, system-ui" font-size="9" fill="#6B6E8E">-- SQL: tabel aanmaken</text>
  <text x="375" y="126" font-family="monospace, system-ui" font-size="10" fill="#C084FC">CREATE TABLE</text>
  <text x="463" y="126" font-family="monospace, system-ui" font-size="10" fill="#FCD34D"> Leerling</text>
  <text x="375" y="142" font-family="monospace, system-ui" font-size="10" fill="#E8E9F3">(</text>
  <text x="390" y="158" font-family="monospace, system-ui" font-size="10" fill="#A8AACB">  leerling_id </text>
  <text x="476" y="158" font-family="monospace, system-ui" font-size="10" fill="#86EFAC">INT AUTO_INCREMENT,</text>
  <text x="390" y="174" font-family="monospace, system-ui" font-size="10" fill="#A8AACB">  naam        </text>
  <text x="476" y="174" font-family="monospace, system-ui" font-size="10" fill="#86EFAC">VARCHAR(100) NOT NULL,</text>
  <text x="390" y="190" font-family="monospace, system-ui" font-size="10" fill="#A8AACB">  voornaam    </text>
  <text x="476" y="190" font-family="monospace, system-ui" font-size="10" fill="#86EFAC">VARCHAR(100) NOT NULL,</text>
  <text x="390" y="206" font-family="monospace, system-ui" font-size="10" fill="#A8AACB">  geboortedatum </text>
  <text x="490" y="206" font-family="monospace, system-ui" font-size="10" fill="#86EFAC">DATE,</text>
  <text x="390" y="222" font-family="monospace, system-ui" font-size="10" fill="#A8AACB">  e_mailadres </text>
  <text x="476" y="222" font-family="monospace, system-ui" font-size="10" fill="#86EFAC">VARCHAR(150) UNIQUE,</text>
  <text x="390" y="238" font-family="monospace, system-ui" font-size="10" fill="#A8AACB">  klas_id     </text>
  <text x="476" y="238" font-family="monospace, system-ui" font-size="10" fill="#22C55E">INT,</text>
  <text x="390" y="254" font-family="monospace, system-ui" font-size="10" fill="#C084FC">  PRIMARY KEY</text>
  <text x="464" y="254" font-family="monospace, system-ui" font-size="10" fill="#E8E9F3">(leerling_id),</text>
  <text x="390" y="270" font-family="monospace, system-ui" font-size="10" fill="#C084FC">  FOREIGN KEY</text>
  <text x="464" y="270" font-family="monospace, system-ui" font-size="10" fill="#E8E9F3">(klas_id)</text>
  <text x="375" y="286" font-family="monospace, system-ui" font-size="10" fill="#E8E9F3">);</text>

  <!-- Legenda -->
  <rect x="360" y="306" width="360" height="74" rx="8" fill="#1A1C28" stroke="#2A2C45" stroke-width="1"/>
  <text x="540" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#E8E9F3">Legenda</text>
  <rect x="376" y="330" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="393" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">PRIMARY KEY (PK) — unieke identificator</text>
  <rect x="376" y="348" width="10" height="10" rx="2" fill="#22C55E"/>
  <text x="393" y="358" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">FOREIGN KEY (FK) — verwijzing naar andere tabel</text>
  <rect x="376" y="366" width="10" height="10" rx="2" fill="#3B82F6"/>
  <text x="393" y="376" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">Entiteitblok — een tabel in de database</text>

  <!-- Voorbeeld data tabel -->
  <rect x="80" y="396" width="240" height="42" rx="6" fill="#1A1C28" stroke="#2A2C45" stroke-width="1"/>
  <text x="200" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#E8E9F3">Voorbeeldrij in de tabel:</text>
  <text x="200" y="426" text-anchor="middle" font-family="monospace, system-ui" font-size="9" fill="#6B6E8E">1 | Janssen | Ali | 2009-04-12 | ali@school.be | 3</text>

  <!-- Opmerking rechts -->
  <rect x="360" y="396" width="360" height="42" rx="6" fill="#3B82F610" stroke="#3B82F630" stroke-width="1"/>
  <text x="540" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8AACB">De PK zorgt ervoor dat elke leerling uniek is.</text>
  <text x="540" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6E8E">Auto_increment: het getal verhoogt automatisch bij elke nieuwe rij.</text>
</svg>
