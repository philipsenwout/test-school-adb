<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bg4)" rx="12"/>
  <rect width="800" height="440" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <text x="400" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="3">FASERING &amp; PLANNING</text>

  <!-- Timeline axis -->
  <line x1="60" y1="80" x2="740" y2="80" stroke="#30363d" stroke-width="2"/>

  <!-- Month labels -->
  <text x="95" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">NOV</text>
  <text x="191" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">DEC</text>
  <text x="287" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">JAN</text>
  <text x="383" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">FEB</text>
  <text x="479" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">MRT</text>
  <text x="575" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">APR</text>
  <text x="671" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">MEI</text>

  <!-- tick marks -->
  <line x1="95" y1="76" x2="95" y2="84" stroke="#30363d" stroke-width="1"/>
  <line x1="191" y1="76" x2="191" y2="84" stroke="#30363d" stroke-width="1"/>
  <line x1="287" y1="76" x2="287" y2="84" stroke="#30363d" stroke-width="1"/>
  <line x1="383" y1="76" x2="383" y2="84" stroke="#30363d" stroke-width="1"/>
  <line x1="479" y1="76" x2="479" y2="84" stroke="#30363d" stroke-width="1"/>
  <line x1="575" y1="76" x2="575" y2="84" stroke="#30363d" stroke-width="1"/>
  <line x1="671" y1="76" x2="671" y2="84" stroke="#30363d" stroke-width="1"/>
  <text x="740" y="70" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">JUN</text>
  <line x1="740" y1="76" x2="740" y2="84" stroke="#30363d" stroke-width="1"/>

  <!-- Phase bars — y positions staggered for readability -->

  <!-- F1: Analyse & Ontwerp — Nov -->
  <rect x="62" y="100" width="192" height="44" rx="6" fill="#7c3aed33" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="70" y="118" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa">F1 — Analyse &amp; Ontwerp</text>
  <text x="70" y="134" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Analyseverslag · ERD · Wireframes</text>
  <!-- milestone dot -->
  <circle cx="254" cy="80" r="5" fill="#7c3aed"/>
  <line x1="254" y1="85" x2="254" y2="100" stroke="#7c3aed55" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- F2: Databank — Dec -->
  <rect x="160" y="160" width="120" height="44" rx="6" fill="#10b98133" stroke="#10b981" stroke-width="1.5"/>
  <text x="168" y="178" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#34d399">F2 — Databank</text>
  <text x="168" y="194" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">SQL-script</text>
  <circle cx="280" cy="80" r="5" fill="#10b981"/>
  <line x1="280" y1="85" x2="280" y2="160" stroke="#10b98155" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- F3: Applicatie-ontwikkeling — Jan – Apr -->
  <rect x="258" y="220" width="336" height="44" rx="6" fill="#0ea5e933" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="266" y="238" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8">F3 — Applicatie-ontwikkeling</text>
  <text x="266" y="254" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Werkende webapplicatie · Node.js + MySQL</text>
  <circle cx="594" cy="80" r="5" fill="#0ea5e9"/>
  <line x1="594" y1="85" x2="594" y2="220" stroke="#0ea5e955" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- F4: Testing — Apr -->
  <rect x="546" y="160" width="120" height="44" rx="6" fill="#f59e0b33" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="554" y="178" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#fbbf24">F4 — Testing</text>
  <text x="554" y="194" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Testverslag</text>
  <circle cx="666" cy="80" r="5" fill="#f59e0b"/>
  <line x1="666" y1="85" x2="666" y2="160" stroke="#f59e0b55" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- F5: Documentatie — Mei -->
  <rect x="640" y="100" width="96" height="44" rx="6" fill="#ec489933" stroke="#ec4899" stroke-width="1.5"/>
  <text x="648" y="118" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#f472b6">F5 — Docs</text>
  <text x="648" y="134" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Handleiding</text>

  <!-- F6 + F7: Presentatie & Reflectie — Juni -->
  <rect x="62" y="300" width="716" height="1" fill="#30363d"/>

  <!-- Cards for last 3 phases in row -->
  <!-- F6 Presentatie -->
  <rect x="62" y="316" width="210" height="72" rx="8" fill="#161b22" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="82" y="338" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">F6 — Eindpresentatie</text>
  <text x="82" y="356" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Periode: juni</text>
  <text x="82" y="372" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Demo + mondelinge verdediging</text>

  <!-- F7 Reflectie -->
  <rect x="295" y="316" width="210" height="72" rx="8" fill="#161b22" stroke="#6b7280" stroke-width="1.5"/>
  <text x="315" y="338" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#9ca3af">F7 — Reflectie</text>
  <text x="315" y="356" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Periode: juni</text>
  <text x="315" y="372" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Persoonlijk reflectieverslag</text>

  <!-- Tip card -->
  <rect x="528" y="316" width="250" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="548" y="338" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff">Tip</text>
  <text x="548" y="356" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Commit na elke werkzitting.</text>
  <text x="548" y="372" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Zo bewijs je je voortgang op GitHub</text>
  <text x="548" y="388" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">en vermijd je verlies van werk.</text>

  <!-- legend bottom -->
  <text x="400" y="418" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">● = oplevermoment / deadline</text>
</svg>
