<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="820" height="500" fill="#1a1a2e"/>
  <text x="410" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#e0e0f0">GIP — Dashboard: Inschrijvingen</text>

  <!-- Browser mockup of dashboard -->
  <rect x="20" y="50" width="780" height="420" rx="10" fill="#16162a" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- Dashboard header -->
  <rect x="20" y="50" width="780" height="44" rx="10" fill="#252550"/>
  <text x="410" y="77" text-anchor="middle" font-size="14" fill="#e0e0f0" font-weight="700">Sportclub Dashboard — Hallo, Jana!</text>
  <rect x="700" y="60" width="90" height="24" rx="5" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="745" y="76" text-anchor="middle" font-size="11" fill="#ff5f57">Uitloggen</text>

  <!-- Section: activiteiten -->
  <text x="40" y="118" font-size="13" fill="#7c85ff" font-weight="700">Beschikbare activiteiten</text>

  <!-- Activity card 1 -->
  <rect x="40" y="128" width="220" height="100" rx="6" fill="#252540" stroke="#7c85ff" stroke-width="1"/>
  <text x="60" y="150" font-size="13" fill="#e0e0f0" font-weight="600">Zwemtraining</text>
  <text x="60" y="168" font-size="11" fill="#888">📅 15/04/2025   🕐 09:00</text>
  <text x="60" y="184" font-size="11" fill="#888">📍 Zwembad     Max: 20</text>
  <rect x="60" y="195" width="130" height="24" rx="5" fill="#7c85ff"/>
  <text x="125" y="211" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Inschrijven</text>

  <!-- Activity card 2 -->
  <rect x="280" y="128" width="220" height="100" rx="6" fill="#252540" stroke="#7c85ff" stroke-width="1"/>
  <text x="300" y="150" font-size="13" fill="#e0e0f0" font-weight="600">Fietsclub weekend</text>
  <text x="300" y="168" font-size="11" fill="#888">📅 20/04/2025   🕐 08:30</text>
  <text x="300" y="184" font-size="11" fill="#888">📍 Start markt  Max: 15</text>
  <rect x="300" y="195" width="130" height="24" rx="5" fill="#7c85ff"/>
  <text x="365" y="211" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Inschrijven</text>

  <!-- Activity card 3 -->
  <rect x="520" y="128" width="220" height="100" rx="6" fill="#252540" stroke="#2a2a4a" stroke-width="1"/>
  <text x="540" y="150" font-size="13" fill="#e0e0f0" font-weight="600">Yoga voor beginners</text>
  <text x="540" y="168" font-size="11" fill="#888">📅 22/04/2025   🕐 10:00</text>
  <text x="540" y="184" font-size="11" fill="#888">📍 Sportzaal    Max: 10</text>
  <rect x="540" y="195" width="130" height="24" rx="5" fill="#7c85ff"/>
  <text x="605" y="211" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Inschrijven</text>

  <!-- Divider -->
  <line x1="30" y1="248" x2="790" y2="248" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Section: mijn inschrijvingen -->
  <text x="40" y="268" font-size="13" fill="#c792ea" font-weight="700">Mijn inschrijvingen</text>

  <!-- Table header -->
  <rect x="40" y="278" width="740" height="28" rx="4" fill="#252550"/>
  <text x="100" y="296" font-size="12" fill="#7c85ff" font-weight="700">Activiteit</text>
  <text x="320" y="296" font-size="12" fill="#7c85ff" font-weight="700">Datum</text>
  <text x="500" y="296" font-size="12" fill="#7c85ff" font-weight="700">Aanvang</text>
  <text x="640" y="296" font-size="12" fill="#7c85ff" font-weight="700">Locatie</text>

  <!-- Row 1 -->
  <rect x="40" y="306" width="740" height="28" rx="0" fill="#1a1a30"/>
  <text x="100" y="324" font-size="12" fill="#a8e6a3">Zwemtraining</text>
  <text x="320" y="324" font-size="12" fill="#c8c8d4">15/04/2025</text>
  <text x="500" y="324" font-size="12" fill="#c8c8d4">09:00</text>
  <text x="640" y="324" font-size="12" fill="#c8c8d4">Zwembad</text>

  <!-- API routes diagram -->
  <rect x="40" y="360" width="740" height="96" rx="6" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="55" y="382" font-size="12" fill="#888" font-weight="700">Achterliggende API-routes:</text>

  <rect x="55" y="390" width="100" height="22" rx="3" fill="#1a2040" stroke="#7c85ff" stroke-width="1"/>
  <text x="105" y="405" text-anchor="middle" font-size="11" fill="#7c85ff" font-weight="700">POST</text>
  <text x="165" y="405" font-size="11" fill="#888" font-family="'Courier New', monospace">/api/inschrijven</text>
  <text x="390" y="405" font-size="11" fill="#555">→ activiteit_id in body, user_id uit sessie</text>

  <rect x="55" y="418" width="100" height="22" rx="3" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="105" y="433" text-anchor="middle" font-size="11" fill="#ff5f57" font-weight="700">DELETE</text>
  <text x="165" y="433" font-size="11" fill="#888" font-family="'Courier New', monospace">/api/uitschrijven/:id</text>
  <text x="390" y="433" font-size="11" fill="#555">→ verwijdert inschrijving op basis van activiteitId</text>

  <rect x="55" y="444" width="100" height="22" rx="3" fill="#1a3020" stroke="#28c840" stroke-width="1"/>
  <text x="105" y="459" text-anchor="middle" font-size="11" fill="#28c840" font-weight="700">GET</text>
  <text x="165" y="459" font-size="11" fill="#888" font-family="'Courier New', monospace">/api/mijn-inschrijvingen</text>
  <text x="390" y="459" font-size="11" fill="#555">→ JOIN activiteiten + inschrijvingen WHERE user_id = ?</text>
</svg>
