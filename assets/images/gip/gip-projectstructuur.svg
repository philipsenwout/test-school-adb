  <text x="578" y="384" font-family="'Courier New', monospace" font-size="12" fill="#0ea5e9">&#128193;</text>
  <text x="598" y="384" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Back-end map</text>
  <text x="578" y="404" font-family="'Courier New', monospace" font-size="12" fill="#7c3aed">&#128193;</text>
  <text x="598" y="404" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Front-end map</text>
  <text x="578" y="424" font-family="'Courier New', monospace" font-size="12" fill="#e06c75">&#128196;</text>
  <text x="598" y="424" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">HTML-pagina</text>
  <text x="578" y="444" font-family="'Courier New', monospace" font-size="12" fill="#22c55e">&#128196;</text>
  <text x="598" y="444" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681">Configuratie / script</text>
