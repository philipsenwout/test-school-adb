<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="320" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="3">TECHNOLOGIESTACK</text>

  <!-- Arrow right 1 -->
  <line x1="228" y1="170" x2="276" y2="170" stroke="#30363d" stroke-width="2"/>
  <polygon points="276,164 290,170 276,176" fill="#30363d"/>

  <!-- Arrow right 2 -->
  <line x1="494" y1="170" x2="542" y2="170" stroke="#30363d" stroke-width="2"/>
  <polygon points="542,164 556,170 542,176" fill="#30363d"/>

  <!-- Card: Front-end -->
  <rect x="40" y="90" width="188" height="160" rx="10" fill="#161b22" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="40" y="90" width="188" height="8" rx="10" fill="url(#frontGrad)"/>
  <rect x="40" y="94" width="188" height="4" fill="url(#frontGrad)"/>
  <text x="134" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#c9d1d9" text-anchor="middle">Front-end</text>
  <!-- HTML badge -->
  <rect x="62" y="146" width="50" height="26" rx="5" fill="#7c3aed22" stroke="#7c3aed" stroke-width="1"/>
  <text x="87" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">HTML</text>
  <!-- CSS badge -->
  <rect x="122" y="146" width="44" height="26" rx="5" fill="#7c3aed22" stroke="#7c3aed" stroke-width="1"/>
  <text x="144" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">CSS</text>
  <!-- JS badge -->
  <rect x="62" y="184" width="104" height="26" rx="5" fill="#7c3aed22" stroke="#7c3aed" stroke-width="1"/>
  <text x="114" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">JavaScript</text>
  <text x="134" y="235" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Client/</text>

  <!-- Card: Back-end -->
  <rect x="306" y="90" width="188" height="160" rx="10" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="306" y="90" width="188" height="8" rx="10" fill="url(#backGrad)"/>
  <rect x="306" y="94" width="188" height="4" fill="url(#backGrad)"/>
  <text x="400" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#c9d1d9" text-anchor="middle">Back-end</text>
  <!-- Node.js badge -->
  <rect x="328" y="146" width="66" height="26" rx="5" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1"/>
  <text x="361" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle">Node.js</text>
  <!-- Express badge -->
  <rect x="404" y="146" width="66" height="26" rx="5" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1"/>
  <text x="437" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle">Express</text>
  <!-- Session/bcrypt badge -->
  <rect x="328" y="184" width="72" height="26" rx="5" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1"/>
  <text x="364" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle">bcrypt</text>
  <rect x="410" y="184" width="64" height="26" rx="5" fill="#0ea5e922" stroke="#0ea5e9" stroke-width="1"/>
  <text x="442" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle">session</text>
  <text x="400" y="235" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Server/server.js</text>

  <!-- Card: Database -->
  <rect x="572" y="90" width="188" height="160" rx="10" fill="#161b22" stroke="#10b981" stroke-width="1.5"/>
  <rect x="572" y="90" width="188" height="8" rx="10" fill="url(#dbGrad)"/>
  <rect x="572" y="94" width="188" height="4" fill="url(#dbGrad)"/>
  <text x="666" y="128" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#c9d1d9" text-anchor="middle">Databank</text>
  <!-- MySQL badge -->
  <rect x="594" y="146" width="56" height="26" rx="5" fill="#10b98122" stroke="#10b981" stroke-width="1"/>
  <text x="622" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">MySQL</text>
  <!-- mysql2 badge -->
  <rect x="660" y="146" width="56" height="26" rx="5" fill="#10b98122" stroke="#10b981" stroke-width="1"/>
  <text x="688" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">mysql2</text>
  <!-- SQL badge -->
  <rect x="594" y="184" width="122" height="26" rx="5" fill="#10b98122" stroke="#10b981" stroke-width="1"/>
  <text x="655" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">database.sql</text>
  <text x="666" y="235" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">Workbench / CLI</text>

  <!-- GitHub strip -->
  <rect x="300" y="268" width="200" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="286" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Versiebeheer: GitHub</text>
</svg>
