<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="url(#bg2)" rx="12"/>
  <rect width="800" height="380" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="3">APPLICATIE-ARCHITECTUUR</text>

  <!-- === CLIENT LAAG === -->
  <rect x="40" y="68" width="200" height="260" rx="10" fill="#1a1f2e" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="140" y="93" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="1">CLIENT</text>

  <!-- Browser icon -->
  <rect x="70" y="106" width="140" height="90" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <rect x="70" y="106" width="140" height="20" rx="6" fill="#30363d"/>
  <circle cx="86" cy="116" r="4" fill="#ef4444"/>
  <circle cx="100" cy="116" r="4" fill="#f59e0b"/>
  <circle cx="114" cy="116" r="4" fill="#22c55e"/>
  <rect x="78" y="132" width="124" height="8" rx="3" fill="#3d444d"/>
  <rect x="78" y="148" width="90" height="6" rx="3" fill="#3d444d"/>
  <rect x="78" y="162" width="110" height="6" rx="3" fill="#3d444d"/>
  <text x="140" y="215" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6e7681" text-anchor="middle">HTML / CSS / JS</text>

  <!-- Files in client -->
  <rect x="68" y="225" width="60" height="22" rx="4" fill="#7c3aed22" stroke="#7c3aed55" stroke-width="1"/>
  <text x="98" y="240" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">*.html</text>
  <rect x="136" y="225" width="60" height="22" rx="4" fill="#7c3aed22" stroke="#7c3aed55" stroke-width="1"/>
  <text x="166" y="240" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">*.js</text>
  <rect x="68" y="256" width="128" height="22" rx="4" fill="#7c3aed22" stroke="#7c3aed55" stroke-width="1"/>
  <text x="132" y="271" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">style.css</text>

  <!-- === ARROW: Client → Server (HTTP Request) === -->
  <line x1="242" y1="175" x2="298" y2="175" stroke="#0ea5e9" stroke-width="2"/>
  <polygon points="298,169 312,175 298,181" fill="#0ea5e9"/>
  <text x="277" y="165" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#0ea5e9" text-anchor="middle">HTTP</text>
  <text x="277" y="155" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">Request</text>

  <!-- === ARROW: Server → Client (JSON Response) === -->
  <line x1="312" y1="198" x2="242" y2="198" stroke="#22c55e" stroke-width="2"/>
  <polygon points="242,192 228,198 242,204" fill="#22c55e"/>
  <text x="277" y="215" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle">JSON</text>
  <text x="277" y="225" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">Response</text>

  <!-- === SERVER LAAG === -->
  <rect x="312" y="68" width="200" height="260" rx="10" fill="#1a2435" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="412" y="93" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="1">SERVER</text>

  <!-- server.js box -->
  <rect x="336" y="106" width="152" height="30" rx="6" fill="#21262d" stroke="#0ea5e9" stroke-width="1"/>
  <text x="412" y="126" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">server.js</text>

  <!-- Route items -->
  <rect x="336" y="148" width="152" height="22" rx="4" fill="#0ea5e912" stroke="#0ea5e940" stroke-width="1"/>
  <text x="412" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">GET / POST / PUT / DELETE</text>
  <rect x="336" y="178" width="152" height="22" rx="4" fill="#0ea5e912" stroke="#0ea5e940" stroke-width="1"/>
  <text x="412" y="193" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">Authenticatie &amp; Sessies</text>
  <rect x="336" y="208" width="152" height="22" rx="4" fill="#0ea5e912" stroke="#0ea5e940" stroke-width="1"/>
  <text x="412" y="223" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">Rolcontrole (user / admin)</text>
  <rect x="336" y="238" width="152" height="22" rx="4" fill="#0ea5e912" stroke="#0ea5e940" stroke-width="1"/>
  <text x="412" y="253" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">CSV-export</text>
  <rect x="336" y="268" width="152" height="22" rx="4" fill="#0ea5e912" stroke="#0ea5e940" stroke-width="1"/>
  <text x="412" y="283" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">Express + bcrypt + mysql2</text>

  <!-- === ARROW: Server → DB (SQL Query) === -->
  <line x1="514" y1="175" x2="570" y2="175" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="570,169 584,175 570,181" fill="#f59e0b"/>
  <text x="549" y="165" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">SQL</text>
  <text x="549" y="155" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Query</text>

  <!-- === ARROW: DB → Server (Resultset) === -->
  <line x1="584" y1="198" x2="514" y2="198" stroke="#10b981" stroke-width="2"/>
  <polygon points="514,192 500,198 514,204" fill="#10b981"/>
  <text x="549" y="215" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">Resultset</text>

  <!-- === DATABASE LAAG === -->
  <rect x="584" y="68" width="176" height="260" rx="10" fill="#0d2318" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="672" y="93" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle" letter-spacing="1">DATABASE</text>

  <!-- DB cylinder -->
  <ellipse cx="672" cy="130" rx="52" ry="14" fill="#10b98122" stroke="#10b981" stroke-width="1.5"/>
  <rect x="620" y="130" width="104" height="60" fill="#10b98112" stroke="#10b981" stroke-width="1.5"/>
  <ellipse cx="672" cy="190" rx="52" ry="14" fill="#10b98122" stroke="#10b981" stroke-width="1.5"/>
  <text x="672" y="158" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">MySQL</text>
  <text x="672" y="175" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">sportclub_db</text>

  <!-- Table names -->
  <rect x="604" y="218" width="136" height="22" rx="4" fill="#10b98122" stroke="#10b98155" stroke-width="1"/>
  <text x="672" y="233" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">tabel: users</text>
  <rect x="604" y="248" width="136" height="22" rx="4" fill="#10b98122" stroke="#10b98155" stroke-width="1"/>
  <text x="672" y="263" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">tabel: [jouw entiteit]</text>
  <rect x="604" y="278" width="136" height="22" rx="4" fill="#10b98122" stroke="#10b98155" stroke-width="1"/>
  <text x="672" y="293" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">+ extra tabellen</text>

  <!-- Bottom label -->
  <text x="400" y="354" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#6e7681" text-anchor="middle">De server is de enige component die rechtstreeks met de databank communiceert.</text>
</svg>
