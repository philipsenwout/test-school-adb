<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="820" height="520" fill="#1a1a2e"/>
  <text x="410" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#e0e0f0">GIP — Adminpanel</text>

  <!-- Browser mockup -->
  <rect x="20" y="50" width="780" height="450" rx="10" fill="#16162a" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- Admin header -->
  <rect x="20" y="50" width="780" height="44" rx="10" fill="#3a1020"/>
  <text x="200" y="77" font-size="14" fill="#ff8888" font-weight="700">🔐 Admin Panel — Sportclub</text>
  <rect x="700" y="60" width="90" height="24" rx="5" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="745" y="76" text-anchor="middle" font-size="11" fill="#ff5f57">Uitloggen</text>

  <!-- Form section (left) -->
  <rect x="30" y="105" width="340" height="270" rx="8" fill="#1f1f38" stroke="#7c85ff" stroke-width="1"/>
  <text x="200" y="128" text-anchor="middle" font-size="13" fill="#7c85ff" font-weight="700">Nieuwe activiteit</text>

  <text x="50" y="152" font-size="11" fill="#888">Naam</text>
  <rect x="50" y="158" width="300" height="26" rx="4" fill="#252550"/>
  <text x="62" y="174" font-size="11" fill="#a8b8ff">Veldrijden kampioenschap</text>

  <text x="50" y="198" font-size="11" fill="#888">Beschrijving</text>
  <rect x="50" y="204" width="300" height="26" rx="4" fill="#252550"/>
  <text x="62" y="220" font-size="11" fill="#888">Optioneel...</text>

  <text x="50" y="244" font-size="11" fill="#888">Datum</text>
  <rect x="50" y="250" width="140" height="26" rx="4" fill="#252550"/>
  <text x="62" y="266" font-size="11" fill="#a8b8ff">2025-05-10</text>

  <text x="200" y="244" font-size="11" fill="#888">Starttijd</text>
  <rect x="200" y="250" width="150" height="26" rx="4" fill="#252550"/>
  <text x="212" y="266" font-size="11" fill="#a8b8ff">13:00</text>

  <text x="50" y="292" font-size="11" fill="#888">Locatie</text>
  <rect x="50" y="298" width="300" height="26" rx="4" fill="#252550"/>
  <text x="62" y="314" font-size="11" fill="#a8b8ff">Sportpark Noord</text>

  <text x="50" y="340" font-size="11" fill="#888">Max. deelnemers</text>
  <rect x="50" y="346" width="100" height="26" rx="4" fill="#252550"/>
  <text x="62" y="362" font-size="11" fill="#a8b8ff">30</text>

  <rect x="50" y="342" width="300" height="0" rx="4" fill="none"/>
  <rect x="150" y="358" width="200" height="30" rx="6" fill="#7c85ff"/>
  <text x="250" y="377" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Aanmaken</text>

  <!-- Table section (right) -->
  <rect x="380" y="105" width="410" height="270" rx="8" fill="#1a1a2a" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Table header -->
  <rect x="380" y="105" width="410" height="28" rx="8" fill="#252540"/>
  <text x="430" y="123" font-size="11" fill="#7c85ff" font-weight="700">Naam</text>
  <text x="560" y="123" font-size="11" fill="#7c85ff" font-weight="700">Datum</text>
  <text x="660" y="123" font-size="11" fill="#7c85ff" font-weight="700">Acties</text>

  <!-- Row 1 -->
  <rect x="380" y="133" width="410" height="30" fill="#1f1f38"/>
  <text x="395" y="152" font-size="11" fill="#c8c8d4">Zwemtraining</text>
  <text x="560" y="152" font-size="11" fill="#888">15/04/2025</text>
  <rect x="660" y="137" width="52" height="20" rx="3" fill="#1a2040" stroke="#7c85ff" stroke-width="1"/>
  <text x="686" y="151" text-anchor="middle" font-size="10" fill="#7c85ff">Bewerk</text>
  <rect x="722" y="137" width="58" height="20" rx="3" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="751" y="151" text-anchor="middle" font-size="10" fill="#ff5f57">Verwijder</text>

  <!-- Row 2 -->
  <rect x="380" y="163" width="410" height="30" fill="#1a1a30"/>
  <text x="395" y="182" font-size="11" fill="#c8c8d4">Fietsclub weekend</text>
  <text x="560" y="182" font-size="11" fill="#888">20/04/2025</text>
  <rect x="660" y="167" width="52" height="20" rx="3" fill="#1a2040" stroke="#7c85ff" stroke-width="1"/>
  <text x="686" y="181" text-anchor="middle" font-size="10" fill="#7c85ff">Bewerk</text>
  <rect x="722" y="167" width="58" height="20" rx="3" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="751" y="181" text-anchor="middle" font-size="10" fill="#ff5f57">Verwijder</text>

  <!-- Row 3 -->
  <rect x="380" y="193" width="410" height="30" fill="#1f1f38"/>
  <text x="395" y="212" font-size="11" fill="#c8c8d4">Yoga voor beginners</text>
  <text x="560" y="212" font-size="11" fill="#888">22/04/2025</text>
  <rect x="660" y="197" width="52" height="20" rx="3" fill="#1a2040" stroke="#7c85ff" stroke-width="1"/>
  <text x="686" y="211" text-anchor="middle" font-size="10" fill="#7c85ff">Bewerk</text>
  <rect x="722" y="197" width="58" height="20" rx="3" fill="#2a1010" stroke="#ff5f57" stroke-width="1"/>
  <text x="751" y="211" text-anchor="middle" font-size="10" fill="#ff5f57">Verwijder</text>

  <!-- Admin check diagram below -->
  <rect x="30" y="388" width="760" height="100" rx="8" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="45" y="410" font-size="12" fill="#888" font-weight="700">Rolcontrole in server.js — alle wijzigingen zijn admin-only:</text>

  <text x="45" y="432" font-size="13" fill="#7c85ff" font-family="'Courier New', monospace">app.</text>
  <text x="83" y="432" font-size="13" fill="#c792ea" font-family="'Courier New', monospace">post</text>
  <text x="116" y="432" font-size="13" fill="#e0e0e0" font-family="'Courier New', monospace">('/api/activiteiten', async (req, res) =&gt; &#123;</text>

  <rect x="45" y="438" width="10" height="22" fill="#ff5f5740" rx="2"/>
  <text x="62" y="454" font-size="13" fill="#ff5f57" font-family="'Courier New', monospace">  if (req.session.rol !== 'admin')</text>
  <text x="62" y="472" font-size="13" fill="#ff5f57" font-family="'Courier New', monospace">    return res.status(403).json(&#123; fout: 'Geen toegang' &#125;);</text>

  <!-- label -->
  <text x="530" y="432" font-size="11" fill="#555">← controleer ROL, niet alleen sessie</text>
  <text x="530" y="454" font-size="11" fill="#555">← 403 Forbidden als geen admin</text>
  <text x="530" y="472" font-size="11" fill="#555">← CRUD routes: POST, PUT, DELETE</text>
</svg>
